function beginGame(swapColors) {
  if (swapColors) {
    myColor = myColor === 'black' ? 'white' : 'black';
  } else if (!swapColors && myColor === null) {
    myColor = myChoice;
  }
  // 開局時の色を記録。三手交換で myColor が反転してもこの値は維持され、
  // 終局後の「先後入れ替え/そのまま再戦」は initialMyColor を基準に判定する。
  initialMyColor = myColor;

  gameReady = true;
  initBoard();
  turn = 'black';
  gameActive = true;
  lastMove = null;

  // 三手交換フェーズの初期化（正規ルール時のみ opening_b1 から開始）
  const preset = getCurrentPreset();
  gamePhase = (preset === 'normal') ? 'opening_b1' : 'normal';
  oppSwapChoice = 'pending';
  lastSwapResult = null;
  mySwapDecided = false;
  closeSwapPanel();
  // 待った（undo）状態のリセット
  moveHistory = [];
  undoPhase = 'idle';
  undoPendingSteps = 0;
  undoStatusKey = null;
  if (typeof undoRejectTimer !== 'undefined' && undoRejectTimer) {
    clearTimeout(undoRejectTimer); undoRejectTimer = null;
  }
  // 持ち時間の初期化（currentRules.timeLimitMin に基づく）
  const tMin = (currentRules && Number.isFinite(currentRules.timeLimitMin)) ? currentRules.timeLimitMin : 0;
  timeLimitMs = tMin > 0 ? tMin * 60 * 1000 : 0;
  myTimeMs = timeLimitMs;
  oppTimeMs = timeLimitMs;
  timeoutFired = false;
  stopTimer();
  renderTimeDisplays();
  if (!isTimeUnlimited()) startTimer();
  // 囲碁の状態リセット
  goPrevBoardByColor = { black: null, white: null };
  captureCount = { black: 0, white: 0 };
  captureFlashStones = [];
  if (captureFlashTimer) { clearTimeout(captureFlashTimer); captureFlashTimer = null; }
  if (goHintTimer) { clearTimeout(goHintTimer); goHintTimer = null; }
  // 囲碁終局フェーズの状態リセット
  scoringPhase = 'idle';
  deadStones = [];
  myScoringAgreed = false;
  oppScoringAgreed = false;
  scoringResult = null;
  forcedTerritory = {};
  const bw = document.getElementById('board-frame');
  if (bw && bw.parentElement) bw.parentElement.classList.remove('scoring-active');
  // ボタン表示を通常状態に明示的にリセット（前対局の終局フェーズ残骸対策）
  const cBtn = document.getElementById('btn-confirm');
  const pBtn = document.getElementById('btn-pass');
  const aBtn = document.getElementById('btn-scoring-agree');
  const xBtn = document.getElementById('btn-scoring-cancel');
  if (cBtn) cBtn.style.display = '';
  if (pBtn) pBtn.style.display = '';
  if (aBtn) aBtn.style.display = 'none';
  if (xBtn) xBtn.style.display = 'none';
  renderCaptureDisplays();
  renderScoreDisplay();

  document.getElementById('my-color-label').innerHTML =
    `${t('youAre')} ${PIECE.svg(myColor, '20px')}${t(myColor === 'black' ? 'black' : 'white')}`;
  updateOppColorLabel();

  showScreen('game');
  renderBoard();
  updateTurnUI();
}

// ===== GAME =====
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function initBoard() {
  board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
  moveNumberMap = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
  pendingMove = null;
  consecutivePasses = 0;
  moveCount = 0;
  winningLine = null;
  drawBoardSvg();
  renderBoardCoords();
}

// 盤面の格子線・星9点を SVG で描画する（一度だけ呼ぶ）
function drawBoardSvg() {
  const svg = document.getElementById('board-svg');
  if (!svg) return;
  const cs = 22; // viewBoxユニット
  const offset = cs / 2; // 11
  const lineEnd = offset + (BOARD_SIZE - 1) * cs; // 407
  let html = '';
  // 縦線 19本
  for (let i = 0; i < BOARD_SIZE; i++) {
    const x = offset + i * cs;
    html += `<line x1="${x}" y1="${offset}" x2="${x}" y2="${lineEnd}" stroke="#2a1a0a" stroke-width="1" />`;
  }
  // 横線 19本
  for (let i = 0; i < BOARD_SIZE; i++) {
    const y = offset + i * cs;
    html += `<line x1="${offset}" y1="${y}" x2="${lineEnd}" y2="${y}" stroke="#2a1a0a" stroke-width="1" />`;
  }
  // 星9点
  const stars = [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
  stars.forEach(([sx, sy]) => {
    const x = offset + sx * cs;
    const y = offset + sy * cs;
    html += `<circle cx="${x}" cy="${y}" r="3" fill="#1a0e04" />`;
  });
  svg.innerHTML = html;
}

function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  // 待ったプレビュー中は、ゴースト範囲のセル位置と「最新で戻された手」のIdxを事前計算
  const ghostActive = (undoPhase !== 'idle' && undoPendingSteps > 0);
  const ghostStart = ghostActive ? undoGhostStartIdx() : -1;
  const latestUndoneIdx = ghostActive ? undoLatestMoveIdx() : -1;
  // 高速参照: 各 (x,y) → 'ghost' / 'ghost-latest' / null
  const ghostMap = new Map();
  if (ghostActive) {
    for (let i = ghostStart; i < moveHistory.length; i++) {
      const e = moveHistory[i];
      if (e.type === 'move') {
        const key = e.y * BOARD_SIZE + e.x;
        ghostMap.set(key, (i === latestUndoneIdx) ? 'ghost-latest' : 'ghost');
      }
    }
  }
  // 終局フェーズ用: 死石セットと領域マップ（marking と finalized の両方で表示）
  const scoringActive = isScoringDisplay();
  const territoryMap = (scoringActive && scoringResult && scoringResult.territoryMap) ? scoringResult.territoryMap : null;
  for (let y = 0; y < BOARD_SIZE; y++) {
    for (let x = 0; x < BOARD_SIZE; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      // 領域tint（空点 + 領域帰属あり）
      if (scoringActive && territoryMap && !board[y][x]) {
        const t = territoryMap[y][x];
        if (t === 'black') cell.classList.add('territory-black');
        else if (t === 'white') cell.classList.add('territory-white');
        // 手動マーク（forcedTerritory）された空点には .forced を追加
        const fkey = x + ',' + y;
        if (Object.prototype.hasOwnProperty.call(forcedTerritory, fkey)) {
          cell.classList.add('forced');
        }
      }
      cell.onclick = () => place(x, y);

      const stoneColor = board[y][x];
      const isPending = pendingMove && pendingMove.x === x && pendingMove.y === y;
      const ghostKind = ghostMap.get(y * BOARD_SIZE + x); // 'ghost' | 'ghost-latest' | undefined
      // 囲碁: 直前の捕獲で消える石をフラッシュ表示（board上は既に null だがアニメ用に一瞬描画）
      const flash = captureFlashStones && captureFlashStones.find(p => p.x === x && p.y === y);
      // 終局フェーズ中の死石マーク
      const isDead = scoringActive && stoneColor && isDeadStoneAt(x, y);

      if (stoneColor || isPending || flash) {
        const colorToShow = stoneColor || (flash && flash.color) || myColor;
        const isLast = !ghostActive && !flash && !scoringActive && lastMove && lastMove.x === x && lastMove.y === y && !isPending;
        const isWin  = winningLine && winningLine.some(p => p.x === x && p.y === y);
        const isGhost = !!ghostKind;
        const isGhostLatest = ghostKind === 'ghost-latest';
        const isCaptured = !!flash;

        let stone;
        const ghostCls = isGhost ? (' undo-ghost' + (isGhostLatest ? ' undo-latest' : '')) : '';
        const capturedCls = isCaptured ? ' captured' : '';
        const deadCls = isDead ? ' dead-stone' : '';
        if (currentLang === 'cat') {
          stone = document.createElement('div');
          stone.className = 'stone cat-piece' + (isPending ? ' preview' : '') + (isLast ? ' last-move' : '') + (isWin ? ' winning' : '') + ghostCls + capturedCls + deadCls;
          stone.innerHTML = PIECE.svg(colorToShow, '100%');
        } else {
          stone = document.createElement('div');
          stone.className = 'stone ' + colorToShow + (isPending ? ' preview' : '') + (isLast ? ' last-move' : '') + (isWin ? ' winning' : '') + ghostCls + capturedCls + deadCls;
        }
        cell.appendChild(stone);

        // 着手番号表示（トグルONのみ、CATモードでは表示しない）
        if (stoneColor && showNotation && currentLang !== 'cat') {
          const num = moveNumberMap[y][x];
          if (num > 0) {
            const numEl = document.createElement('span');
            numEl.className = 'move-number';
            numEl.style.color = stoneColor === 'black' ? '#fff' : '#000';
            numEl.textContent = num;
            stone.appendChild(numEl);
          }
        }
      }
      el.appendChild(cell);
    }
  }
}

function updateTurnUI() {
  const frame = document.getElementById('board-frame');
  const indicator = document.getElementById('turn-indicator');
  const confirmBtn = document.getElementById('btn-confirm');
  const passBtn = document.getElementById('btn-pass');
  const myTurn = turn === myColor;

  // 終局フェーズ中は updateScoringActions が turn-indicator とボタンを管理
  if (gameActive && isScoringActive()) {
    updateScoringActions();
    if (frame) frame.classList.remove('my-turn');
    return;
  }

  // 待った進行中は専用パネルが turn-indicator を覆い、ボタンは無効化
  if (gameActive && undoPhase !== 'idle') {
    if (frame) frame.classList.remove('my-turn');
    if (confirmBtn) confirmBtn.disabled = true;
    if (passBtn) passBtn.disabled = true;
    // updateUndoUI で実際のパネル描画を行う
    updateUndoUI();
    return;
  }

  // 三手交換の進行中は専用メッセージを表示
  if (gameActive && gamePhase !== 'normal') {
    const phaseKey = phaseIndicatorKey();
    if (phaseKey) {
      turnIndicatorKey = phaseKey;
      indicator.className = 'turn-indicator active';
      indicator.textContent = t(phaseKey);
      // 自分の手番フェーズなら盤面枠もアクティブ
      if (phaseKey === 'phase_b1_me' || phaseKey === 'phase_w1_me' || phaseKey === 'phase_b2_me') {
        frame.classList.add('my-turn');
      } else {
        frame.classList.remove('my-turn');
      }
      // ボタン制御
      if (confirmBtn) confirmBtn.disabled = !(myTurn && pendingMove && gameActive);
      if (passBtn) passBtn.disabled = true; // 開局フェーズではパス禁止
      return;
    }
  }

  if (myTurn) {
    frame.classList.add('my-turn');
    indicator.className = 'turn-indicator active';
    indicator.textContent = t('myTurn');
    turnIndicatorKey = 'myTurn';
  } else {
    frame.classList.remove('my-turn');
    indicator.className = 'turn-indicator';
    indicator.textContent = t('oppTurn');
    turnIndicatorKey = 'oppTurn';
  }

  // 確定ボタン: 自分手番＋仮置き有り＋対局中のみ
  if (confirmBtn) confirmBtn.disabled = !(myTurn && pendingMove && gameActive);
  // パスボタン: 自分手番＋対局中のみ
  if (passBtn) passBtn.disabled = !(myTurn && gameActive);
  // 待ったボタンの表示・有効状態
  updateUndoUI();
  // 終局フェーズボタンの表示状態同期（前対局の終局からの遷移で残骸が出ないよう）
  if (typeof updateScoringActions === 'function') updateScoringActions();
}

// 三手交換フェーズに対応するturn-indicatorキーを返す
function phaseIndicatorKey() {
  const myTurn = turn === myColor;
  switch (gamePhase) {
    case 'opening_b1': return myTurn ? 'phase_b1_me' : 'phase_b1_opp';
    case 'opening_w1': return myTurn ? 'phase_w1_me' : 'phase_w1_opp';
    case 'opening_b2': return myTurn ? 'phase_b2_me' : 'phase_b2_opp';
    case 'swap_select': return 'phase_swap_me';   // 白側
    case 'swap_wait':   return 'phase_swap_opp';  // 黒側
    default: return null;
  }
}

function place(x, y) {
  if (!gameReady || !gameActive) return;
  // 終局フェーズ中: 石クリック=死石トグル、空点クリック=手動地マーク（自分の色方向）
  if (isScoringActive()) {
    if (board[y][x] !== null) {
      toggleDeadStone(x, y, false);
    } else {
      toggleForcedTerritory(x, y, myColor, false);
    }
    return;
  }
  // 三手交換のスワップ選択フェーズでは盤面操作不可
  if (gamePhase === 'swap_select' || gamePhase === 'swap_wait') return;
  // 待った進行中（preparing/awaiting/reviewing）も盤面操作不可
  if (undoPhase !== 'idle') return;
  if (turn !== myColor) return;
  if (board[y][x]) return;

  // 正規ルール: 黒1手目は天元(9,9)固定
  if (gamePhase === 'opening_b1' && (x !== 9 || y !== 9)) {
    showTengenHint();
    return;
  }

  // カジュアル: 三三禁を仮置き時点で弾く（無効クリック扱い）
  if (getCurrentPreset() === 'casual' && isForbiddenAt(x, y, myColor)) {
    return;
  }

  // 同じ場所への2回目クリック → PCなら確定（モバイルは無視）
  if (pendingMove && pendingMove.x === x && pendingMove.y === y) {
    if (!IS_TOUCH) confirmMove();
    return;
  }
  pendingMove = { x, y };
  renderBoard();
  updateTurnUI();
}

// 天元(9,9)以外をクリックした際のヒント表示（turn-indicator に一時表示）
function showTengenHint() {
  turnIndicatorKey = 'phase_tengen_only';
  const ind = document.getElementById('turn-indicator');
  if (ind) {
    ind.className = 'turn-indicator active';
    ind.textContent = t('phase_tengen_only');
  }
  if (tengenHintTimer) clearTimeout(tengenHintTimer);
  tengenHintTimer = setTimeout(() => {
    tengenHintTimer = null;
    updateTurnUI();
  }, 2000);
}

function getCurrentPreset() {
  return (currentRules && currentRules.preset) || 'free';
}

function getRuleSetForMove(color) {
  if (typeof GomokuRules === 'undefined') return null;
  const tbl = GomokuRules.PRESET_RULESETS[getCurrentPreset()];
  return tbl ? tbl[color] : null;
}

// 着手前 (board[y][x] === null) の禁手チェック
function isForbiddenAt(x, y, color) {
  if (typeof GomokuRules === 'undefined') return false;
  const ruleSet = getRuleSetForMove(color);
  if (!ruleSet) return false;
  return GomokuRules.isForbidden(board, x, y, color, ruleSet, BOARD_SIZE);
}

function confirmMove() {
  if (!pendingMove) return;
  if (!gameReady || !gameActive) return;
  if (turn !== myColor) return;
  const { x, y } = pendingMove;

  // ===== 囲碁モード =====
  if (isGoRoom()) {
    const r = applyGoMove(x, y, myColor);
    if (!r.valid) {
      // 確定時に弾く: 仮置き解除 + 違反ヒント表示
      pendingMove = null;
      renderBoard();
      showGoViolationHint(r.illegalReason);
      return;
    }
    // 着手成功 → 相手に送信（受信側でも同じ placeMove を実行して同期）
    send({ type: 'move', x, y, remainingMs: isTimeUnlimited() ? null : myTimeMs });
    pendingMove = null;
    consecutivePasses = 0;
    renderBoard();
    renderCaptureDisplays();
    nextTurn();
    return;
  }

  // ===== 五目並べモード =====
  const preset = getCurrentPreset();
  // 着手前の禁手判定（board[y][x] はまだ null）
  // 正規: 禁手なら打って即敗北。カジュアル: 念のため確定時にもガード（仮置き済みでも蹴る）。
  const forbidden = (typeof GomokuRules !== 'undefined') ? isForbiddenAt(x, y, myColor) : false;
  if (preset === 'casual' && forbidden) {
    pendingMove = null;
    renderBoard();
    updateTurnUI();
    return;
  }

  applyMove(x, y, myColor);
  send({ type: 'move', x, y, remainingMs: isTimeUnlimited() ? null : myTimeMs });
  pendingMove = null;
  consecutivePasses = 0;

  if (preset === 'normal' && forbidden) {
    // 禁手で着手 → 自分の負け
    const winnerColor = (myColor === 'black') ? 'white' : 'black';
    endGame(winnerColor, 'forbidden');
    return;
  }

  // プリセット別の勝敗判定
  if (typeof GomokuRules !== 'undefined') {
    const r = GomokuRules.checkWinByPreset(board, x, y, myColor, preset, BOARD_SIZE);
    if (r && r.result === 'win') {
      winningLine = r.line;
      endGame(myColor);
      return;
    }
  }
  // 三手交換のフェーズ進行
  advancePhaseAfterMove();
  nextTurn();
}

// 着手後にフェーズを進める（自分の着手後に呼ぶ。相手側でも同じロジックを呼ぶ）
function advancePhaseAfterMove() {
  if (gamePhase === 'opening_b1') {
    gamePhase = 'opening_w1';
  } else if (gamePhase === 'opening_w1') {
    gamePhase = 'opening_b2';
  } else if (gamePhase === 'opening_b2') {
    // 黒2手目完了 → swap選択フェーズへ
    // 白側 = swap_select、黒側 = swap_wait
    gamePhase = (myColor === 'white') ? 'swap_select' : 'swap_wait';
    // パネルを開く
    openSwapPanel();
  }
}

function applyMove(x, y, color) {
  board[y][x] = color;
  moveCount++;
  moveNumberMap[y][x] = moveCount;
  lastMove = { x, y };
  moveHistory.push({type: 'move', x, y, color});
}

// ===== 囲碁の着手処理 =====
// 共通エントリ: GoRules.placeMove で結果を取得し、UI/state を更新する。
// 戻り値: { valid:true, captured:[{x,y,color}] } または { valid:false, illegalReason }
function applyGoMove(x, y, color) {
  if (typeof GoRules === 'undefined') return { valid: false, illegalReason: 'occupied' };
  const prev = goPrevBoardByColor[color];
  const r = GoRules.placeMove(board, x, y, color, prev, BOARD_SIZE);
  if (!r.valid) return r;
  // 捕獲フラッシュ用: 一瞬古い盤面に「取られる石」を残してアニメ（CSS と同じ1秒）
  if (r.captured.length > 0) {
    captureFlashStones = r.captured.slice();
    if (captureFlashTimer) clearTimeout(captureFlashTimer);
    captureFlashTimer = setTimeout(() => {
      captureFlashStones = [];
      captureFlashTimer = null;
      renderBoard();
    }, 1000);
  }
  // board / moveNumberMap 更新（newBoard を反映）
  for (let yy = 0; yy < BOARD_SIZE; yy++) {
    for (let xx = 0; xx < BOARD_SIZE; xx++) {
      const before = board[yy][xx];
      const after = r.newBoard[yy][xx];
      if (before && !after) {
        moveNumberMap[yy][xx] = 0;
      }
      board[yy][xx] = after;
    }
  }
  moveCount++;
  moveNumberMap[y][x] = moveCount;
  lastMove = { x, y };
  moveHistory.push({type: 'move', x, y, color});
  // 取石数: 着手した側がオフになる相手色の石を「取った」
  captureCount[color] += r.captured.length;
  // コウ参照盤面更新（自分の手後の盤面）
  goPrevBoardByColor[color] = GoRules.cloneBoard(board);
  return r;
}

// ===== 囲碁 終局フェーズ =====
// 'marking': 死石・地マーク中（インタラクション可能）
// 'finalized': 結果確定後の表示中（地・スコアは見えるがインタラクション不可）
// 'idle': 通常状態
function isScoringActive() { return scoringPhase === 'marking'; }
function isScoringDisplay() { return scoringPhase === 'marking' || scoringPhase === 'finalized'; }

function isDeadStoneAt(x, y) {
  return deadStones.some(p => p.x === x && p.y === y);
}

function recomputeScoring() {
  if (typeof GoScoring === 'undefined') return;
  // Step 1: 自動判定（forcedTerritory 抜き）を計算
  const result = GoScoring.computeScore(
    board, deadStones, captureCount, GoScoring.DEFAULT_KOMI, BOARD_SIZE
  );
  // Step 2: forcedTerritory のうち自動判定と一致するエントリを削除
  // （自動と同じならわざわざ手動上書きする必要がない=オレンジマーク不要）
  for (const key of Object.keys(forcedTerritory)) {
    const [xs, ys] = key.split(',');
    const x = parseInt(xs, 10), y = parseInt(ys, 10);
    if (forcedTerritory[key] === result.territoryMap[y][x]) {
      delete forcedTerritory[key];
    }
  }
  // Step 3: 残った forcedTerritory を applyForcedTerritory で適用
  scoringResult = result;
  applyForcedTerritory();
}

// 自動判定の territoryMap に手動マーク（forcedTerritory）を上書きし、
// 黒地・白地・合計・勝敗・差を再計算する
function applyForcedTerritory() {
  if (!scoringResult || !scoringResult.territoryMap) return;
  let bAdj = 0, wAdj = 0;
  for (const key of Object.keys(forcedTerritory)) {
    const [xs, ys] = key.split(',');
    const x = parseInt(xs, 10), y = parseInt(ys, 10);
    if (board[y][x] !== null) continue;
    const newColor = forcedTerritory[key];
    const oldColor = scoringResult.territoryMap[y][x];
    if (oldColor === newColor) continue;
    scoringResult.territoryMap[y][x] = newColor;
    if (oldColor === 'black') bAdj--;
    if (oldColor === 'white') wAdj--;
    if (newColor === 'black') bAdj++;
    if (newColor === 'white') wAdj++;
  }
  scoringResult.black.territory += bAdj;
  scoringResult.white.territory += wAdj;
  scoringResult.black.total += bAdj;
  scoringResult.white.total += wAdj;
  if (scoringResult.black.total > scoringResult.white.total) {
    scoringResult.winner = 'black';
    scoringResult.margin = scoringResult.black.total - scoringResult.white.total;
  } else if (scoringResult.white.total > scoringResult.black.total) {
    scoringResult.winner = 'white';
    scoringResult.margin = scoringResult.white.total - scoringResult.black.total;
  } else {
    scoringResult.winner = 'draw';
    scoringResult.margin = 0;
  }
}

// 現在表示されている空点(x,y)の領域帰属を取得（手動 forced 優先、無ければ自動）
function getDisplayTerritoryAt(x, y) {
  const key = x + ',' + y;
  if (Object.prototype.hasOwnProperty.call(forcedTerritory, key)) {
    return forcedTerritory[key];
  }
  if (scoringResult && scoringResult.territoryMap) {
    return scoringResult.territoryMap[y][x];
  }
  return null;
}

// (x,y)から同じ表示色で連結している空点群をBFSで取得。
// 表示色は forced+auto 合成後の値。石は通過しない。
function findConnectedTerritoryGroup(x, y, color) {
  const region = [];
  if (board[y][x] !== null) return region;
  const visited = new Set();
  const startKey = y * BOARD_SIZE + x;
  visited.add(startKey);
  const queue = [{x, y}];
  while (queue.length) {
    const p = queue.shift();
    region.push(p);
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dx, dy] of dirs) {
      const nx = p.x + dx, ny = p.y + dy;
      if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) continue;
      const k = ny * BOARD_SIZE + nx;
      if (visited.has(k)) continue;
      if (board[ny][nx] !== null) continue;
      const ndc = getDisplayTerritoryAt(nx, ny);
      if (ndc !== color) continue;
      visited.add(k);
      queue.push({x: nx, y: ny});
    }
  }
  return region;
}

// (x,y) が「内部セル」（4近傍すべてが同じ表示色の地）かを判定。
// 端や辺、石、neutral、別の色 のいずれかに接している場合は false（=端セル）。
function isInteriorTerritoryCell(x, y, color) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dx, dy] of dirs) {
    const nx = x + dx, ny = y + dy;
    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) return false;
    if (board[ny][nx] !== null) return false;
    if (getDisplayTerritoryAt(nx, ny) !== color) return false;
  }
  return true;
}

// 空点を手動でマーク。
//   - 表示色が neutral（または null） → byColor（単一セルのみ）
//   - 表示色が黒/白:
//     * 中央セル（4近傍すべて同色地） → 連結している同色地グループ全体を neutral
//     * 端セル（辺/角/石/別色/neutral に接する） → そのセルだけ neutral
// byColor は「クリックした人の色」（白手番なら white, 黒手番なら black）。
// 死石マークと同様、両者で同期、変更すると合意リセット。
function toggleForcedTerritory(x, y, byColor, fromOpp) {
  if (!isScoringActive()) return;
  if (board[y][x] !== null) return;
  if (byColor !== 'black' && byColor !== 'white') return;

  const currentDisplay = getDisplayTerritoryAt(x, y);
  if (currentDisplay === 'neutral' || currentDisplay === null) {
    // neutral → byColor (単一)
    forcedTerritory[x + ',' + y] = byColor;
  } else {
    // 黒地/白地 → neutral
    if (isInteriorTerritoryCell(x, y, currentDisplay)) {
      // 中央セル: 連結グループ全体を neutral
      const region = findConnectedTerritoryGroup(x, y, currentDisplay);
      for (const p of region) {
        forcedTerritory[p.x + ',' + p.y] = 'neutral';
      }
    } else {
      // 端セル: 単一のみ
      forcedTerritory[x + ',' + y] = 'neutral';
    }
  }

  if (!fromOpp) {
    send({type: 'force_territory_toggle', x, y, byColor});
  }
  myScoringAgreed = false;
  oppScoringAgreed = false;
  recomputeScoring(); // 自動判定一致は自動的に cleanup される
  renderBoard();
  renderScoreDisplay();
  updateScoringActions();
}

// 連続パス2回で呼ばれる: 終局フェーズに入る
function enterScoringPhase() {
  scoringPhase = 'marking';
  deadStones = [];
  myScoringAgreed = false;
  oppScoringAgreed = false;
  recomputeScoring();
  // 盤面に scoring-active クラスをつけてホバー効果ON
  const bf = document.getElementById('board-frame');
  if (bf) bf.parentElement.classList.add('scoring-active');
  renderBoard();
  renderScoreDisplay();
  updateTurnUI();
  updateScoringActions();
}

function exitScoringPhase() {
  scoringPhase = 'idle';
  deadStones = [];
  myScoringAgreed = false;
  oppScoringAgreed = false;
  scoringResult = null;
  forcedTerritory = {};
  const bf = document.getElementById('board-frame');
  if (bf && bf.parentElement) bf.parentElement.classList.remove('scoring-active');
  // ボタン表示を通常状態に戻す
  const confirmBtn = document.getElementById('btn-confirm');
  const passBtn = document.getElementById('btn-pass');
  const agreeBtn = document.getElementById('btn-scoring-agree');
  const cancelBtn = document.getElementById('btn-scoring-cancel');
  if (confirmBtn) confirmBtn.style.display = '';
  if (passBtn) passBtn.style.display = '';
  if (agreeBtn) agreeBtn.style.display = 'none';
  if (cancelBtn) cancelBtn.style.display = 'none';
  renderScoreDisplay();
}

// 結果確定後（finalize 経由）の終局フェーズ。データ（deadStones / forcedTerritory /
// scoringResult）は維持して地・スコアの表示を5秒間継続させる。インタラクション用
// ボタンのみ非表示にする。完全クリアは beginGame / resetToLobby で行う。
function softExitScoringPhase() {
  scoringPhase = 'finalized';
  myScoringAgreed = false;
  oppScoringAgreed = false;
  const agreeBtn = document.getElementById('btn-scoring-agree');
  const cancelBtn = document.getElementById('btn-scoring-cancel');
  if (agreeBtn) agreeBtn.style.display = 'none';
  if (cancelBtn) cancelBtn.style.display = 'none';
  // 通常ボタンも無効化（gameActiveもfalseになるが防御的に表示は戻す）
  const confirmBtn = document.getElementById('btn-confirm');
  const passBtn = document.getElementById('btn-pass');
  if (confirmBtn) confirmBtn.style.display = '';
  if (passBtn) passBtn.style.display = '';
  // 板の scoring-active クラスは維持（ホバー効果）— 不要なら removable
}

// 死石をトグルして相手に通知。両者の合意フラグもリセット（Q5=b）
// 死石が変わると自動地判定も変わるので、手動上書き（forcedTerritory）もクリア
function toggleDeadStone(x, y, fromOpp) {
  const idx = deadStones.findIndex(p => p.x === x && p.y === y);
  if (idx >= 0) {
    deadStones.splice(idx, 1);
  } else {
    deadStones.push({x, y});
  }
  if (!fromOpp) {
    send({type: 'dead_stone_toggle', x, y});
  }
  // 死石変化で両者の合意 + 手動地マークもリセット
  myScoringAgreed = false;
  oppScoringAgreed = false;
  forcedTerritory = {};
  recomputeScoring();
  renderBoard();
  renderScoreDisplay();
  updateScoringActions();
}

function agreeScoring() {
  if (!isScoringActive()) return;
  if (myScoringAgreed) return;
  myScoringAgreed = true;
  send({type: 'scoring_agree'});
  updateScoringActions();
  if (myScoringAgreed && oppScoringAgreed) {
    finalizeScoring();
  }
}

function cancelAgreeScoring() {
  if (!isScoringActive()) return;
  if (!myScoringAgreed) return;
  myScoringAgreed = false;
  send({type: 'scoring_disagree'});
  updateScoringActions();
}

// 両者合意で最終結果へ移行。データは維持して結果表示中も地・スコアが見える状態にする。
function finalizeScoring() {
  if (!scoringResult) recomputeScoring();
  const winnerColor = (scoringResult && scoringResult.winner !== 'draw')
    ? scoringResult.winner : null;
  softExitScoringPhase();
  endGame(winnerColor, 'go-final');
}

// スコア表示を更新（my-score-display と opp-score-display）
// marking と finalized の両方で表示する
function renderScoreDisplay() {
  const myEl = document.getElementById('my-score-display');
  const oppEl = document.getElementById('opp-score-display');
  if (!myEl || !oppEl) return;
  if (!isScoringDisplay() || !scoringResult || !myColor) {
    myEl.style.display = 'none';
    oppEl.style.display = 'none';
    return;
  }
  const oc = (myColor === 'black') ? 'white' : 'black';
  const my = scoringResult[myColor];
  const op = scoringResult[oc];
  myEl.style.display = '';
  oppEl.style.display = '';
  myEl.textContent = formatScoreLine(my, myColor);
  oppEl.textContent = formatScoreLine(op, oc);
}

// 囲碁の最終結果テキスト: "黒 17.5 - 白 13.5  黒 4.0目勝ち"
function formatGoFinalResult(sr, viewerColor) {
  if (!sr) return '';
  const blackTotal = sr.black.total;
  const whiteTotal = sr.white.total;
  const head = `${t('black')} ${blackTotal} - ${t('white')} ${whiteTotal}`;
  if (sr.winner === 'draw') return head + ' ' + t('drawMsg');
  const winnerLabel = (sr.winner === 'black') ? t('black') : t('white');
  return head + '  ' + winnerLabel + ' ' + sr.margin + t('goFinalMarginUnit');
}

function formatScoreLine(s, color) {
  // 例: "17.5目 (地7+取4+コミ6.5)"
  const parts = [];
  parts.push(t('scoreTerritory') + s.territory);
  parts.push(t('scoreCaptures') + (s.captures + s.deadOpp));
  if (color === 'white' && s.komi) parts.push(t('scoreKomi') + s.komi);
  return s.total + t('scoreUnit') + ' (' + parts.join('+') + ')';
}

// 終局フェーズの状態に応じて board-actions と turn-indicator を更新
function updateScoringActions() {
  const confirmBtn = document.getElementById('btn-confirm');
  const passBtn = document.getElementById('btn-pass');
  const undoBtn = document.getElementById('btn-undo');
  const agreeBtn = document.getElementById('btn-scoring-agree');
  const cancelBtn = document.getElementById('btn-scoring-cancel');
  const indicator = document.getElementById('turn-indicator');
  const frame = document.getElementById('board-frame');

  if (isScoringActive()) {
    if (confirmBtn) confirmBtn.style.display = 'none';
    if (passBtn) passBtn.style.display = 'none';
    if (undoBtn) undoBtn.style.display = 'none';
    if (agreeBtn) {
      agreeBtn.style.display = '';
      agreeBtn.disabled = myScoringAgreed;
    }
    if (cancelBtn) {
      cancelBtn.style.display = '';
      cancelBtn.disabled = !myScoringAgreed;
    }
    // turn-indicator: 終局フェーズメッセージ
    let key;
    if (myScoringAgreed && !oppScoringAgreed) key = 'scoringWaitingOpp';
    else if (!myScoringAgreed && oppScoringAgreed) key = 'scoringOppAgreed';
    else if (myScoringAgreed && oppScoringAgreed) key = 'scoringBothAgreed';
    else key = 'scoringMarkPrompt';
    turnIndicatorKey = key;
    if (indicator) {
      indicator.className = 'turn-indicator active';
      indicator.textContent = t(key);
      indicator.style.display = '';
    }
    if (frame) frame.classList.remove('my-turn');
  } else {
    if (confirmBtn) confirmBtn.style.display = '';
    if (passBtn) passBtn.style.display = '';
    if (agreeBtn) agreeBtn.style.display = 'none';
    if (cancelBtn) cancelBtn.style.display = 'none';
    // undo button visibility は updateUndoUI に委ねる
  }
}

// コウ違反/自殺手のヒントを turn-indicator に短時間表示
function showGoViolationHint(reason) {
  const ind = document.getElementById('turn-indicator');
  if (!ind) return;
  if (goHintTimer) clearTimeout(goHintTimer);
  const key = (reason === 'ko') ? 'goHintKo'
            : (reason === 'suicide') ? 'goHintSuicide'
            : 'goHintInvalid';
  turnIndicatorKey = key;
  ind.classList.add('violation-hint');
  ind.textContent = t(key);
  goHintTimer = setTimeout(() => {
    goHintTimer = null;
    ind.classList.remove('violation-hint');
    updateTurnUI();
  }, 1500);
}

// 取石数表示の更新（gameActive または scoring 中（marking/finalized）に表示）
function renderCaptureDisplays() {
  const myEl = document.getElementById('my-capture-display');
  const oppEl = document.getElementById('opp-capture-display');
  if (!myEl || !oppEl) return;
  const showActive = (gameActive || isScoringDisplay()) && isGoRoom() && myColor;
  if (showActive) {
    const oc = (myColor === 'black') ? 'white' : 'black';
    myEl.style.display = '';
    oppEl.style.display = '';
    myEl.textContent = t('captureLabel') + captureCount[myColor];
    oppEl.textContent = t('captureLabel') + captureCount[oc];
  } else {
    myEl.style.display = 'none';
    oppEl.style.display = 'none';
  }
}

// ===== 持ち時間 =====
function isTimeUnlimited() { return timeLimitMs <= 0; }

function formatTimeMs(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.ceil(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

// 持ち時間タイマーが動くべき条件
//  - gameActive
//  - 時間制限ありの対局（timeLimitMs > 0）
//  - 三手交換の swap_select/swap_wait 中は停止（互いの判断待ち）
//  - 待った申請中は停止
//  - 囲碁の終局フェーズ（scoring）中は停止
// ※ opening_b1/w1/b2 中は通常通り動く（実際に着手している時間なので）
function shouldTimerTick() {
  return gameActive && !isTimeUnlimited()
    && gamePhase !== 'swap_select'
    && gamePhase !== 'swap_wait'
    && undoPhase === 'idle'
    && scoringPhase === 'idle';
}

// 1秒ごとに残時間を減算する。手番のプレイヤーの残時間が減る。
function startTimer() {
  if (timerInterval) return;
  if (isTimeUnlimited()) return;
  lastTickAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  timerInterval = setInterval(timerTick, 200); // 5fps で十分
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function timerTick() {
  if (!shouldTimerTick()) {
    // タイマーは生かしておくが減算しない（フェーズ復帰で自動再開できるよう）
    lastTickAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
    renderTimeDisplays();
    return;
  }
  const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  const dt = now - lastTickAt;
  lastTickAt = now;
  if (turn === myColor) {
    myTimeMs -= dt;
    if (myTimeMs <= 0 && !timeoutFired) {
      myTimeMs = 0;
      timeoutFired = true;
      send({ type: 'time_out' });
      // 自分の時間切れ → 自分の負け
      const winnerColor = (myColor === 'black') ? 'white' : 'black';
      endGame(winnerColor, 'timeout');
      renderTimeDisplays();
      return;
    }
  } else {
    // 相手の手番中も相手側の表示を進める（ただし真の値は相手から着手時に上書きされる）
    oppTimeMs -= dt;
    if (oppTimeMs < 0) oppTimeMs = 0;
  }
  renderTimeDisplays();
}

// opp-color-badge のラベル（相手色名）を更新する。
// CAT モードの t() は毎回ランダムな単語を返すため、200ms毎の renderTimeDisplays
// から呼ぶと文言が頻繁に切り替わってうっとうしい。状態が変わった時のみ呼ぶ。
function updateOppColorLabel() {
  const oppCl = document.getElementById('opp-color-label');
  if (!oppCl) return;
  if (!myColor) { oppCl.innerHTML = ''; return; }
  const oc = (myColor === 'black') ? 'white' : 'black';
  oppCl.innerHTML = `${t('opponentLabel')} ${PIECE.svg(oc, '20px')}${t(oc === 'black' ? 'black' : 'white')}`;
}

// 時計表示の更新（数字、警告色、アクティブ枠のみ。ラベル文言はここでは触らない）
function renderTimeDisplays() {
  const myEl  = document.getElementById('my-time-display');
  const oppEl = document.getElementById('opp-time-display');
  const oppBadge = document.getElementById('opp-color-badge');
  if (!myEl || !oppEl || !oppBadge) return;

  if (isTimeUnlimited()) {
    // 無制限: ∞ 表示
    myEl.style.display = '';
    oppEl.style.display = '';
    myEl.textContent = '∞';
    oppEl.textContent = '∞';
    myEl.className = 'time-display unlimited';
    oppEl.className = 'time-display unlimited';
  } else {
    myEl.style.display = '';
    oppEl.style.display = '';
    myEl.textContent = formatTimeMs(myTimeMs);
    oppEl.textContent = formatTimeMs(oppTimeMs);
    const myWarn  = myTimeMs  <= 3 * 60 * 1000;
    const oppWarn = oppTimeMs <= 3 * 60 * 1000;
    const myActive  = (turn === myColor) && shouldTimerTick();
    const oppActive = (turn !== myColor) && shouldTimerTick();
    myEl.className  = 'time-display' + (myWarn ? ' warning' : '') + (myActive ? ' active' : '');
    oppEl.className = 'time-display' + (oppWarn ? ' warning' : '') + (oppActive ? ' active' : '');
  }

  // opp-color-badge の表示/非表示のみ切り替え（ラベル文言は触らない）
  // 三手交換 swap_select/swap_wait 中は opp-badge を隠してスワップパネルが上書き表示
  // 終局フェーズの結果表示中（finalized）も opp-badge を表示し続ける
  const swapActive = (gamePhase === 'swap_select' || gamePhase === 'swap_wait');
  const showOpp = (gameActive || isScoringDisplay()) && !swapActive && myColor;
  oppBadge.style.display = showOpp ? '' : 'none';
  const swapPanel = document.getElementById('swap-overlay');
  if (swapPanel) swapPanel.style.display = swapActive ? '' : 'none';
}

function syncTimeFromMessage(remainingMs) {
  if (typeof remainingMs !== 'number' || !isFinite(remainingMs)) return;
  // 着手メッセージは相手が送ってきたもの → 相手の残時間
  oppTimeMs = Math.max(0, remainingMs);
}

// ===== 待った（UNDO）=====
// 1回押し = 自分の手番に戻るまで戻す（相手の最新手 + 自分の最新手）。
// 残り履歴が1個だけのときは1手戻し。

// 1回押しで戻る手数を返す（0=戻せない）
function undoStepsPerClick() {
  const remaining = moveHistory.length - undoPendingSteps;
  if (remaining <= 0) return 0;
  return remaining >= 2 ? 2 : 1;
}

// ゴースト範囲（プレビュー中の戻し対象）の history インデックス開始位置
function undoGhostStartIdx() {
  return moveHistory.length - undoPendingSteps;
}

// ある history インデックスが現在ゴースト表示対象かを判定
function isGhostHistoryIdx(idx) {
  if (undoPhase === 'idle') return false;
  return idx >= undoGhostStartIdx() && idx < moveHistory.length;
}

// ゴースト範囲の中で「最新で戻された」=オレンジ強調すべき着手のインデックス
// = 範囲の最古 = ゴースト範囲先頭。pass の場合はその次の 'move' を探す。
function undoLatestMoveIdx() {
  if (undoPendingSteps === 0) return -1;
  const start = undoGhostStartIdx();
  for (let i = start; i < moveHistory.length; i++) {
    if (moveHistory[i].type === 'move') return i;
  }
  return -1;
}

// 待ったボタン: 1段戻しの予約を増やす（自分の手番＋idle/preparing のみ）
function requestUndoStep() {
  if (!gameReady || !gameActive) return;
  if (getCurrentPreset() === 'normal') return;
  if (turn !== myColor) return;
  if (undoPhase !== 'idle' && undoPhase !== 'preparing') return;
  const steps = undoStepsPerClick();
  if (steps === 0) return; // これ以上戻せない
  undoPendingSteps += steps;
  undoPhase = 'preparing';
  undoStatusKey = null;
  pendingMove = null; // 仮置きキャンセル
  renderBoard();
  updateUndoUI();
  updateTurnUI();
}

// 待ったキャンセル: preparing 中のみ。idle に戻し、ゴーストを解除
function cancelUndo() {
  if (undoPhase !== 'preparing') return;
  undoPhase = 'idle';
  undoPendingSteps = 0;
  undoStatusKey = null;
  renderBoard();
  updateUndoUI();
  updateTurnUI();
}

// 同意申請: 相手に undo_request を送り awaiting_response へ
function submitUndoRequest() {
  if (undoPhase !== 'preparing') return;
  if (undoPendingSteps <= 0) return;
  send({type: 'undo_request', steps: undoPendingSteps});
  undoPhase = 'awaiting_response';
  undoStatusKey = null;
  updateUndoUI();
  updateTurnUI();
}

// 自分が同意（受信側）
function acceptUndo() {
  if (undoPhase !== 'reviewing') return;
  send({type: 'undo_accept'});
  applyUndoFinal(undoPendingSteps);
  undoPhase = 'idle';
  undoPendingSteps = 0;
  undoStatusKey = null;
  renderBoard();
  updateUndoUI();
  updateTurnUI();
}

// 自分が拒否（受信側）
function rejectUndo() {
  if (undoPhase !== 'reviewing') return;
  send({type: 'undo_reject'});
  undoPhase = 'idle';
  undoPendingSteps = 0;
  undoStatusKey = null;
  renderBoard();
  updateUndoUI();
  updateTurnUI();
}

// 実際に moveHistory から末尾N個を削除して盤面状態を再構築する（合意後）
function applyUndoFinal(N) {
  if (N <= 0) return;
  if (N > moveHistory.length) N = moveHistory.length;
  const remaining = moveHistory.slice(0, moveHistory.length - N);

  if (isGoRoom()) {
    // 囲碁: 取石を伴うため moveHistory を最初からリプレイして盤面を再構築
    board = (typeof GoRules !== 'undefined') ? GoRules.createEmptyBoard(BOARD_SIZE)
                                              : Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(null));
    moveNumberMap = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(0));
    moveCount = 0;
    captureCount = { black: 0, white: 0 };
    goPrevBoardByColor = { black: null, white: null };
    moveHistory = [];
    lastMove = null;
    consecutivePasses = 0;
    for (const e of remaining) {
      if (e.type === 'move') {
        applyGoMove(e.x, e.y, e.color);
        consecutivePasses = 0;
      } else if (e.type === 'pass') {
        moveHistory.push({type: 'pass', color: e.color});
        consecutivePasses++;
      }
    }
    // リプレイ中の捕獲フラッシュ残骸をクリア（巻き戻し時はアニメ抑制）
    captureFlashStones = [];
    if (captureFlashTimer) { clearTimeout(captureFlashTimer); captureFlashTimer = null; }
  } else {
    // 五目並べ: 末尾N手を物理的に削除（取石なしのため単純に巻き戻し可能）
    const removed = moveHistory.splice(moveHistory.length - N, N);
    for (const e of removed) {
      if (e.type === 'move') {
        board[e.y][e.x] = null;
        moveNumberMap[e.y][e.x] = 0;
        moveCount--;
      }
    }
    // lastMove 再計算
    lastMove = null;
    for (let i = moveHistory.length - 1; i >= 0; i--) {
      if (moveHistory[i].type === 'move') {
        lastMove = {x: moveHistory[i].x, y: moveHistory[i].y};
        break;
      }
    }
    // consecutivePasses 再計算
    consecutivePasses = 0;
    for (let i = moveHistory.length - 1; i >= 0 && moveHistory[i].type === 'pass'; i--) {
      consecutivePasses++;
    }
  }
  // turn 再計算（共通: 末尾の色の反対、履歴空なら 'black'）
  const last = moveHistory[moveHistory.length - 1];
  turn = last ? (last.color === 'black' ? 'white' : 'black') : 'black';
  winningLine = null;
  pendingMove = null;
}

// 拒否通知を turn-indicator に3秒表示（idle復帰後）
let undoRejectTimer = null;
function showUndoRejectedNotice() {
  if (undoRejectTimer) clearTimeout(undoRejectTimer);
  turnIndicatorKey = 'undoRejected';
  const ind = document.getElementById('turn-indicator');
  if (ind) {
    ind.className = 'turn-indicator active';
    ind.textContent = t('undoRejected');
  }
  undoRejectTimer = setTimeout(() => {
    undoRejectTimer = null;
    updateTurnUI();
  }, 3000);
}

// undo-panel と btn-undo, btn-confirm, btn-pass の表示・有効状態を更新
function updateUndoUI() {
  const panel    = document.getElementById('undo-panel');
  const panelText = document.getElementById('undo-panel-text');
  const panelBtns = document.getElementById('undo-panel-buttons');
  const btnUndo  = document.getElementById('btn-undo');
  const btnConf  = document.getElementById('btn-confirm');
  const btnPass  = document.getElementById('btn-pass');
  const turnInd  = document.getElementById('turn-indicator');

  // 待ったボタン: 自分の手番＋idle/preparing＋カジュアル/自由＋履歴に戻せるものがある
  const preset = getCurrentPreset();
  const myTurnNow = (turn === myColor);
  const undoBtnVisible = gameActive
    && preset !== 'normal'
    && (undoPhase === 'idle' || undoPhase === 'preparing')
    && myTurnNow
    && (moveHistory.length - undoPendingSteps) > 0;
  if (btnUndo) btnUndo.style.display = undoBtnVisible ? '' : 'none';
  if (btnUndo) btnUndo.disabled = !undoBtnVisible;

  // パネル表示
  if (undoPhase === 'idle') {
    if (panel) panel.style.display = 'none';
    if (turnInd) turnInd.style.display = '';
    return;
  }

  // パネル表示モード（preparing/awaiting/reviewing）
  if (panel) panel.style.display = '';
  if (turnInd) turnInd.style.display = 'none';

  // 確定/パスは無効化
  if (btnConf) btnConf.disabled = true;
  if (btnPass) btnPass.disabled = true;

  // パスM回カウント（戻し範囲内）
  const start = undoGhostStartIdx();
  let passCount = 0;
  for (let i = start; i < moveHistory.length; i++) {
    if (moveHistory[i].type === 'pass') passCount++;
  }

  if (panelText) {
    let txt;
    if (undoPhase === 'preparing') {
      txt = t('undoPrepText').replace('{N}', String(undoPendingSteps));
      if (passCount > 0) txt += ' ' + t('undoPassNote').replace('{M}', String(passCount));
      undoStatusKey = 'undoPrepText';
    } else if (undoPhase === 'awaiting_response') {
      txt = t('undoAwaiting');
      undoStatusKey = 'undoAwaiting';
    } else { // reviewing
      txt = t('undoReviewText').replace('{N}', String(undoPendingSteps));
      if (passCount > 0) txt += ' ' + t('undoPassNote').replace('{M}', String(passCount));
      undoStatusKey = 'undoReviewText';
    }
    panelText.textContent = txt;
  }

  if (panelBtns) {
    panelBtns.innerHTML = '';
    if (undoPhase === 'preparing') {
      const btnSubmit = document.createElement('button');
      btnSubmit.className = 'btn btn-primary';
      btnSubmit.textContent = t('undoBtnSubmit');
      btnSubmit.onclick = submitUndoRequest;
      const btnCancel = document.createElement('button');
      btnCancel.className = 'btn btn-ghost';
      btnCancel.textContent = t('undoBtnCancel');
      btnCancel.onclick = cancelUndo;
      panelBtns.appendChild(btnSubmit);
      panelBtns.appendChild(btnCancel);
      panel.classList.remove('no-buttons');
    } else if (undoPhase === 'reviewing') {
      const btnAccept = document.createElement('button');
      btnAccept.className = 'btn btn-primary';
      btnAccept.textContent = t('undoBtnAccept');
      btnAccept.onclick = acceptUndo;
      const btnReject = document.createElement('button');
      btnReject.className = 'btn btn-secondary';
      btnReject.textContent = t('undoBtnReject');
      btnReject.onclick = rejectUndo;
      panelBtns.appendChild(btnAccept);
      panelBtns.appendChild(btnReject);
      panel.classList.remove('no-buttons');
    } else {
      // awaiting_response: ボタン無し（テキストのみ）
      panel.classList.add('no-buttons');
    }
  }
}

// ===== 三手交換 SWAP PANEL =====
// gamePhase が 'swap_select'(白側)/'swap_wait'(黒側) の間はパネル表示。
// 白側は選択前=選択肢ボタン、選択後=結果表示+OK。
// 黒側は白の決定前=待機中表示、決定後=結果表示+OK。
// 双方が OK を押すと gamePhase='normal' で通常進行へ。
let mySwapDecided = false; // 白側: 選択肢を確定済みか（true なら結果表示モード）

function openSwapPanel() {
  mySwapDecided = false;
  if (gamePhase === 'swap_wait') oppSwapChoice = 'pending';
  // インラインパネル表示、opp-color-badge は隠す（位置を入れ替え）
  const panel = document.getElementById('swap-overlay');
  if (panel) panel.style.display = '';
  const oppBd = document.getElementById('opp-color-badge');
  if (oppBd) oppBd.style.display = 'none';
  updateSwapPanelUI();
  updateTurnUI();
}

function closeSwapPanel() {
  const panel = document.getElementById('swap-overlay');
  if (panel) panel.style.display = 'none';
  // gameActive なら opp-color-badge を復元（renderTimeDisplays が再描画する）
  renderTimeDisplays();
}

// パネル内部のテキスト・ボタンを現在状態と現在言語で再生成
// 言語切替時にも applyLang から呼ぶ
function updateSwapPanelUI() {
  const overlay = document.getElementById('swap-overlay');
  if (!overlay || overlay.style.display === 'none') return;

  const titleEl  = document.getElementById('swap-modal-title');
  const descEl   = document.getElementById('swap-modal-desc');
  const statusEl = document.getElementById('swap-modal-status');
  const actionEl = document.getElementById('swap-modal-actions');

  if (titleEl) titleEl.textContent = t('swapTitle');
  if (descEl)  descEl.textContent  = t('swapDesc');

  if (gamePhase === 'swap_select' && !mySwapDecided) {
    // 白側・選択前: 選択肢を表示
    if (statusEl) {
      statusEl.classList.remove('swap-result');
      statusEl.textContent = t('swapPromptWhite');
    }
    if (actionEl) {
      actionEl.innerHTML = '';
      const btnSwap = document.createElement('button');
      btnSwap.className = 'btn btn-primary';
      btnSwap.textContent = t('swapBtnSwap');
      btnSwap.onclick = () => chooseSwap(true);
      const btnKeep = document.createElement('button');
      btnKeep.className = 'btn btn-secondary';
      btnKeep.textContent = t('swapBtnKeep');
      btnKeep.onclick = () => chooseSwap(false);
      actionEl.appendChild(btnSwap);
      actionEl.appendChild(btnKeep);
    }
    return;
  }

  // ここから「結果表示+OK」モード（双方共通）
  // 白側=swap_select+mySwapDecided / 黒側=swap_wait（pending or 決定済み）
  if (statusEl) {
    let txt;
    let resultMode = false;
    let choiceKey;
    if (gamePhase === 'swap_select') {
      // 白側: 自分が選んだ結果を表示
      choiceKey = (lastSwapResult === 'swap') ? 'swapStatusSwapped' : 'swapStatusKept';
    } else {
      // 黒側: 白が選んだ結果（pendingなら待機中）
      if (oppSwapChoice === 'pending') {
        choiceKey = null;
      } else {
        choiceKey = (oppSwapChoice === 'swap') ? 'swapStatusSwapped' : 'swapStatusKept';
      }
    }
    if (choiceKey) {
      const meColorKey = myColor === 'black' ? 'swapColorBlack' : 'swapColorWhite';
      const resultKey = (choiceKey === 'swapStatusSwapped') ? 'swapResultSwapped' : 'swapResultKept';
      txt = t(choiceKey) + '\n' + t(resultKey).replace('{COLOR}', t(meColorKey));
      resultMode = true;
    } else {
      txt = t('swapStatusPending');
    }
    statusEl.textContent = txt;
    statusEl.classList.toggle('swap-result', resultMode);
  }

  if (actionEl) {
    actionEl.innerHTML = '';
    const btnOk = document.createElement('button');
    btnOk.className = 'btn btn-primary';
    btnOk.textContent = t('swapBtnOk');
    // 黒側で白がまだ決定していない場合は無効化、白側（決定済み）と黒側（決定済み）は有効
    btnOk.disabled = (gamePhase === 'swap_wait' && oppSwapChoice === 'pending');
    btnOk.onclick = swapPanelOk;
    actionEl.appendChild(btnOk);
  }
}

// 白側: スワップ選択（true=入れ替え、false=継続）
function chooseSwap(swap) {
  if (gamePhase !== 'swap_select') return;
  if (mySwapDecided) return;
  send({ type: 'swap_choice', swap: !!swap });
  lastSwapResult = swap ? 'swap' : 'continue';
  mySwapDecided = true;
  if (swap) {
    // 役割入れ替え: myColor 反転（盤面はそのまま）
    myColor = (myColor === 'black') ? 'white' : 'black';
    const mcl = document.getElementById('my-color-label');
    if (mcl) mcl.innerHTML = `${t('youAre')} ${PIECE.svg(myColor, '20px')}${t(myColor === 'black' ? 'black' : 'white')}`;
    updateOppColorLabel();
  }
  // パネルを「結果+OK」表示に切り替え（即時クローズはしない）
  updateSwapPanelUI();
}

// 双方: OK押下でパネル閉じて通常進行へ
function swapPanelOk() {
  if (gamePhase === 'swap_wait' && oppSwapChoice === 'pending') return;
  if (gamePhase === 'swap_select' && !mySwapDecided) return;
  gamePhase = 'normal';
  mySwapDecided = false;
  closeSwapPanel();
  updateTurnUI();
}

function nextTurn() {
  turn = turn === 'black' ? 'white' : 'black';
  renderBoard();
  updateTurnUI();
  // 持ち時間: 手番交代でタイマーの計測対象が切り替わる（lastTickAt をリセット）
  lastTickAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
  renderTimeDisplays();
}

function pass() {
  if (!gameReady || !gameActive) return;
  if (turn !== myColor) return;
  if (undoPhase !== 'idle') return; // 待った進行中はパス不可
  if (isScoringActive()) return; // 終局フェーズ中はパス不可
  pendingMove = null;
  send({ type: 'pass', remainingMs: isTimeUnlimited() ? null : myTimeMs });
  moveHistory.push({type: 'pass', color: myColor});
  consecutivePasses++;
  if (consecutivePasses >= 2) {
    if (isGoRoom()) {
      // 囲碁: 終局フェーズ（死石マーク + 地計算）に移行
      enterScoringPhase();
    } else {
      endGame(null); // 五目並べ: 引き分け
    }
    return;
  }
  nextTurn();
}

function resign() {
  if (!confirm(t('confirmResign'))) return;
  send({ type: 'resign' });
  gameActive = false;
  gamePhase = 'normal';
  mySwapDecided = false;
  closeSwapPanel();
  undoPhase = 'idle';
  undoPendingSteps = 0;
  if (undoRejectTimer) { clearTimeout(undoRejectTimer); undoRejectTimer = null; }
  const upe = document.getElementById('undo-panel');
  if (upe) upe.style.display = 'none';
  const tie = document.getElementById('turn-indicator');
  if (tie) tie.style.display = '';
  showEndScreen(t('resignLose'), 'resign');
}

function endGame(winnerColor, reason) {
  gameActive = false;
  pendingMove = null;
  // 三手交換フェーズ中の終局（resign等）に備えてパネルを閉じてフェーズリセット
  gamePhase = 'normal';
  mySwapDecided = false;
  closeSwapPanel();
  // 待った進行中の終局に備えて undo state をリセット＆パネル隠す
  undoPhase = 'idle';
  undoPendingSteps = 0;
  undoStatusKey = null;
  if (undoRejectTimer) { clearTimeout(undoRejectTimer); undoRejectTimer = null; }
  const upe = document.getElementById('undo-panel');
  if (upe) upe.style.display = 'none';
  const tie = document.getElementById('turn-indicator');
  if (tie) tie.style.display = '';
  // 持ち時間タイマー停止
  stopTimer();
  renderTimeDisplays();
  // scoringPhase の扱い:
  //   'marking' = 死石マーク中に異常終局 (resign/timeout) → 完全 exit
  //   'finalized' = finalizeScoring 経由 → データを保持（地・スコアを5秒間表示）
  //   'idle' = 何もしない
  if (scoringPhase === 'marking') {
    exitScoringPhase();
  }
  // ボタン表示は softExit / exit 内で処理されるが、念のため
  const agB2 = document.getElementById('btn-scoring-agree');
  const acB2 = document.getElementById('btn-scoring-cancel');
  if (agB2) agB2.style.display = 'none';
  if (acB2) acB2.style.display = 'none';
  // スコア表示は finalized 中は維持
  if (scoringPhase !== 'finalized') {
    const mySD2 = document.getElementById('my-score-display');
    const oppSD2 = document.getElementById('opp-score-display');
    if (mySD2) mySD2.style.display = 'none';
    if (oppSD2) oppSD2.style.display = 'none';
  }
  renderBoard(); // winningLine + territoryMap (finalized中) を反映

  let resultKey, outcome, resultClass;
  // 囲碁の最終結果メッセージは scoringResult から動的に生成（margin 含む）
  let goFinalText = null;
  if (reason === 'go-final' && scoringResult) {
    goFinalText = formatGoFinalResult(scoringResult, myColor);
  }
  if (winnerColor === null) {
    if (reason === 'go-end-pending') {
      resultKey = 'goScoringPending'; outcome = 'draw'; resultClass = 'result-draw';
    } else if (reason === 'go-final') {
      resultKey = 'goFinalDraw'; outcome = 'draw'; resultClass = 'result-draw';
    } else {
      resultKey = 'drawMsg'; outcome = 'draw'; resultClass = 'result-draw';
    }
  } else if (winnerColor === myColor) {
    resultKey = (reason === 'forbidden') ? 'forbiddenWin'
              : (reason === 'timeout')   ? 'timeoutWin'
              : (reason === 'go-final')  ? 'goFinalWin'
              : 'winMsg';
    outcome = 'win'; resultClass = 'result-win';
  } else {
    resultKey = (reason === 'forbidden') ? 'forbiddenLose'
              : (reason === 'timeout')   ? 'timeoutLose'
              : (reason === 'go-final')  ? 'goFinalLose'
              : 'loseMsg';
    outcome = 'lose'; resultClass = 'result-lose';
  }

  // 盤面下のターン表示部分に勝敗を表示（邪魔にならない位置）
  turnIndicatorKey = resultKey;
  const indicator = document.getElementById('turn-indicator');
  if (indicator) {
    indicator.className = 'turn-indicator ' + resultClass;
    indicator.textContent = goFinalText ? goFinalText : t(resultKey);
  }
  // 確定/パスボタンを無効化
  const cb = document.getElementById('btn-confirm'); if (cb) cb.disabled = true;
  const pb = document.getElementById('btn-pass');    if (pb) pb.disabled = true;
  const fr = document.getElementById('board-frame'); if (fr) fr.classList.remove('my-turn');

  // 5秒後に終了画面へ自動遷移（5連ハイライト or 囲碁の地・スコアを見てもらうため）
  // 囲碁の終局結果の場合、end画面に詳細結果文字列を引き継ぐ
  const finalText = goFinalText || t(resultKey);
  // matchHistory 用に囲碁の詳細スコアを captureしておく（scoringResult が後で消えるため）
  const goScoreSnapshot = (reason === 'go-final' && scoringResult)
    ? formatGoFinalResult(scoringResult, myColor) : null;
  setTimeout(() => {
    showEndScreen(finalText, outcome, goScoreSnapshot);
  }, 5000);
}

function toggleNotation() {
  showNotation = document.getElementById('notation-toggle').checked;
  renderBoard();
  renderBoardCoords();
}

// 盤面周囲に座標ラベルを描画（showNotation 連動）。
// 列: A〜T（I除く、19文字、左→右）
// 行: 19〜1（上→下、Go標準で下が1）
// 表示位置: 盤面の上下左右4辺
function renderBoardCoords() {
  const container = document.querySelector('.board-container');
  const frame = document.getElementById('board-frame');
  if (!container || !frame) return;
  // 既存の座標ラベルを削除
  container.querySelectorAll('.board-coord').forEach(el => el.remove());
  if (!showNotation) {
    frame.classList.remove('with-coords');
    return;
  }
  frame.classList.add('with-coords');
  const colLabels = 'ABCDEFGHJKLMNOPQRST'; // I を除く 19 文字
  for (let i = 0; i < BOARD_SIZE; i++) {
    // 上下: 列ラベル（同じ）
    ['top', 'bottom'].forEach(pos => {
      const el = document.createElement('div');
      el.className = 'board-coord board-coord-' + pos;
      el.style.left = 'calc(' + i + ' * var(--cs))';
      el.textContent = colLabels[i];
      container.appendChild(el);
    });
    // 左右: 行番号（19 が上、1 が下 = Go標準）
    const rowNum = String(BOARD_SIZE - i);
    ['left', 'right'].forEach(pos => {
      const el = document.createElement('div');
      el.className = 'board-coord board-coord-' + pos;
      el.style.top = 'calc(' + i + ' * var(--cs))';
      el.textContent = rowNum;
      container.appendChild(el);
    });
  }
}

function showEndScreen(result, outcome, goScoreText) {
  document.getElementById('end-result').textContent = result;
  const scoreEl = document.getElementById('end-score');
  if (scoreEl) {
    // 囲碁の場合は手数+詳細スコア、それ以外は手数のみ
    const movesPart = moveCount > 0 ? (moveCount + t('movesUnit')) : '';
    if (goScoreText) {
      scoreEl.textContent = movesPart ? (movesPart + ' / ' + goScoreText) : goScoreText;
    } else {
      scoreEl.textContent = movesPart;
    }
  }

  if (outcome) {
    matchHistory.push({ outcome, myColor, moves: moveCount, goScoreText: goScoreText || null });
    renderHistory();
  }

  myEndChoice = null;
  oppEndChoice = null;
  updateEndUI();

  showScreen('end');
}

function renderHistory() {
  const panel = document.getElementById('history-panel');
  const list = document.getElementById('history-list');
  if (!matchHistory.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  list.innerHTML = '';

  let wins = 0, loses = 0, draws = 0;

  matchHistory.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'history-row';

    const myStone  = PIECE.span(h.myColor, '14px');
    const oppStone = PIECE.span(h.myColor === 'black' ? 'white' : 'black', '14px');

    let scoreText;
    if (h.outcome === 'win') {
      scoreText = `${t('historyMe')}${myStone}${t('historyWinWord')} - ${oppStone}${t('historyOpp')}`;
      wins++;
    } else if (h.outcome === 'lose') {
      scoreText = `${t('historyMe')}${myStone} - ${oppStone}${t('historyOpp')}${t('historyWinWord')}`;
      loses++;
    } else if (h.outcome === 'resign') {
      scoreText = `${t('historyMe')}${myStone}${t('historyResignWord')} - ${oppStone}${t('historyOpp')}${t('historyWinWord')}`;
      loses++;
    } else { // draw
      scoreText = `${t('historyMe')}${myStone}${t('historyDraw')} - ${oppStone}${t('historyOpp')}`;
      draws++;
    }

    const badgeClass = h.outcome === 'win' ? 'win' : (h.outcome === 'draw' ? 'draw' : 'lose');
    const badgeText = h.outcome === 'win' ? t('historyWin') : (h.outcome === 'draw' ? t('historyDraw') : t('historyLose'));
    // 囲碁の場合、詳細スコア（黒X-白Y / 差Z目）を併記
    const goPart = h.goScoreText ? `<span class="history-go-score" style="font-size:11px;color:var(--text-muted);margin-left:6px;">${escHtml(h.goScoreText)}</span>` : '';
    row.innerHTML = `<span class="history-idx">${i + 1}</span><span class="history-badge ${badgeClass}">${badgeText}</span><span class="history-score" style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;">${scoreText}${goPart}</span>`;
    list.appendChild(row);
  });

  // 集計行
  const summary = document.createElement('div');
  summary.className = 'history-row';
  summary.style.cssText = 'background:transparent;border-top:1px solid var(--border);margin-top:2px;padding-top:6px;font-size:11px;color:var(--gray);justify-content:center;gap:12px;';
  summary.innerHTML = `<span style="color:var(--success)">${wins}${t('historyWin')}</span><span style="color:var(--danger)">${loses}${t('historyLose')}</span><span style="color:var(--gray)">${draws}${t('historyDraw')}</span>`;
  list.appendChild(summary);
  list.scrollTop = list.scrollHeight;
}

// ===== END CHOICES =====
function chooseEnd(choice) {
  if (choice === 'quit') {
    send({ type: 'end_choice', choice: 'quit' });
    resetToLobby();
    return;
  }

  myEndChoice = choice;
  send({ type: 'end_choice', choice });
  updateEndUI();
  checkEndMatch();
}

function updateEndUI() {
  // 自分の選択は常にオレンジ枠（myEndChoiceは変更しない）
  const swapBtn = document.getElementById('end-swap');
  const sameBtn = document.getElementById('end-same');
  swapBtn.className = 'end-btn' + (myEndChoice === 'swap' ? ' selected' : '');
  sameBtn.className = 'end-btn' + (myEndChoice === 'same' ? ' selected' : '');
  // 相手の選択表示
  document.getElementById('opp-swap').textContent = oppEndChoice === 'swap' ? t('oppChoosing') : '';
  document.getElementById('opp-same').textContent = oppEndChoice === 'same' ? t('oppChoosing') : '';
}

function checkEndMatch() {
  if (!myEndChoice || !oppEndChoice) return;
  if (myEndChoice !== oppEndChoice) {
    // 不一致 → 選択はそのまま維持、相手にも通知しない（お互い表示を残す）
    return;
  }

  // 一致
  // 「開局時の色」(initialMyColor) を基準に判定する。三手交換で途中 myColor が
  // 反転していても、再戦の先後入替/維持は最初に色選択画面で確定した色を基準にする。
  const baseColor = initialMyColor || myColor;
  const swap = myEndChoice === 'swap';
  myColor = swap ? (baseColor === 'black' ? 'white' : 'black') : baseColor;
  gameActive = false;
  beginGame();
}

// ===== MESSAGES =====
function handleMsg(m) {
  // chat
  if (m.type === 'chat') {
    const screens = ['waiting', 'room', 'game', 'end'];
    screens.forEach(s => addChat(s, `相手：${m.message}`));
    return;
  }

  if (m.type === 'color_select') {
    oppChoice = m.color;
    updateColorUI();
    checkStartReady();
    return;
  }

  if (m.type === 'start_press') {
    oppStartPressed = true;
    checkBothStart();
    return;
  }

  if (m.type === 'move') {
    if (board[m.y][m.x]) return; // 既に石がある場合は無視
    if (typeof m.remainingMs === 'number') syncTimeFromMessage(m.remainingMs);
    const oppColor = turn;

    // ===== 囲碁モード =====
    if (isGoRoom()) {
      const r = applyGoMove(m.x, m.y, oppColor);
      if (!r.valid) {
        // 受信したが違反? 通常起こらない（送信側でブロック済）。同期ズレなのでログレベル
        console.warn('Received invalid go move:', r.illegalReason);
        return;
      }
      consecutivePasses = 0;
      renderBoard();
      renderCaptureDisplays();
      nextTurn();
      return;
    }

    // ===== 五目並べモード =====
    const preset = getCurrentPreset();

    // 相手の着手前盤面で禁手判定（正規のみ事後判定で勝敗反映）
    const oppForbidden = (preset === 'normal' && typeof GomokuRules !== 'undefined')
      ? isForbiddenAt(m.x, m.y, oppColor) : false;

    applyMove(m.x, m.y, oppColor);
    consecutivePasses = 0;

    if (oppForbidden) {
      // 相手が禁手を打った → 自分の勝ち
      endGame(myColor, 'forbidden');
      return;
    }

    if (typeof GomokuRules !== 'undefined') {
      const r = GomokuRules.checkWinByPreset(board, m.x, m.y, oppColor, preset, BOARD_SIZE);
      if (r && r.result === 'win') {
        winningLine = r.line;
        endGame(oppColor);
        return;
      }
    }
    // 相手の着手でもフェーズ進行
    advancePhaseAfterMove();
    nextTurn();
    return;
  }

  if (m.type === 'undo_request') {
    // 競合防止: 自分が preparing/awaiting 中なら受信を無視（仕様上発生しないが防御）
    if (undoPhase !== 'idle') return;
    const N = parseInt(m.steps, 10);
    if (!Number.isFinite(N) || N <= 0 || N > moveHistory.length) return;
    undoPendingSteps = N;
    undoPhase = 'reviewing';
    pendingMove = null;
    renderBoard();
    updateUndoUI();
    updateTurnUI();
    return;
  }

  if (m.type === 'undo_accept') {
    if (undoPhase !== 'awaiting_response') return;
    applyUndoFinal(undoPendingSteps);
    undoPhase = 'idle';
    undoPendingSteps = 0;
    undoStatusKey = null;
    renderBoard();
    updateUndoUI();
    updateTurnUI();
    return;
  }

  if (m.type === 'undo_reject') {
    if (undoPhase !== 'awaiting_response') return;
    undoPhase = 'idle';
    undoPendingSteps = 0;
    undoStatusKey = null;
    renderBoard();
    updateUndoUI();
    updateTurnUI();
    // 拒否通知を3秒 turn-indicator に表示
    showUndoRejectedNotice();
    return;
  }

  if (m.type === 'swap_choice') {
    // 白側からのswap決定。受信側は黒側（swap_wait）
    if (gamePhase !== 'swap_wait') return;
    oppSwapChoice = m.swap ? 'swap' : 'continue';
    lastSwapResult = oppSwapChoice;
    if (m.swap) {
      // 役割入れ替え: myColor を反転（盤面はそのまま）
      myColor = (myColor === 'black') ? 'white' : 'black';
      // my-color-label / opp-color-label も更新
      const mcl = document.getElementById('my-color-label');
      if (mcl) mcl.innerHTML = `${t('youAre')} ${PIECE.svg(myColor, '20px')}${t(myColor === 'black' ? 'black' : 'white')}`;
      updateOppColorLabel();
    }
    updateSwapPanelUI();
    return;
  }

  if (m.type === 'pass') {
    if (typeof m.remainingMs === 'number') syncTimeFromMessage(m.remainingMs);
    // 受信時 turn は相手の色（自分が直前に打った後 nextTurn で flip 済み、または初手で turn='black' = 相手が黒）
    moveHistory.push({type: 'pass', color: turn});
    consecutivePasses++;
    if (consecutivePasses >= 2) {
      if (isGoRoom()) {
        enterScoringPhase();
      } else {
        endGame(null);
      }
      return;
    }
    nextTurn();
    return;
  }

  if (m.type === 'time_out') {
    // 相手の時間切れ → 自分の勝ち
    oppTimeMs = 0;
    endGame(myColor, 'timeout');
    return;
  }

  if (m.type === 'dead_stone_toggle') {
    // 終局フェーズ中のみ有効
    if (!isScoringActive()) return;
    toggleDeadStone(m.x, m.y, true /* fromOpp */);
    return;
  }

  if (m.type === 'force_territory_toggle') {
    if (!isScoringActive()) return;
    if (m.byColor !== 'black' && m.byColor !== 'white') return;
    toggleForcedTerritory(m.x, m.y, m.byColor, true /* fromOpp */);
    return;
  }

  if (m.type === 'scoring_agree') {
    if (!isScoringActive()) return;
    oppScoringAgreed = true;
    updateScoringActions();
    if (myScoringAgreed && oppScoringAgreed) {
      finalizeScoring();
    }
    return;
  }

  if (m.type === 'scoring_disagree') {
    if (!isScoringActive()) return;
    oppScoringAgreed = false;
    updateScoringActions();
    return;
  }

  if (m.type === 'resign') {
    gameActive = false;
    gamePhase = 'normal';
    mySwapDecided = false;
    closeSwapPanel();
    undoPhase = 'idle';
    undoPendingSteps = 0;
    if (undoRejectTimer) { clearTimeout(undoRejectTimer); undoRejectTimer = null; }
    const upe = document.getElementById('undo-panel');
    if (upe) upe.style.display = 'none';
    const tie = document.getElementById('turn-indicator');
    if (tie) tie.style.display = '';
    showEndScreen(t('resignWin'), 'win');
    return;
  }

  if (m.type === 'end_choice') {
    oppEndChoice = m.choice;
    if (m.choice === 'quit') {
      alert(t('oppQuit'));
      resetToLobby();
      return;
    }
    updateEndUI();
    checkEndMatch();
    return;
  }
}

// ===== CHAT =====
function sendChat(screen) {
  const input = document.getElementById('chat-input-' + screen);
  const msg = input.value.trim();
  if (!msg) return;
  addChat(screen, `自分：${msg}`);

  // mirror to all chat boxes
  ['waiting', 'room', 'game', 'end'].filter(s => s !== screen).forEach(s => addChat(s, `自分：${msg}`));

  send({ type: 'chat', message: msg });
  input.value = '';
}

function addChat(screen, text) {
  const box = document.getElementById('chat-' + screen);
  if (!box) return;
  const line = document.createElement('div');
  line.textContent = text;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

// Enter key for all chat inputs
document.querySelectorAll('.chat-input').forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // find which screen
      const id = input.id.replace('chat-input-', '');
      sendChat(id);
    }
  });
});

// ===== UTILS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let currentLang = (() => {
  try {
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

let catBase = 'ja';

function catSpeak(key) {
  const errorKeys = ['pwError','noRoomError','fullRoomError','kicked','createErrorEmpty','privateIdRequired'];
  const meOppKeys   = ['historyMe','historyOpp','historyWinWord','historyResignWord'];
  const calmKeys  = ['connecting','reconnecting','waitingGuest','waitingStart'];
  let vocab;
  if (catBase === 'en') {
    if (errorKeys.includes(key))   vocab = ['HISS!','SPIT!','FSSST!'];
    else if (calmKeys.includes(key))  vocab = ['purrrr...','mrrr...','prrr...'];
    else if (meOppKeys.includes(key)) vocab = ['~nya~'];
    else                              vocab = ['MEOW','meow','mrrrow','mew','NYA!'];
  } else if (catBase === 'zh') {
    if (errorKeys.includes(key))   vocab = ['嘶！','哈！','嘶嘶！'];
    else if (calmKeys.includes(key))  vocab = ['咕噜…','喵…','噜噜…'];
    else if (meOppKeys.includes(key)) vocab = ['~喵~'];
    else                              vocab = ['喵','喵呜','咪','喵！'];
  } else {
    if (errorKeys.includes(key))   vocab = ['シャー！','フーッ！','シャシャシャ！'];
    else if (calmKeys.includes(key))  vocab = ['ごろごろ…','にゃ…','ぐるぐる…'];
    else if (meOppKeys.includes(key)) vocab = ['~にゃ~'];
    else                              vocab = ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'];
  }
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function t(key) {
  if (currentLang === 'cat') return catSpeak(key);
  return (I18N[currentLang] || I18N.ja)[key] || (I18N.ja)[key] || key;
}

function applyLang() {
  const d = I18N[currentLang] || I18N.ja;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : currentLang;

  // Static UI elements
  const setText = (id, key) => { const el = document.getElementById(id); if (el) el.textContent = t(key); };
  setText('i18n-create-title', 'createTitle');
  setText('i18n-label-name', 'labelName');
  setText('i18n-label-room', 'labelRoom');
  setText('i18n-label-pw', 'labelPw');
  setText('i18n-label-public', 'labelPublic');
  setText('i18n-label-rule', 'labelRule');
  setText('i18n-label-time-limit', 'labelTimeLimit');
  setText('i18n-tab-gomoku', 'tabGomoku');
  setText('i18n-tab-go', 'tabGo');
  // 持ち時間 placeholder と時計表示の言語反映
  const tInput = document.getElementById('room-time-limit');
  if (tInput) tInput.placeholder = t('timeLimitPlaceholder');
  // 残時間表示・相手バッジを再描画（CATモードや言語切替時にラベル更新）
  if (typeof renderTimeDisplays === 'function') renderTimeDisplays();
  setText('i18n-preset-normal', 'presetNormal');
  setText('i18n-preset-casual', 'presetCasual');
  setText('i18n-preset-free', 'presetFree');
  setText('i18n-btn-create', 'btnCreate');
  setText('i18n-room-list-title', 'roomListTitle');
  setText('i18n-btn-refresh', 'btnRefresh');
  setText('i18n-room-info', 'roomInfo');
  setText('i18n-room-label', 'roomLabel');
  setText('i18n-btn-send-w', 'btnSend');
  setText('i18n-btn-leave-w', 'btnLeave');
  setText('i18n-rule-title', 'ruleTitle');
  setText('i18n-color-title', 'colorTitle');
  // 駒アイコン付きラベル（innerHTML）
  const blEl = document.getElementById('i18n-black-label');
  if (blEl) blEl.innerHTML = `${PIECE.svg('black','18px')} ${t('blackLabel')}`;
  const whEl = document.getElementById('i18n-white-label');
  if (whEl) whEl.innerHTML = `${PIECE.svg('white','18px')} ${t('whiteLabel')}`;
  setText('btn-start', 'startGame');
  setText('i18n-btn-leave-r', 'btnLeave');
  setText('i18n-btn-send-r', 'btnSend');
  setText('i18n-btn-kick', 'btnKick');
  setText('btn-pass', 'btnPass');
  setText('btn-confirm', 'confirmMove');
  setText('btn-undo', 'btnUndo');
  setText('btn-scoring-agree', 'btnScoringAgree');
  setText('btn-scoring-cancel', 'btnScoringCancel');
  setText('i18n-btn-resign', 'btnResign');
  setText('i18n-btn-send-g', 'btnSend');
  setText('i18n-notation-toggle', 'notationToggle');
  setText('i18n-next-game', 'nextGame');
  setText('i18n-end-swap', 'endSwap');
  setText('i18n-end-same', 'endSame');
  setText('i18n-end-quit', 'endQuit');
  setText('i18n-btn-send-e', 'btnSend');
  setText('i18n-match-history', 'matchHistory');
  setText('i18n-private-title', 'privateTitle');
  setText('i18n-private-pw-label', 'privatePwLabel');
  setText('i18n-btn-private-show', 'privateBtnShow');

  // Placeholders
  ['waiting','room','game'].forEach(s => {
    const el = document.getElementById('chat-input-' + s);
    if (el) el.placeholder = t('chatPlaceholder');
  });
  const endInput = document.getElementById('chat-input-end');
  if (endInput) endInput.placeholder = t('chatPlaceholderEnd');
  const pwInput = document.getElementById('room-password');
  if (pwInput) pwInput.placeholder = t('pwPlaceholder');

  // ===== 動的テキストを状態キーから直接生成（CAT切替対応） =====
  const ls = document.getElementById('lobby-status');
  if (ls && lobbyStatusKey) ls.textContent = t(lobbyStatusKey);

  const ws2 = document.getElementById('waiting-status');
  if (ws2 && waitingStatusKey) {
    if (waitingStatusKey === 'guestJoined' && waitingStatusName) {
      ws2.textContent = waitingStatusName + t('guestJoined');
    } else {
      ws2.textContent = t(waitingStatusKey);
    }
  }

  // turn-indicator: ゲーム中・終局時の表示を再生成
  if (turnIndicatorKey) {
    const ind = document.getElementById('turn-indicator');
    if (ind) {
      // 囲碁の最終結果（finalized 中）は詳細スコアテキストを再生成
      if (scoringPhase === 'finalized' && scoringResult &&
          (turnIndicatorKey === 'goFinalWin' || turnIndicatorKey === 'goFinalLose' || turnIndicatorKey === 'goFinalDraw')) {
        ind.textContent = formatGoFinalResult(scoringResult, myColor);
      } else {
        ind.textContent = t(turnIndicatorKey);
      }
    }
  }

  // start-hint: 色選択状態に応じて
  const startHintEl = document.getElementById('start-hint');
  if (startHintEl) {
    const ready = myChoice && oppChoice && myChoice !== oppChoice;
    startHintEl.textContent = ready ? t('startReady') : t('startHint');
  }
  // start-waiting-msg: スタート押下状態に応じて
  const sw = document.getElementById('start-waiting-msg');
  if (sw) {
    sw.textContent = (myStartPressed && !oppStartPressed) ? t('waitingStart') : '';
  }

  // opp-swap / opp-same: oppEndChoice を直接見て生成
  const os = document.getElementById('opp-swap');
  const om = document.getElementById('opp-same');
  if (os) os.textContent = oppEndChoice === 'swap' ? t('oppChoosing') : '';
  if (om) om.textContent = oppEndChoice === 'same' ? t('oppChoosing') : '';

  // ロビー画面アクティブなら部屋一覧バッジも i18n 反映のため再取得
  const lobbyScreen = document.getElementById('screen-lobby');
  if (lobbyScreen && lobbyScreen.classList.contains('active')) {
    if (typeof MomoMatchmaking !== 'undefined' && MomoMatchmaking.refreshRooms) {
      MomoMatchmaking.refreshRooms();
    }
  }

  // 色選択画面アクティブならルール詳細パネルを再生成
  const roomScreen = document.getElementById('screen-room');
  if (roomScreen && roomScreen.classList.contains('active')) {
    renderRoomRule();
  }

  // ゲーム画面アクティブなら盤面再描画（CAT モード切替で猫/鳥アイコンに切替えるため）
  const gameScreen = document.getElementById('screen-game');
  if (gameScreen && gameScreen.classList.contains('active') && typeof renderBoard === 'function') {
    renderBoard();
  }

  // 三手交換パネルが開いていたら再描画（言語切替に完璧対応）
  if (typeof updateSwapPanelUI === 'function') {
    updateSwapPanelUI();
  }

  // 待ったパネルが開いていたら再描画（言語切替に完璧対応）
  if (typeof updateUndoUI === 'function' && undoPhase !== 'idle') {
    updateUndoUI();
  }

  // Lang select sync
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;

  // stone-preview: CATモード時は猫/鳥アイコンに切り替え
  const spb = document.getElementById('stone-preview-black');
  const spw = document.getElementById('stone-preview-white');
  if (spb && spw) {
    if (currentLang === 'cat') {
      spb.style.cssText = 'width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;';
      spb.innerHTML = PIECE.svg('black', '34px');
      spw.style.cssText = 'width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#666;border:2px solid #888;';
      spw.innerHTML = PIECE.svg('white', '34px');
    } else {
      spb.style.cssText = '';
      spb.className = 'stone-preview black';
      spb.innerHTML = '';
      spw.style.cssText = '';
      spw.className = 'stone-preview white';
      spw.innerHTML = '';
    }
  }

  // ゲーム中ならmy-color-labelとopp-color-labelも更新
  if (myColor) {
    const mcl = document.getElementById('my-color-label');
    if (mcl) mcl.innerHTML = `${t('youAre')} ${PIECE.svg(myColor, '20px')}${myColor === 'black' ? t('black') : t('white')}`;
    if (typeof updateOppColorLabel === 'function') updateOppColorLabel();
  }
  // 囲碁の取石数表示も言語切替で更新（"取石: " ラベル）
  if (typeof renderCaptureDisplays === 'function') renderCaptureDisplays();
  // 囲碁終局フェーズのスコア表示・ボタン状態も再描画
  if (typeof renderScoreDisplay === 'function') renderScoreDisplay();
  if (typeof updateScoringActions === 'function') updateScoringActions();
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  applyLang();
}

// ===== BOOT =====
connectWS();
applyLang();
restoreInputs();
</script>
</body>
</html>
