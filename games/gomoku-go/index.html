<script src="../matchmaking/momo-matchmaking.js"></script>
<script src="gomoku-rules.js"></script>
<script src="go-rules.js"></script>
<script src="go-scoring.js"></script>
<style>
:root {
  /* DESIGN_SPEC v1.0 準拠 */
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --border-strong: #444;
  --bg-selected: rgba(194,65,12,0.15);
  --orange: #c2410c;
  --orange-mid: #ea580c;
  --orange-light: #fb923c;
  --orange-dim: #7a3405;
  --orange-glow: rgba(194,65,12,0.25);
  --white: #f0f0f0;
  --gray: #666;
  --gray2: #444;
  --text: #e5e5e5;
  --text-muted: #737373;
  --danger: #c0392b;
  --success: #27ae60;
  /* 五目並べ盤面用 */
  --board-bg: #d9b27a;
  --board-line: #2a1a0a;
  --board-star: #1a0e04;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  color: var(--orange);
  letter-spacing: 2px;
  padding: 16px 0 4px;
  margin-top: 32px;
}

.version {
  font-size: 11px;
  color: var(--gray);
  margin-bottom: 12px;
}

/* ===== LANG SWITCHER ===== */
#lang-switcher {
  position: fixed;
  top: 8px;
  right: 12px;
  z-index: 200;
}
#lang-select {
  background: var(--surface2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
}
#lang-select:focus { border-color: var(--orange); }

/* ===== SCREEN SYSTEM ===== */
.screen { display: none; width: 100%; max-width: 460px; padding: 0 12px 40px; }
.screen.active { display: flex; flex-direction: column; gap: 10px; }

/* ===== BUTTONS ===== */
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 700;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--orange); color: #fff; }
.btn-primary:hover { background: #ff7a20; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--orange); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ===== INPUTS ===== */
.input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
.input:focus { border-color: var(--orange); }

label { font-size: 12px; color: var(--gray); margin-bottom: 2px; display: block; }

.field { display: flex; flex-direction: column; gap: 3px; }

.row { display: flex; gap: 8px; }
.row .btn { flex: 1; }

/* ===== PANEL ===== */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.panel-title {
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  color: var(--orange);
  margin-bottom: 10px;
}

/* ===== STATUS BAR ===== */
.status-bar {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--gray);
  text-align: center;
}
.status-bar.highlight { border-color: var(--orange); color: var(--orange); }

/* ===== ROOM LIST ===== */
.room-list { display: flex; flex-direction: column; gap: 6px; }
.room-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.room-item:hover { border-color: var(--orange); }
.room-item.full { opacity: 0.45; cursor: not-allowed; }
.room-name { font-weight: 700; font-size: 14px; }
.room-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
.room-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
}
.badge-lock { background: var(--gray2); color: var(--white); }
.badge-open { background: var(--success); color: #fff; }
.badge-full { background: var(--gray2); color: var(--gray); }
/* ルールプリセット用のバッジ（明るめ・目立つ色） */
.badge-rule-normal { background: #ea580c; color: #fff; }
.badge-rule-casual { background: #fb923c; color: #1a0e04; }
.badge-rule-free   { background: #94a3b8; color: #fff; }

/* ===== CHAT ===== */
.chat-wrap { display: flex; flex-direction: column; gap: 6px; }
.chat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  height: 110px;
  overflow-y: auto;
  padding: 8px 10px;
  font-size: 12px;
  line-height: 1.6;
  cursor: default;
  user-select: none;
}
.chat-row { display: flex; gap: 6px; }
.chat-input { flex: 1; border-color: #3a3a3a !important; }
.chat-input:focus { border-color: var(--orange) !important; }
.chat-row .btn-secondary { border-color: #3a3a3a; }

/* ===== COLOR SELECT ===== */
.color-select { display: flex; gap: 10px; }
.color-btn {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.color-btn:hover { border-color: var(--orange); }
.color-btn.selected-black { border-color: #fff; background: #111; }
.color-btn.selected-white { border-color: var(--orange); background: #2a2a2a; }
/* .color-btn.taken は廃止 */
.stone-preview {
  width: 36px; height: 36px;
  border-radius: 50%;
}
.stone-preview.black { background: #111; border: 2px solid #555; }
.stone-preview.white { background: #f0f0f0; border: 2px solid #aaa; }
.color-label { font-size: 13px; font-weight: 700; }
.color-who { font-size: 11px; color: var(--orange); min-height: 16px; }

/* ===== BOARD ===== */
.board-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.my-color-badge,
.opp-color-badge {
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
}
.my-color-badge .badge-line,
.opp-color-badge .badge-line {
  display: flex;
  align-items: center;
  gap: 8px;
}
.score-display {
  font-size: 12px;
  color: var(--orange);
  background: rgba(194,65,12,0.12);
  padding: 2px 8px;
  border-radius: 6px;
  text-align: center;
  white-space: nowrap;
  font-family: 'Fredoka One', cursive, sans-serif;
}
#my-score-display { color: #ffd9b8; background: rgba(251,146,60,0.18); }
#opp-score-display { color: var(--orange); background: rgba(194,65,12,0.12); }
.opp-color-badge { color: var(--text-muted); }
.time-display {
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  letter-spacing: 0.5px;
  color: var(--text);
  margin-left: 8px;
  padding: 2px 10px;
  background: rgba(0,0,0,0.35);
  border-radius: 6px;
  min-width: 56px;
  text-align: center;
}
.time-display.warning { color: var(--danger, #ef4444); }
.time-display.unlimited { font-size: 20px; }
.time-display.active {
  outline: 1px solid var(--orange);
  background: rgba(194,65,12,0.15);
}
/* 部屋一覧の持ち時間バッジ */
.badge-time {
  background: #334155;
  color: #fff;
  font-size: 11px;
}

/* 座標ラベル（着手番号トグルON時のみ） */
.board-coord {
  position: absolute;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 700;
  pointer-events: none;
  text-align: center;
  letter-spacing: 0.5px;
}
.board-coord-top, .board-coord-bottom {
  width: var(--cs);
  height: 14px;
  line-height: 14px;
}
.board-coord-top    { bottom: calc(100% + 2px); }
.board-coord-bottom { top: calc(100% + 2px); }
.board-coord-left, .board-coord-right {
  width: 14px;
  height: var(--cs);
  line-height: var(--cs);
}
.board-coord-left  { right: calc(100% + 2px); }
.board-coord-right { left: calc(100% + 2px); }
.board-frame.with-coords { padding: 22px; }

.board-frame {
  padding: 12px;
  border-radius: 8px;
  border: 3px solid var(--border);
  background: var(--board-bg);
  transition: border-color 0.3s;
}
.board-frame.my-turn { border-color: var(--orange); box-shadow: 0 0 16px var(--orange-glow); }

.board-container {
  position: relative;
  --cs: 22px;
  width: calc(19 * var(--cs));
  height: calc(19 * var(--cs));
  margin: 0 auto;
}
@media (max-width: 480px) {
  .board-container { --cs: 18px; }
}

.board-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.board {
  display: grid;
  grid-template-columns: repeat(19, var(--cs));
  grid-template-rows: repeat(19, var(--cs));
  position: absolute;
  inset: 0;
}

.cell {
  width: var(--cs);
  height: var(--cs);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  outline: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.stone {
  width: 90%;
  height: 90%;
  border-radius: 50%;
  position: relative;
  pointer-events: none;
  transition: opacity 0.15s;
}
.stone.black { background: radial-gradient(circle at 30% 30%, #555, #000); box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
.stone.white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); box-shadow: 0 1px 2px rgba(0,0,0,0.3); border: 1px solid #888; box-sizing: border-box; }
.stone.preview { opacity: 0.45; }
.stone.last-move::after {
  content: '';
  position: absolute;
  inset: -3px;
  border: 2px solid var(--orange-mid);
  border-radius: 50%;
  pointer-events: none;
}
.stone.winning {
  box-shadow:
    0 0 0 3px var(--orange-mid),
    0 0 0 5px var(--orange-light),
    0 0 22px var(--orange),
    0 0 36px rgba(251,146,60,0.6);
  animation: winPulse 0.55s ease-in-out infinite alternate;
  z-index: 2;
}
/* CAT モード時の駒（猫/鳥アイコン）— 背景・影を打ち消してアイコンに集中 */
.stone.cat-piece {
  background: none;
  border: none;
  box-shadow: none;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}
.stone.cat-piece.last-move::after {
  inset: -2px;
  border-radius: 6px;
}
.stone.cat-piece.winning {
  box-shadow:
    0 0 0 3px var(--orange-mid),
    0 0 0 5px var(--orange-light),
    0 0 22px var(--orange),
    0 0 36px rgba(251,146,60,0.6);
}
/* 囲碁の終局フェーズ: 死石マーク + 領域可視化 */
.stone.dead-stone {
  opacity: 0.4;
  cursor: pointer;
}
.stone.dead-stone::after {
  content: '✕';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  color: var(--orange);
  text-shadow: 0 0 4px rgba(0,0,0,0.6);
  pointer-events: none;
}
/* 領域（地）の薄い色付け + 中央に色付きドット */
.cell.territory-black { background: rgba(0,0,0,0.38); }
.cell.territory-white { background: rgba(255,255,255,0.38); }
.cell.territory-black::before,
.cell.territory-white::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 30%; height: 30%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1;
}
.cell.territory-black::before { background: #000; box-shadow: 0 0 0 1px rgba(255,255,255,0.4); }
.cell.territory-white::before { background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.4); }
/* 手動マーク（forcedTerritory）の印 — 右上にオレンジの小マーク */
.cell.forced::after {
  content: '';
  position: absolute;
  top: 1px;
  right: 1px;
  width: 5px;
  height: 5px;
  background: var(--orange);
  border-radius: 50%;
  box-shadow: 0 0 3px rgba(0,0,0,0.5);
  pointer-events: none;
  z-index: 2;
}
/* マーク中のセルにホバーした時のフィードバック */
.scoring-active .cell:hover { outline: 1px solid var(--orange); outline-offset: -1px; }

/* 囲碁の捕獲フラッシュ（一瞬光ってから消える） */
.stone.captured {
  animation: capturedFlash 1.0s ease-out forwards;
}
@keyframes capturedFlash {
  0%   { opacity: 1.0; box-shadow: 0 0 0 0 var(--orange); }
  20%  { opacity: 1.0; box-shadow: 0 0 0 4px var(--orange-light), 0 0 18px var(--orange); transform: scale(1.15); }
  60%  { opacity: 1.0; box-shadow: 0 0 0 4px var(--orange-light), 0 0 18px var(--orange); transform: scale(1.10); }
  85%  { opacity: 0.5; transform: scale(0.85); }
  100% { opacity: 0; transform: scale(0.4); }
}
.stone.cat-piece.captured { animation: capturedFlashCat 1.0s ease-out forwards; }
@keyframes capturedFlashCat {
  0%   { opacity: 1.0; }
  20%  { opacity: 1.0; transform: scale(1.15); }
  60%  { opacity: 1.0; transform: scale(1.10); }
  85%  { opacity: 0.5; transform: scale(0.85); }
  100% { opacity: 0; transform: scale(0.4); }
}

/* 取石数（アゲハマ）表示 */
.capture-display {
  font-size: 12px;
  color: var(--text-muted);
  background: rgba(0,0,0,0.3);
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 6px;
}
/* 自分側の取石は白色で目立たせる */
#my-capture-display { color: #ffffff; }

/* コウ違反/自殺手のヒント時、turn-indicator が赤フラッシュ */
.turn-indicator.violation-hint {
  color: var(--danger, #ef4444) !important;
  font-weight: 700;
  animation: violationFlash 0.4s ease-out;
}
@keyframes violationFlash {
  0%   { background: rgba(239,68,68,0.4); }
  100% { background: transparent; }
}

/* 待った（undo）プレビュー中のゴースト石 */
.stone.undo-ghost { opacity: 0.3; }
.stone.undo-ghost.undo-latest {
  opacity: 0.6;
}
.stone.undo-ghost.undo-latest::after {
  content: '';
  position: absolute;
  inset: -3px;
  border: 3px solid var(--orange);
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px var(--orange-glow);
}
.stone.cat-piece.undo-ghost.undo-latest::after {
  inset: -2px;
  border-radius: 6px;
}
/* 待ったパネル（turn-indicator と同じ位置に表示） */
.undo-panel {
  background: var(--surface);
  border: 1px solid var(--orange);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  text-align: center;
  margin-top: 4px;
}
.undo-panel-text {
  color: var(--text);
  white-space: pre-line;
  margin-bottom: 8px;
  line-height: 1.4;
}
.undo-panel.no-buttons .undo-panel-text { margin-bottom: 0; }
.undo-panel-buttons {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.undo-panel-buttons .btn {
  flex: 1;
  min-width: 100px;
  max-width: 160px;
}
@keyframes winPulse {
  from { transform: scale(1.0); }
  to   { transform: scale(1.18); }
}
.turn-indicator.result-win,
.turn-indicator.result-lose,
.turn-indicator.result-draw {
  font-family: 'Fredoka One', cursive;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 1px;
  padding: 6px 14px;
  border-radius: 8px;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.turn-indicator.result-win  {
  color: #fff;
  background: var(--orange);
  box-shadow: 0 0 20px var(--orange-glow);
}
.turn-indicator.result-lose {
  color: #fff;
  background: var(--surface2);
  border: 2px solid var(--border-strong);
}
.turn-indicator.result-draw {
  color: #fff;
  background: var(--orange-dim);
  border: 2px solid var(--orange-mid);
}

.move-number {
  position: absolute;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 9px;
  font-weight: 700;
  pointer-events: none;
  z-index: 1;
}

.score-bar {
  display: flex;
  gap: 16px;
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  align-items: center;
}
.score-black { color: #aaa; }
.score-white { color: var(--white); }
.score-sep { color: var(--gray); font-size: 14px; }

.turn-indicator {
  font-size: 13px;
  text-align: center;
  min-height: 20px;
  color: var(--gray);
}
.turn-indicator.active { color: var(--orange); font-weight: 700; }

.board-actions { display: flex; gap: 8px; }
.board-actions .btn { flex: 1; font-size: 13px; padding: 8px; }

/* ===== END PANEL ===== */
.end-choices { display: flex; flex-direction: column; gap: 8px; }

/* ===== MATCH HISTORY ===== */
.history-panel { display: flex; flex-direction: column; gap: 6px; }
.history-list {
  max-height: 130px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.history-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  padding: 4px 6px;
  border-radius: 4px;
  background: var(--surface2);
}
.history-idx { color: var(--gray); min-width: 20px; font-size: 11px; }
.history-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
  min-width: 34px;
  text-align: center;
}
.history-badge.win  { background: var(--success); color: #fff; }
.history-badge.lose { background: var(--danger);  color: #fff; }
.history-badge.draw { background: var(--gray2);   color: var(--white); }
.history-score { color: var(--text); flex: 1; }
.end-btn {
  padding: 12px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.end-btn:hover { border-color: var(--orange); }
.end-btn.selected { border-color: var(--orange); background: #1a0e04; color: var(--orange); }
.end-btn.danger-btn { border-color: var(--danger); }
.end-btn.danger-btn:hover { background: #2a0a0a; }
.opponent-choice { font-size: 11px; color: var(--orange); }

/* ===== PASSWORD MODAL ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.modal-title { font-family: 'Fredoka One', cursive; color: var(--orange); font-size: 18px; }

/* swap panel — 三手交換（正規ルール） インライン配置版
   board-wrap 内の opp-color-badge と入れ替えで盤面下に表示する。
   表示順は status → buttons → title → description（ユーザー指定）。 */
.swap-panel-inline {
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--orange);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-sizing: border-box;
}
.swap-modal-title {
  font-family: 'Fredoka One', cursive;
  color: var(--orange);
  font-size: 16px;
  text-align: center;
  margin-top: 4px;
}
.swap-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  white-space: pre-line;
}
.swap-status {
  font-size: 13px;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  min-height: 34px;
  white-space: pre-line;
  text-align: center;
}
.swap-status.swap-result {
  border-color: var(--orange);
  color: var(--orange);
}
.swap-actions { gap: 8px; flex-wrap: wrap; }
.swap-actions .btn { flex: 1; min-width: 120px; }

.divider { border: none; border-top: 1px solid var(--border); }

/* toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.toggle {
  appearance: none;
  width: 36px; height: 20px;
  background: var(--gray2);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle:checked { background: var(--orange); }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: left 0.2s;
}
.toggle:checked::after { left: 19px; }

/* ===== GAME TYPE TABS (ロビー上部) ===== */
.game-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 8px;
}
.game-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-muted);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.game-tab:hover { color: var(--text); }
.game-tab.active {
  background: var(--orange);
  color: #fff;
  box-shadow: 0 2px 8px rgba(194,65,12,0.35);
}

/* ===== RULE PRESET CARDS (部屋作成) ===== */
.rule-presets { display: flex; gap: 6px; margin-top: 4px; }
.rule-card {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 6px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  color: var(--text);
}
.rule-card:hover { border-color: var(--orange); }
.rule-card.selected {
  border-color: var(--orange);
  background: var(--bg-selected);
  color: var(--orange);
}

/* ===== RULE DETAIL (色選択画面) ===== */
.rule-detail-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 12px;
  font-size: 12px;
  margin-top: 6px;
}
.rule-detail-grid .rd-label { color: var(--gray); white-space: nowrap; }
.rule-detail-grid .rd-value { color: var(--text); }
.rule-preset-name {
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  color: var(--orange);
  text-align: center;
}

</style>
</head>
<body>

<div id="lang-switcher">
  <select id="lang-select" onchange="onLangChange(this.value)">
    <option value="ja">日本語</option>
    <option value="en">EN</option>
    <option value="zh">中文</option>
    <option value="cat">CAT</option>
  </select>
</div>

<h1><svg xmlns="http://www.w3.org/2000/svg" viewBox="-46 -50 92 80" style="height:36px;vertical-align:middle;margin-right:6px;margin-top:-11px;"><g transform="rotate(-12,-12,8.3)"><path d="M-21.6,-14.94 L-14.549,-35.916 Q-12,-43.5 -9.451,-35.916 L-2.4,-14.94 Z" fill="#c2410c"/></g><g transform="rotate(12,12,8.3)"><path d="M2.4,-14.94 L9.451,-35.916 Q12,-43.5 14.549,-35.916 L21.6,-14.94 Z" fill="#c2410c"/></g><ellipse cx="0" cy="1.3" rx="34" ry="26" fill="#c2410c"/><line x1="-14" y1="1.00" x2="-33.68" y2="-2.28" stroke="#000" stroke-width="1.8" stroke-linecap="round"/><line x1="-14" y1="6.0" x2="-33.44" y2="6.0" stroke="#000" stroke-width="1.8" stroke-linecap="round"/><line x1="-14" y1="10.59" x2="-29.58" y2="14.26" stroke="#000" stroke-width="1.8" stroke-linecap="round"/><line x1="-33.68" y1="-2.28" x2="-38" y2="-3" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/><line x1="-33.44" y1="6.0" x2="-40" y2="6" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/><line x1="-29.58" y1="14.26" x2="-37" y2="16" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="1.00" x2="33.68" y2="-2.28" stroke="#000" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="6.0" x2="33.44" y2="6.0" stroke="#000" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="10.59" x2="29.58" y2="14.26" stroke="#000" stroke-width="1.8" stroke-linecap="round"/><line x1="33.68" y1="-2.28" x2="38" y2="-3" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/><line x1="33.44" y1="6.0" x2="40" y2="6" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/><line x1="29.58" y1="14.26" x2="37" y2="16" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/><ellipse cx="-12" cy="-3.7" rx="4.2" ry="5.6" fill="#1a0800"/><ellipse cx="12" cy="-3.7" rx="4.2" ry="5.6" fill="#1a0800"/><ellipse cx="-12" cy="-3.7" rx="2.4" ry="3.5" fill="#000"/><ellipse cx="12" cy="-3.7" rx="2.4" ry="3.5" fill="#000"/><circle cx="-10.5" cy="-5.2" r="1.0" fill="#c2410c"/><circle cx="13.5" cy="-5.2" r="1.0" fill="#c2410c"/><path d="M0,6.3 C-0.8,4.8 -3.5,4.8 -3.5,7.3 C-3.5,9.3 0,11.3 0,11.3 C0,11.3 3.5,9.3 3.5,7.3 C3.5,4.8 0.8,4.8 0,6.3 Z" fill="#000"/><line x1="0" y1="11.3" x2="0" y2="13.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/><path d="M0,13.3 Q-5,17.3 -8,15.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/><path d="M0,13.3 Q5,17.3 8,15.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/></svg><span style="color:var(--white)">MOMO</span> <span style="color:var(--orange-mid)">Go</span></h1>
<div class="version">v1.0</div>

<!-- ===== SCREEN: LOBBY ===== -->
<div class="screen active" id="screen-lobby">
  <div class="status-bar" id="lobby-status">接続中...</div>
  <div class="game-tabs" id="game-tabs">
    <button class="game-tab active" data-game="gomoku" onclick="selectGameType('gomoku')" id="i18n-tab-gomoku">五目並べ</button>
    <button class="game-tab" data-game="go" onclick="selectGameType('go')" id="i18n-tab-go">囲碁</button>
  </div>
  <div class="panel">
    <div class="panel-title" id="i18n-create-title">部屋を作る</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="field"><label id="i18n-label-name">あなたの名前</label><input class="input" id="my-name" value="" maxlength="12"></div>
      <div class="field"><label id="i18n-label-room">部屋の名前</label><input class="input" id="room-name-input" value="" maxlength="20"></div>
      <div class="field"><label id="i18n-label-pw">パスワード（省略可）</label><input class="input" id="room-password" placeholder="なしの場合は空欄" maxlength="20" autocomplete="new-password"></div>
      <div class="toggle-row">
        <span id="i18n-label-public">一覧に公開する</span>
        <input type="checkbox" class="toggle" id="room-public" checked>
      </div>
      <div class="field" id="rule-preset-field">
        <label id="i18n-label-rule">ルール</label>
        <div class="rule-presets" id="rule-presets">
          <div class="rule-card" data-preset="normal" onclick="selectPreset('normal')" id="i18n-preset-normal">正規（連珠）</div>
          <div class="rule-card selected" data-preset="casual" onclick="selectPreset('casual')" id="i18n-preset-casual">カジュアル</div>
          <div class="rule-card" data-preset="free" onclick="selectPreset('free')" id="i18n-preset-free">自由</div>
        </div>
      </div>
      <div class="field">
        <label id="i18n-label-time-limit" data-i18n="labelTimeLimit">持ち時間（分）</label>
        <input class="input" id="room-time-limit" type="number" min="0" max="999" inputmode="numeric" placeholder="0または空欄=無制限" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="createRoom()" id="i18n-btn-create">部屋を作成</button>
      <div id="create-error" style="font-size:12px;color:var(--danger);min-height:16px;text-align:center;"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span id="i18n-room-list-title">部屋一覧</span>
      <button class="btn-ghost btn" style="font-size:11px;padding:4px 8px;" onclick="refreshRooms()" id="i18n-btn-refresh">更新</button>
    </div>
    <div class="room-list" id="room-list">
      <div style="color:var(--gray);font-size:13px;text-align:center;padding:10px;">部屋を取得中...</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title" id="i18n-private-title">非公開の部屋を表示</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="field">
        <label id="i18n-private-pw-label">パスワード（なければ空欄）</label>
        <div style="display:flex;gap:6px;">
          <input class="input" id="private-room-pw" type="password" maxlength="20" style="flex:1;" autocomplete="new-password">
          <button class="btn btn-secondary" onclick="showPrivateRooms()" id="i18n-btn-private-show" style="white-space:nowrap;flex-shrink:0;">表示</button>
        </div>
      </div>
      <div class="room-list" id="private-room-list" style="display:none;"></div>
      <div id="private-error" style="font-size:12px;color:var(--danger);min-height:16px;text-align:center;"></div>
    </div>
  </div>
</div>

<!-- ===== SCREEN: WAITING (HOST) ===== -->
<div class="screen" id="screen-waiting">
  <div class="status-bar highlight" id="waiting-status">ゲストの参加を待っています...</div>
  <div class="panel">
    <div class="panel-title" id="i18n-room-info">部屋情報</div>
    <div style="font-size:13px;color:var(--gray);"><span id="i18n-room-label">部屋名：</span><span id="waiting-room-name" style="color:var(--text)"></span></div>
  </div>
  <div class="chat-wrap">
    <div class="chat-box" id="chat-waiting"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-waiting" placeholder="メッセージ">
      <button class="btn btn-secondary" onclick="sendChat('waiting')" id="i18n-btn-send-w">送信</button>
    </div>
  </div>
  <button class="btn btn-ghost" onclick="leaveRoom()" id="i18n-btn-leave-w">退出</button>
</div>

<!-- ===== SCREEN: ROOM (PRE-GAME LOBBY) ===== -->
<div class="screen" id="screen-room">
  <div class="status-bar" id="room-status"></div>

  <div class="panel">
    <div class="panel-title" id="i18n-rule-title">ルール</div>
    <div class="rule-preset-name" id="room-rule-name">-</div>
    <div class="rule-detail-grid" id="room-rule-detail"></div>
  </div>

  <div class="panel">
    <div class="panel-title" id="i18n-color-title">色を選択してください</div>
    <div class="color-select">
      <div class="color-btn" id="btn-black" onclick="selectColor('black')">
        <div class="stone-preview black" id="stone-preview-black"></div>
        <div class="color-label" id="i18n-black-label"></div>
        <div class="color-who" id="who-black"></div>
      </div>
      <div class="color-btn" id="btn-white" onclick="selectColor('white')">
        <div class="stone-preview white" id="stone-preview-white"></div>
        <div class="color-label" id="i18n-white-label"></div>
        <div class="color-who" id="who-white"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div style="font-size:13px;color:var(--gray);text-align:center;margin-bottom:8px;" id="start-hint">黒と白をそれぞれ選択するとゲーム開始できます</div>
    <div class="row">
      <button class="btn btn-primary" id="btn-start" disabled onclick="pressStart()" data-i18n="startGame">ゲーム開始</button>
      <button class="btn btn-ghost" onclick="leaveRoom()" id="i18n-btn-leave-r">退出</button>
    </div>
    <div style="font-size:12px;color:var(--orange);text-align:center;margin-top:6px;min-height:18px;" id="start-waiting-msg"></div>
  </div>

  <div class="chat-wrap">
    <div class="chat-box" id="chat-room"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-room" placeholder="メッセージ">
      <button class="btn btn-secondary" onclick="sendChat('room')" id="i18n-btn-send-r">送信</button>
    </div>
  </div>

  <div id="host-controls" style="display:none;">
    <button class="btn btn-danger" style="width:100%;font-size:13px;" onclick="kickGuest()" id="i18n-btn-kick">ゲストをキック</button>
  </div>
</div>

<!-- ===== SCREEN: GAME ===== -->
<div class="screen" id="screen-game">
  <div class="board-wrap">
    <div class="my-color-badge">
      <div class="badge-line">
        <span id="my-color-label">あなたは ？</span>
        <span class="capture-display" id="my-capture-display" style="display:none;"></span>
        <span class="time-display" id="my-time-display" style="display:none;"></span>
      </div>
      <div class="score-display" id="my-score-display" style="display:none;"></div>
    </div>

    <div class="board-frame" id="board-frame">
      <div class="board-container">
        <svg class="board-svg" id="board-svg" viewBox="0 0 418 418" preserveAspectRatio="none"></svg>
        <div class="board" id="board"></div>
      </div>
    </div>

    <div class="opp-color-badge" id="opp-color-badge" style="display:none;">
      <div class="badge-line">
        <span id="opp-color-label"></span>
        <span class="capture-display" id="opp-capture-display" style="display:none;"></span>
        <span class="time-display" id="opp-time-display"></span>
      </div>
      <div class="score-display" id="opp-score-display" style="display:none;"></div>
    </div>
    <!-- 三手交換パネル（インライン、opp-color-badge と入れ替えで表示） -->
    <div class="swap-panel-inline" id="swap-overlay" style="display:none;">
      <div class="swap-status" id="swap-modal-status"></div>
      <div class="row swap-actions" id="swap-modal-actions"></div>
      <div class="swap-modal-title" id="swap-modal-title">三手交換</div>
      <div class="swap-desc" id="swap-modal-desc"></div>
    </div>

    <div class="turn-indicator" id="turn-indicator">-</div>
    <!-- 待った（undo）パネル: turn-indicator の直下に重ねる位置に表示 -->
    <div class="undo-panel" id="undo-panel" style="display:none;">
      <div class="undo-panel-text" id="undo-panel-text"></div>
      <div class="undo-panel-buttons" id="undo-panel-buttons"></div>
    </div>

    <div class="board-actions">
      <button class="btn btn-primary" id="btn-confirm" onclick="confirmMove()" disabled data-i18n="confirmMove">確定</button>
      <button class="btn btn-secondary" id="btn-pass" onclick="pass()" data-i18n="pass">パス</button>
      <button class="btn btn-secondary" id="btn-undo" onclick="requestUndoStep()" style="display:none;">待った</button>
      <button class="btn btn-primary" id="btn-scoring-agree" onclick="agreeScoring()" style="display:none;">合意する</button>
      <button class="btn btn-ghost" id="btn-scoring-cancel" onclick="cancelAgreeScoring()" style="display:none;">合意取消</button>
      <button class="btn btn-ghost" onclick="resign()" id="i18n-btn-resign">降参</button>
    </div>

    <div class="toggle-row" style="margin-top:6px;font-size:12px;color:var(--text-muted);">
      <span id="i18n-notation-toggle">着手番号を表示</span>
      <input type="checkbox" class="toggle" id="notation-toggle" onchange="toggleNotation()">
    </div>
  </div>

  <div class="chat-wrap">
    <div class="chat-box" id="chat-game"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-game" placeholder="メッセージ">
      <button class="btn btn-secondary" onclick="sendChat('game')" id="i18n-btn-send-g">送信</button>
    </div>
  </div>
</div>

<!-- ===== SCREEN: END ===== -->
<div class="screen" id="screen-end">
  <div class="panel">
    <div class="panel-title" id="end-result" style="font-size:22px;text-align:center;"></div>
    <div style="font-size:14px;text-align:center;color:var(--gray);margin-top:4px;" id="end-score"></div>
  </div>

  <div class="panel history-panel" id="history-panel" style="display:none;">
    <div class="panel-title" id="i18n-match-history">対局履歴</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="panel">

// ===== WS =====
// WebSocket・WebRTC処理はすべて MomoMatchmaking モジュールに委譲する

function connectWS() {
  MomoMatchmaking.init({
    signalingUrl: SIGNALING_URL,
    gameType: currentGameType,

    onWsOpen: () => {
      lobbyStatusKey = 'connected';
      document.getElementById('lobby-status').textContent = t('connected');
      document.getElementById('lobby-status').classList.add('highlight');
    },

    onWsClose: () => {
      lobbyStatusKey = 'connecting';
      const ls = document.getElementById('lobby-status');
      if (ls) {
        ls.textContent = t('connecting');
        ls.classList.remove('highlight');
      }
    },

    onRoomList: (rooms) => {
      renderRoomList(rooms);
      if (_showingPrivate) {
        renderPrivateRoomList(rooms, _pendingPrivatePw);
        _showingPrivate = false;
      }
    },

    onRoomCreated: (roomId, roomName, rules) => {
      currentRoomName = roomName;
      // ホストは自分が選んだプリセットを保持（サーバー応答の rules があれば優先）
      currentRules = rules || { preset: selectedPreset };
      document.getElementById('waiting-room-name').textContent = roomName;
      waitingStatusKey = 'waitingGuest';
      waitingStatusName = '';
      document.getElementById('waiting-status').textContent = t('waitingGuest');
      showScreen('waiting');
    },

    onJoinedRoom: (roomId, roomName, hostName, rules) => {
      currentRoomName = roomName;
      // ゲストはホストから受信したルールを保持（rules が無ければデフォルト casual）
      currentRules = rules || { preset: 'casual' };
      document.getElementById('room-status').textContent = `${roomName}｜ホスト：${hostName}`;
      document.getElementById('host-controls').style.display = 'none';
      renderRoomRule();
      showScreen('room');
    },

    onGuestJoined: (guestName) => {
      waitingStatusKey = 'guestJoined';
      waitingStatusName = guestName;
      const msg = `${guestName}${t('guestJoined')}`;
      document.getElementById('waiting-status').textContent = msg;
      document.getElementById('room-status').textContent = currentRoomName;
      document.getElementById('host-controls').style.display = 'block';
      renderRoomRule();
      showScreen('room');
      addChat('room', msg);
    },

    onGuestLeft: () => {
      if (gameActive) {
        showDisconnect(t('disconnected'));
      } else {
        addChat('waiting', t('guestLeft'));
        resetColorSelect();
        waitingStatusKey = 'waitingGuest';
        waitingStatusName = '';
        document.getElementById('waiting-status').textContent = t('waitingGuest');
        document.getElementById('host-controls').style.display = 'none';
        showScreen('waiting');
      }
    },

    onConnected: () => {
      // DataChannel確立（connected フラグはgetState()経由で参照）
    },

    onDisconnected: (msg) => {
      showDisconnect(msg);
    },

    onMessage: (data) => {
      handleMsg(data);
    },

    onError: (message) => {
      document.getElementById('pw-error').textContent = message;
      document.getElementById('private-error').textContent = message;
    },

    onKicked: () => {
      alert(t('kicked'));
      resetToLobby();
    },
  });
}

// 部屋一覧に表示するルール+持ち時間バッジHTML。
// 囲碁の部屋は preset を持たないので、持ち時間バッジのみ。
function ruleBadgeHtml(rules) {
  let html = '';
  if (rules && rules.preset && RULE_TABLE[rules.preset]) {
    const preset = rules.preset;
    html += `<span class="badge badge-rule-${preset}">${escHtml(t(presetNameKey(preset)))}</span>`;
  }
  if (rules) {
    const tMin = Number.isFinite(rules.timeLimitMin) ? rules.timeLimitMin : 0;
    const tLbl = tMin > 0 ? ('⏱' + tMin + t('timeMinUnit')) : ('⏱' + t('timeUnlimited'));
    html += `<span class="badge badge-time">${escHtml(tLbl)}</span>`;
  }
  return html;
}

function presetNameKey(preset) {
  return preset === 'normal' ? 'presetNormal'
       : preset === 'casual' ? 'presetCasual'
       : preset === 'free'   ? 'presetFree'
       : 'presetCasual';
}

// ロビーのタブで gameType を切り替える。
// 部屋に入っていれば resetToLobby で状態クリーンアップしてから gameType を切替。
function selectGameType(gt) {
  if (gt !== 'gomoku' && gt !== 'go') return;
  if (gt === currentGameType) return;
  // 部屋に入っているなら状態リセット込みで退出
  if (typeof MomoMatchmaking !== 'undefined' && MomoMatchmaking.getState) {
    const st = MomoMatchmaking.getState();
    if (st && st.currentRoomId) {
      resetToLobby();
    }
  }
  currentGameType = gt;
  // タブUI更新
  document.querySelectorAll('#game-tabs .game-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.game === gt);
  });
  // ルールプリセット欄: 五目並べのみ表示
  const rf = document.getElementById('rule-preset-field');
  if (rf) rf.style.display = (gt === 'gomoku') ? '' : 'none';
  // 持ち時間欄のデフォルト: 囲碁=空欄、五目=現在のプリセット連動
  const tInput = document.getElementById('room-time-limit');
  if (tInput) {
    if (gt === 'go') {
      tInput.value = '';
    } else {
      const def = PRESET_DEFAULT_TIME[selectedPreset];
      tInput.value = (def === '' || def === undefined) ? '' : String(def);
    }
  }
  // サーバーへ gameType 切替を通知（既存 WS を維持して enter_lobby 再送）
  if (typeof MomoMatchmaking !== 'undefined' && MomoMatchmaking.changeGameType) {
    MomoMatchmaking.changeGameType(gt);
  }
  // ロビー画面にいることを保証
  showScreen('lobby');
}

// 部屋作成パネルでプリセットカードを選択する
function selectPreset(preset) {
  if (!RULE_TABLE[preset]) return;
  selectedPreset = preset;
  document.querySelectorAll('#rule-presets .rule-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.preset === preset);
  });
  // 持ち時間欄のデフォルト値をプリセット連動で設定（normal=30、casual/free=空）
  const tInput = document.getElementById('room-time-limit');
  if (tInput) {
    const def = PRESET_DEFAULT_TIME[preset];
    tInput.value = (def === '' || def === undefined) ? '' : String(def);
  }
}

// screen-room のルール詳細パネルを再描画（言語切替時にも呼ぶ）
function renderRoomRule() {
  const nameEl = document.getElementById('room-rule-name');
  const detailEl = document.getElementById('room-rule-detail');
  if (!nameEl || !detailEl) return;
  if (!currentRules) {
    nameEl.textContent = '-';
    detailEl.innerHTML = '';
    return;
  }
  let rows = '';
  // currentRules.preset の有無で囲碁/五目並べを判定（ルームデータ準拠で確実）
  const isGoRoom = !currentRules.preset;
  if (isGoRoom) {
    // 囲碁は固定ルール（コミ・コウ・自殺手・連続パス2回）+ 持ち時間
    nameEl.textContent = t('goTitle');
    const goRows = [
      ['ruleLabel_komi',     'goRuleVal_komi'],
      ['ruleLabel_ko',       'goRuleVal_ko'],
      ['ruleLabel_suicide',  'goRuleVal_suicideForbid'],
      ['ruleLabel_passEnd',  'goRuleVal_passEnd'],
    ];
    rows = goRows.map(([labelKey, valKey]) =>
      `<div class="rd-label">${escHtml(t(labelKey))}</div><div class="rd-value">${escHtml(t(valKey))}</div>`
    ).join('');
  } else {
    // 五目並べ: プリセット別の詳細行
    const preset = currentRules.preset;
    nameEl.textContent = t(presetNameKey(preset));
    const tbl = RULE_TABLE[preset] || RULE_TABLE.casual;
    rows = RULE_ROWS.map(([key, labelKey]) =>
      `<div class="rd-label">${escHtml(t(labelKey))}</div><div class="rd-value">${escHtml(t(tbl[key]))}</div>`
    ).join('');
  }
  // 持ち時間行（共通）
  const tMin = Number.isFinite(currentRules.timeLimitMin) ? currentRules.timeLimitMin : 0;
  const tStr = tMin > 0 ? (String(tMin) + t('timeMinUnit')) : t('timeUnlimited');
  rows += `<div class="rd-label">${escHtml(t('ruleLabel_timeLimit'))}</div><div class="rd-value">${escHtml(tStr)}</div>`;

}

function createRoom() {

  const roomEl = document.getElementById('room-name-input');
  const errEl = document.getElementById('create-error');

  const playerName = nameEl.value.trim();
  const roomName = roomEl.value.trim();

  if (!playerName || !roomName) {
    errEl.textContent = t('createErrorEmpty');
    return;
  }
  errEl.textContent = '';

  myName = playerName;
  try {
    localStorage.setItem('momoPlayerName', playerName);
    localStorage.setItem('momoRoomName', roomName);
  } catch(e) {}

  const password = document.getElementById('room-password').value;
  const isPublic = document.getElementById('room-public').checked;
  const tInput = document.getElementById('room-time-limit');
  const rawT = tInput ? tInput.value.trim() : '';
  const tMin = rawT === '' ? 0 : Math.max(0, Math.min(999, parseInt(rawT, 10) || 0));
  // 囲碁は preset を持たない（コミ・コウ・自殺手は固定）
  const rules = (currentGameType === 'go')
    ? { timeLimitMin: tMin }
    : { preset: selectedPreset, timeLimitMin: tMin };

  MomoMatchmaking.createRoom({ hostName: myName, name: roomName, password, isPublic, rules });
}
