<script src="../matchmaking/momo-matchmaking.js"></script>
<script src="gomoku-rules.js"></script>
<style>
:root {
  /* DESIGN_SPEC v1.0 準拠 */
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --border-strong: #444;
  --bg-selected: rgba(194,65,12,0.15);
  --orange: #c2410c;
  --orange-mid: #ea580c;
  --orange-light: #fb923c;
  --orange-dim: #7a3405;
  --orange-glow: rgba(194,65,12,0.25);
  --white: #f0f0f0;
  --gray: #666;
  --gray2: #444;
  --text: #e5e5e5;
  --text-muted: #737373;
  --danger: #c0392b;
  --success: #27ae60;
  /* 五目並べ盤面用 */
  --board-bg: #d9b27a;
  --board-line: #2a1a0a;
  --board-star: #1a0e04;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 28px;
  color: var(--orange);
  letter-spacing: 2px;
  padding: 16px 0 4px;
  margin-top: 32px;
}

.version {
  font-size: 11px;
  color: var(--gray);
  margin-bottom: 12px;
}

/* ===== LANG SWITCHER ===== */
#lang-switcher {
  position: fixed;
  top: 8px;
  right: 12px;
  z-index: 200;
}
#lang-select {
  background: var(--surface2);
  border: 1px solid var(--border-strong);
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
}
#lang-select:focus { border-color: var(--orange); }

/* ===== SCREEN SYSTEM ===== */
.screen { display: none; width: 100%; max-width: 460px; padding: 0 12px 40px; }
.screen.active { display: flex; flex-direction: column; gap: 10px; }

/* ===== BUTTONS ===== */
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 700;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--orange); color: #fff; }
.btn-primary:hover { background: #ff7a20; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--orange); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ===== INPUTS ===== */
.input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
.input:focus { border-color: var(--orange); }

label { font-size: 12px; color: var(--gray); margin-bottom: 2px; display: block; }

.field { display: flex; flex-direction: column; gap: 3px; }

.row { display: flex; gap: 8px; }
.row .btn { flex: 1; }

/* ===== PANEL ===== */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.panel-title {
  font-family: 'Fredoka One', cursive;
  font-size: 16px;
  color: var(--orange);
  margin-bottom: 10px;
}

/* ===== STATUS BAR ===== */
.status-bar {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--gray);
  text-align: center;
}
.status-bar.highlight { border-color: var(--orange); color: var(--orange); }

/* ===== ROOM LIST ===== */
.room-list { display: flex; flex-direction: column; gap: 6px; }
.room-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.room-item:hover { border-color: var(--orange); }
.room-item.full { opacity: 0.45; cursor: not-allowed; }
.room-name { font-weight: 700; font-size: 14px; }
.room-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
.room-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
}
.badge-lock { background: var(--gray2); color: var(--white); }
.badge-open { background: var(--success); color: #fff; }
.badge-full { background: var(--gray2); color: var(--gray); }
/* ルールプリセット用のバッジ（明るめ・目立つ色） */
.badge-rule-normal { background: #ea580c; color: #fff; }
.badge-rule-casual { background: #fb923c; color: #1a0e04; }
.badge-rule-free   { background: #94a3b8; color: #fff; }

/* ===== CHAT ===== */
.chat-wrap { display: flex; flex-direction: column; gap: 6px; }
.chat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  height: 110px;
  overflow-y: auto;
  padding: 8px 10px;
  font-size: 12px;
  line-height: 1.6;
  cursor: default;
  user-select: none;
}
.chat-row { display: flex; gap: 6px; }
.chat-input { flex: 1; border-color: #3a3a3a !important; }
.chat-input:focus { border-color: var(--orange) !important; }
.chat-row .btn-secondary { border-color: #3a3a3a; }

/* ===== COLOR SELECT ===== */
.color-select { display: flex; gap: 10px; }
.color-btn {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
}
.color-btn:hover { border-color: var(--orange); }
.color-btn.selected-black { border-color: #fff; background: #111; }
.color-btn.selected-white { border-color: var(--orange); background: #2a2a2a; }
/* .color-btn.taken は廃止 */
.stone-preview {
  width: 36px; height: 36px;
  border-radius: 50%;
}
.stone-preview.black { background: #111; border: 2px solid #555; }
.stone-preview.white { background: #f0f0f0; border: 2px solid #aaa; }
.color-label { font-size: 13px; font-weight: 700; }
.color-who { font-size: 11px; color: var(--orange); min-height: 16px; }

/* ===== BOARD ===== */
.board-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.my-color-badge {
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
}

.board-frame {
  padding: 12px;
  border-radius: 8px;
  border: 3px solid var(--border);
  background: var(--board-bg);
  transition: border-color 0.3s;
}
.board-frame.my-turn { border-color: var(--orange); box-shadow: 0 0 16px var(--orange-glow); }

.board-container {
  position: relative;
  --cs: 22px;
  width: calc(19 * var(--cs));
  height: calc(19 * var(--cs));
  margin: 0 auto;
}
@media (max-width: 480px) {
  .board-container { --cs: 18px; }
}

.board-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.board {
  display: grid;
  grid-template-columns: repeat(19, var(--cs));
  grid-template-rows: repeat(19, var(--cs));
  position: absolute;
  inset: 0;
}

.cell {
  width: var(--cs);
  height: var(--cs);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  outline: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.stone {
  width: 90%;
  height: 90%;
  border-radius: 50%;
  position: relative;
  pointer-events: none;
  transition: opacity 0.15s;
}
.stone.black { background: radial-gradient(circle at 30% 30%, #555, #000); box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
.stone.white { background: radial-gradient(circle at 30% 30%, #fff, #ccc); box-shadow: 0 1px 2px rgba(0,0,0,0.3); border: 1px solid #888; box-sizing: border-box; }
.stone.preview { opacity: 0.45; }
.stone.last-move::after {
  content: '';
  position: absolute;
  inset: -3px;
  border: 2px solid var(--orange-mid);
  border-radius: 50%;
  pointer-events: none;
}
.stone.winning {
  box-shadow:
    0 0 0 3px var(--orange-mid),
    0 0 0 5px var(--orange-light),
    0 0 22px var(--orange),
    0 0 36px rgba(251,146,60,0.6);
  animation: winPulse 0.55s ease-in-out infinite alternate;
  z-index: 2;
}
/* CAT モード時の駒（猫/鳥アイコン）— 背景・影を打ち消してアイコンに集中 */
.stone.cat-piece {
  background: none;
  border: none;
  box-shadow: none;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}
.stone.cat-piece.last-move::after {
  inset: -2px;
  border-radius: 6px;
}
.stone.cat-piece.winning {
  box-shadow:
    0 0 0 3px var(--orange-mid),
    0 0 0 5px var(--orange-light),
    0 0 22px var(--orange),
    0 0 36px rgba(251,146,60,0.6);
}
@keyframes winPulse {
  from { transform: scale(1.0); }
  to   { transform: scale(1.18); }
}
.turn-indicator.result-win,
.turn-indicator.result-lose,
.turn-indicator.result-draw {
  font-family: 'Fredoka One', cursive;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 1px;
  padding: 6px 14px;
  border-radius: 8px;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.turn-indicator.result-win  {
  color: #fff;
  background: var(--orange);
  box-shadow: 0 0 20px var(--orange-glow);
}
.turn-indicator.result-lose {
  color: #fff;
  background: var(--surface2);
  border: 2px solid var(--border-strong);
}
.turn-indicator.result-draw {
  color: #fff;
  background: var(--orange-dim);
  border: 2px solid var(--orange-mid);
}

.move-number {
  position: absolute;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 9px;
  font-weight: 700;
  pointer-events: none;
  z-index: 1;
}

.score-bar {
  display: flex;
  gap: 16px;
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  align-items: center;
}
.score-black { color: #aaa; }
.score-white { color: var(--white); }
.score-sep { color: var(--gray); font-size: 14px; }

.turn-indicator {
  font-size: 13px;
  text-align: center;
  min-height: 20px;
  color: var(--gray);
}
.turn-indicator.active { color: var(--orange); font-weight: 700; }

.board-actions { display: flex; gap: 8px; }
.board-actions .btn { flex: 1; font-size: 13px; padding: 8px; }

/* ===== END PANEL ===== */
.end-choices { display: flex; flex-direction: column; gap: 8px; }

/* ===== MATCH HISTORY ===== */
.history-panel { display: flex; flex-direction: column; gap: 6px; }
.history-list {
  max-height: 130px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.history-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  padding: 4px 6px;
  border-radius: 4px;
  background: var(--surface2);
}
.history-idx { color: var(--gray); min-width: 20px; font-size: 11px; }
.history-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
  min-width: 34px;
  text-align: center;
}
.history-badge.win  { background: var(--success); color: #fff; }
.history-badge.lose { background: var(--danger);  color: #fff; }
.history-badge.draw { background: var(--gray2);   color: var(--white); }
.history-score { color: var(--text); flex: 1; }
.end-btn {
  padding: 12px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.end-btn:hover { border-color: var(--orange); }
.end-btn.selected { border-color: var(--orange); background: #1a0e04; color: var(--orange); }
.end-btn.danger-btn { border-color: var(--danger); }
.end-btn.danger-btn:hover { background: #2a0a0a; }
.opponent-choice { font-size: 11px; color: var(--orange); }

/* ===== PASSWORD MODAL ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.modal-title { font-family: 'Fredoka One', cursive; color: var(--orange); font-size: 18px; }

.divider { border: none; border-top: 1px solid var(--border); }

/* toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.toggle {
  appearance: none;
  width: 36px; height: 20px;
  background: var(--gray2);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle:checked { background: var(--orange); }
.toggle::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: left 0.2s;
}
.toggle:checked::after { left: 19px; }

/* ===== RULE PRESET CARDS (部屋作成) ===== */
.rule-presets { display: flex; gap: 6px; margin-top: 4px; }
.rule-card {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 6px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  color: var(--text);
}
.rule-card:hover { border-color: var(--orange); }
.rule-card.selected {
  border-color: var(--orange);
  background: var(--bg-selected);
  color: var(--orange);
}

/* ===== RULE DETAIL (色選択画面) ===== */
.rule-detail-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 12px;
  font-size: 12px;
  margin-top: 6px;
}
.rule-detail-grid .rd-label { color: var(--gray); white-space: nowrap; }
.rule-detail-grid .rd-value { color: var(--text); }
.rule-preset-name {
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  color: var(--orange);
  text-align: center;
}

</style>
</head>
<body>

<div id="lang-switcher">
  <select id="lang-select" onchange="onLangChange(this.value)">
    <option value="ja">日本語</option>
    <option value="en">EN</option>
    <option value="zh">中文</option>
    <option value="cat">CAT</option>
  </select>
</div>

<div class="version">v1.0</div>

<!-- ===== SCREEN: LOBBY ===== -->
<div class="screen active" id="screen-lobby">
  <div class="status-bar" id="lobby-status">接続中...</div>
  <div class="panel">
    <div class="panel-title" id="i18n-create-title">部屋を作る</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="field"><label id="i18n-label-name">あなたの名前</label><input class="input" id="my-name" value="" maxlength="12"></div>
      <div class="field"><label id="i18n-label-room">部屋の名前</label><input class="input" id="room-name-input" value="" maxlength="20"></div>
      <div class="field"><label id="i18n-label-pw">パスワード（省略可）</label><input class="input" id="room-password" placeholder="なしの場合は空欄" maxlength="20" autocomplete="off"></div>
      <div class="toggle-row">
        <span id="i18n-label-public">一覧に公開する</span>
        <input type="checkbox" class="toggle" id="room-public" checked>
      </div>
      <div class="field">
        <label id="i18n-label-rule">ルール</label>
        <div class="rule-presets" id="rule-presets">
          <div class="rule-card" data-preset="normal" onclick="selectPreset('normal')" id="i18n-preset-normal">正規（連珠）</div>
          <div class="rule-card selected" data-preset="casual" onclick="selectPreset('casual')" id="i18n-preset-casual">カジュアル</div>
          <div class="rule-card" data-preset="free" onclick="selectPreset('free')" id="i18n-preset-free">自由</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createRoom()" id="i18n-btn-create">部屋を作成</button>
      <div id="create-error" style="font-size:12px;color:var(--danger);min-height:16px;text-align:center;"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span id="i18n-room-list-title">部屋一覧</span>
      <button class="btn-ghost btn" style="font-size:11px;padding:4px 8px;" onclick="refreshRooms()" id="i18n-btn-refresh">更新</button>
    </div>
    <div class="room-list" id="room-list">
      <div style="color:var(--gray);font-size:13px;text-align:center;padding:10px;">部屋を取得中...</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title" id="i18n-private-title">非公開の部屋を表示</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="field">
        <label id="i18n-private-pw-label">パスワード（なければ空欄）</label>
        <div style="display:flex;gap:6px;">
          <input class="input" id="private-room-pw" type="password" maxlength="20" style="flex:1;" autocomplete="off">
          <button class="btn btn-secondary" onclick="showPrivateRooms()" id="i18n-btn-private-show" style="white-space:nowrap;flex-shrink:0;">表示</button>
        </div>
      </div>
      <div class="room-list" id="private-room-list" style="display:none;"></div>
      <div id="private-error" style="font-size:12px;color:var(--danger);min-height:16px;text-align:center;"></div>
    </div>
  </div>
</div>

<!-- ===== SCREEN: WAITING (HOST) ===== -->
<div class="screen" id="screen-waiting">
  <div class="status-bar highlight" id="waiting-status">ゲストの参加を待っています...</div>
  <div class="panel">
    <div class="panel-title" id="i18n-room-info">部屋情報</div>
    <div style="font-size:13px;color:var(--gray);"><span id="i18n-room-label">部屋名：</span><span id="waiting-room-name" style="color:var(--text)"></span></div>
  </div>
  <div class="chat-wrap">
    <div class="chat-box" id="chat-waiting"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-waiting" placeholder="メッセージ">
      <button class="btn btn-secondary" onclick="sendChat('waiting')" id="i18n-btn-send-w">送信</button>
    </div>
  </div>
  <button class="btn btn-ghost" onclick="leaveRoom()" id="i18n-btn-leave-w">退出</button>
</div>

<!-- ===== SCREEN: ROOM (PRE-GAME LOBBY) ===== -->
<div class="screen" id="screen-room">
  <div class="status-bar" id="room-status"></div>

  <div class="panel">
    <div class="panel-title" id="i18n-rule-title">ルール</div>
    <div class="rule-preset-name" id="room-rule-name">-</div>
    <div class="rule-detail-grid" id="room-rule-detail"></div>
  </div>

  <div class="panel">
    <div class="panel-title" id="i18n-color-title">色を選択してください</div>
    <div class="color-select">
      <div class="color-btn" id="btn-black" onclick="selectColor('black')">
        <div class="stone-preview black" id="stone-preview-black"></div>
        <div class="color-label" id="i18n-black-label"></div>
        <div class="color-who" id="who-black"></div>
      </div>
      <div class="color-btn" id="btn-white" onclick="selectColor('white')">
        <div class="stone-preview white" id="stone-preview-white"></div>
        <div class="color-label" id="i18n-white-label"></div>
        <div class="color-who" id="who-white"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div style="font-size:13px;color:var(--gray);text-align:center;margin-bottom:8px;" id="start-hint">黒と白をそれぞれ選択するとゲーム開始できます</div>
    <div class="row">
      <button class="btn btn-primary" id="btn-start" disabled onclick="pressStart()" data-i18n="startGame">ゲーム開始</button>
      <button class="btn btn-ghost" onclick="leaveRoom()" id="i18n-btn-leave-r">退出</button>
    </div>
    <div style="font-size:12px;color:var(--orange);text-align:center;margin-top:6px;min-height:18px;" id="start-waiting-msg"></div>
  </div>

  <div class="chat-wrap">
    <div class="chat-box" id="chat-room"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-room" placeholder="メッセージ">
      <button class="btn btn-secondary" onclick="sendChat('room')" id="i18n-btn-send-r">送信</button>
    </div>
  </div>

  <div id="host-controls" style="display:none;">
    <button class="btn btn-danger" style="width:100%;font-size:13px;" onclick="kickGuest()" id="i18n-btn-kick">ゲストをキック</button>
  </div>
</div>

<!-- ===== SCREEN: GAME ===== -->
<div class="screen" id="screen-game">
  <div class="board-wrap">
    <div class="my-color-badge">
      <span id="my-color-label">あなたは ？</span>
    </div>

    <div class="board-frame" id="board-frame">
      <div class="board-container">
        <svg class="board-svg" id="board-svg" viewBox="0 0 418 418" preserveAspectRatio="none"></svg>
        <div class="board" id="board"></div>
      </div>
    </div>

    <div class="turn-indicator" id="turn-indicator">-</div>

    <div class="board-actions">
      <button class="btn btn-primary" id="btn-confirm" onclick="confirmMove()" disabled data-i18n="confirmMove">確定</button>
      <button class="btn btn-secondary" id="btn-pass" onclick="pass()" data-i18n="pass">パス</button>
      <button class="btn btn-ghost" onclick="resign()" id="i18n-btn-resign">降参</button>
    </div>

    <div class="toggle-row" style="margin-top:6px;font-size:12px;color:var(--text-muted);">
      <span id="i18n-notation-toggle">着手番号を表示</span>
      <input type="checkbox" class="toggle" id="notation-toggle" onchange="toggleNotation()">
    </div>
  </div>

  <div class="chat-wrap">
    <div class="chat-box" id="chat-game"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-game" placeholder="メッセージ">
      <button class="btn btn-secondary" onclick="sendChat('game')" id="i18n-btn-send-g">送信</button>
    </div>
  </div>
</div>

<!-- ===== SCREEN: END ===== -->
<div class="screen" id="screen-end">
  <div class="panel">
    <div class="panel-title" id="end-result" style="font-size:22px;text-align:center;"></div>
    <div style="font-size:14px;text-align:center;color:var(--gray);margin-top:4px;" id="end-score"></div>
  </div>

  <div class="panel history-panel" id="history-panel" style="display:none;">
    <div class="panel-title" id="i18n-match-history">対局履歴</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="panel">
    <div class="panel-title" id="i18n-next-game">次の対局</div>
    <div class="end-choices">
      <button class="end-btn" id="end-swap" onclick="chooseEnd('swap')">
        <span id="i18n-end-swap">先後入れ替えて再戦</span>
        <span class="opponent-choice" id="opp-swap"></span>
      </button>
      <button class="end-btn" id="end-same" onclick="chooseEnd('same')">
        <span id="i18n-end-same">先後そのままで再戦</span>
        <span class="opponent-choice" id="opp-same"></span>
      </button>
      <button class="end-btn danger-btn" onclick="chooseEnd('quit')" id="i18n-end-quit">終了して退出</button>
    </div>
  </div>

  <div class="chat-wrap">
    <div class="chat-box" id="chat-end"></div>
    <div class="chat-row">
      <input class="input chat-input" id="chat-input-end" placeholder="GGなど">
      <button class="btn btn-secondary" onclick="sendChat('end')" id="i18n-btn-send-e">送信</button>
    </div>
  </div>
</div>

<!-- ===== PASSWORD MODAL ===== -->
<div class="overlay" id="pw-overlay">
  <div class="modal">
    <div class="modal-title">🔒 パスワード入力</div>
    <div style="font-size:13px;color:var(--gray);" id="pw-room-name"></div>
    <input class="input" id="pw-input" placeholder="パスワード" type="password">
    <div style="font-size:12px;color:var(--danger);min-height:16px;" id="pw-error"></div>
    <div class="row">
      <button class="btn btn-primary" onclick="submitPassword()">入室</button>
      <button class="btn btn-ghost" onclick="closePwModal()">キャンセル</button>
    </div>
  </div>
</div>

// ===== CONFIG =====

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  // 画面切替時にチャット欄をクリア
  ['waiting', 'room', 'game', 'end'].forEach(s => {
    const box = document.getElementById('chat-' + s);
    if (box) box.innerHTML = '';
  });
}

// ===== WS =====
// WebSocket・WebRTC処理はすべて MomoMatchmaking モジュールに委譲する

function connectWS() {
  MomoMatchmaking.init({
    signalingUrl: SIGNALING_URL,
    gameType: 'gomoku',

    onWsOpen: () => {
      lobbyStatusKey = 'connected';
      document.getElementById('lobby-status').textContent = t('connected');
      document.getElementById('lobby-status').classList.add('highlight');
    },

    onWsClose: () => {
      lobbyStatusKey = 'connecting';
      const ls = document.getElementById('lobby-status');
      if (ls) {
        ls.textContent = t('connecting');
        ls.classList.remove('highlight');
      }
    },

    onRoomList: (rooms) => {
      renderRoomList(rooms);
      if (_showingPrivate) {
        renderPrivateRoomList(rooms, _pendingPrivatePw);
        _showingPrivate = false;
      }
    },

    onRoomCreated: (roomId, roomName, rules) => {
      currentRoomName = roomName;
      // ホストは自分が選んだプリセットを保持（サーバー応答の rules があれば優先）
      currentRules = rules || { preset: selectedPreset };
      document.getElementById('waiting-room-name').textContent = roomName;
      waitingStatusKey = 'waitingGuest';
      waitingStatusName = '';
      document.getElementById('waiting-status').textContent = t('waitingGuest');
      showScreen('waiting');
    },

    onJoinedRoom: (roomId, roomName, hostName, rules) => {
      currentRoomName = roomName;
      // ゲストはホストから受信したルールを保持（rules が無ければデフォルト casual）
      currentRules = rules || { preset: 'casual' };
      document.getElementById('room-status').textContent = `${roomName}｜ホスト：${hostName}`;
      document.getElementById('host-controls').style.display = 'none';
      renderRoomRule();
      showScreen('room');
    },

    onGuestJoined: (guestName) => {
      waitingStatusKey = 'guestJoined';
      waitingStatusName = guestName;
      const msg = `${guestName}${t('guestJoined')}`;
      document.getElementById('waiting-status').textContent = msg;
      document.getElementById('room-status').textContent = currentRoomName;
      document.getElementById('host-controls').style.display = 'block';
      renderRoomRule();
      showScreen('room');
      addChat('room', msg);
    },

    onGuestLeft: () => {
      if (gameActive) {
        showDisconnect(t('disconnected'));
      } else {
        addChat('waiting', t('guestLeft'));
        resetColorSelect();
        waitingStatusKey = 'waitingGuest';
        waitingStatusName = '';
        document.getElementById('waiting-status').textContent = t('waitingGuest');
        document.getElementById('host-controls').style.display = 'none';
        showScreen('waiting');
      }
    },

    onConnected: () => {
      // DataChannel確立（connected フラグはgetState()経由で参照）
    },

    onDisconnected: (msg) => {
      showDisconnect(msg);
    },

    onMessage: (data) => {
      handleMsg(data);
    },

    onError: (message) => {
      document.getElementById('pw-error').textContent = message;
      document.getElementById('private-error').textContent = message;
    },

    onKicked: () => {
      alert(t('kicked'));
      resetToLobby();
    },
  });
}

// ===== RULE PRESET HELPERS =====
// 部屋一覧に表示するルールバッジHTML（rules が無いか preset 不正なら空文字）
function ruleBadgeHtml(rules) {
  if (!rules || !rules.preset || !RULE_TABLE[rules.preset]) return '';
  const preset = rules.preset;
  return `<span class="badge badge-rule-${preset}">${escHtml(t(presetNameKey(preset)))}</span>`;
}

function presetNameKey(preset) {
  return preset === 'normal' ? 'presetNormal'
       : preset === 'casual' ? 'presetCasual'
       : preset === 'free'   ? 'presetFree'
       : 'presetCasual';
}

// 部屋作成パネルでプリセットカードを選択する
function selectPreset(preset) {
  if (!RULE_TABLE[preset]) return;
  selectedPreset = preset;
  document.querySelectorAll('#rule-presets .rule-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.preset === preset);
  });
}

// screen-room のルール詳細パネルを再描画（言語切替時にも呼ぶ）
function renderRoomRule() {
  const nameEl = document.getElementById('room-rule-name');
  const detailEl = document.getElementById('room-rule-detail');
  if (!nameEl || !detailEl) return;
  if (!currentRules || !currentRules.preset) {
    nameEl.textContent = '-';
    detailEl.innerHTML = '';
    return;
  }
  const preset = currentRules.preset;
  nameEl.textContent = t(presetNameKey(preset));
  const tbl = RULE_TABLE[preset] || RULE_TABLE.casual;
  detailEl.innerHTML = RULE_ROWS.map(([key, labelKey]) =>
    `<div class="rd-label">${escHtml(t(labelKey))}</div><div class="rd-value">${escHtml(t(tbl[key]))}</div>`
  ).join('');
}

// ===== ROOM MANAGEMENT =====
function createRoom() {
  const nameEl = document.getElementById('my-name');
  const roomEl = document.getElementById('room-name-input');
  const errEl = document.getElementById('create-error');

  const playerName = nameEl.value.trim();
  const roomName = roomEl.value.trim();

  if (!playerName || !roomName) {
    errEl.textContent = t('createErrorEmpty');
    return;
  }
  errEl.textContent = '';

  myName = playerName;
  try {
    localStorage.setItem('momoPlayerName', playerName);
    localStorage.setItem('momoRoomName', roomName);
  } catch(e) {}

  const password = document.getElementById('room-password').value;
  const isPublic = document.getElementById('room-public').checked;
  const rules = { preset: selectedPreset };

  MomoMatchmaking.createRoom({ hostName: myName, name: roomName, password, isPublic, rules });
}

function showPrivateRooms() {
  const nameVal = document.getElementById('my-name').value.trim();
  if (!nameVal) {
    const nameEl = document.getElementById('my-name');
    nameEl.focus();
    nameEl.style.borderColor = 'var(--danger)';
    setTimeout(() => { nameEl.style.borderColor = ''; }, 2000);
    return;
  }
  myName = nameVal;
  try { localStorage.setItem('momoPlayerName', myName); } catch(e) {}
  document.getElementById('private-error').textContent = '';

  const pw = document.getElementById('private-room-pw').value;
  // サーバーから最新の部屋リストを取得し、onRoomList で描画
  _pendingPrivatePw = pw;
  _showingPrivate = true;
  MomoMatchmaking.refreshRooms();
}

// 非公開部屋表示用の一時フラグ
let _pendingPrivatePw = '';
let _showingPrivate = false;

function refreshRooms() {
  MomoMatchmaking.refreshRooms();
}

function renderRoomList(rooms) {
  const el = document.getElementById('room-list');
  if (!rooms || rooms.length === 0) {
    el.innerHTML = `<div style="color:var(--gray);font-size:13px;text-align:center;padding:10px;">${t('noRooms')}</div>`;
    return;
  }
  el.innerHTML = '';
  const publicRooms = rooms.filter(r => r.isPublic);
  if (publicRooms.length === 0) {
    el.innerHTML = `<div style="color:var(--gray);font-size:13px;text-align:center;padding:10px;">${t('noPublicRooms')}</div>`;
    return;
  }
  publicRooms.forEach(r => {
    const full = r.guestConnected;
    const item = document.createElement('div');
    item.className = 'room-item' + (full ? ' full' : '');
    item.innerHTML = `
      <div>
        <div class="room-name">${escHtml(r.name)}</div>
        <div class="room-meta">Host: ${escHtml(r.hostName)} ／ ${r.gameState === 'playing' ? t('playing') : t('waiting2')}</div>
      </div>
      <div class="room-badges">
        ${ruleBadgeHtml(r.rules)}
        ${r.hasPassword ? '<span class="badge badge-lock">🔒</span>' : ''}
        ${full ? `<span class="badge badge-full">${t('roomFull')}</span>` : `<span class="badge badge-open">${t('roomOpen')}</span>`}
      </div>
    `;
    if (!full) {
      item.onclick = () => tryJoinRoom(r);
    }
    el.appendChild(item);
  });
}

function renderPrivateRoomList(rooms, pw) {
  const el = document.getElementById('private-room-list');
  el.style.display = '';
  el.innerHTML = '';

  // 非公開部屋のうち、パスワードが一致するもの（または空パスワード）
  const privateRooms = (rooms || []).filter(r => !r.isPublic);
  // パスワード一致チェックはサーバー側でしか確認できないため、
  // ここでは「非公開部屋を全て表示」し、入室時に認証する
  // パスワード入力があれば入力値と一致するものだけ（サーバーが hasPassword を返すため、
  // パスワードなし部屋は空文字で入れる）
  const filtered = pw
    ? privateRooms.filter(r => r.hasPassword) // パスワードあり部屋のみ表示（空文字なら全て）
    : privateRooms.filter(r => !r.hasPassword); // パスワードなし非公開部屋

  // パスワード未入力の場合は両方表示する（入力内容で絞らない）
  const toShow = privateRooms; // サーバーが返す非公開部屋をそのまま表示し入室で認証

  if (toShow.length === 0) {
    el.innerHTML = `<div style="color:var(--gray);font-size:13px;text-align:center;padding:10px;">${t('noRooms')}</div>`;
    return;
  }

  toShow.forEach(r => {
    const full = r.guestConnected;
    const item = document.createElement('div');
    item.className = 'room-item' + (full ? ' full' : '');
    item.innerHTML = `
      <div>
        <div class="room-name">${escHtml(r.name)}</div>
        <div class="room-meta">Host: ${escHtml(r.hostName)} ／ ${r.gameState === 'playing' ? t('playing') : t('waiting2')}</div>
      </div>
      <div class="room-badges">
        ${ruleBadgeHtml(r.rules)}
        ${r.hasPassword ? '<span class="badge badge-lock">🔒</span>' : ''}
        ${full ? `<span class="badge badge-full">${t('roomFull')}</span>` : `<span class="badge badge-open">${t('roomOpen')}</span>`}
      </div>
    `;
    if (!full) {
      item.onclick = () => {
        // 入力されたパスワードでそのまま入室試行
        myName = document.getElementById('my-name').value.trim() || myName;
        MomoMatchmaking.joinRoom(r.id, pw, myName);
      };
    }
    el.appendChild(item);
  });
}

function tryJoinRoom(room) {
  const nameVal = document.getElementById('my-name').value.trim();
  if (!nameVal) {
    // 名前欄にフォーカスしてエラー表示
    const nameEl = document.getElementById('my-name');
    nameEl.focus();
    nameEl.style.borderColor = 'var(--danger)';
    setTimeout(() => { nameEl.style.borderColor = ''; }, 2000);
    return;
  }
  myName = nameVal;
  try { localStorage.setItem('momoPlayerName', myName); } catch(e) {}
  pendingJoinRoom = room;
  if (room.hasPassword) {
    document.getElementById('pw-room-name').textContent = room.name;
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    document.getElementById('pw-overlay').classList.add('show');
  } else {
    joinRoom(room.id, '');
  }
}

function submitPassword() {
  const pw = document.getElementById('pw-input').value;
  if (pendingJoinRoom) joinRoom(pendingJoinRoom.id, pw);
  closePwModal();
}

function closePwModal() {
  document.getElementById('pw-overlay').classList.remove('show');
}

function joinRoom(roomId, password) {
  MomoMatchmaking.joinRoom(roomId, password, myName);
}

function kickGuest() {
  if (confirm(t('confirmKick'))) {
    MomoMatchmaking.kickGuest();
    resetColorSelect();
    document.getElementById('host-controls').style.display = 'none';
    showScreen('waiting');
  }
}

function leaveRoom() {
  if (confirm(t('confirmLeave'))) {
    resetToLobby();
  }
}

function resetToLobby() {
  MomoMatchmaking.leaveRoom();
  myColor = null;
  gameReady = false;
  gameActive = false;
  matchHistory = [];
  currentRules = null;
  _showingPrivate = false;
  _pendingPrivatePw = '';
  const prl = document.getElementById('private-room-list');
  if (prl) { prl.style.display = 'none'; prl.innerHTML = ''; }
  resetColorSelect();
  showScreen('lobby');
  MomoMatchmaking.refreshRooms();
}

function showDisconnect(msg) {
  gameActive = false;
  alert(msg || t('disconnected'));
  resetToLobby();
}

  MomoMatchmaking.send(data);
}

// ===== COLOR SELECT =====
function selectColor(color) {
  myChoice = color;
  send({ type: 'color_select', color });
  updateColorUI();
  checkStartReady();
}

function updateColorUI() {
  const btnBlack = document.getElementById('btn-black');
  const btnWhite = document.getElementById('btn-white');
  const whoBlack = document.getElementById('who-black');
  const whoWhite = document.getElementById('who-white');

  btnBlack.className = 'color-btn';
  btnWhite.className = 'color-btn';

  if (myChoice === 'black') btnBlack.classList.add('selected-black');
  if (myChoice === 'white') btnWhite.classList.add('selected-white');

  whoBlack.textContent = myChoice === 'black' ? t('whoMe') : oppChoice === 'black' ? t('whoOpp') : '';
  whoWhite.textContent = myChoice === 'white' ? t('whoMe') : oppChoice === 'white' ? t('whoOpp') : '';
}

function checkStartReady() {
  const ready = myChoice && oppChoice && myChoice !== oppChoice;
  document.getElementById('btn-start').disabled = !ready;
  document.getElementById('start-hint').textContent = ready ? t('startReady') : t('startHint');
}

function resetColorSelect() {
  myChoice = null;
  oppChoice = null;
  myStartPressed = false;
  oppStartPressed = false;
  document.getElementById('start-waiting-msg').textContent = '';
  document.getElementById('btn-start').disabled = true;
  updateColorUI();
  checkStartReady();
}

function pressStart() {
  myStartPressed = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('start-waiting-msg').textContent = t('waitingStart');
  send({ type: 'start_press' });
  checkBothStart();
}

function checkBothStart() {
  if (myStartPressed && oppStartPressed) {
    beginGame();
  }
}

function beginGame(swapColors) {
  if (swapColors) {
    myColor = myColor === 'black' ? 'white' : 'black';
  } else if (!swapColors && myColor === null) {
    myColor = myChoice;
  }

  gameReady = true;
  initBoard();
  turn = 'black';
  gameActive = true;
  lastMove = null;

  document.getElementById('my-color-label').innerHTML =
    `${t('youAre')} ${PIECE.svg(myColor, '20px')}${t(myColor === 'black' ? 'black' : 'white')}`;

  showScreen('game');
  renderBoard();
  updateTurnUI();
}

// ===== GAME =====
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function initBoard() {
  board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
  moveNumberMap = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
  pendingMove = null;
  consecutivePasses = 0;
  moveCount = 0;
  winningLine = null;
  drawBoardSvg();
}

// 盤面の格子線・星9点を SVG で描画する（一度だけ呼ぶ）
function drawBoardSvg() {
  const svg = document.getElementById('board-svg');
  if (!svg) return;
  const cs = 22; // viewBoxユニット
  const offset = cs / 2; // 11
  const lineEnd = offset + (BOARD_SIZE - 1) * cs; // 407
  let html = '';
  // 縦線 19本
  for (let i = 0; i < BOARD_SIZE; i++) {
    const x = offset + i * cs;
    html += `<line x1="${x}" y1="${offset}" x2="${x}" y2="${lineEnd}" stroke="#2a1a0a" stroke-width="1" />`;
  }
  // 横線 19本
  for (let i = 0; i < BOARD_SIZE; i++) {
    const y = offset + i * cs;
    html += `<line x1="${offset}" y1="${y}" x2="${lineEnd}" y2="${y}" stroke="#2a1a0a" stroke-width="1" />`;
  }
  // 星9点
  const stars = [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
  stars.forEach(([sx, sy]) => {
    const x = offset + sx * cs;
    const y = offset + sy * cs;
    html += `<circle cx="${x}" cy="${y}" r="3" fill="#1a0e04" />`;
  });
  svg.innerHTML = html;
}

function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let y = 0; y < BOARD_SIZE; y++) {
    for (let x = 0; x < BOARD_SIZE; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.onclick = () => place(x, y);

      const stoneColor = board[y][x];
      const isPending = pendingMove && pendingMove.x === x && pendingMove.y === y;

      if (stoneColor || isPending) {
        const colorToShow = stoneColor || myColor;
        const isLast = lastMove && lastMove.x === x && lastMove.y === y && !isPending;
        const isWin  = winningLine && winningLine.some(p => p.x === x && p.y === y);

        let stone;
        if (currentLang === 'cat') {
          // CATモード: 駒を猫/鳥アイコンで描画
          stone = document.createElement('div');
          stone.className = 'stone cat-piece' + (isPending ? ' preview' : '') + (isLast ? ' last-move' : '') + (isWin ? ' winning' : '');
          stone.innerHTML = PIECE.svg(colorToShow, '100%');
        } else {
          stone = document.createElement('div');
          stone.className = 'stone ' + colorToShow + (isPending ? ' preview' : '') + (isLast ? ' last-move' : '') + (isWin ? ' winning' : '');
        }
        cell.appendChild(stone);

        // 着手番号表示（トグルONのみ、CATモードでは表示しない）
        if (stoneColor && showNotation && currentLang !== 'cat') {
          const num = moveNumberMap[y][x];
          if (num > 0) {
            const numEl = document.createElement('span');
            numEl.className = 'move-number';
            numEl.style.color = stoneColor === 'black' ? '#fff' : '#000';
            numEl.textContent = num;
            stone.appendChild(numEl);
          }
        }
      }
      el.appendChild(cell);
    }
  }
}

function updateTurnUI() {
  const frame = document.getElementById('board-frame');
  const indicator = document.getElementById('turn-indicator');
  const confirmBtn = document.getElementById('btn-confirm');
  const passBtn = document.getElementById('btn-pass');
  const myTurn = turn === myColor;

  if (myTurn) {
    frame.classList.add('my-turn');
    indicator.className = 'turn-indicator active';
    indicator.textContent = t('myTurn');
    turnIndicatorKey = 'myTurn';
  } else {
    frame.classList.remove('my-turn');
    indicator.className = 'turn-indicator';
    indicator.textContent = t('oppTurn');
    turnIndicatorKey = 'oppTurn';
  }

  // 確定ボタン: 自分手番＋仮置き有り＋対局中のみ
  if (confirmBtn) confirmBtn.disabled = !(myTurn && pendingMove && gameActive);
  // パスボタン: 自分手番＋対局中のみ
  if (passBtn) passBtn.disabled = !(myTurn && gameActive);
}

function place(x, y) {
  if (!gameReady || !gameActive) return;
  if (turn !== myColor) return;
  if (board[y][x]) return;

  // 同じ場所への2回目クリック → PCなら確定（モバイルは無視）
  if (pendingMove && pendingMove.x === x && pendingMove.y === y) {
    if (!IS_TOUCH) confirmMove();
    return;
  }
  pendingMove = { x, y };
  renderBoard();
  updateTurnUI();
}

function confirmMove() {
  if (!pendingMove) return;
  if (!gameReady || !gameActive) return;
  if (turn !== myColor) return;
  const { x, y } = pendingMove;
  applyMove(x, y, myColor);
  send({ type: 'move', x, y });
  pendingMove = null;
  consecutivePasses = 0;
  // 5連判定（自由ルール）
  const winLine = (typeof GomokuRules !== 'undefined') ? GomokuRules.checkWin(board, x, y, myColor, BOARD_SIZE) : null;
  if (winLine) {
    winningLine = winLine;
    endGame(myColor);
    return;
  }
  nextTurn();
}

function applyMove(x, y, color) {
  board[y][x] = color;
  moveCount++;
  moveNumberMap[y][x] = moveCount;
  lastMove = { x, y };
}

function nextTurn() {
  turn = turn === 'black' ? 'white' : 'black';
  renderBoard();
  updateTurnUI();
}

function pass() {
  if (!gameReady || !gameActive) return;
  if (turn !== myColor) return;
  pendingMove = null;
  send({ type: 'pass' });
  consecutivePasses++;
  if (consecutivePasses >= 2) {
    endGame(null); // 引き分け
    return;
  }
  nextTurn();
}

function resign() {
  if (!confirm(t('confirmResign'))) return;
  send({ type: 'resign' });
  gameActive = false;
  showEndScreen(t('resignLose'), 'resign');
}

function endGame(winnerColor) {
  gameActive = false;
  pendingMove = null;
  renderBoard(); // winningLine を反映してハイライト

  let resultKey, outcome, resultClass;
  if (winnerColor === null) {
    resultKey = 'drawMsg'; outcome = 'draw'; resultClass = 'result-draw';
  } else if (winnerColor === myColor) {
    resultKey = 'winMsg'; outcome = 'win'; resultClass = 'result-win';
  } else {
    resultKey = 'loseMsg'; outcome = 'lose'; resultClass = 'result-lose';
  }

  // 盤面下のターン表示部分に勝敗を表示（邪魔にならない位置）
  turnIndicatorKey = resultKey;
  const indicator = document.getElementById('turn-indicator');
  if (indicator) {
    indicator.className = 'turn-indicator ' + resultClass;
    indicator.textContent = t(resultKey);
  }
  // 確定/パスボタンを無効化
  const cb = document.getElementById('btn-confirm'); if (cb) cb.disabled = true;
  const pb = document.getElementById('btn-pass');    if (pb) pb.disabled = true;
  const fr = document.getElementById('board-frame'); if (fr) fr.classList.remove('my-turn');

  // 5秒後に終了画面へ自動遷移（5連ハイライトを見てもらうため）
  setTimeout(() => {
    showEndScreen(t(resultKey), outcome);
  }, 5000);
}

function toggleNotation() {
  showNotation = document.getElementById('notation-toggle').checked;
  renderBoard();
}

function showEndScreen(result, outcome) {
  document.getElementById('end-result').textContent = result;
  const scoreEl = document.getElementById('end-score');
  if (scoreEl) {
    scoreEl.textContent = moveCount > 0 ? `${moveCount}${t('movesUnit')}` : '';
  }

  if (outcome) {
    matchHistory.push({ outcome, myColor, moves: moveCount });
    renderHistory();
  }

  myEndChoice = null;
  oppEndChoice = null;
  updateEndUI();

  showScreen('end');
}

function renderHistory() {
  const panel = document.getElementById('history-panel');
  const list = document.getElementById('history-list');
  if (!matchHistory.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  list.innerHTML = '';

  let wins = 0, loses = 0, draws = 0;

  matchHistory.forEach((h, i) => {
    const row = document.createElement('div');
    row.className = 'history-row';

    const myStone  = PIECE.span(h.myColor, '14px');
    const oppStone = PIECE.span(h.myColor === 'black' ? 'white' : 'black', '14px');

    let scoreText;
    if (h.outcome === 'win') {
      scoreText = `${t('historyMe')}${myStone}${t('historyWinWord')} - ${oppStone}${t('historyOpp')}`;
      wins++;
    } else if (h.outcome === 'lose') {
      scoreText = `${t('historyMe')}${myStone} - ${oppStone}${t('historyOpp')}${t('historyWinWord')}`;
      loses++;
    } else if (h.outcome === 'resign') {
      scoreText = `${t('historyMe')}${myStone}${t('historyResignWord')} - ${oppStone}${t('historyOpp')}${t('historyWinWord')}`;
      loses++;
    } else { // draw
      scoreText = `${t('historyMe')}${myStone}${t('historyDraw')} - ${oppStone}${t('historyOpp')}`;
      draws++;
    }

    const badgeClass = h.outcome === 'win' ? 'win' : (h.outcome === 'draw' ? 'draw' : 'lose');
    const badgeText = h.outcome === 'win' ? t('historyWin') : (h.outcome === 'draw' ? t('historyDraw') : t('historyLose'));
    row.innerHTML = `<span class="history-idx">${i + 1}</span><span class="history-badge ${badgeClass}">${badgeText}</span><span class="history-score" style="display:flex;align-items:center;gap:2px;">${scoreText}</span>`;
    list.appendChild(row);
  });

  // 集計行
  const summary = document.createElement('div');
  summary.className = 'history-row';
  summary.style.cssText = 'background:transparent;border-top:1px solid var(--border);margin-top:2px;padding-top:6px;font-size:11px;color:var(--gray);justify-content:center;gap:12px;';
  summary.innerHTML = `<span style="color:var(--success)">${wins}${t('historyWin')}</span><span style="color:var(--danger)">${loses}${t('historyLose')}</span><span style="color:var(--gray)">${draws}${t('historyDraw')}</span>`;
  list.appendChild(summary);
  list.scrollTop = list.scrollHeight;
}

// ===== END CHOICES =====
function chooseEnd(choice) {
  if (choice === 'quit') {
    send({ type: 'end_choice', choice: 'quit' });
    resetToLobby();
    return;
  }

  myEndChoice = choice;
  send({ type: 'end_choice', choice });
  updateEndUI();
  checkEndMatch();
}

function updateEndUI() {
  // 自分の選択は常にオレンジ枠（myEndChoiceは変更しない）
  const swapBtn = document.getElementById('end-swap');
  const sameBtn = document.getElementById('end-same');
  swapBtn.className = 'end-btn' + (myEndChoice === 'swap' ? ' selected' : '');
  sameBtn.className = 'end-btn' + (myEndChoice === 'same' ? ' selected' : '');
  // 相手の選択表示
  document.getElementById('opp-swap').textContent = oppEndChoice === 'swap' ? t('oppChoosing') : '';
  document.getElementById('opp-same').textContent = oppEndChoice === 'same' ? t('oppChoosing') : '';
}

function checkEndMatch() {
  if (!myEndChoice || !oppEndChoice) return;
  if (myEndChoice !== oppEndChoice) {
    // 不一致 → 選択はそのまま維持、相手にも通知しない（お互い表示を残す）
    return;
  }

  // 一致
  const swap = myEndChoice === 'swap';
  myColor = swap ? (myColor === 'black' ? 'white' : 'black') : myColor;
  gameActive = false;
  beginGame();
}

// ===== MESSAGES =====
function handleMsg(m) {
  // chat
  if (m.type === 'chat') {
    const screens = ['waiting', 'room', 'game', 'end'];
    screens.forEach(s => addChat(s, `相手：${m.message}`));
    return;
  }

  if (m.type === 'color_select') {
    oppChoice = m.color;
    updateColorUI();
    checkStartReady();
    return;
  }

  if (m.type === 'start_press') {
    oppStartPressed = true;
    checkBothStart();
    return;
  }

  if (m.type === 'move') {
    if (board[m.y][m.x]) return; // 既に石がある場合は無視
    applyMove(m.x, m.y, turn);
    consecutivePasses = 0;
    const winLine = (typeof GomokuRules !== 'undefined') ? GomokuRules.checkWin(board, m.x, m.y, turn, BOARD_SIZE) : null;
    if (winLine) {
      winningLine = winLine;
      endGame(turn);
      return;
    }
    nextTurn();
    return;
  }

  if (m.type === 'pass') {
    consecutivePasses++;
    if (consecutivePasses >= 2) {
      endGame(null);
      return;
    }
    nextTurn();
    return;
  }

  if (m.type === 'resign') {
    gameActive = false;
    showEndScreen(t('resignWin'), 'win');
    return;
  }

  if (m.type === 'end_choice') {
    oppEndChoice = m.choice;
    if (m.choice === 'quit') {
      alert(t('oppQuit'));
      resetToLobby();
      return;
    }
    updateEndUI();
    checkEndMatch();
    return;
  }
}

// ===== CHAT =====
function sendChat(screen) {
  const input = document.getElementById('chat-input-' + screen);
  const msg = input.value.trim();
  if (!msg) return;
  addChat(screen, `自分：${msg}`);

  // mirror to all chat boxes
  ['waiting', 'room', 'game', 'end'].filter(s => s !== screen).forEach(s => addChat(s, `自分：${msg}`));

  send({ type: 'chat', message: msg });
  input.value = '';
}

function addChat(screen, text) {
  const box = document.getElementById('chat-' + screen);
  if (!box) return;
  const line = document.createElement('div');
  line.textContent = text;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

// Enter key for all chat inputs
document.querySelectorAll('.chat-input').forEach(input => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // find which screen
      const id = input.id.replace('chat-input-', '');
      sendChat(id);
    }
  });
});

// ===== UTILS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let currentLang = (() => {
  try {
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

let catBase = 'ja';

function catSpeak(key) {
  const errorKeys = ['pwError','noRoomError','fullRoomError','kicked','createErrorEmpty','privateIdRequired'];
  const meOppKeys   = ['historyMe','historyOpp','historyWinWord','historyResignWord'];
  const calmKeys  = ['connecting','reconnecting','waitingGuest','waitingStart'];
  let vocab;
  if (catBase === 'en') {
    if (errorKeys.includes(key))   vocab = ['HISS!','SPIT!','FSSST!'];
    else if (calmKeys.includes(key))  vocab = ['purrrr...','mrrr...','prrr...'];
    else if (meOppKeys.includes(key)) vocab = ['~nya~'];
    else                              vocab = ['MEOW','meow','mrrrow','mew','NYA!'];
  } else if (catBase === 'zh') {
    if (errorKeys.includes(key))   vocab = ['嘶！','哈！','嘶嘶！'];
    else if (calmKeys.includes(key))  vocab = ['咕噜…','喵…','噜噜…'];
    else if (meOppKeys.includes(key)) vocab = ['~喵~'];
    else                              vocab = ['喵','喵呜','咪','喵！'];
  } else {
    if (errorKeys.includes(key))   vocab = ['シャー！','フーッ！','シャシャシャ！'];
    else if (calmKeys.includes(key))  vocab = ['ごろごろ…','にゃ…','ぐるぐる…'];
    else if (meOppKeys.includes(key)) vocab = ['~にゃ~'];
    else                              vocab = ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'];
  }
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function t(key) {
  if (currentLang === 'cat') return catSpeak(key);
  return (I18N[currentLang] || I18N.ja)[key] || (I18N.ja)[key] || key;
}

function applyLang() {
  const d = I18N[currentLang] || I18N.ja;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : currentLang;

  // Static UI elements
  const setText = (id, key) => { const el = document.getElementById(id); if (el) el.textContent = t(key); };
  setText('i18n-create-title', 'createTitle');
  setText('i18n-label-name', 'labelName');
  setText('i18n-label-room', 'labelRoom');
  setText('i18n-label-pw', 'labelPw');
  setText('i18n-label-public', 'labelPublic');
  setText('i18n-label-rule', 'labelRule');
  setText('i18n-preset-normal', 'presetNormal');
  setText('i18n-preset-casual', 'presetCasual');
  setText('i18n-preset-free', 'presetFree');
  setText('i18n-btn-create', 'btnCreate');
  setText('i18n-room-list-title', 'roomListTitle');
  setText('i18n-btn-refresh', 'btnRefresh');
  setText('i18n-room-info', 'roomInfo');
  setText('i18n-room-label', 'roomLabel');
  setText('i18n-btn-send-w', 'btnSend');
  setText('i18n-btn-leave-w', 'btnLeave');
  setText('i18n-rule-title', 'ruleTitle');
  setText('i18n-color-title', 'colorTitle');
  // 駒アイコン付きラベル（innerHTML）
  const blEl = document.getElementById('i18n-black-label');
  if (blEl) blEl.innerHTML = `${PIECE.svg('black','18px')} ${t('blackLabel')}`;
  const whEl = document.getElementById('i18n-white-label');
  if (whEl) whEl.innerHTML = `${PIECE.svg('white','18px')} ${t('whiteLabel')}`;
  setText('btn-start', 'startGame');
  setText('i18n-btn-leave-r', 'btnLeave');
  setText('i18n-btn-send-r', 'btnSend');
  setText('i18n-btn-kick', 'btnKick');
  setText('btn-pass', 'btnPass');
  setText('btn-confirm', 'confirmMove');
  setText('i18n-btn-resign', 'btnResign');
  setText('i18n-btn-send-g', 'btnSend');
  setText('i18n-notation-toggle', 'notationToggle');
  setText('i18n-next-game', 'nextGame');
  setText('i18n-end-swap', 'endSwap');
  setText('i18n-end-same', 'endSame');
  setText('i18n-end-quit', 'endQuit');
  setText('i18n-btn-send-e', 'btnSend');
  setText('i18n-match-history', 'matchHistory');
  setText('i18n-private-title', 'privateTitle');
  setText('i18n-private-pw-label', 'privatePwLabel');
  setText('i18n-btn-private-show', 'privateBtnShow');

  // Placeholders
  ['waiting','room','game'].forEach(s => {
    const el = document.getElementById('chat-input-' + s);
    if (el) el.placeholder = t('chatPlaceholder');
  });
  const endInput = document.getElementById('chat-input-end');
  if (endInput) endInput.placeholder = t('chatPlaceholderEnd');
  const pwInput = document.getElementById('room-password');
  if (pwInput) pwInput.placeholder = t('pwPlaceholder');

  // ===== 動的テキストを状態キーから直接生成（CAT切替対応） =====
  const ls = document.getElementById('lobby-status');
  if (ls && lobbyStatusKey) ls.textContent = t(lobbyStatusKey);

  const ws2 = document.getElementById('waiting-status');
  if (ws2 && waitingStatusKey) {
    if (waitingStatusKey === 'guestJoined' && waitingStatusName) {
      ws2.textContent = waitingStatusName + t('guestJoined');
    } else {
      ws2.textContent = t(waitingStatusKey);
    }
  }

  // turn-indicator: ゲーム中・終局時の表示を再生成
  if (turnIndicatorKey) {
    const ind = document.getElementById('turn-indicator');
    if (ind) ind.textContent = t(turnIndicatorKey);
  }

  // start-hint: 色選択状態に応じて
  const startHintEl = document.getElementById('start-hint');
  if (startHintEl) {
    const ready = myChoice && oppChoice && myChoice !== oppChoice;
    startHintEl.textContent = ready ? t('startReady') : t('startHint');
  }
  // start-waiting-msg: スタート押下状態に応じて
  const sw = document.getElementById('start-waiting-msg');
  if (sw) {
    sw.textContent = (myStartPressed && !oppStartPressed) ? t('waitingStart') : '';
  }

  // opp-swap / opp-same: oppEndChoice を直接見て生成
  const os = document.getElementById('opp-swap');
  const om = document.getElementById('opp-same');
  if (os) os.textContent = oppEndChoice === 'swap' ? t('oppChoosing') : '';
  if (om) om.textContent = oppEndChoice === 'same' ? t('oppChoosing') : '';

  // ロビー画面アクティブなら部屋一覧バッジも i18n 反映のため再取得
  const lobbyScreen = document.getElementById('screen-lobby');
  if (lobbyScreen && lobbyScreen.classList.contains('active')) {
    if (typeof MomoMatchmaking !== 'undefined' && MomoMatchmaking.refreshRooms) {
      MomoMatchmaking.refreshRooms();
    }
  }

  // 色選択画面アクティブならルール詳細パネルを再生成
  const roomScreen = document.getElementById('screen-room');
  if (roomScreen && roomScreen.classList.contains('active')) {
    renderRoomRule();
  }

  // ゲーム画面アクティブなら盤面再描画（CAT モード切替で猫/鳥アイコンに切替えるため）
  const gameScreen = document.getElementById('screen-game');
  if (gameScreen && gameScreen.classList.contains('active') && typeof renderBoard === 'function') {
    renderBoard();
  }

  // Lang select sync
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;

  // stone-preview: CATモード時は猫/鳥アイコンに切り替え
  const spb = document.getElementById('stone-preview-black');
  const spw = document.getElementById('stone-preview-white');
  if (spb && spw) {
    if (currentLang === 'cat') {
      spb.style.cssText = 'width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;';
      spb.innerHTML = PIECE.svg('black', '34px');
      spw.style.cssText = 'width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#666;border:2px solid #888;';
      spw.innerHTML = PIECE.svg('white', '34px');
    } else {
      spb.style.cssText = '';
      spb.className = 'stone-preview black';
      spb.innerHTML = '';
      spw.style.cssText = '';
      spw.className = 'stone-preview white';
      spw.innerHTML = '';
    }
  }

  // ゲーム中ならmy-color-labelも更新
  if (myColor) {
    const mcl = document.getElementById('my-color-label');
    if (mcl) mcl.innerHTML = `${t('youAre')} ${PIECE.svg(myColor, '20px')}${myColor === 'black' ? t('black') : t('white')}`;
  }
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  applyLang();
}

connectWS();
applyLang();
restoreInputs();
