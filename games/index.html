<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMO Games</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23000000'/%3E%3Cpolygon points='14,22 10,8 22,16' fill='%23000000' stroke='%23c2410c' stroke-width='2' stroke-linejoin='round'/%3E%3Cpolygon points='50,22 42,16 54,8' fill='%23000000' stroke='%23c2410c' stroke-width='2' stroke-linejoin='round'/%3E%3Cellipse cx='32' cy='37' rx='22' ry='20' fill='%23000000' stroke='%23c2410c' stroke-width='2.5'/%3E%3Cellipse cx='24' cy='34' rx='3' ry='3.5' fill='%23c2410c'/%3E%3Cellipse cx='40' cy='34' rx='3' ry='3.5' fill='%23c2410c'/%3E%3Cellipse cx='32' cy='41' rx='2.2' ry='1.6' fill='%23c2410c'/%3E%3Cpath d='M32,43 Q29,48 26,47' fill='none' stroke='%23c2410c' stroke-width='1.8' stroke-linecap='round'/%3E%3Cpath d='M32,43 Q35,48 38,47' fill='none' stroke='%23c2410c' stroke-width='1.8' stroke-linecap='round'/%3E%3Cline x1='9' y1='39' x2='22' y2='41.5' stroke='%23c2410c' stroke-width='1.2' stroke-linecap='round'/%3E%3Cline x1='9' y1='43' x2='22' y2='43' stroke='%23c2410c' stroke-width='1.2' stroke-linecap='round'/%3E%3Cline x1='9' y1='47' x2='22' y2='44.5' stroke='%23c2410c' stroke-width='1.2' stroke-linecap='round'/%3E%3Cline x1='55' y1='39' x2='42' y2='41.5' stroke='%23c2410c' stroke-width='1.2' stroke-linecap='round'/%3E%3Cline x1='55' y1='43' x2='42' y2='43' stroke='%23c2410c' stroke-width='1.2' stroke-linecap='round'/%3E%3Cline x1='55' y1='47' x2='42' y2='44.5' stroke='%23c2410c' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0a; --surface:#111111; --surface2:#1a1a1a;
    --orange:#c2410c; --orange-light:#ea580c; --orange-bright:#fb923c;
    --orange-pale:#431407;
    --text:#e5e5e5; --text-muted:#737373; --border:#2a2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),
      linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px; opacity:0.2; pointer-events:none; z-index:0;
  }
  .container {
    position:relative; z-index:1;
    width:100%; max-width:860px; padding:0 24px;
  }

  /* ── HEADER ── */
  header {
    padding:40px 0 36px;
    animation:fadeDown 0.6s ease both;
  }
  .breadcrumb {
    display:flex; align-items:center; gap:8px;
    font-size:0.78rem; color:var(--text-muted); margin-bottom:20px;
  }
  .breadcrumb a {
    color:var(--text-muted); text-decoration:none;
    transition:color 0.2s;
  }
  .breadcrumb a:hover { color:var(--orange-bright); }
  .breadcrumb span { color:var(--border); }

  .header-row {
    display:flex; align-items:center; gap:16px;
  }
  .cat-icon {
    width:52px; height:52px; flex-shrink:0;
    filter:drop-shadow(0 0 12px rgba(194,65,12,0.5));
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{filter:drop-shadow(0 0 12px rgba(194,65,12,0.5));}
    50%{filter:drop-shadow(0 0 22px rgba(234,88,12,0.8));}
  }
  h1 {
    font-family:'Fredoka One',cursive;
    font-size:clamp(2rem,6vw,3rem);
    font-weight:400; color:#fff; letter-spacing:0.04em; line-height:1;
  }
  h1 span { color:var(--orange-light); }
  .header-sub {
    margin-top:8px; font-size:0.82rem;
    color:var(--text-muted); letter-spacing:0.1em;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    display:flex; align-items:center; gap:12px;
    margin-bottom:20px;
    animation:fadeUp 0.6s ease 0.15s both;
  }
  .section-label span {
    font-size:0.72rem; font-weight:500;
    letter-spacing:0.14em; text-transform:uppercase; color:var(--orange);
  }
  .section-label::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* ── GAME CARDS ── */
  .cards {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:16px; margin-bottom:60px;
    animation:fadeUp 0.6s ease 0.2s both;
  }
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:28px 24px;
    text-decoration:none; color:inherit;
    transition:border-color 0.2s, transform 0.2s, background 0.2s;
    display:flex; flex-direction:column; gap:10px;
    position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at top left,rgba(194,65,12,0.09) 0%,transparent 60%);
    opacity:0; transition:opacity 0.3s;
  }
  .card:hover { border-color:var(--orange); transform:translateY(-3px); background:var(--surface2); }
  .card:hover::before { opacity:1; }

  .card-badge {
    display:inline-flex; align-items:center; gap:6px;
    font-size:0.65rem; font-weight:500; letter-spacing:0.1em;
    text-transform:uppercase; width:fit-content;
    padding:3px 10px; border-radius:4px;
    background:var(--orange-pale); color:var(--orange-bright);
    border:1px solid var(--orange);
  }
  .card-title {
    font-family:'Fredoka One',cursive;
    font-size:1.4rem; font-weight:400;
    color:#fff; letter-spacing:0.03em;
  }
  .card-title span { color:var(--orange-light); }
  .card-desc {
    font-size:0.85rem; color:var(--text-muted); line-height:1.65; flex:1;
  }
  .card-meta {
    display:flex; gap:12px; flex-wrap:wrap;
    font-size:0.75rem; color:var(--text-muted);
    border-top:1px solid var(--border); padding-top:12px; margin-top:4px;
  }
  .card-meta span { display:flex; align-items:center; gap:4px; }
  .card-play {
    margin-top:4px; font-size:0.82rem; color:var(--orange);
    letter-spacing:0.08em; display:flex; align-items:center; gap:6px;
  }
  .card-play::after { content:'→'; transition:transform 0.2s; }
  .card:hover .card-play::after { transform:translateX(4px); }

  /* ── FOOTER ── */
  footer {
    margin-top:auto; padding:20px 0;
    font-size:0.75rem; color:var(--text-muted);
    text-align:center; border-top:1px solid var(--border);
    width:100%; position:relative; z-index:1;
  }
  footer a { color:var(--text-muted); text-decoration:none; }
  footer a:hover { color:var(--orange-bright); }

  @keyframes fadeDown {
    from{opacity:0;transform:translateY(-14px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="breadcrumb">
      <a href="../">MOMO Works</a>
      <span>›</span>
      <span>MOMO Games</span>
    </div>
    <div class="header-row">
      <svg class="cat-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
        <rect width="64" height="64" rx="8" fill="#000000"/>
        <polygon points="14,22 10,8 22,16" fill="#000000" stroke="#c2410c" stroke-width="2" stroke-linejoin="round"/>
        <polygon points="50,22 42,16 54,8" fill="#000000" stroke="#c2410c" stroke-width="2" stroke-linejoin="round"/>
        <ellipse cx="32" cy="37" rx="22" ry="20" fill="#000000" stroke="#c2410c" stroke-width="2.5"/>
        <ellipse cx="24" cy="34" rx="3" ry="3.5" fill="#c2410c"/>
        <ellipse cx="40" cy="34" rx="3" ry="3.5" fill="#c2410c"/>
        <ellipse cx="32" cy="41" rx="2.2" ry="1.6" fill="#c2410c"/>
        <path d="M32,43 Q29,48 26,47" fill="none" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M32,43 Q35,48 38,47" fill="none" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="9"  y1="39" x2="22" y2="41.5" stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="9"  y1="43" x2="22" y2="43"   stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="9"  y1="47" x2="22" y2="44.5" stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="55" y1="39" x2="42" y2="41.5" stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="55" y1="43" x2="42" y2="43"   stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="55" y1="47" x2="42" y2="44.5" stroke="#c2410c" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div>
        <h1>MOMO <span>Games</span></h1>
        <div class="header-sub">ブラウザで遊べるゲーム集</div>
      </div>
    </div>
  </header>

  <div class="section-label"><span>Game List</span></div>

  <div class="cards">

    <!-- MOMO Hanoi -->
    <a class="card" href="hanoi/">
      <div class="card-badge">🎮 New</div>
      <div class="card-title">MOMO <span>Hanoi</span></div>
      <div class="card-desc">
        ハノイの塔を解きながらUFOを迎撃するパズル×シューティング。
        円盤を移動させて砲弾を発射し、地面を守れ！
      </div>
      <div class="card-meta">
        <span>🧩 パズル</span>
        <span>🛸 シューティング</span>
        <span>3難易度</span>
      </div>
      <div class="card-play">今すぐプレイ</div>
    </a>

    <!-- 追加ゲーム用プレースホルダー（非表示・コメントとして残す） -->
    <!--
    <a class="card" href="game2/">
      <div class="card-title">次のゲーム</div>
      <div class="card-desc">準備中</div>
    </a>
    -->

  </div>
</div>

<footer>
  <a href="../">← MOMO Works に戻る</a>
</footer>

</body>
</html>
