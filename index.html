<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --orange: #c2410c;
    --orange-light: #ea580c;
    --text: #e5e5e5;
    --text-muted: #737373;
    --border: #2a2a2a;
    --border-strong: #444;
    --bg-selected: rgba(194,65,12,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LANG SWITCHER ── */
  #lang-switcher { position: fixed; top: 8px; right: 12px; display: flex; gap: 4px; z-index: 200; }
  .lang-btn { background: transparent; border: 0.5px solid var(--border-strong); color: var(--text-muted); font-size: 10px; padding: 3px 7px; border-radius: 4px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .lang-btn:hover { color: var(--orange-light); border-color: var(--orange); }
  .lang-btn.active { color: var(--orange-light); border-color: var(--orange); background: var(--bg-selected); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
    padding: 0 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 72px 0 56px;
    animation: fadeDown 0.7s ease both;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .cat-icon {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 18px rgba(194,65,12,0.5));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(194,65,12,0.5)); }
    50%       { filter: drop-shadow(0 0 32px rgba(234,88,12,0.8)); }
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 8vw, 4.2rem);
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  h1 span { color: var(--orange-light); }

  .tagline {
    margin-top: 12px;
    font-size: 0.875rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── TOS NOTICE BAR（CONTENTSラベル直上） ──
     利用規約への案内文＋リンク。
     文言は I18N[lang].tosNotice で管理。
     リンク先: terms.html
  ── */
  .tos-notice {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 18px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: fadeUp 0.7s ease 0.15s both;
  }

  .tos-notice-text {
    font-size: 0.78rem;
    color: #ffffff;
    letter-spacing: 0.05em;
    line-height: 1.5;
    text-align: center;
  }

  .tos-notice-text a {
    color: #ffffff;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255,255,255,0.45);
    transition: color 0.2s, text-decoration-color 0.2s;
  }

  .tos-notice-text a:hover {
    color: var(--orange-light);
    text-decoration-color: var(--orange-light);
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .section-label span {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 80px;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  @media (max-width: 520px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(194,65,12,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover { border-color: var(--orange); transform: translateY(-3px); background: var(--surface2); }
  .card:hover::before { opacity: 1; }

  .card.disabled { opacity: 0.4; cursor: default; pointer-events: none; }

  .card-icon { font-size: 2rem; line-height: 1; }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.03em;
  }

  .card-title span { color: var(--orange-light); }

  .card-desc { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }

  .card-arrow {
    margin-top: auto;
    padding-top: 16px;
    font-size: 0.8rem;
    color: var(--orange);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-arrow::after { content: '→'; transition: transform 0.2s; }
  .card:hover .card-arrow::after { transform: translateX(4px); }

  .badge-soon {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: auto;
    padding-top: 16px;
    width: fit-content;
  }

  footer {
    margin-top: auto;
    padding: 24px 0;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border);
    width: 100%;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

      <h1>MOMO <span>Works</span></h1>
    </div>
    <p class="tagline" id="tagline">Games &amp; Tools by MOMO</p>
  </header>

  <!-- ── TOS NOTICE BAR ──────────────────────────────────────
       利用規約案内バー（CONTENTSラベルの直上）
       ・文言は I18N[lang].tosNotice で管理（下部 <script> 参照）
       ・リンク先: terms.html（同ディレクトリ）
  ─────────────────────────────────────────────────────────── -->
  <div class="tos-notice">
    <p class="tos-notice-text" id="tos-notice"></p>
  </div>

  <div class="section-label"><span>Contents</span></div>

  <div class="cards">
    <a class="card" href="games/">
      <div class="card-icon">🎮</div>
      <div class="card-title">MOMO <span>Games</span></div>
      <div class="card-desc" id="games-desc">ブラウザで気軽に遊べるゲーム集。インストール不要。</div>
      <div class="card-arrow" id="games-arrow">遊ぶ</div>
    </a>

    <a class="card" href="tools/">
      <div class="card-icon">🛠️</div>
      <div class="card-title">MOMO <span>Tools</span></div>
      <div class="card-desc" id="tools-desc">ブラウザで使える便利なWebツール集。MOMO Player など。</div>

<div style="text-align:center;margin-bottom:8px;position:relative;z-index:1;">
  <a href="test/" style="font-size:0.65rem;color:#333;text-decoration:none;letter-spacing:0.06em;">テスト</a>
</div>

<footer id="footer-text">
  &copy; MOMO Works
</footer>

<script>
/* ── 内部バージョン（表示なし・管理用） ── */
const SITE_VERSION = 'v1.01';

/* ── I18N ───────────────────────────────────────────────────
   tosNotice: CONTENTSバー上に表示する利用規約案内文。
   リンクタグ <a> を直接HTMLとして埋め込む。
   リンク先は terms.html（同ディレクトリ）。
   ─────────────────────────────────────────────────────────── */
const I18N = {
  ja: {
    tagline:   'Games &amp; Tools by MOMO',
    gamesDesc: 'ブラウザで気軽に遊べるゲーム集。インストール不要。',
    gamesArrow:'遊ぶ',
    toolsDesc: 'ブラウザで使える便利なWebツール集。MOMO Player など。',
    toolsArrow:'使う',
    footer:    '© MOMO Works',
    tosNotice: 'お約束：<a href="terms.html">利用規約</a>に同意したものとみなします。',
  },
  en: {
    tagline:   'Games &amp; Tools by MOMO',
    gamesDesc: 'A collection of browser games. No installation required.',
    gamesArrow:'Play',
    toolsDesc: 'A collection of browser-based web tools. Includes MOMO Player and more.',
    toolsArrow:'Open',
    footer:    '© MOMO Works',
    tosNotice: 'Ground Rules: <a href="terms.html">Agreement</a> required for use.',
  },
  zh: {
    tagline:   'Games &amp; Tools by MOMO',
    gamesDesc: '可在浏览器中轻松游玩的游戏合集，无需安装。',
    gamesArrow:'游玩',
    toolsDesc: '可在浏览器中使用的实用网页工具合集，包含 MOMO Player 等。',
    toolsArrow:'使用',
    footer:    '© MOMO Works',
    tosNotice: '约定：使用即表示同意<a href="terms.html">使用条款</a>。',
  },
};

let currentLang = (() => { try { return localStorage.getItem('momoLang') || 'ja'; } catch(e) { return 'ja'; } })();

function applyLang() {
  const d = I18N[currentLang] || I18N.ja;
  document.getElementById('tagline').innerHTML     = d.tagline;
  document.getElementById('games-desc').textContent = d.gamesDesc;
  document.getElementById('games-arrow').textContent = d.gamesArrow;
  document.getElementById('tools-desc').textContent = d.toolsDesc;
  document.getElementById('tools-arrow').textContent = d.toolsArrow;
  document.getElementById('footer-text').textContent = d.footer;
  document.getElementById('tos-notice').innerHTML   = d.tosNotice; // HTML（<a>含む）で設定
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : currentLang;
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    try { localStorage.setItem('momoLang', currentLang); } catch(e) {}
    applyLang();
  });
});

applyLang();
</script>
