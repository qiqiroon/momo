<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --orange: #c2410c;
    --orange-light: #ea580c;
    --text: #e5e5e5;
    --text-muted: #737373;
    --border: #2a2a2a;
    --border-strong: #444;
    --bg-selected: rgba(194,65,12,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LANG SWITCHER（プルダウン） ── */
  #lang-switcher { position: fixed; top: 8px; right: 12px; z-index: 200; }
  #lang-select {
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }
  #lang-select:focus { border-color: var(--orange); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
    padding: 0 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 72px 0 56px;
    animation: fadeDown 0.7s ease both;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .cat-icon {
    width: 72px;
    height: 72px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 18px rgba(194,65,12,0.5));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(194,65,12,0.5)); }
    50%       { filter: drop-shadow(0 0 32px rgba(234,88,12,0.8)); }
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 8vw, 4.2rem);
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  h1 span { color: var(--orange-light); }

  .tagline {
    margin-top: 12px;
    font-size: 0.875rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .tos-notice {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 18px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: fadeUp 0.7s ease 0.15s both;
  }

  .tos-notice-text {
    font-size: 0.78rem;
    color: #ffffff;
    letter-spacing: 0.05em;
    line-height: 1.5;
    text-align: center;
  }

  .tos-notice-text a {
    color: #ffffff;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255,255,255,0.45);
    transition: color 0.2s, text-decoration-color 0.2s;
  }

  .tos-notice-text a:hover {
    color: var(--orange-light);
    text-decoration-color: var(--orange-light);
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .section-label span {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 48px;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  @media (max-width: 520px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.2s, transform 0.2s;
  }

  .card:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
  }

  .card-icon { font-size: 2rem; }

  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    font-weight: 400;
    color: #fff;
    letter-spacing: 0.04em;
  }

  .card-title span { color: var(--orange-light); }

  .card-desc { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }

  .card-arrow {
    margin-top: auto;
    padding-top: 16px;
    font-size: 0.8rem;
    color: var(--orange);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-arrow::after { content: '→'; transition: transform 0.2s; }
  .card:hover .card-arrow::after { transform: translateX(4px); }

  .badge-soon {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: auto;
    padding-top: 16px;
    width: fit-content;
  }

  /* ── MOMO Logue カード (v1.04 でリンク → 独立カードに昇格、 フッター付近に移動) ── */
  .logue-card-wrap {
    margin-top: 32px;
    padding: 0 0 32px;
    animation: fadeUp 0.7s ease 0.4s both;
  }
  .logue-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .logue-card:hover {
    border-color: var(--orange);
    background: var(--surface2);
    transform: translateY(-1px);
  }
  .logue-card-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .logue-card-body {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .logue-card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    color: #fff;
    letter-spacing: 0.03em;
  }
  .logue-card-title span { color: var(--orange-light); }
  .logue-card-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  footer {
    margin-top: auto;
    padding: 24px 0;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border);
    width: 100%;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
<script src="/momo/lib/momo-analytics.js" defer></script>

let catBase = 'ja';

function catSpeak(key) {
  const errorKeys = ['pwError','noRoomError','fullRoomError','kicked','createErrorEmpty','privateIdRequired'];
  const calmKeys  = ['connecting','reconnecting','waitingGuest','waitingStart'];
  let vocab;
  if (catBase === 'en') {
    if (errorKeys.includes(key))      vocab = ['HISS!','SPIT!','FSSST!'];
    else if (calmKeys.includes(key))  vocab = ['purrrr...','mrrr...','prrr...'];
    else                              vocab = ['MEOW','meow','mrrrow','mew','NYA!'];
  } else if (catBase === 'zh') {
    if (errorKeys.includes(key))      vocab = ['嘶！','哈！','嘶嘶！'];
    else if (calmKeys.includes(key))  vocab = ['咕噜…','喵…','噜噜…'];
    else                              vocab = ['喵','喵呜','咪','喵！'];
  } else {
    if (errorKeys.includes(key))      vocab = ['シャー！','フーッ！','シャシャシャ！'];
    else if (calmKeys.includes(key))  vocab = ['ごろごろ…','にゃ…','ぐるぐる…'];
    else                              vocab = ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'];
  }
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function t(key) {
  if (currentLang === 'cat') return catSpeak(key);
  return (I18N[currentLang] || I18N.ja)[key] || I18N.ja[key] || key;
}

let currentLang = (() => {
  try {
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

function applyLang() {
  const d = I18N[currentLang] || I18N.ja;
  if (currentLang === 'cat') {
    document.getElementById('tagline').innerHTML      = catSpeak('tagline');
    document.getElementById('games-desc').textContent  = catSpeak('gamesDesc');
    document.getElementById('games-arrow').textContent = catSpeak('gamesArrow');
    document.getElementById('tools-desc').textContent  = catSpeak('toolsDesc');
    document.getElementById('tools-arrow').textContent = catSpeak('toolsArrow');
    document.getElementById('footer-text').textContent = catSpeak('footer');
    document.getElementById('tos-notice').textContent  = catSpeak('tosNotice');
    document.getElementById('logue-link').textContent  = catSpeak('logueLink');
    document.getElementById('logue-sub').textContent   = catSpeak('logueSub');
  } else {
    document.getElementById('tagline').innerHTML       = d.tagline;
    document.getElementById('games-desc').textContent  = d.gamesDesc;
    document.getElementById('games-arrow').textContent = d.gamesArrow;
    document.getElementById('tools-desc').textContent  = d.toolsDesc;
    document.getElementById('tools-arrow').textContent = d.toolsArrow;
    document.getElementById('footer-text').textContent = d.footer;
    document.getElementById('tos-notice').innerHTML    = d.tosNotice;
    document.getElementById('logue-link').textContent  = d.logueLink;
    document.getElementById('logue-sub').textContent   = d.logueSub;
  }
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  applyLang();
}

applyLang();
</script>
