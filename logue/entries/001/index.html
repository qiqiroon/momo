<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;

    --surface2: #1a1a1a;
    --orange: #c2410c;
    --orange-light: #ea580c;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  #lang-switcher { position: fixed; top: 8px; right: 12px; z-index: 200; }

  .container {

<script>
const CONTENT = {
  ja: {
    title: 'こんにちは、世界',
    body: `
      <p>こんにちは、世界。</p>
      <p>このページは私がAIとともに作ったプログラムを公開する場所です。コードは1行も書いていません。公開の方法もAIが提案しました。私はAIには直接できない作業を手伝っただけです。</p>
      <p>公開しているプログラムの内容は、自分が欲しいと思ったもの、または作ったら面白そうだと思ったものです。「こういうものを作ってほしい」と伝えると、AIが作ってくれました。</p>
      <p>なぜこんなことをしているのか。それは、AIを全力で楽しむことにしたからです。</p>
      <p>私にはひとつの仮説があります。「世界は私を楽しませるために進化した」というものです。独りよがりですね。</p>
      <p>私が生まれた日本は、まだ後進国と呼ばれていた時代でした。世界はすべてアナログでした。物心がつく頃には、周囲がアニメで満たされていました。ゴールデンタイムの6時から8時まで、途切れることなく複数のアニメが放映されていた時代です。</p>
      <p>やがてインベーダーゲームや家庭用ゲーム機が現れ、私はゲームにのめり込みました。続いてパソコンが登場し、コンピュータを自分一人で使えるという世界が生まれました。電話回線で通信するパソコン通信を通じて、フリーソフトや通信対戦ゲームを楽しみました。携帯電話とインターネットが普及すると、世界はネットで一つにつながり、当然のように私もその世界に入り浸りました。</p>
      <p>音楽の面では、アメリカの80年代という黄金時代を最も感受性の高い年齢で過ごせたことは幸運だったと思います。アナログからデジタルへの移行と、ウォークマンの登場で音楽を持ち歩けるようになり、レンタルCDを借りまくって多くの音楽に触れました。</p>
      <p>VOCALOIDが登場すると、ネット上の素人作曲家がライセンスフリーの曲を投稿し始めました。それを歌うアマチュア歌手、絵をつけるアマチュア絵師、踊る人——さまざまなサブカルチャーが花開いたニコニコ時代です。その延長線上にVTuberが現れました。日本のアマチュア歌い手がマスクで顔を隠して歌う文化の、自然な発展形だと私は思っています。</p>
      <p>そしてAIが現れました。ちょうど退職を考え始めた頃、かねてからプログラミングを学びたいとは思っていたものの、年齢的にゼロから学ぶのは難しく、持て余す時間もある——そんなタイミングで、これ以上ないほど都合よくAIが登場しました。そうか、次はそうくるのか。乗るしかない。←ここが現在地です。</p>
      <p>どうせ作るなら、その労力に見合うだけのことをしたい。複数の人に使ってもらうしかない。それが今やっていることです。</p>
      <p>ところで、このサイトの名前「MOMO」は友人の猫の名前です。友人の許可を得て、使わせてもらっています。</p>
    `,
  },
  en: {
    title: 'Hello, World',
    body: `
      <p>Hello, world.</p>
      <p>This page is where I publish programs made together with AI. Not a single line of code was written by me. The way to publish them was also proposed by AI. I only helped with the tasks AI couldn't do directly.</p>
      <p>The programs I publish are things I wanted for myself, or things I thought would be interesting to build. I'd tell AI "make something like this," and it would.</p>
      <p>Why am I doing this? Because I decided to enjoy AI to the fullest.</p>
      <p>I have one hypothesis: "The world evolved to entertain me." Self-centered, I know.</p>
      <p>When I was born, Japan was still called a developing nation. The world was entirely analog. By the time I was old enough to be aware of my surroundings, they were saturated with anime. Multiple shows aired back-to-back from six to eight o'clock every evening without pause.</p>
      <p>Then came Space Invaders and home game consoles, and I fell deep into gaming. Next came personal computers, and with them a world where you could use a computer all by yourself. Through dial-up bulletin board systems — an absurdly inefficient way to communicate by today's standards — I enjoyed free software and online multiplayer games. When mobile phones and the internet arrived, the world connected into one, and naturally I dove straight in.</p>
      <p>On the music side, I was lucky enough to experience the golden age of American 1980s music at the most impressionable age of my life. As music shifted from analog to digital, and the Walkman made it possible to carry music anywhere, I rented stacks of CDs and soaked up as much as I could.</p>
      <p>When VOCALOID appeared, amateur composers on the internet began posting royalty-free music in droves. Amateur singers performed it, amateur illustrators added visuals, dancers choreographed to it — a whole ecosystem of subcultures bloomed in what I think of as the Niconico era. VTubers emerged from that same lineage. Japanese amateur singers had long performed behind masks to hide their faces; I see VTubers as a natural evolution of that tradition.</p>
      <p>And then AI arrived. Right around when I was starting to think about retirement, I had always wanted to learn programming — but learning from scratch at my age felt daunting, and I had time on my hands I didn't know what to do with. Then, at the most convenient possible moment, AI showed up. So that's how it's going to go next? Well then, I'm getting on board. ← That's where I am now.</p>
      <p>If I'm going to make things anyway, I want them to be worth the effort. The only way to justify it is to have more than one person use them. That's what I'm doing.</p>
      <p>By the way, "MOMO" — the name of this site — is the name of a friend's cat. I have their permission to use it.</p>
    `,
  },
  zh: {
    title: '你好，世界',
    body: `
      <p>你好，世界。</p>
      <p>这个页面是我与AI共同创作程序并对外公开的地方。我一行代码都没有写，连发布的方式也是AI提议的。我只是协助完成了AI无法直接处理的那部分工作。</p>
      <p>这里公开的程序，都是我自己想要的东西，或者觉得做出来会很有趣的东西。我告诉AI"我想要这样的东西"，它就帮我做出来了。</p>
      <p>为什么要做这些？因为我决定全力享受AI带来的乐趣。</p>
      <p>我有一个假设："世界是为了让我快乐而进化的。"有点自我中心，对吧。</p>
      <p>我出生的那个年代，日本还被称为后进国。整个世界都是模拟的。等我懂事的时候，身边的世界已经被动画填满了。每天黄金时段的六点到八点，多部动画连续不断地播出。</p>
      <p>后来太空侵略者和家用游戏机相继出现，我一头扎进了游戏的世界。再后来个人电脑问世，一个人独自使用电脑成为可能。通过电话线拨号通信的电脑通信——以今天的标准来看效率低得难以想象——我享受着免费软件和联机对战游戏的乐趣。手机和互联网普及后，世界通过网络连为一体，我自然也一头扎进了网络的世界。</p>
      <p>在音乐方面，我很庆幸自己能在感受力最强的年纪，经历美国80年代那个黄金时代。随着音乐从模拟转向数字，随身听的出现让音乐可以随身携带，我借了一摞又一摞的租借CD，接触了大量的音乐。</p>
      <p>VOCALOID登场后，网络上的业余作曲家开始大量发布免版权音乐。演唱这些歌曲的业余歌手、为其配画的业余画师、随之起舞的舞者——各种亚文化在我所称之为"Niconico时代"蓬勃盛开。VTuber就在这条延长线上出现了。日本的业余歌手长期以来习惯戴着面具遮住脸演唱，我认为VTuber正是这种文化的自然发展形态。</p>
      <p>然后AI出现了。就在我开始考虑退休的时候，我一直想学编程，但年纪大了从零开始太难，手头又有大把闲暇时间——就在这个时机，AI以最恰到好处的方式登场了。原来，下一步是这样来的吗？那就只能上车了。←这就是我现在所在的位置。</p>
      <p>既然要做，就要做得值得这份付出。唯一的办法就是让更多人来使用。这就是我现在正在做的事。</p>
      <p>顺便一提，这个网站的名字"MOMO"，是一位朋友家猫咪的名字。已获得朋友的许可，在此借用。</p>
    `,
  },
};

let catBase = 'ja';

function catSpeak() {
  const vocabMap = {
    en: ['MEOW','meow','mrrrow','mew','NYA!'],
    zh: ['喵','喵呜','咪','喵！'],
    ja: ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'],
  };
  const vocab = vocabMap[catBase] || vocabMap.ja;
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function catBody() {
  // 日本語本文の段落数（10段落）に合わせてにゃあにゃあする
  return Array.from({length: 11}, () => `<p>${catSpeak()}</p>`).join('\n');
}

let currentLang = (() => {
  try {
    const p = new URLSearchParams(location.search).get('lang');
    if (p && ['ja','en','zh','cat'].includes(p)) return p;
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

function applyLang() {
  if (currentLang === 'cat') {
    const t = catSpeak();
    document.getElementById('entry-title').textContent  = t;
    document.title = t + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = catBody();
    document.getElementById('nav-back').textContent     = catSpeak();
    document.getElementById('footer-text').textContent  = catSpeak();
  } else {
    const c = CONTENT[currentLang] || CONTENT.ja;
    document.getElementById('entry-title').textContent  = c.title;
    document.title = c.title + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = c.body;
    document.getElementById('nav-back').textContent     = '← Logue';
    document.getElementById('footer-text').textContent  = '© MOMO Works';
  }
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  try {
    const url = new URL(location.href);
    if (lang === 'ja') url.searchParams.delete('lang');
    else url.searchParams.set('lang', lang);
    history.replaceState(null, '', url.toString());
  } catch(e) {}
  applyLang();
}

applyLang();
</script>
</body>
