<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --orange: #c2410c;
    --orange-light: #ea580c;
    --text: #e5e5e5;
    --text-muted: #737373;
    --border: #2a2a2a;
    --border-strong: #444;
    --bg-selected: rgba(194,65,12,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LANG SWITCHER ── */
  #lang-switcher { position: fixed; top: 8px; right: 12px; z-index: 200; }
  #lang-select {
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }
  #lang-select:focus { border-color: var(--orange); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 0 24px;
  }

  /* ── ヘッダー部（小さめ） ── */
  .site-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 52px 0 40px;
    animation: fadeDown 0.7s ease both;
  }

  .site-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .site-logo:hover { color: var(--text); }
  .site-logo span { color: var(--orange-light); }

  .site-logo-sep {
    color: var(--border-strong);
    font-size: 0.9rem;
  }

  .site-logo-sub {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: #fff;
    letter-spacing: 0.04em;
  }

  .site-logo-sub span { color: var(--orange-light); }

  /* ── 記事本文エリア ── */
  article {
    animation: fadeUp 0.7s ease 0.15s both;
    margin-bottom: 56px;
  }

  .entry-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .entry-num {
    font-size: 0.7rem;
    color: var(--orange);
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
  }

  .entry-date {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .entry-title {
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    font-weight: 500;
    letter-spacing: 0.03em;
    line-height: 1.4;
    margin-bottom: 32px;
    color: #fff;
  }

  .entry-body {
    font-size: 1rem;
    line-height: 2;
    color: var(--text);
    letter-spacing: 0.04em;
  }

  .entry-body p {
    margin-bottom: 1.6em;
  }

  .entry-body p:last-child {
    margin-bottom: 0;
  }

  /* ── ナビゲーション ── */
  .entry-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 0 40px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .nav-link {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }

  .nav-link:hover { color: var(--text); }

  footer {
    margin-top: auto;
    padding: 24px 0;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border);
    width: 100%;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

<body>

<div id="lang-switcher">
  <select id="lang-select" onchange="onLangChange(this.value)">
    <option value="ja">日本語</option>
    <option value="en">EN</option>
    <option value="zh">中文</option>
    <option value="cat">CAT</option>
  </select>
</div>

<div class="container">

  <article>

    <h1 class="entry-title" id="entry-title">こんにちは、世界</h1>

    <div class="entry-body" id="entry-body">

  </article>

  <nav class="entry-nav">

  </nav>

<footer id="footer-text">
  &copy; MOMO Works
</footer>

<script>
/* ══════════════════════════════════════════════════════════════
   Entry 001 — 本文データ
   日本語原文を書き、英語・中国語はAI翻訳で追記する。
   各言語の本文は <p> タグで段落を分ける。
══════════════════════════════════════════════════════════════ */
const CONTENT = {
  ja: {
    title: 'こんにちは、世界',
    body: `
      <p>こんにちは、世界。</p>
      <p>特に言うことはない。ただ、世界に向かってこんにちはと言いたかっただけだ。</p>
      <p>誰かに読まれるかどうかもわからない。検索エンジンに引っかかるかどうかもわからない。それでもここに書く。電波に乗せて放流する。瓶に詰めて海に投げる、みたいな話だ。</p>
      <p>世界はひろい。私はちいさい。それでいい。</p>
    `,
  },
  en: {
    title: 'Hello, World',
    body: `
      <p>Hello, world.</p>
      <p>I don't have anything in particular to say. I just wanted to say hello to the world.</p>
      <p>I don't know if anyone will read this. I don't know if any search engine will ever find it. Even so, I write it here. I release it on the airwaves. It's a bit like sealing a message in a bottle and throwing it into the sea.</p>
      <p>The world is vast. I am small. And that's fine.</p>
    `,
  },
  zh: {
    title: '你好，世界',
    body: `
      <p>你好，世界。</p>
      <p>没什么特别想说的。只是想对这个世界说一声你好。</p>
      <p>不知道有没有人会读到这些文字，也不知道搜索引擎能不能找到它。即便如此，我还是把它写在这里，放入电波中任其漂流。就像把信装进瓶子，投入大海一样。</p>
      <p>世界很广阔。我很渺小。这样就好。</p>
    `,
  },
};

/* ── CAT ── */
let catBase = 'ja';

function catSpeak(key) {
  const calmKeys  = ['connecting','waitingGuest'];
  const errorKeys = ['pwError','noRoomError'];
  let vocab;
  if (catBase === 'en') {
    vocab = ['MEOW','meow','mrrrow','mew','NYA!'];
  } else if (catBase === 'zh') {
    vocab = ['喵','喵呜','咪','喵！'];
  } else {
    vocab = ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'];
  }
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function catBody() {
  // 猫語は段落数ぶんにゃあにゃあする
  const lines = ['', '', '', ''].map(() => `<p>${catSpeak('body')}</p>`).join('\n');
  return lines;
}

let currentLang = (() => {
  // URLパラメータ優先、次にlocalStorage
  try {
    const params = new URLSearchParams(location.search);
    const p = params.get('lang');
    if (p && ['ja','en','zh','cat'].includes(p)) return p;
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

const I18N_UI = {
  ja: { navBack: '← Logue', footer: '© MOMO Works' },
  en: { navBack: '← Logue', footer: '© MOMO Works' },
  zh: { navBack: '← Logue', footer: '© MOMO Works' },
};

function applyLang() {
  const ui = I18N_UI[currentLang] || I18N_UI.ja;
  if (currentLang === 'cat') {
    const catTitle = catSpeak('title');
    document.getElementById('entry-title').textContent = catTitle;
    document.title = catTitle + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML   = catBody();
    document.getElementById('nav-back').textContent   = catSpeak('navBack');
    document.getElementById('footer-text').textContent = catSpeak('footer');
  } else {
    const c = CONTENT[currentLang] || CONTENT.ja;
    document.getElementById('entry-title').textContent = c.title;
    document.title = c.title + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML   = c.body;
    document.getElementById('nav-back').textContent   = ui.navBack;
    document.getElementById('footer-text').textContent = ui.footer;
  }
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  // URLパラメータを更新（履歴は残さない）
  try {
    const url = new URL(location.href);
    if (lang === 'ja') { url.searchParams.delete('lang'); }
    else { url.searchParams.set('lang', lang); }
    history.replaceState(null, '', url.toString());
  } catch(e) {}
  applyLang();
}

applyLang();
</script>
