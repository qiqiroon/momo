%231a0800'/%3E%3Cellipse cx='-12' cy='-3.7' rx='2.4' ry='3.5' fill='%23000'/%3E%3Cellipse cx='12' cy='-3.7' rx='2.4' ry='3.5' fill='%23000'/%3E%3Ccircle cx='-10.5' cy='-5.2' r='1.0' fill='%23c2410c'/%3E%3Ccircle cx='13.5' cy='-5.2' r='1.0' fill='%23c2410c'/%3E%3Cpath d='M0,6.3 C-0.8,4.8 -3.5,4.8 -3.5,7.3 C-3.5,9.3 0,11.3 0,11.3 C0,11.3 3.5,9.3 3.5,7.3 C3.5,4.8 0.8,4.8 0,6.3 Z' fill='%23000'/%3E%3Cline x1='0' y1='11.3' x2='0' y2='13.3' fill='none' stroke='%23000' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M0,13.3 Q-5,17.3 -8,15.3' fill='none' stroke='%23000' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M0,13.3 Q5,17.3 8,15.3' fill='none' stroke='%23000' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --orange: #c2410c;
    --orange-light: #ea580c;
    --text: #e5e5e5;
    --text-muted: #737373;
    --border: #2a2a2a;
    --border-strong: #444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  #lang-switcher { position: fixed; top: 8px; right: 12px; z-index: 200; }
  #lang-select {
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }
  #lang-select:focus { border-color: var(--orange); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 0 24px;
  }

  .site-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 52px 0 40px;
    animation: fadeDown 0.7s ease both;
  }

  .site-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .site-logo:hover { color: var(--text); }
  .site-logo span { color: var(--orange-light); }
  .site-logo-sep { color: var(--border-strong); font-size: 0.9rem; }

  article {
    animation: fadeUp 0.7s ease 0.15s both;
    margin-bottom: 56px;
  }

  .entry-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .entry-num { font-size: 0.7rem; color: var(--orange); letter-spacing: 0.1em; }
  .entry-date { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; }

  .entry-title {
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    font-weight: 500;
    letter-spacing: 0.03em;
    line-height: 1.4;
    margin-bottom: 32px;
    color: #fff;
  }

  .entry-body { font-size: 1rem; line-height: 2; color: var(--text); letter-spacing: 0.04em; }
  .entry-body p { margin-bottom: 1.6em; }
  .entry-body p:last-child { margin-bottom: 0; }

  .entry-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 0 40px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .nav-link {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--text); }

  footer {
    margin-top: auto;
    padding: 24px 0;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border);
    width: 100%;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div id="lang-switcher">
  <select id="lang-select" onchange="onLangChange(this.value)">
    <option value="ja">日本語</option>
    <option value="en">EN</option>
    <option value="zh">中文</option>
    <option value="cat">CAT</option>
  </select>
</div>

<div class="container">
  <div class="site-header">
    <a class="site-logo" href="../../../">MOMO <span>Works</span></a>
    <span class="site-logo-sep">/</span>
    <a class="site-logo" href="../../">MOMO <span>Logue</span></a>
  </div>

  <article>
    <div class="entry-meta">
      <span class="entry-num">002</span>
      <span class="entry-date">2026-04-22</span>
    </div>
    <h1 class="entry-title" id="entry-title">音楽ファイル</h1>
    <div class="entry-body" id="entry-body"></div>
  </article>

  <nav class="entry-nav">
    <a class="nav-link" href="../" id="nav-back">← Logue</a>
    <span></span>
  </nav>
</div>

<footer id="footer-text">&copy; MOMO Works</footer>

<script>
const CONTENT = {
  ja: {
    title: '音楽ファイル',
    body: `
      <p>世間では、音楽ファイルではなく「音楽を聴く権利」へのサブスクリプションが主流かもしれない。
      しかし、このサイトのアプリは音楽ファイルを対象にしている。</p>
      <p>所有からマインドフルネスへの移行は、私たちの世代には当てはまらない。
      音楽趣味とは、聴くことではなく所有することである。
      私たちは多くのCD、あるいはアナログレコードを大量に保有している。
      これらは、高価なオーディオ設備を必要としたり、媒体の保管に手間がかかったりと、
      音楽体験の質を下げる要因にもなっている。</p>
      <p>実際に聴くには不便なため、音楽ファイルとしてコンピュータ上に保存し、
      大量に保有したうえでPC上で再生するのが、私たちの世代のスタイルだ。
      このサイトのアプリは、それを前提として提供している。
      そもそも、それを実現するために開発を始めた。</p>
      <p>多分、若い人にはピンとこないと思う。</p>
    `,
  },
  en: {
    title: 'Audio Files',
    body: `
      <p>Subscription services that provide "the right to listen" have likely become the mainstream.
      However, the applications on this site are built around audio files.</p>
      <p>The shift from ownership to mindfulness does not really apply here.
      For some of us, music as a hobby has meant owning it rather than just listening.
      We have accumulated large collections of CDs, or sometimes vinyl records.
      These require expensive equipment and careful storage, which can reduce the ease of actually experiencing music.</p>
      <p>Because playing physical media is inconvenient, the music is stored as files on a computer.
      Large collections are kept and played back on a PC.
      The applications on this site are designed with that assumption.
      They were created for that purpose from the beginning.</p>
      <p>It probably does not resonate with younger people.</p>
    `,
  },
  zh: {
    title: '音频文件',
    body: `
      <p>如今主流也许已经变成了提供“收听权”的订阅服务，而不是音频文件本身。
      但这个网站的应用是以音频文件为前提构建的。</p>
      <p>从“拥有”转向“体验”的变化，并不适用于这一类人。
      对一些人来说，音乐这种兴趣意味着拥有，而不仅仅是收听。
      我们积累了大量的CD，或者黑胶唱片。
      这些需要昂贵的设备和细致的保存，也在某种程度上降低了实际聆听的便利性。</p>
      <p>由于直接使用实体媒介不方便，音乐会被转成电脑中的音频文件保存。
      在电脑上管理并播放大量文件，成为一种习惯。
      这个网站的应用正是以此为前提设计的。
      从一开始，就是为了这个目的而制作の。</p>
      <p>大概很难让年轻人产生共鳴。</p>
    `,
  },
};

let catBase = 'ja';

function catSpeak() {
  const vocabMap = {
    en: ['MEOW','meow','mrrrow','mew','NYA!'],
    zh: ['喵','喵呜','咪','喵！'],
    ja: ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'],
  };
  const vocab = vocabMap[catBase] || vocabMap.ja;
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function catBody() {
  return Array.from({length: 4}, () => `<p>${catSpeak()}</p>`).join('\n');
}

let currentLang = (() => {
  try {
    const p = new URLSearchParams(window.location.search).get('lang');
    if (p && ['ja','en','zh','cat'].includes(p)) return p;
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

function applyLang() {
  const titleEl = document.getElementById('entry-title');
  const bodyEl = document.getElementById('entry-body');
  const backEl = document.getElementById('nav-back');
  const footEl = document.getElementById('footer-text');

  if (currentLang === 'cat') {
    const t = catSpeak();
    titleEl.textContent = t;
    bodyEl.innerHTML = catBody();
    document.title = t + ' — MOMO Logue';
    backEl.textContent = catSpeak();
    footEl.textContent = catSpeak();
  } else {
    const c = CONTENT[currentLang] || CONTENT.ja;
    titleEl.textContent = c.title;
    bodyEl.innerHTML = c.body;
    document.title = c.title + ' — MOMO Logue';
    backEl.textContent = '← Logue';
    footEl.textContent = '© MOMO Works';
  }
  
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = (currentLang === 'cat') ? catBase : currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  try {
    const url = new URL(window.location.href);
    if (lang === 'ja') url.searchParams.delete('lang');
    else url.searchParams.set('lang', lang);
    window.history.replaceState(null, '', url.toString());
  } catch(e) {}
  applyLang();
}

// 初期実行
applyLang();
</script>

</body>
</html>
