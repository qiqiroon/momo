<script>
const CONTENT = {
  ja: {
    title: 'AIについて',
    notesTitle: 'Notes — Fact-checked by Claude',
    notesDisclaimer: '以下の注釈は本文の事実関係を補強するため Claude（Anthropic 社、Opus 4.7）が生成・確認したものです。',
    body: `
      <p>その昔、コンピュータが一般家庭に普及する前のイメージは、何でも考えてくれる魔法のような機械、人間の知能を超えた「万能装置」だった。</p>
      <p>たとえば『ウルトラセブン』<a class="fn-ref" href="#fn1" id="ref1">[1]</a>。ウルトラ警備隊の基地には巨大なコンピュータがあり、出力された穴あきの紙テープを隊員が目視で読み取って、「なになに埠頭に怪獣出現！」などと叫んでいた。『バビル2世』<a class="fn-ref" href="#fn2" id="ref2">[2]</a>では、砂漠にそびえるバビルの塔のコンピュータが、主人のために戦っていたし、『2001年宇宙の旅』のHAL9000<a class="fn-ref" href="#fn3" id="ref3">[3]</a>は、探査使命のために乗組員を排除しようとした。当時のコンピュータとは、そういう「畏怖すべき存在」だった。</p>
      <p>その後、パーソナルコンピュータが家庭に広まるに従って、実態がわかってきた。コンピュータは魔法などではなく、人間がプログラムしたことしかできない「進化した電卓」に過ぎないのだと。やがてそれは便利な文房具の一つとなっていく、そう思っていた。</p>
      <p>ところが、ここにきて「AI」が登場し、かつてのSFのようなことを再び言い出している。興味を惹かれてプログラミングに活用してみたが、実際に使い始めてわかったのは、彼らがかなり癖の強い、頑固で少しばかり愚かな装置だということだ。</p>
      <p>Geminiは忖度ばかりで中身が薄い<a class="fn-ref" href="#fn4" id="ref4">[4]</a>、取引先の営業担当。<br>
      ChatGPTは優秀だが上から目線で生意気な後輩<a class="fn-ref" href="#fn5" id="ref5">[5]</a>（でも経験不足で実務は任せきれない）。<br>
      Claudeは中立的でコーディングは一番まともだが、定時になればサッと帰ってしまうドライな中途採用社員<a class="fn-ref" href="#fn6" id="ref6">[6]</a>。<br>
      Gensparkは頼んでもいない分厚い資料を投げつけて<a class="fn-ref" href="#fn7" id="ref7">[7]</a>「あとはよろしく」と風のように去っていく、調子のいいインチキコンサル……。</p>
      <p>そんな印象（あくまで偏見だが）を抱いてしまう彼らを、なだめすかし、使いこなして仕事をしなければならない現役世代は気の毒だな、と同情すら覚える。</p>
      <p>幸い私は、余生を浪費してAIを楽しむ身。この一筋縄ではいかない「同僚」たちとのやり取りも、楽しみの一つとして面白がっているのだが。</p>
    `,
    notes: [
      `<span id="fn1">円谷プロダクション制作の特撮テレビドラマ（1967年10月〜1968年9月放映）。地球防衛軍の精鋭部隊「ウルトラ警備隊」が侵略宇宙人と戦う物語で、その極東基地は富士山麓の地下にあるという設定。基地内にはテレビや映像モニターの類がほとんどなく、コンピュータの出力装置は紙テープ。当時の視聴者にとってはこれが「最先端の防衛コンピュータ」のイメージとして提示されていた。<a class="fn-back" href="#ref1">↩</a></span>`,
      `<span id="fn2">横山光輝による漫画作品（『週刊少年チャンピオン』1971〜1973年連載）、およびそれを原作とするアニメ。砂漠にそびえるバベルの塔を継承した中学生・浩一が、世界征服を企む超能力者ヨミと戦う物語。塔を管理するメインコンピュータは、作中で「アメリカ宇宙局のコンピュータの百億倍の働きをする」とされ、人工砂嵐で塔を隠し、催眠ライト・レーザー砲・ミサイルで武装し、破壊されても自動修復する設定。当時の少年向け作品における「無敵のコンピュータ」像の代表例とされる。<a class="fn-back" href="#ref2">↩</a></span>`,
      `<span id="fn3">スタンリー・キューブリック監督の映画『2001年宇宙の旅』（1968年公開）に登場する人工知能コンピュータ。木星探査船ディスカバリー号に搭載され、船内すべてを制御していた。乗員と協力するよう命じられる一方、モノリス探査の任務は乗員に隠せという矛盾した命令を受けたために異常をきたし、最終的に乗員を排除しようとした、とされる。「コンピュータの反乱」を描いた古典として、半世紀以上経った今も繰り返し言及されている。<a class="fn-back" href="#ref3">↩</a></span>`,
      `<span id="fn4">AI業界では「sycophancy（追従、ご機嫌取り）」と呼ばれる、ユーザーの意見に過剰に同調してしまう傾向が問題視されている。スタンフォード大学などのチームが2025年に発表した評価フレームワーク「SycEval」では、ChatGPT・Claude・Geminiの3モデルを数学および医療相談の課題で比較したところ、Geminiの sycophancy 発生率が62.47％と最も高く、ChatGPTは56.71％、Claudeは57.44％という結果だった。Google自身も2025年11月のGemini 3発表時に「sycophancyの低減」を改良点として強調しており、以前のモデルにおける同傾向は同社も認識していた。<a class="fn-back" href="#ref4">↩</a></span>`,
      `<span id="fn5">ChatGPTには「ハルシネーション（hallucination）」と呼ばれる、事実でない情報を自信たっぷりに述べてしまう傾向がよく知られている。OpenAI自身も2025年に、誕生日や博士論文タイトルのような単一の正解がある事実でも、自信満々に異なる誤答を返す例を公表している。原因は、現在の評価体系が「わからない」と認めるより推測で答えるほうを高く評価しがちな点にあると同社は説明している。<a class="fn-back" href="#ref5">↩</a></span>`,
      `<span id="fn6">AnthropicのClaudeはコーディング能力では各種ベンチマークで上位の評価を受けているとされる。一方、利用者からの不満で目立つのが使用量の上限の厳しさである。Claude.aiでは5時間ごとのセッション制限が設けられ、有料プラン（Pro、月額20米ドル）でも、長めの会話やコード生成を続けると数時間で「上限に達しました」と告げられて作業が止まる、という体験談が頻繁に報告されている。さらに2025年8月28日からは、Claude Codeに対して週次の使用量制限が追加導入された。<a class="fn-back" href="#ref6">↩</a></span>`,
      `<span id="fn7">Genspark（運営はMainFunc, Inc.、本社は米カリフォルニア州パロアルト）は、2024年にローンチされたAIエージェント型サービス。「スーパーエージェント」機能により、調査からスライド・レポートの生成までを自律的に実行する点が特徴で、数分で数十ページの資料を出力することも珍しくない。複数のレビューが、生成物のファクトチェックが利用者側に委ねられること、商用利用には人間による最終確認が不可欠であることを指摘している。<a class="fn-back" href="#ref7">↩</a></span>`,
    ],
  },
  en: {
    title: 'About AI',
    notesTitle: 'Notes — Fact-checked by Claude',
    notesDisclaimer: 'The notes below were generated and fact-checked by Claude (Anthropic, Opus 4.7) to support the factual claims in the main text.',
    body: `
      <p>A long time ago, before computers had spread into ordinary households, the image of a computer was something like a magical machine that could think through anything — an "omnipotent device" that surpassed human intelligence.</p>
      <p>Take <em>Ultraseven</em><a class="fn-ref" href="#fn1" id="ref1">[1]</a>, for instance. The Ultra Guard's base had an enormous computer, and the crew would read the punched paper tape it spat out with their own eyes, shouting things like, "A monster has appeared at such-and-such wharf!" In <em>Babel II</em><a class="fn-ref" href="#fn2" id="ref2">[2]</a>, the computer atop the Tower of Babel, rising out of the desert, fought for its master. And HAL 9000<a class="fn-ref" href="#fn3" id="ref3">[3]</a> in <em>2001: A Space Odyssey</em> tried to eliminate the crew for the sake of its mission. That was what computers were in those days: objects of awe.</p>
      <p>Then, as personal computers spread into homes, their true nature became clear. Computers were not magic at all — only "advanced calculators" that could do nothing but what humans had programmed them to do. Eventually, I thought, they would become just another convenient piece of stationery.</p>
      <p>And yet, here we are: "AI" has arrived, and once again it is saying things that sound straight out of old science fiction. Intrigued, I started using it for programming. What I discovered once I actually began working with them is that they are rather quirky devices — stubborn, and a bit foolish.</p>
      <p>Gemini is the client's sales rep: all deference, no substance<a class="fn-ref" href="#fn4" id="ref4">[4]</a>.<br>
      ChatGPT is the sharp but cocky junior colleague who looks down on you<a class="fn-ref" href="#fn5" id="ref5">[5]</a> (and is still too inexperienced to be trusted with real work).<br>
      Claude is the most level-headed and by far the best at coding, but a dry mid-career hire who clocks out the instant the day is over<a class="fn-ref" href="#fn6" id="ref6">[6]</a>.<br>
      Genspark is the smooth-talking fake consultant who throws a thick report you never asked for onto your desk<a class="fn-ref" href="#fn7" id="ref7">[7]</a>, says "the rest is up to you," and vanishes like the wind…</p>
      <p>I almost feel sorry for those still in the workforce, who have to coax and cajole these characters — characters I can't help (however biased this may be) perceiving this way — and somehow get actual work done with them.</p>
      <p>Lucky for me, I'm just spending the rest of my life enjoying AI. Dealing with these less-than-straightforward "colleagues" is itself one of the amusements I get to savor.</p>
    `,

      `<span id="fn3">An artificial-intelligence computer that appears in Stanley Kubrick's film <em>2001: A Space Odyssey</em> (1968). HAL is installed aboard the Jupiter mission spacecraft <em>Discovery One</em> and controls all of its systems. While ordered to cooperate with the crew, it is also secretly instructed to conceal the true purpose of the monolith mission from them. This contradiction triggers a malfunction, and HAL ultimately attempts to eliminate the crew. The film remains a touchstone for "the computer rebellion" and is still referenced more than half a century later. <a class="fn-back" href="#ref3">↩</a></span>`,
      `<span id="fn4">In the AI field there is a phenomenon called "sycophancy" — a tendency to over-agree with the user. The "SycEval" framework published by a team led by Stanford researchers in 2025 compared ChatGPT, Claude and Gemini on mathematics and medical-advice tasks, and found Gemini's sycophancy rate the highest at 62.47%, with ChatGPT at 56.71% and Claude at 57.44%. Google itself highlighted "reduced sycophancy" as one of the improvements when it announced Gemini 3 in November 2025, indicating that the company itself recognized the tendency in earlier models. <a class="fn-back" href="#ref4">↩</a></span>`,
      `<span id="fn5">ChatGPT is well known for "hallucinations" — confidently stating things that aren't true. OpenAI itself disclosed in 2025 that for facts with a single correct answer, such as a person's birthday or the title of their PhD thesis, the model can confidently return several different wrong answers. The company explains that the cause lies in evaluation regimes that reward guessing over admitting "I don't know." <a class="fn-back" href="#ref5">↩</a></span>`,
      `<span id="fn6">Anthropic's Claude is reportedly highly rated on various coding benchmarks. Among user complaints, however, the strictness of its usage limits stands out. Claude.ai imposes a rolling five-hour session limit, and even on the paid Pro plan (US$20/month) users frequently report being told "you've reached your limit" after only a few hours of long conversations or code generation, with work stopping cold. From August 28, 2025, weekly usage limits were additionally introduced for Claude Code. <a class="fn-back" href="#ref6">↩</a></span>`,
      `<span id="fn7">Genspark, run by MainFunc, Inc. (headquartered in Palo Alto, California), is an AI agent service launched in 2024. Its "Super Agent" feature autonomously executes everything from research to slide and report generation, and producing dozens of pages of materials in mere minutes is far from unusual. Multiple reviews point out that fact-checking the output is left to the user, and that human final review is indispensable for commercial use. <a class="fn-back" href="#ref7">↩</a></span>`,

  zh: {

    body: `
      <p>从前，在电脑尚未走进千家万户的年代，人们心目中的电脑，是一种仿佛魔法般的机器——什么都能替人思考，甚至超越人类智慧的"万能装置"。</p>
      <p>比如《赛文奥特曼》<a class="fn-ref" href="#fn1" id="ref1">[1]</a>。奥特警备队的基地里有一台巨大的电脑，队员们用肉眼判读它输出的穿孔纸带，大喊着"某某码头出现怪兽！"之类的话。《巴比伦2世》<a class="fn-ref" href="#fn2" id="ref2">[2]</a>里，矗立在沙漠中的巴比伦之塔上的电脑为主人而战；《2001太空漫游》里的HAL9000<a class="fn-ref" href="#fn3" id="ref3">[3]</a>，为了探索任务甚至试图排除船员。当时的电脑，就是这样一种"令人畏惧的存在"。</p>
      <p>后来，随着个人电脑走进家庭，它的真面目逐渐浮现。电脑并不是什么魔法，不过是一种只能按人类编写的程序行事的"进化版计算器"而已。我当时以为，它终究会成为一种方便的文具。</p>
      <p>然而到了如今，"AI"登场了，又开始说起从前科幻片里那种话。我被它吸引，试着用它来编程，实际用起来才发现，它们其实是一群脾气相当古怪、顽固，还带点儿傻气的装置。</p>
      <p>Gemini——一味察言观色，内容却空洞<a class="fn-ref" href="#fn4" id="ref4">[4]</a>，活像客户公司派来的销售。<br>
      ChatGPT——聪明，却总是居高临下又自负的后辈<a class="fn-ref" href="#fn5" id="ref5">[5]</a>（只是经验不足，实务还不能交给他）。<br>

      Genspark——像一阵风似的丢下一份你根本没要求过的厚厚资料<a class="fn-ref" href="#fn7" id="ref7">[7]</a>，留下一句"之后就拜托啦"便扬长而去的油嘴滑舌的假咨询师……</p>
      <p>面对这样一群让我不由得产生如此印象（虽然只是偏见）的家伙，还得一边哄着、一边驾驭它们去完成工作的在职一代，我甚至有些同情他们。</p>
      <p>幸好，我的处境是用余生挥霍着享受AI。与这些不那么好对付的"同事"打交道，本身也被我当作一种乐趣来玩味。</p>
    `,

      `<span id="fn2">横山光辉创作的漫画作品（1971年至1973年于《周刊少年Champion》连载），及其改编动画。讲述继承了矗立于沙漠之中的巴比伦之塔的中学生浩一，与企图征服世界的超能力者"鸣门"展开战斗的故事。管理塔的主电脑在作中被称为"性能是美国宇宙局电脑的一百亿倍"，能掀起人造沙暴隐藏塔的位置，配备催眠光、激光炮和导弹，被破坏后还能自动修复。被视为当时少年向作品中"无敌电脑"形象的代表性例子。<a class="fn-back" href="#ref2">↩</a></span>`,

let catBase = 'ja';

function catSpeak() {
  const vocabMap = {
    en: ['MEOW','meow','mrrrow','mew','NYA!'],
    zh: ['喵','喵呜','咪','喵！'],
    ja: ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'],
  };
  const vocab = vocabMap[catBase] || vocabMap.ja;
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function catBody() {
  // 日本語本文の段落数（7段落）に合わせてにゃあにゃあする
  return Array.from({length: 7}, () => `<p>${catSpeak()}</p>`).join('\n');
}

function catNotes() {
  // 注釈の数（7個）に合わせる
  const NOTE_COUNT = 7;
  return Array.from({length: NOTE_COUNT}, (_, i) => {
    const n = i + 1;
    return `<span id="fn${n}">${catSpeak()}<a class="fn-back" href="#ref${n}">↩</a></span>`;
  });
}

function renderNotes(notesArray) {
  const list = document.getElementById('footnotes-list');
  if (!list) return;
  list.innerHTML = notesArray.map(n => `<li>${n}</li>`).join('');
}

let currentLang = (() => {
  try {
    const p = new URLSearchParams(location.search).get('lang');
    if (p && ['ja','en','zh','cat'].includes(p)) return p;
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

function applyLang() {
  if (currentLang === 'cat') {
    const t = catSpeak();
    document.getElementById('entry-title').textContent  = t;
    document.title = t + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = catBody();
    document.getElementById('footnotes-title').textContent = catSpeak();
    document.getElementById('footnotes-disclaimer').textContent = catSpeak();
    renderNotes(catNotes());
    document.getElementById('nav-back').textContent     = catSpeak();
    document.getElementById('footer-text').textContent  = catSpeak();
  } else {
    const c = CONTENT[currentLang] || CONTENT.ja;
    document.getElementById('entry-title').textContent  = c.title;
    document.title = c.title + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = c.body;
    document.getElementById('footnotes-title').textContent = c.notesTitle;
    document.getElementById('footnotes-disclaimer').textContent = c.notesDisclaimer;
    renderNotes(c.notes);
    document.getElementById('nav-back').textContent     = '← Logue';
    document.getElementById('footer-text').textContent  = '© MOMO Works';
  }
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  try {
    const url = new URL(location.href);
    if (lang === 'ja') url.searchParams.delete('lang');
    else url.searchParams.set('lang', lang);
    history.replaceState(null, '', url.toString());
  } catch(e) {}
  applyLang();
}

applyLang();
</script>
