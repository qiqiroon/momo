<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --orange: #c2410c;
    --orange-light: #ea580c;
    --text: #e5e5e5;
    --text-muted: #737373;
    --border: #2a2a2a;
    --border-strong: #444;
    --bg-selected: rgba(194,65,12,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  #lang-switcher { position: fixed; top: 8px; right: 12px; z-index: 200; }
  #lang-select {
    background: var(--surface2);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
  }
  #lang-select:focus { border-color: var(--orange); }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 0 24px;
  }

  .site-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 52px 0 40px;
    animation: fadeDown 0.7s ease both;
  }

  .site-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .site-logo:hover { color: var(--text); }
  .site-logo span { color: var(--orange-light); }
  .site-logo-sep { color: var(--border-strong); font-size: 0.9rem; }

  article {
    animation: fadeUp 0.7s ease 0.15s both;
    margin-bottom: 56px;
  }

  .entry-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .entry-num { font-size: 0.7rem; color: var(--orange); letter-spacing: 0.1em; }
  .entry-date { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; }

  .entry-title {
    font-size: clamp(1.4rem, 4vw, 1.9rem);
    font-weight: 500;
    letter-spacing: 0.03em;
    line-height: 1.4;
    margin-bottom: 32px;
    color: #fff;
  }

  .entry-body { font-size: 1rem; line-height: 2; color: var(--text); letter-spacing: 0.04em; }
  .entry-body p { margin-bottom: 1.6em; }
  .entry-body p:last-child { margin-bottom: 0; }

  .entry-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 0 40px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.7s ease 0.3s both;
  }

  .nav-link {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--text); }

  footer {
    margin-top: auto;
    padding: 24px 0;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    border-top: 1px solid var(--border);
    width: 100%;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }

<div id="lang-switcher">
  <select id="lang-select" onchange="onLangChange(this.value)">
    <option value="ja">日本語</option>
    <option value="en">EN</option>

    </div>

<footer id="footer-text">&copy; MOMO Works</footer>

<script>
const CONTENT = {
  ja: {
    title: 'AIによる知能補完',
    body: `
      <p>AIによって、これまで作れなかったプログラムが作れるようになった。知能を補えるようになった、と言ってもいい。</p>
      <p>やがて人型ロボットが普及すれば、体力も補えるようになるのだろう。</p>
      <p>ただ、人間の愚かさだけは補えない。</p>
      <p>先日、若い頃のつもりで一つやらかした。詳細は伏せるが、頭ではわかっていてなお、踏み外すこともある。どんな道具がそばにあっても、補ってもらえる種類のものではない。つまり愚かさとは、理屈では届かない場所で人がしくじる、その避けようのなさのことでもある。</p>
      <p>道具は揃った。あとは使う側の問題だが、これがいちばん古くて新しい問題なのだろう。届かない言葉は、こういうところに置いておくしかない。</p>
    `,
  },
  en: {
    title: 'Intelligence, Supplemented by AI',
    body: `
      <p>Thanks to AI, I can now write programs I could never have written before. You could say that my intelligence has been supplemented.</p>
      <p>Eventually, once humanoid robots become widespread, our physical strength will probably be supplemented too.</p>
      <p>But human foolishness — that, alone, cannot be supplemented.</p>
      <p>The other day, I slipped up — as though I had forgotten my own age. I'll spare the details, but even when one knows better, one can still stumble. No tool at hand can supplement that. Foolishness, in the end, is also the name for this: that people falter where reason cannot reach, and there is no way around it.</p>
      <p>The tools are in place. What remains is the user — the oldest and newest problem there is. Words that cannot reach their destination have to be left somewhere like this.</p>
    `,
  },
  zh: {
    title: 'AI对智能的补足',
    body: `
      <p>多亏了AI，我得以写出从前写不出来的程序。也可以说，我的智能被补足了。</p>
      <p>等到将来人形机器人普及，体力大概也能被补足吧。</p>
      <p>只是，人的愚蠢是无论如何补不上的。</p>
      <p>前些日子，我像是忘了自己年纪似的，做了一件不该做的事。详情不便细说，只能说，心里明明清楚，却仍有踏空的时候。无论手边有怎样的工具，那都不是能被补足的种类。所谓愚蠢，归根到底也是这样一回事——人会在道理够不到的地方失足，而那是无可避免的。</p>
      <p>工具已经齐备。剩下的就是用的人，而这恐怕是最古老、也最新鲜的问题。送不到的话，只能放在这样的地方。</p>
    `,
  },
};

let catBase = 'ja';

function catSpeak() {
  const vocabMap = {
    en: ['MEOW','meow','mrrrow','mew','NYA!'],
    zh: ['喵','喵呜','咪','喵！'],
    ja: ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'],
  };
  const vocab = vocabMap[catBase] || vocabMap.ja;
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function catBody() {
  // 本文の段落数（5段落）に合わせてにゃあにゃあする
  return Array.from({length: 5}, () => `<p>${catSpeak()}</p>`).join('\n');
}

let currentLang = (() => {
  try {
    const p = new URLSearchParams(location.search).get('lang');
    if (p && ['ja','en','zh','cat'].includes(p)) return p;
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

function applyLang() {
  if (currentLang === 'cat') {
    const t = catSpeak();
    document.getElementById('entry-title').textContent  = t;
    document.title = t + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = catBody();
    document.getElementById('nav-back').textContent     = catSpeak();
    document.getElementById('footer-text').textContent  = catSpeak();
  } else {
    const c = CONTENT[currentLang] || CONTENT.ja;
    document.getElementById('entry-title').textContent  = c.title;
    document.title = c.title + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = c.body;
    document.getElementById('nav-back').textContent     = '← Logue';
    document.getElementById('footer-text').textContent  = '© MOMO Works';
  }
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  try {
    const url = new URL(location.href);
    if (lang === 'ja') url.searchParams.delete('lang');
    else url.searchParams.set('lang', lang);
    history.replaceState(null, '', url.toString());
  } catch(e) {}
  applyLang();
}

applyLang();
</script>
