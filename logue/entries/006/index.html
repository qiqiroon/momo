<script>
const CONTENT = {
  ja: {
    title: '法則型の独り言',
    notesTitle: 'Notes — Fact-checked by Claude',
    notesDisclaimer: '以下の注釈は本文の事実関係を補強するため Claude（Anthropic 社、Opus 4.7）が生成・確認したものです。',
    body: `
      <p>こんなサイト作って何が楽しいの、と思う人のほうが多いと思う。</p>
      <p>岡田斗司夫<a class="fn-ref" href="#fn1" id="ref1">[1]</a>の４タイプ分類<a class="fn-ref" href="#fn2" id="ref2">[2]</a>というものがある。人間を「注目型」「司令型」「法則型」「理想型」の四つに分ける性格論で、外向／内向と、具体／抽象の二つの軸で人を区切る。MBTI<a class="fn-ref" href="#fn3" id="ref3">[3]</a>と似ているが別物で、岡田個人の経験から組み立てられた、科学的根拠もない分類法だ。だが、人を見るときの当たりをつける道具としては、まあ使える。MBTIは設問が多くて診断が面倒だし、出てきた４文字を見ても、その人がどう動くかが結局よくわからない。岡田の４分類は粗いかわりに、目の前の相手の行動原理にその場で当たりをつけて対処できる。私のような無精者にはこちらが合っている。</p>
      <p>四つを並べると、こうなる。</p>
      <div class="types">
        <span>法則型（内向×具体）：世界の法則は全部知りたい、自分のことは何一つ世界に知られたくない</span>
        <span>理想型（内向×抽象）：自分の中の「こうあるべき」に届かないものは、自分のものでさえ気に入らない</span>
        <span>注目型（外向×抽象）：できるだけ多くの人に好かれたい、自分の熱を分け合いたい</span>
        <span>司令型（外向×具体）：勝ちたい。場を仕切りたい。負ける勝負はしたくない</span>
      </div>
      <p>私は明らかに法則型に属す。世界の仕組みを覗き見たい、覗き見たことは黙っていたい、その癖は自分でもよくわかる。だから、こんなサイトをやっている動機もはっきりしている。プログラムの知識なしにAIだけでアプリを作って公開できる、なんて面白いんだ、この面白さの仕組みを誰かにもわかってほしい――それだけのことだ。</p>
      <p>たぶん他のタイプの人は、こう思っている。</p>
      <div class="types">
        <span>司令型：なんでそんなもの作ってるの？　アフィリエイトでも貼って収益化すればいいのに</span>
        <span>理想型：AIに作らせるなんて邪道。自分の能力でもないものを誇示して、無能をさらしているだけだ</span>
        <span>注目型：そんなもので人の目を引きたいの？　もっと楽しいことたくさんあるよ。ゲームができたなら、いっしょに遊ぼう</span>
      </div>
      <p>これは私の妄想なので、実際にこう言われたわけではない。司令型から見れば法則型は損得に鈍く、理想型から見れば手抜きに見え、注目型から見れば一緒に楽しむ気がない奴に見える――というだけの話だ。たぶんそれぞれの目には、そう映る。</p>
      <p>そして、こんなことをわざわざ書いていること自体が、法則型の呪縛にとらわれている、という気もする。世界の仕組みを説明したくて仕方がないのだ。誰に、というあてもなく。</p>
      <p>いいじゃん、自分が楽しんでるんだから。</p>
    `,
    notes: [
      `<span id="fn1">岡田斗司夫（おかだ としお／1958年生）。日本のオタク文化を代表する評論家・実業家。1984年、後に『新世紀エヴァンゲリオン』を世に送り出すアニメ制作会社ガイナックスを庵野秀明らと共同で設立し、初代社長を務めた。在籍中の作品に『王立宇宙軍 オネアミスの翼』『トップをねらえ！』『ふしぎの海のナディア』『プリンセスメーカー』など。退社後は東京大学教養学部・大阪芸術大学などで講師・客員教授を歴任し、自らを「オタキング」と称してオタク文化を学問として論じた。著書に『オタク学入門』『「世界征服」は可能か？』『いつまでもデブと思うなよ』など多数あり、累計部数は250万部を超えるとされる。<a class="fn-back" href="#ref1">↩</a></span>`,
      `<span id="fn2">正式名称は「欲求の４タイプ」。岡田が大阪芸術大学で講義をする中で、学生のタイプ別に話し方を変えると伝わりやすくなることから整理されたとされる。書籍として最初にまとまったのは2000年の『人生テスト 人を動かす４つの力』、現在広く読まれているのは2011年の『人生の法則 「欲求の４タイプ」で分かるあなたと他人』（朝日新聞出版）である。岡田自身は「科学的根拠は一切ない」と明言しており、性格診断というより「他人の行動原理に当たりをつけるための実用ツール」と位置付けている。<a class="fn-back" href="#ref2">↩</a></span>`,
      `<span id="fn3">MBTI（Myers-Briggs Type Indicator）。ユング（Carl Jung）の心理学的類型論を下敷きに、米国のキャサリン・ブリッグスとイザベル・マイヤーズの母娘によって開発された性格分類法。原型は第二次世界大戦中の1944年で、人間を16タイプ（INFJ、ESTPなど４文字で表記）に分類する。世界45か国以上で使われている一方、心理測定学の観点からは信頼性・妥当性に疑義があり、疑似科学とみなされることも多い。日本では2020年代に入ってからSNSを通じて再流行している。<a class="fn-back" href="#ref3">↩</a></span>`,
    ],
  },
  en: {
    title: 'Soliloquy of a Hosoku-type',
    notesTitle: 'Notes — Fact-checked by Claude',
    notesDisclaimer: 'The following notes were generated and verified by Claude (Anthropic, Opus 4.7) to support the factual content of the main text.',
    body: `
      <p>Most people, I think, wonder what's so fun about running a site like this.</p>
      <p>There is a personality framework called the Four Types, proposed by Toshio Okada<a class="fn-ref" href="#fn1" id="ref1">[1]</a><a class="fn-ref" href="#fn2" id="ref2">[2]</a>. It sorts people into four kinds — Attention-type, Command-type, Hosoku-type (law of the world), and Ideal-type — along two axes: extroverted versus introverted, and concrete versus abstract. It resembles MBTI<a class="fn-ref" href="#fn3" id="ref3">[3]</a> but is a different thing — built from Okada's own experience, with no scientific grounding to speak of. Still, as a tool for taking a quick read on someone, it works well enough. MBTI's questionnaire is tedious, and once you have your four letters, you still don't really know how that person will act. Okada's framework is rougher, but you can size up the person in front of you on the spot and adjust your approach. For a lazy man like me, this one fits.</p>
      <p>Laid out side by side, they look like this:</p>
      <div class="types">
        <span>Hosoku-type (introverted × concrete): wants to know every law of the world, and wants the world to know nothing of itself</span>
        <span>Ideal-type (introverted × abstract): cannot stand anything — even one's own things — that fails to meet the inner standard of how things ought to be</span>
        <span>Attention-type (extroverted × abstract): wants to be liked by as many people as possible, wants to share its warmth</span>
        <span>Command-type (extroverted × concrete): wants to win, wants to run the show, refuses fights it cannot win</span>
      </div>
      <p>I am clearly a Hosoku-type. I want to peer into how the world works, and I want to keep what I've seen to myself — the habit is unmistakable, even to me. So my reasons for running this site are equally clear. That you can build and publish an app using only AI, without any programming knowledge — how interesting that is. I want someone to understand how this kind of fun is put together. That's all there is to it.</p>
      <p>The other types, I imagine, see it like this:</p>
      <div class="types">
        <span>Command-type: Why are you making something like that? Slap on some ads and at least monetize it.</span>
        <span>Ideal-type: Letting an AI build it for you is cheating. Showing off something that isn't even your own ability — you're only exposing how little you can do.</span>
        <span>Attention-type: Is that really how you want to catch people's eyes? There are so many more enjoyable things out there. If you've made a game, let's play it together.</span>
      </div>
      <p>This is my own imagining; nobody actually said any of it. To a Command-type, a Hosoku-type seems indifferent to gain and loss; to an Ideal-type, a corner-cutter; to an Attention-type, someone uninterested in shared fun — that's all. Through each pair of eyes, it probably does look that way.</p>
      <p>And the very fact that I'm bothering to write all this is, I suspect, the Hosoku-type's own bind. I cannot help wanting to explain how the world works. To no one in particular.</p>
      <p>Well, it's fine — I'm enjoying myself.</p>
    `,
    notes: [
      `<span id="fn1">Toshio Okada (b. 1958). A leading Japanese commentator and entrepreneur of otaku culture. In 1984, together with Hideaki Anno and others, he co-founded the animation studio Gainax — the company that would later release Neon Genesis Evangelion — and served as its first president. Works produced during his tenure include The Wings of Honneamise, Gunbuster, Nadia: The Secret of Blue Water, and Princess Maker. After leaving Gainax, he held lecturer and visiting-professor posts at the University of Tokyo's College of Arts and Sciences, Osaka University of Arts, and elsewhere, styling himself the "Otaking" and arguing for otaku culture as a subject of serious study. He has authored numerous books, including An Introduction to Otaku Studies, Is World Conquest Possible?, and Stop Thinking of Yourself as Fat, with cumulative sales reported to exceed 2.5 million copies.<a class="fn-back" href="#ref1">↩</a></span>`,

const NOTE_COUNT = 3;

let catBase = 'ja';

function catSpeak() {
  const vocabMap = {
    en: ['MEOW','meow','mrrrow','mew','NYA!'],
    zh: ['喵','喵呜','咪','喵！'],
    ja: ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'],
  };
  const vocab = vocabMap[catBase] || vocabMap.ja;
  return vocab[Math.floor(Math.random() * vocab.length)];
}

function catBody() {
  // 本文の段落数（11段落）に合わせてにゃあにゃあする
  return Array.from({length: 11}, () => `<p>${catSpeak()}</p>`).join('\n');
}

function catNotes() {
  return Array.from({length: NOTE_COUNT}, () => catSpeak());
}

function renderNotes(notesArray) {
  const list = document.getElementById('footnotes-list');
  if (!list) return;
  list.innerHTML = notesArray.map(n => `<li>${n}</li>`).join('');
}

let currentLang = (() => {
  try {
    const p = new URLSearchParams(location.search).get('lang');
    if (p && ['ja','en','zh','cat'].includes(p)) return p;
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

function applyLang() {
  if (currentLang === 'cat') {
    const t = catSpeak();
    document.getElementById('entry-title').textContent  = t;
    document.title = t + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = catBody();
    document.getElementById('footnotes-title').textContent = catSpeak();
    document.getElementById('footnotes-disclaimer').textContent = catSpeak();
    renderNotes(catNotes());
    document.getElementById('nav-back').textContent     = catSpeak();
    document.getElementById('footer-text').textContent  = catSpeak();
  } else {
    const c = CONTENT[currentLang] || CONTENT.ja;
    document.getElementById('entry-title').textContent  = c.title;
    document.title = c.title + ' — MOMO Logue';
    document.getElementById('entry-body').innerHTML     = c.body;
    document.getElementById('footnotes-title').textContent = c.notesTitle;
    document.getElementById('footnotes-disclaimer').textContent = c.notesDisclaimer;
    renderNotes(c.notes);
    document.getElementById('nav-back').textContent     = '← Logue';
    document.getElementById('footer-text').textContent  = '© MOMO Works';
  }
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? catBase : currentLang);
}

function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  try {
    const url = new URL(location.href);
    if (lang === 'ja') url.searchParams.delete('lang');
    else url.searchParams.set('lang', lang);
    history.replaceState(null, '', url.toString());
  } catch(e) {}
  applyLang();
}

applyLang();
</script>
