<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOMO Logue</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0a; --surface: #111111; --orange: #c2410c; --text: #e5e5e5; --text-muted: #737373; --border: #2a2a2a; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
  .container { width: 100%; max-width: 760px; padding: 40px 24px; }
  header { text-align: center; padding-bottom: 30px; } /* 余白を少し詰めました */
  h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin: 0; }
  h1 span { color: #ea580c; }
  .tagline { color: var(--text-muted); font-size: 0.9rem; margin-top: 10px; }
  
  .section-label { border-bottom: 1px solid var(--border); margin-bottom: 0; padding-bottom: 10px; color: var(--orange); font-size: 0.8rem; font-weight: bold; }
  
  .entry-list { list-style: none; padding: 0; margin: 0; }
  .entry-item { border-bottom: 1px solid var(--border); }
  /* 最初の子要素にだけ線をつける設定を削除し、すべての余白を統一 */
  .entry-link { display: flex; align-items: baseline; gap: 15px; padding: 18px 5px; text-decoration: none; color: var(--text); }
  .entry-link:hover { background: rgba(255,255,255,0.02); }
  .entry-num { font-size: 0.8rem; color: var(--text-muted); width: 30px; }
  .entry-date { margin-left: auto; font-size: 0.8rem; color: var(--text-muted); }
  
  #lang-switcher { position: fixed; top: 10px; right: 10px; z-index: 100; }
  #lang-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 5px; border-radius: 4px; }
  footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: var(--text-muted); border-top: 1px solid var(--border); width: 100%; text-align: center; }
</style>
</head>
<body>

<div id="lang-switcher">
  <select id="lang-select" onchange="onLangChange(this.value)">
    <option value="ja">日本語</option>
    <option value="en">EN</option>
    <option value="zh">中文</option>
    <option value="cat">CAT</option>
  </select>
</div>

<div class="container">
  <header>
    <h1>MOMO <span>Logue</span></h1>
    <p class="tagline" id="tagline">独り言 by MOMO</p>
  </header>
  
  <div class="section-label">ENTRIES</div>
  <ul class="entry-list" id="entry-list"></ul>
  
  <div style="margin-top: 30px;">
    <a href="../" id="back-link" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem;">← MOMO Works</a>
  </div>
</div>

<footer id="footer-text">&copy; MOMO Works</footer>

<script>
const ENTRIES = [
  { id: '001', date: '2026-04-19', ja: 'こんにちは、世界', en: 'Hello, World', zh: '你好，世界' },
  { id: '002', date: '2026-04-22', ja: '音楽ファイル', en: 'Audio Files', zh: '音频文件' },
  { id: '003', date: '2026-04-23', ja: 'AIについて', en: 'About AI', zh: '关于AI' },
  { id: '004', date: '2026-04-25', ja: 'AIによる知能補完', en: 'Intelligence, Supplemented by AI', zh: 'AI对智能的补足' },
  { id: '005', date: '2026-04-27', ja: 'AIに教わりながらAIを使う', en: 'Learning from AI to Use AI', zh: '边问AI边用AI' },
  { id: '006', date: '2026-04-28', ja: '法則型の独り言', en: 'Soliloquy of a Hosoku-type', zh: '法则型的独白' }
];

const I18N = {
  ja: { tagline: '独り言 by MOMO', back: '← MOMO Works', foot: '© MOMO Works' },
  en: { tagline: 'Soliloquy by MOMO', back: '← MOMO Works', foot: '© MOMO Works' },
  zh: { tagline: 'MOMO 的独白', back: '← MOMO Works', foot: '© MOMO Works' },
  cat: { tagline: 'Nyaa?', back: 'Nyaa...', foot: 'Nyaa.' }
};

let currentLang = localStorage.getItem('momoLang') || 'ja';
if (!['ja','en','zh','cat'].includes(currentLang)) currentLang = 'ja';

function render() {
  const d = I18N[currentLang] || I18N.ja;
  const taglineEl = document.getElementById('tagline');
  const backEl = document.getElementById('back-link');
  const footEl = document.getElementById('footer-text');
  
  if (taglineEl) taglineEl.textContent = d.tagline;
  if (backEl) backEl.textContent = d.back;
  if (footEl) footEl.textContent = d.foot;

  const ul = document.getElementById('entry-list');
  if (!ul) return;
  ul.innerHTML = '';

  ENTRIES.forEach(e => {
    const li = document.createElement('li');
    li.className = 'entry-item';
    let title = (currentLang === 'cat') ? 'にゃあ' : (e[currentLang] || e.ja);
    const url = `./entries/${e.id}/` + (currentLang === 'ja' ? '' : `?lang=${currentLang}`);
    li.innerHTML = `<a class="entry-link" href="${url}"><span class="entry-num">${e.id}</span><span class="entry-title">${title}</span><span class="entry-date">${e.date}</span></a>`;
    ul.appendChild(li);
  });

  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
}

function onLangChange(l) {
  currentLang = l;
  localStorage.setItem('momoLang', l);
  render();
}

render();
</script>
</body>
</html>
