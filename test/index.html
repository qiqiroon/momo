<div style="padding: 1rem 0; font-family: var(--font-sans);">
  <h2 class="sr-only">Coin year OCR prototype: photograph a Japanese coin to detect its mint year.</h2>

  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem;">
    <input type="file" accept="image/*" capture="environment" id="file" style="display:none" />
    <button id="pick" style="width:100%; height:44px; font-size:15px;"><i class="ti ti-camera" style="font-size:18px; vertical-align:-3px; margin-right:8px" aria-hidden="true"></i>写真を撮る / 選ぶ</button>
    <p style="font-size:12px; color:var(--color-text-tertiary); margin:10px 0 0; line-height:1.6;">年号の部分を大きく、斜め光で陰影をつけると認識しやすくなります。</p>
  </div>

  <div id="preview-wrap" style="display:none; margin-bottom:1rem;">
    <img id="preview" style="width:100%; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-tertiary);" />
  </div>

  <div id="status" style="display:none; font-size:14px; color:var(--color-text-secondary); margin-bottom:1rem; display:none; align-items:center; gap:8px;">
    <i class="ti ti-loader-2" style="font-size:16px" aria-hidden="true"></i><span id="status-text">処理中…</span>
  </div>

  <div id="result" style="display:none;">
    <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem 1.25rem;">
      <p style="font-size:13px; color:var(--color-text-secondary); margin:0 0 4px;">判定結果</p>
      <p id="year-out" style="font-size:24px; font-weight:500; margin:0 0 12px;">—</p>
      <div style="border-top:0.5px solid var(--color-border-tertiary); padding-top:12px;">
        <p style="font-size:12px; color:var(--color-text-tertiary); margin:0 0 4px;">認識された文字（生データ）</p>
        <p id="raw-out" style="font-size:13px; font-family:var(--font-mono); color:var(--color-text-secondary); margin:0; word-break:break-all; white-space:pre-wrap;"></p>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
  <script>
    (function(){
      var pick = document.getElementById('pick');
      var file = document.getElementById('file');
      var status = document.getElementById('status');
      var statusText = document.getElementById('status-text');
      var result = document.getElementById('result');
      var yearOut = document.getElementById('year-out');
      var rawOut = document.getElementById('raw-out');
      var preview = document.getElementById('preview');
      var previewWrap = document.getElementById('preview-wrap');

      var eraStart = { '令和':2018, '平成':1988, '昭和':1925 };
      var kanjiNum = {'〇':0,'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'廿':20,'卅':30};

      function kanjiToNum(s){
        if(!s) return null;
        if(/^\d+$/.test(s)) return parseInt(s,10);
        var total=0, current=0, found=false;
        for(var i=0;i<s.length;i++){
          var c=s[i];
          if(c==='十'||c==='廿'||c==='卅'){
            found=true;
            var mult = c==='十'?10:(c==='廿'?20:30);
            if(current===0) current=1;
            if(c==='十') total += current*10; else total += mult;
            current=0;
          } else if(kanjiNum[c]!==undefined){
            found=true; current=kanjiNum[c];
          }
        }
        total+=current;
        return found?total:null;
      }

      function detect(text){
        var clean = text.replace(/\s/g,'');
        for(var era in eraStart){
          var idx = clean.indexOf(era);
          if(idx>=0){
            var after = clean.slice(idx+era.length);
            var m = after.match(/^(元|[〇零一二三四五六七八九十廿卅\d]{1,3})/);
            if(m){
              var n = m[1]==='元' ? 1 : kanjiToNum(m[1]);
              if(n && n>0 && n<70){
                return { era:era, n:n, seireki: eraStart[era]+n };
              }
            }
          }
        }
        return null;
      }

      pick.addEventListener('click', function(){ file.click(); });

      file.addEventListener('change', function(e){
        var f = e.target.files[0];
        if(!f) return;
        var url = URL.createObjectURL(f);
        preview.src = url; previewWrap.style.display='block';
        result.style.display='none';
        status.style.display='flex'; statusText.textContent='OCRエンジン準備中…';

        Tesseract.recognize(url, 'jpn', {
          logger: function(m){
            if(m.status==='recognizing text'){
              statusText.textContent='文字を認識中… '+Math.round(m.progress*100)+'%';
            } else if(m.status){
              statusText.textContent = m.status;
            }
          }
        }).then(function(res){
          status.style.display='none';
          var text = res.data.text || '';
          rawOut.textContent = text.trim() || '(文字を検出できませんでした)';
          var d = detect(text);
          if(d){
            yearOut.textContent = d.era+d.n+'年 ＝ 西暦'+d.seireki+'年';
            yearOut.style.color='var(--color-text-success)';
          } else {
            yearOut.textContent='年号を判定できませんでした';
            yearOut.style.color='var(--color-text-danger)';
          }
          result.style.display='block';
        }).catch(function(err){
          status.style.display='none';
          yearOut.textContent='エラー: '+err.message;
          yearOut.style.color='var(--color-text-danger)';
          rawOut.textContent='';
          result.style.display='block';
        });
      });
    })();
  </script>
</div>
