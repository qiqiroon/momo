<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>傾き検知 実験アプリ（スリープ防止付）</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #444;
            border: 2px solid #888;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ff8800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #debug {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
        #status {
            font-size: 12px;
            color: #00ff00;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startButton">センサーを許可してスタート</button>
        <div id="debug">傾き: 取得待機中...</div>
        <div id="status"></div>
    </div>

    <canvas id="gameCanvas" width="300" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const debugText = document.getElementById('debug');
        const statusText = document.getElementById('status');

        let ball = { x: canvas.width / 2, y: canvas.height / 2, vx: 0, vy: 0, radius: 15, color: '#ffaa00' };
        let tilt = { beta: 0, gamma: 0 };
        let isPlaying = false;
        let wakeLock = null; // スリープ防止用オブジェクト

        // スリープ防止（Wake Lock）をリクエストする関数
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusText.innerText = "SCREEN KEEP-ALIVE: ON";
                    console.log('Wake Lock is active');
                } catch (err) {
                    statusText.innerText = "Wake Lock Error: " + err.message;
                }
            } else {
                statusText.innerText = "Wake Lock API not supported";
            }
        }

        startButton.addEventListener('click', async () => {
            // 1. スリープ防止をリクエスト
            await requestWakeLock();

            // 2. センサーの許可（iOS対策）
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            startGame();
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                startGame();
            }
        });

        // アプリがバックグラウンドから復帰した際、再度スリープ防止をかける
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        function startGame() {
            startButton.style.display = 'none';
            isPlaying = true;
            update();
        }

        function handleOrientation(event) {
            tilt.gamma = event.gamma || 0;
            tilt.beta = event.beta || 0;
            debugText.innerText = `X: ${Math.round(tilt.gamma)} / Y: ${Math.round(tilt.beta)}`;
        }

        function update() {
            if (!isPlaying) return;
            ball.vx += tilt.gamma * 0.02;
            ball.vy += tilt.beta * 0.02;
            ball.vx *= 0.98;
            ball.vy *= 0.98;
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx *= -0.6; }
            else if (ball.x + ball.radius > canvas.width) { ball.x = canvas.width - ball.radius; ball.vx *= -0.6; }
            if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy *= -0.6; }
            else if (ball.y + ball.radius > canvas.height) { ball.y = canvas.height - ball.radius; ball.vy *= -0.6; }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x - 4, ball.y - 4, ball.radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
        }
    </script>
</body>
</html>
