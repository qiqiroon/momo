<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>傾き検知 実験アプリ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #444;
            border: 2px solid #888;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ff8800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #debug {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="startButton">センサーを許可してスタート</button>
        <div id="debug">傾き: 取得待機中...</div>
    </div>

    <canvas id="gameCanvas" width="300" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const debugText = document.getElementById('debug');

        // ボールの状態
        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: 0, // X方向の速度
            vy: 0, // Y方向の速度
            radius: 15,
            color: '#ffaa00'
        };

        // 端末の傾き
        let tilt = { beta: 0, gamma: 0 };
        let isPlaying = false;

        // スタートボタンの処理（iOSの権限取得のため必須）
        startButton.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13以降の処理
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            startGame();
                        } else {
                            alert('センサーの許可が必要です');
                        }
                    })
                    .catch(console.error);
            } else {
                // Androidや古いiOSなどの処理
                window.addEventListener('deviceorientation', handleOrientation);
                startGame();
            }
        });

        function startGame() {
            startButton.style.display = 'none';
            isPlaying = true;
            update(); // 描画ループ開始
        }

        // 傾きデータの取得
        function handleOrientation(event) {
            // gamma: 左右の傾き (-90 から 90)
            // beta: 前後の傾き (-180 から 180)
            tilt.gamma = event.gamma || 0;
            tilt.beta = event.beta || 0;
            
            // デバッグ表示
            debugText.innerText = `X(左右): ${Math.round(tilt.gamma)} / Y(前後): ${Math.round(tilt.beta)}`;
        }

        // メインループ（物理演算と描画）
        function update() {
            if (!isPlaying) return;

            // 1. 加速度の適用（傾きを速度に変換）
            // 数値を調整して転がりの重さを変えられます
            ball.vx += tilt.gamma * 0.02;
            ball.vy += tilt.beta * 0.02;

            // 2. 摩擦の適用（徐々に減速させる）
            ball.vx *= 0.98;
            ball.vy *= 0.98;

            // 3. 位置の更新
            ball.x += ball.vx;
            ball.y += ball.vy;

            // 4. 壁との衝突判定（跳ね返り）
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.6; // 反発係数
            } else if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx *= -0.6;
            }

            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -0.6;
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.vy *= -0.6;
            }

            // 5. 描画
            draw();

            // 次のフレームを要求
            requestAnimationFrame(update);
        }

        function draw() {
            // 背景のクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ボールの描画
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            
            // ボールのハイライト（立体感）
            ctx.beginPath();
            ctx.arc(ball.x - 4, ball.y - 4, ball.radius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
            ctx.closePath();
        }
    </script>
</body>
</html>
