<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MOMO Audio - GitHub Ready</title>
</head>
<body>
    <input type="file" id="audioFile" accept="audio/mp3">
    <button id="playBtn">再生開始</button>
    
    <audio id="mainAudio" crossorigin="anonymous"></audio>

    <script>
        const audioTag = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');

        document.getElementById('audioFile').onchange = (e) => {
            audioTag.src = URL.createObjectURL(e.target.files[0]);
        };

        playBtn.onclick = async () => {
            // 1. AudioContextをユーザー操作で確実に立ち上げる
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            
            // 2. 既存のAudioElementをWeb Audio APIに取り込む
            const source = ctx.createMediaElementSource(audioTag);
            source.connect(ctx.destination);
            
            // 3. 再生を明示的に開始し、Promiseを待つ
            try {
                await audioTag.play();
                console.log("再生開始成功");
            } catch (err) {
                console.error("再生失敗:", err);
                alert("再生を許可してください。");
            }
        };
    </script>
</body>
</html>
