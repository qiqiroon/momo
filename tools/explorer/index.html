<style>
/* =====================================================
   MOMO Explorer v1.01 — スタイルシート
   テーマ: レトロOS風ユーティリティ × モダンクリーン
   ===================================================== */

@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* design-spec-v1_0 標準カラーパレット */
  --bg:          #0a0a0a;
  --surface:     #111111;
  --surface2:    #1a1a1a;

  --orange:      #c2410c;
  --orange-mid:  #ea580c;
  --orange-light:#fb923c;

  --text:        #e5e5e5;
  --text-muted:  #737373;

  --border:      #2a2a2a;
  --border-strong: #444;

  --bg-selected: rgba(194,65,12,0.15);

  /* Explorer固有エイリアス（既存コードとの互換） */
  --bg2:         #0f0f0f;
  --bg3:         #111111;
  --panel:       #111111;
  --panel2:      #1a1a1a;
  --border2:     #444;

  --fg:          var(--text);
  --fg2:         #a3a3a3;
  --fg3:         var(--text-muted);

  --accent:      var(--orange-mid);
  --accent2:     var(--orange-light);
  --accent3:     var(--orange);

  --github-col:  #9ece6a;
  --disk-col:    #c8c8c8;
  --gdrive-col:  #60a5fa;

  --sel:         var(--bg-selected);
  --sel-border:  var(--orange);
  --hover:       var(--surface2);

  --btn-bg:      var(--surface);
  --btn-hover:   var(--surface2);
  --btn-active:  #222;
  --btn-dis:     #0a0a0a;

  --err:         #f87171;
  --warn:        var(--orange-light);
  --ok:          #86efac;

  --radius:      4px;
  --radius2:     6px;
  --mono:        'JetBrains Mono', 'Courier New', monospace;
  --sans:        'Noto Sans JP', sans-serif;

  --header-h:    36px;
  --addr-h:      34px;
  --toolbar-h:   38px;
  --tree-w:      240px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: 13px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── レイアウトシェル ── */
#shell {
  display: grid;
  grid-template-rows: var(--header-h) var(--addr-h) max-content var(--toolbar-h) 1fr;
  height: 100vh;
  width: 100vw;
}

/* ── ヘッダー ── */
#header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  user-select: none;
}
#header .logo {
  font-family: 'Fredoka One', var(--sans);
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.02em;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
#header .logo .logo-cat {
  width: 28px;
  height: 24px;
  flex-shrink: 0;
}
#header .logo .logo-name { color: var(--text); }
#header .logo .logo-name span { color: var(--orange-mid); }
#header .logo .ver {
  color: var(--text-muted);
  font-family: var(--mono);
  font-weight: 400;
  font-size: 10px;
  margin-left: 4px;
}
#header .spacer { flex: 1; }
#pyodide-status {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg3);
  display: flex;
  align-items: center;
  gap: 5px;
}
#pyodide-status .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--fg3);
  transition: background 0.4s;
}
#pyodide-status .dot.loading { background: var(--warn); animation: pulse 1s infinite; }
#pyodide-status .dot.ready   { background: var(--ok); }
#pyodide-status .dot.error   { background: var(--err); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── アドレスバー ── */
#addr-row {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
  position: relative;
}
#addr-icon { font-size: 14px; flex-shrink: 0; }
#addr-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  height: 100%;
  caret-color: var(--accent);
}
#addr-input:focus { color: var(--accent); }
#addr-error {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: var(--err);
  color: #fff;
  font-size: 11px;
  font-family: var(--mono);
  padding: 3px 12px;
  z-index: 100;
  display: none;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }

/* ── ツールバー ── */
#toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 4px;
}
.tb-btn {
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--fg2);
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 10px;
  height: 26px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  white-space: nowrap;
  user-select: none;
}
.tb-btn:hover:not(:disabled) {
  background: var(--btn-hover);
  color: var(--fg);
  border-color: var(--border2);
}
.tb-btn:active:not(:disabled) { background: var(--btn-active); }
.tb-btn:disabled {
  background: var(--btn-dis);
  color: var(--fg3);
  cursor: not-allowed;
  opacity: 0.55;
}
.tb-btn .icon { font-size: 13px; }
.tb-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 2px;
}

/* ── メインエリア ── */
#main {
  display: flex;
  overflow: hidden;
  border-top: 1px solid var(--border);
}

/* ── 左ペイン ── */
#left-pane {
  width: var(--tree-w);
  min-width: 140px;
  max-width: 400px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  position: relative;
}
#left-pane::-webkit-scrollbar { width: 4px; }
#left-pane::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* リサイザー */
#resizer {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
#resizer:hover, #resizer.dragging { background: var(--accent); }

/* ── ツリー ── */
.tree-root { padding: 6px 0; }

.tree-node { user-select: none; }

.tree-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.1s;
  min-height: 24px;
  position: relative;
}
.tree-row:hover { background: var(--hover); }
.tree-row.selected {
  background: var(--sel);
  border-left: 2px solid var(--sel-border);
  padding-left: 6px;
}
.tree-row.backend-root {
  font-weight: 600;
  font-size: 12px;
  padding-top: 5px;
  padding-bottom: 5px;
}

.tree-toggle {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--fg3);
  flex-shrink: 0;
  transition: transform 0.15s;
}
.tree-toggle.open { transform: rotate(90deg); }

.tree-icon { font-size: 14px; flex-shrink: 0; }

.tree-label {
  font-size: 12px;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

/* バックエンドカラー */
.backend-github .tree-label { color: var(--github-col); }
.backend-disk   .tree-label { color: var(--disk-col); }
.backend-gdrive .tree-label { color: var(--gdrive-col); }
.backend-github.selected { border-color: var(--github-col); }
.backend-disk.selected   { border-color: var(--disk-col); }
.backend-gdrive.selected { border-color: var(--gdrive-col); }

.tree-children {
  padding-left: 16px;
  overflow: hidden;
}
.tree-children.collapsed { display: none; }

.conn-badge {
  font-size: 9px;
  font-family: var(--mono);
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: auto;
  flex-shrink: 0;
}
.conn-badge.ok     { background: #1a3a20; color: var(--ok); }
.conn-badge.no     { background: #2a1a1f; color: var(--fg3); }
.conn-badge.busy   { background: #2a2010; color: var(--warn); }

.tree-spinner {
  width: 12px; height: 12px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 右ペイン ── */
#right-pane {
  flex: 1;
  background: var(--bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ファイルリストヘッダ */
#list-header {
  display: grid;
  grid-template-columns: 28px 1fr 70px 70px 130px;
  padding: 4px 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  color: var(--fg3);
  font-size: 11px;
  font-family: var(--mono);
  user-select: none;
  flex-shrink: 0;
}
.list-col { padding: 0 4px; }

/* ファイルリスト */
#file-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
#file-list::-webkit-scrollbar { width: 6px; }
#file-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.file-row {
  display: grid;
  grid-template-columns: 28px 1fr 70px 70px 130px;
  padding: 4px 8px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: background 0.1s;
  align-items: center;
  min-height: 28px;
}
.file-row:hover { background: var(--hover); }
.file-row.selected {
  background: var(--sel);
  border-bottom-color: transparent;
}
.file-row .f-icon { font-size: 15px; }
.file-row .f-name {
  font-size: 12px;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 4px;
  color: var(--fg);
}
/* ファイルは全部白（fg） */
/* フォルダはバックエンドの色に合わせる */
.file-row.folder.backend-github .f-name { color: var(--github-col); }
.file-row.folder.backend-disk   .f-name { color: var(--disk-col); }
.file-row.folder.backend-gdrive .f-name { color: var(--gdrive-col); }
/* 選択時はオレンジ */
.file-row.selected .f-name { color: var(--orange-light) !important; }.file-row .f-type {
  font-size: 11px;
  color: var(--fg3);
  font-family: var(--mono);
  padding: 0 4px;
}
.file-row .f-size {
  font-size: 11px;
  color: var(--fg2);
  font-family: var(--mono);
  text-align: right;
  padding: 0 4px;
}
.file-row .f-date {
  font-size: 11px;
  color: var(--fg3);
  font-family: var(--mono);
  padding: 0 4px;
}
/* フォルダの色はCSSクラスで制御 */

/* ローディング・空状態 */
#list-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--fg3);
  font-family: var(--mono);
  font-size: 12px;
  pointer-events: none;
}
#list-overlay.hidden { display: none; }
.overlay-spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ── モーダル・ダイアログ ── */
#modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  display: none;
}
#modal-bg.show { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 20px 24px;
  min-width: 300px;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: modalIn 0.15s ease-out;
}
@keyframes modalIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:none} }

.modal-title {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-title.warn { color: var(--warn); }
.modal-title.err  { color: var(--err);  }

.modal-body {
  font-size: 12px;
  color: var(--fg2);
  line-height: 1.6;
  margin-bottom: 16px;
  word-break: break-all;
}

.modal-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
  margin-bottom: 14px;
}
.modal-input:focus { border-color: var(--accent); }

.modal-btns {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.modal-btn {
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--fg2);
  font-family: var(--sans);
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.modal-btn:hover { background: var(--btn-hover); color: var(--fg); }
.modal-btn.primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}
.modal-btn.primary:hover { filter: brightness(1.1); }
.modal-btn.danger {
  background: var(--err);
  color: #fff;
  border-color: var(--err);
}
.modal-btn.danger:hover { filter: brightness(1.1); }

/* ── ステータスバー ── */
#statusbar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  height: 22px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg3);
  flex-shrink: 0;
}
#statusbar .sb-item { display: flex; align-items: center; gap: 4px; }
#statusbar .sb-clip {
  color: var(--warn);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── github 読み取り専用バナー ── */
#readonly-banner {
  background: rgba(194,65,12,0.08);
  border-bottom: 1px solid var(--orange);
  padding: 3px 12px;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--orange-light);
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  max-height: 0;
  padding-top: 0;
  padding-bottom: 0;
  border-bottom-width: 0;
  transition: max-height 0.15s, padding 0.15s;
}
#readonly-banner.show {
  max-height: 28px;
  padding-top: 3px;
  padding-bottom: 3px;
  border-bottom-width: 1px;
}

/* ── レート制限警告 ── */
.rate-warn {
  background: rgba(194,65,12,0.08);
  border-top: 1px solid var(--orange);
  padding: 3px 12px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--orange-light);
  display: none;
}
.rate-warn.show { display: block; }

/* ── Pyodide ロード中オーバーレイ ── */
#boot-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.4s;
}
#boot-overlay.hide { opacity: 0; pointer-events: none; }
.boot-logo {
  font-family: 'Fredoka One', var(--sans);
  font-size: 24px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.02em;
}
.boot-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg3);
}
.boot-bar {

<script>
/* =====================================================
   MOMO Explorer v1.01 — メインスクリプト
   ===================================================== */

const VERSION = "1.09";

// ── FSA対応チェック（iOS判定） ────────────────────────
const hasFSA = typeof window.showDirectoryPicker === 'function' ||
               window.showDirectoryPicker != null;

// ── iOS仮想ファイルシステム（webkitdirectory経由） ──────
// hasFSA=false の場合にメモリ上でファイルツリーを保持する
const iosVFS = {
  // { path: File } のマップ。path は "root/sub/file.txt" 形式
  files: {},
  // ルートフォルダ名
  rootName: "",
  // 有効フラグ
  active: false,

  clear() {
    this.files = {};
    this.rootName = "";
    this.active = false;
  },

  // ファイル一覧からツリー構築
  build(fileList) {
    this.files = {};
    if (fileList.length === 0) return;
    // webkitRelativePath: "rootFolder/sub/file.txt"
    this.rootName = fileList[0].webkitRelativePath.split("/")[0] || "disk";
    for (const f of fileList) {
      // rootFolder名を除いた相対パス
      const rel = f.webkitRelativePath.split("/").slice(1).join("/");
      if (rel) this.files[rel] = f;
    }
    this.active = true;
  },

  // 指定パス配下のエントリ一覧を返す（listDir相当）
  listDir(path) {
    const prefix = path ? path.replace(/\/?$/, "/") : "";
    const seen = new Set();
    const items = [];
    for (const rel of Object.keys(this.files)) {
      if (!rel.startsWith(prefix)) continue;
      const rest = rel.slice(prefix.length);
      const parts = rest.split("/");
      const name = parts[0];
      if (!name || seen.has(name)) continue;
      seen.add(name);
      if (parts.length > 1) {
        // ディレクトリ
        items.push({ name, type: "dir", size: 0, modified: null });
      } else {
        const f = this.files[rel];
        items.push({ name, type: "file", size: f.size, modified: new Date(f.lastModified).toISOString() });
      }
    }
    // フォルダ先・名前昇順
    items.sort((a, b) => {
      if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
      return a.name.localeCompare(b.name, "ja");
    });
    return items;
  },

  // ファイルのArrayBufferを返す
  async readBytes(path) {
    const f = this.files[path];
    if (!f) throw new Error(`File not found: ${path}`);
    return await f.arrayBuffer();
  },

  async readText(path, encoding = "utf-8") {
    const buf = await this.readBytes(path);
    return new TextDecoder(encoding).decode(buf);
  },
};

// ── 定数 ──────────────────────────────────────────────
const GITHUB_OWNER  = "qiqiroon";
const GITHUB_REPO   = "momo";
const GITHUB_BRANCH = "main";
const GITHUB_TOP    = "tools/explorer/data";  // エクスプローラに表示するトップフォルダ

// ── 状態 ──────────────────────────────────────────────
const state = {
  currentBackend: null,   // 'github' | 'disk' | 'gdrive'
  currentPath: "",        // バックエンド内の現在パス
  selectedItem: null,     // { name, type, path, backend }
  clipboard: null,        // { item, op: 'copy'|'cut' }
  backends: {
    github: { status: "disconnected", instance: null },
    disk:   { status: "disconnected", instance: null },
    gdrive: { status: "disconnected", instance: null },
  },
  loading: false,
  treeExpanded: { github: false, disk: false, gdrive: false },
  treeNodes: {},   // path -> element
};

// ── PyodideラッパーとPython連携 ──────────────────────
let pyodide = null;
let pyReady = false;

async function bootPyodide() {
  setBootMsg(t('bootCdn'), 10);
  try {
    pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/" });
    setBootMsg(t('bootMicropip'), 40);
    await pyodide.loadPackage("micropip");
    setBootMsg(t('bootGithub'), 65);

    // momo_github をインラインで読み込む（GitHub Pages 上では fetch で取得）
    await loadMomoGithub();

    setBootMsg(t('bootDisk'), 80);
    try {
      await loadMomoDiskBridge();
    } catch(e) {
      console.warn("momo_disk_bridge.js の読み込みに失敗しました:", e);
    }

    setBootMsg(t('bootReady'), 100);
    pyReady = true;

    document.getElementById("py-dot").className   = "dot ready";
    document.getElementById("py-label").textContent = t('pyodideReady');

    setTimeout(() => {
      const ov = document.getElementById("boot-overlay");
      ov.classList.add("hide");
      setTimeout(() => ov.remove(), 400);
    }, 300);

    // GitHub バックエンドを自動初期化
    await initGithubBackend();
    renderTree();
    // renderTree()でDOMが再生成されるため、バッジを再更新
    updateTreeBadge("github");
    updateTreeBadge("disk");
    updateTreeBadge("gdrive");

    // ── 起動時自動再接続 ──
    // disk: IndexedDB にハンドルが残っていれば自動復元
    autoReconnectDisk();
    // gdrive: hint が保存されていればサイレント再認証
    autoReconnectGdrive();

  } catch(e) {
    setBootMsg(t('overlayError') + e.message, 100);
    document.getElementById("py-dot").className   = "dot error";
    document.getElementById("py-label").textContent = t('pyodideErr');
    console.error(e);
  }
}

function setBootMsg(msg, pct) {
  document.getElementById("boot-msg").textContent = msg;
  document.getElementById("boot-bar").style.width = pct + "%";
}

async function loadMomoDiskBridge() {
  const urls = [
    "../../lib/momo_disk/momo_disk_bridge.js",
    "https://qiqiroon.github.io/momo/lib/momo_disk/momo_disk_bridge.js",
  ];
  for (const url of urls) {
    try {
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = url;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
      return;
    } catch {
      console.warn(`momo_disk_bridge.js: ${url} の読み込み失敗、次を試みます`);
    }
  }
  throw new Error("momo_disk_bridge.js をどのURLからも読み込めませんでした");
}

async function loadMomoGithub() {
  const urls = [
    "../../lib/momo_github/momo_github.py",
    "https://qiqiroon.github.io/momo/lib/momo_github/momo_github.py",
  ];
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (r.ok) {
        await pyodide.runPythonAsync(await r.text());
        return;
      }
    } catch {
      console.warn(`momo_github.py: ${url} の読み込み失敗、次を試みます`);
    }
  }
  console.warn("momo_github.py をどのURLからも取得できませんでした。スタブを使用します");
  await pyodide.runPythonAsync(getMomoGithubStub());
}

// ライブラリが取得できない環境向けスタブ（最小実装）
function getMomoGithubStub() {
  return `
import json, time
from datetime import datetime, timezone

class MomoGitHub:
    VERSION = "1.00-stub"
    def __init__(self, owner, repo, branch="main", base_path="", cache_ttl=600):
        self.owner = owner; self.repo = repo; self.branch = branch
        self.base_path = base_path.strip("/"); self.cache_ttl = cache_ttl
        self.current_path = ""; self.cache = {}
        self._raw_base = f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}"
        self._api_base = f"https://api.github.com/repos/{owner}/{repo}/contents"
    @property
    def breadcrumb(self):
        parts = [p for p in [self.base_path, self.current_path] if p]
        return " > ".join(parts)
    @property
    def full_current_path(self):
        segs = [s for s in [self.base_path, self.current_path] if s]
        return "/".join(segs)
    async def list_dir(self, path=None, use_cache=True):
        if path is None: path = self.current_path
        segs = [s for s in [self.base_path, self.current_path, path] if s]
        # deduplicate
        if path == self.current_path:
            segs = [s for s in [self.base_path, self.current_path] if s]
        full = "/".join(segs)
        url = f"{self._api_base}/{full}?ref={self.branch}" if full else f"{self._api_base}?ref={self.branch}"
        if use_cache and url in self.cache:
            ts, items, cat = self.cache[url]
            if time.monotonic()-ts < self.cache_ttl:
                return list(items)+[{"_cached":True,"_cached_at":cat,"_rate_limit":{}}]
        from pyodide.http import pyfetch
        r = await pyfetch(url)
        data = await r.json()
        if not isinstance(data, list): raise FileNotFoundError(full)
        items = sorted([{"name":i["name"],"type":"dir" if i["type"]=="dir" else "file","size":i.get("size",0),"download_url":i.get("download_url")} for i in data], key=lambda x:(0 if x["type"]=="dir" else 1,x["name"].lower()))
        self.cache[url]=(time.monotonic(),items,datetime.now(tz=timezone.utc).isoformat())
        return list(items)+[{"_cached":False,"_cached_at":None,"_rate_limit":{}}]
    async def navigate(self, path):
        if path=="..":
            parts=[p for p in self.current_path.split("/") if p]
            if not parts: raise ValueError("Cannot navigate above base_path")
            self.current_path="/".join(parts[:-1])
        elif path.startswith("/"):
            self.current_path=path.lstrip("/")
        else:
            self.current_path=("/".join([p for p in [self.current_path,path] if p])).strip("/")
    async def read_text(self, path, encoding="utf-8"):
        segs=[s for s in [self.base_path,self.current_path,path] if s]
        url=f"{self._raw_base}/{'/'.join(segs)}"
        from pyodide.http import pyfetch
        r=await pyfetch(url)
        if r.status==404: raise FileNotFoundError(path)
        return await r.string()
    async def read_bytes(self, path):
        return (await self.read_text(path)).encode()
    async def read_json(self, path):
        return json.loads(await self.read_text(path))
    async def exists(self, path):
        try: await self.read_text(path); return True
        except: return False
    async def refresh(self, path=None):
        if path is None: self.cache.clear()
    def write_text(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
    def write_bytes(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
    def delete(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
    def mkdir(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
`;
}

// ── バックエンド初期化 ─────────────────────────────────
async function fetchLibSource(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch failed: ${url} (${r.status})`);
  return await r.text();
}

async function initDiskBackend() {
  // iOSフォールバック: showDirectoryPicker非対応でもwebkitdirectory経由で利用可能
  if (!hasFSA) {
    state.backends.disk.status = "ready";
    state.backends.disk.instance = true;
    state.backends.disk.iosMode = true;  // iOSフォールバックフラグ
    updateTreeBadge("disk");
    return;
  }
  state.backends.disk.status = "connecting";
  updateTreeBadge("disk");
  try {
    const urls = [
      "../../lib/momo_disk/momo_disk.py",
      "https://qiqiroon.github.io/momo/lib/momo_disk/momo_disk.py",
    ];
    let diskSrc = null;
    for (const url of urls) {
      try { diskSrc = await fetchLibSource(url); break; }
      catch { console.warn(`momo_disk.py: ${url} の読み込み失敗、次を試みます`); }
    }
    if (!diskSrc) throw new Error("momo_disk.py をどのURLからも読み込めませんでした");
    await pyodide.runPythonAsync(diskSrc);
    await pyodide.runPythonAsync(`_disk = MomoDisk()`);
    state.backends.disk.status = "ready";
    state.backends.disk.instance = true;
  } catch(e) {
    state.backends.disk.status = "error";
    console.error("Disk init error:", e);
  }
  updateTreeBadge("disk");
}

async function expandDiskTree() {
  if (!state.backends.disk.instance) {
    await initDiskBackend();
  }
  if (state.backends.disk.status === "error") {
    const msg = state.backends.disk.iosUnsupported
      ? t('diskIosUnsupported')
      : t('modalDiskInitErr');
    await showModal({ title: t('modalDiskErrTitle'), titleClass:"err",
      body: msg,
      buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
    return;
  }

  // ── iOSフォールバックモード ──
  if (state.backends.disk.iosMode) {
    // 既に接続済みならツリー展開のみ
    if (state.backends.disk.status === "connected") {
      state.treeExpanded.disk = true;
      document.getElementById("toggle-disk").classList.add("open");
      document.getElementById("tree-children-disk").classList.remove("collapsed");
      await navigateTo("disk", "");
      return;
    }
    // webkitdirectory inputを起動
    await openIosFolderPicker();
    return;
  }

  // 既に接続済みならツリー展開と右ペイン表示のみ（open_root は呼ばない）
  if (state.backends.disk.status === "connected") {
    state.treeExpanded.disk = true;
    document.getElementById("toggle-disk").classList.add("open");
    document.getElementById("tree-children-disk").classList.remove("collapsed");
    await navigateTo("disk", "");
    return;
  }

  state.backends.disk.status = "connecting";
  updateTreeBadge("disk");
  try {
    const restored = await pyodide.runPythonAsync(`
import json as _j
_result = await _disk.open_root()
_j.dumps({"restored": bool(_result), "root_name": _disk.root_name})
`);
    const info = JSON.parse(restored);
    state.backends.disk.status = "connected";
    state.backends.disk.rootName = info.root_name;
    updateTreeBadge("disk");
    updateDiskStatusBar();

    state.treeExpanded.disk = true;
    document.getElementById("toggle-disk").classList.add("open");
    const container = document.getElementById("tree-children-disk");
    container.classList.remove("collapsed");

    showToast(info.restored
      ? `💾 「${info.root_name}」${t('toastDiskRestored')}`
      : `💾 「${info.root_name}」${t('toastDiskSelected')}`
    );

    await navigateTo("disk", "");
    await loadDiskTreeChildren(container, "", 1);

  } catch(e) {
    state.backends.disk.status = "error";
    updateTreeBadge("disk");
    await showModal({ title: t('modalDiskErrTitle'), titleClass:"err",
      body: t('modalDiskConnErr') + e.message,
      buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
  }
}

// ── iOSフォールバック: webkitdirectoryでフォルダ選択 ──
function openIosFolderPicker() {
  return new Promise((resolve) => {
    const input = document.getElementById("ios-folder-input");

    // 前回のリスナーをクリーンアップするためにinputを複製し直す
    const newInput = input.cloneNode(true);
    input.parentNode.replaceChild(newInput, input);

    let settled = false;
    const settle = () => { settled = true; };

    const onChange = async (e) => {
      if (settled) return;
      settle();
      const files = Array.from(e.target.files || []);
      if (files.length === 0) { resolve(); return; }

      setLoading(true);
      try {
        iosVFS.build(files);
        state.backends.disk.status = "connected";
        state.backends.disk.rootName = iosVFS.rootName;
        updateTreeBadge("disk");
        updateDiskStatusBar();

        state.treeExpanded.disk = true;
        document.getElementById("toggle-disk").classList.add("open");
        const container = document.getElementById("tree-children-disk");
        container.classList.remove("collapsed");

        showToast(`💾 「${iosVFS.rootName}」${t('toastDiskSelected')} ${t('iosReadOnly')}`);
        await navigateTo("disk", "");
        await loadDiskTreeChildren(container, "", 1);
      } finally {
        setLoading(false);
        resolve();
      }
    };

    // iOSではchangeが発火しないキャンセルの検出:
    // focusが戻ってから少し待ち、changeが来ていなければキャンセルと判断
    const onFocus = () => {
      // 500msではiOSで遅すぎる場合があるので、changeを先に待ちつつ監視
      setTimeout(() => {
        if (!settled) {
          settle();
          resolve();
        }
      }, 1000);
    };

    newInput.addEventListener("change", onChange);
    window.addEventListener("focus", onFocus, { once: true });
    // iOSではclick()の直接呼び出しが効かない場合があるため少し遅延
    setTimeout(() => newInput.click(), 100);
  });
}

async function loadDiskTreeChildren(container, path, depth) {
  container.innerHTML = `<div class="tree-row"><div class="tree-spinner"></div></div>`;
  try {
    const items = await listDir("disk", path);
    container.innerHTML = "";
    const folders = items.filter(i => i.type === "dir");
    if (folders.length === 0) {
      container.innerHTML = `<div class="tree-row" style="color:var(--fg3);font-size:11px;font-family:var(--mono);padding-left:${8+depth*14}px">${t('treeEmpty')}</div>`;
      return;
    }
    for (const f of folders) {
      const childPath = path ? `${path}/${f.name}` : f.name;
      const node = buildTreeFolderNode("disk", f.name, childPath, depth);
      container.appendChild(node);
    }
  } catch(e) {
    container.innerHTML = `<div class="tree-row" style="color:var(--err);font-size:11px;padding-left:${8+depth*14}px">${t('overlayError')}${escHtml(e.message)}</div>`;
  }
}

// ── ツリー描画 ────────────────────────────────────────
function renderTree() {
  const root = document.getElementById("tree-root");
  root.innerHTML = "";

  const backends = [
    { id: "github", icon: "🐙", label: "github",  col: "var(--github-col)" },
    { id: "disk",   icon: "💾", label: "disk",     col: "var(--disk-col)"   },
    { id: "gdrive", icon: "📱", label: "gdrive",   col: "var(--gdrive-col)" },
  ];

  for (const b of backends) {
    const node = buildBackendNode(b);
    root.appendChild(node);
  }
}

function buildBackendNode(b) {
  const wrap = document.createElement("div");
  wrap.className = `tree-node backend-node`;
  wrap.dataset.backend = b.id;

  const row = document.createElement("div");
  row.className = `tree-row backend-root backend-${b.id}`;
  row.id = `tree-root-${b.id}`;
  row.innerHTML = `
    <span class="tree-toggle" id="toggle-${b.id}">▶</span>
    <span class="tree-icon">${b.icon}</span>
    <span class="tree-label">${b.label}</span>
    <span class="conn-badge no" id="badge-${b.id}">${t('badgeNo')}</span>
  `;
  row.addEventListener("click", () => onBackendRootClick(b.id));

  const children = document.createElement("div");
  children.className = "tree-children collapsed";
  children.id = `tree-children-${b.id}`;

  wrap.appendChild(row);
  wrap.appendChild(children);
  return wrap;
}

function updateTreeBadge(backendId) {
  const badge = document.getElementById(`badge-${backendId}`);
  if (!badge) return;
  const status = state.backends[backendId].status;
  badge.className = "conn-badge";
  if (status === "connected") {
    // iOSフォールバック時は「読取専用」バッジ
    if (backendId === "disk" && state.backends.disk.iosMode) {
      badge.className += " busy";
      badge.textContent = t('iosDiskBadge');
    } else {
      badge.className += " ok";
      badge.textContent = t('badgeOk');
    }
  }
  else if (status === "connecting") { badge.className += " busy"; badge.textContent = t('badgeConnecting'); }
  else if (status === "error")      { badge.className += " no"; badge.textContent = t('badgeError'); }
  else                              { badge.className += " no"; badge.textContent = t('badgeNo'); }
}

async function onBackendRootClick(backendId) {
  const expanded = state.treeExpanded[backendId];
  const connected = state.backends[backendId].status === "connected";

  if (expanded) {
    if (state.currentBackend !== backendId && connected) {
      // 別バックエンドから来た → 右ペインをこのバックエンドに切り替え（折りたたまない）
      await navigateTo(backendId, "");
    } else {
      // 同じバックエンドを再クリック → 折りたたむ
      state.treeExpanded[backendId] = false;
      document.getElementById(`toggle-${backendId}`).classList.remove("open");
      document.getElementById(`tree-children-${backendId}`).classList.add("collapsed");
    }
    return;
  }

  // 未展開 → 展開処理（内部で navigateTo も呼ぶ）
  if (backendId === "github") {
    await expandGithubTree();
  } else if (backendId === "disk") {
    await expandDiskTree();
  } else if (backendId === "gdrive") {
    await expandGdriveTree();
  }
}

async function initGdriveBackend() {
  state.backends.gdrive.status = "connecting";
  updateTreeBadge("gdrive");
  try {
    const urls = [
      "../../lib/momo_gdrive/momo_gdrive.py",
      "https://qiqiroon.github.io/momo/lib/momo_gdrive/momo_gdrive.py",
    ];
    let gdriveSrc = null;
    for (const url of urls) {
      try { gdriveSrc = await fetchLibSource(url); break; }
      catch { console.warn(`momo_gdrive.py: ${url} の読み込み失敗、次を試みます`); }
    }
    if (!gdriveSrc) throw new Error("momo_gdrive.py をどのURLからも読み込めませんでした");
    await pyodide.runPythonAsync(gdriveSrc);
    await pyodide.runPythonAsync(`_gdrive = MomoGDrive()`);
    state.backends.gdrive.status = "ready";
    state.backends.gdrive.instance = true;
  } catch(e) {
    state.backends.gdrive.status = "error";
    console.error("GDrive init error:", e);
  }
  updateTreeBadge("gdrive");
}

// ── 起動時自動再接続: disk ────────────────────────────
async function autoReconnectDisk() {
  // iOSはIndexedDB復元不可（webkitdirectory経由のみ）
  if (!hasFSA) return;
  try {
    await initDiskBackend();
    if (state.backends.disk.status !== "ready") return;

    // IndexedDB にハンドルが保存されているか確認（ダイアログを出さない）
    // Pyodide は最後の式の値を返すので、必ず最後に _j.dumps(...) を「式」として置く
    const restored = await pyodide.runPythonAsync(`
import json as _j
_auto_result = {"ok": False, "reason": "not_started"}
try:
    from js import window as _win
    _bridge_obj = _win.MomoDiskBridge
    if _bridge_obj is None:
        _auto_result = {"ok": False, "reason": "bridge_not_found"}
    else:
        _cached = await _bridge_obj.restoreRoot()
        if _cached is None:
            _auto_result = {"ok": False, "reason": "no_saved"}
        else:
            _granted = await _bridge_obj.requestPermission(_cached)
            if not _granted:
                _auto_result = {"ok": False, "reason": "permission_denied"}
            else:
                _disk.root_handle    = _cached
                _disk.root_name      = str(_cached.name)
                _disk.current_path   = "/"
                _disk.current_handle = _cached
                _disk.cache.clear()
                _auto_result = {"ok": True, "root_name": str(_cached.name)}
except Exception as _e:
    _auto_result = {"ok": False, "reason": str(_e)}
_j.dumps(_auto_result)
`);
    const info = JSON.parse(restored);
    if (!info.ok) {
      console.log("Disk auto-reconnect skipped:", info.reason);
      state.backends.disk.status = "ready";
      updateTreeBadge("disk");
      return;
    }
    state.backends.disk.status = "connected";
    state.backends.disk.rootName = info.root_name;
    updateTreeBadge("disk");
    updateDiskStatusBar();

    state.treeExpanded.disk = true;
    document.getElementById("toggle-disk").classList.add("open");
    const container = document.getElementById("tree-children-disk");
    container.classList.remove("collapsed");
    showToast(`💾 「${info.root_name}」${t('toastDiskRestored')}`);
    await navigateTo("disk", "");
    await loadDiskTreeChildren(container, "", 1);
  } catch(e) {
    console.warn("Disk auto-reconnect failed:", e);
    // 失敗してもdiskは手動接続できる状態に戻す
    if (state.backends.disk.status !== "connected") {
      state.backends.disk.status = "ready";
      updateTreeBadge("disk");
    }
  }
}

// ── 起動時自動再接続: gdrive ──────────────────────────
async function autoReconnectGdrive() {
  const savedHint = localStorage.getItem('momoGdriveHint');
  if (!savedHint) return;
  try {
    // GIS の読み込みを待つ（最大4秒）
    let retries = 20;
    while (typeof google === "undefined" && retries-- > 0) {
      await new Promise(r => setTimeout(r, 200));
    }
    if (typeof google === "undefined") return;

    await initGdriveBackend();
    if (state.backends.gdrive.status !== "ready") return;

    // サイレント再認証（タイムアウト8秒、ユーザー操作なし）
    await pyodide.runPythonAsync(
      `await _gdrive.connect(hint=${JSON.stringify(savedHint)}, prompt="none")`
    );

    state.backends.gdrive.status = "connected";
    updateTreeBadge("gdrive");

    // ツリーを展開して右ペインを表示
    state.treeExpanded.gdrive = true;
    document.getElementById("toggle-gdrive").classList.add("open");
    const container = document.getElementById("tree-children-gdrive");
    container.classList.remove("collapsed");
    showToast(t('toastGdrive'));
    await navigateTo("gdrive", "");
    await loadGdriveTreeChildren(container, "", 1);
  } catch(e) {
    // サイレント再認証失敗はエラー表示しない（次回手動接続で対応）
    console.warn("GDrive auto-reconnect failed:", e);
    state.backends.gdrive.status = "disconnected";
    updateTreeBadge("gdrive");
  }
}

async function expandGdriveTree() {
  if (!state.backends.gdrive.instance) await initGdriveBackend();
  if (state.backends.gdrive.status === "error") {
    await showModal({ title: t('modalDiskErrTitle'), titleClass:"err",
      body: t('modalGdriveInitErr'),
      buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
    return;
  }

  // 既に接続済みならツリー展開のみ
  if (state.backends.gdrive.status === "connected") {
    state.treeExpanded.gdrive = true;
    document.getElementById("toggle-gdrive").classList.add("open");
    document.getElementById("tree-children-gdrive").classList.remove("collapsed");
    await navigateTo("gdrive", "");
    return;
  }

  state.backends.gdrive.status = "connecting";
  updateTreeBadge("gdrive");
  try {
    // Google Identity Services の読み込みを待つ
    let retries = 20;
    while (typeof google === "undefined" && retries-- > 0) {
      await new Promise(r => setTimeout(r, 200));
    }
    if (typeof google === "undefined") {
      throw new Error(t('modalGdriveGISErr'));
    }

    // 保存済みhint（email）でサイレント再認証を試みる
    let connected = false;
    const savedHint = localStorage.getItem('momoGdriveHint');
    if (savedHint) {
      try {
        await pyodide.runPythonAsync(
          `await _gdrive.connect(hint=${JSON.stringify(savedHint)}, prompt="none")`
        );
        connected = true;
      } catch(e) {
        // サイレント認証失敗（ユーザーが権限を取り消した等）→ 通常フローへ
        console.warn("GDrive silent re-auth failed, re-authenticating:", e);
      }
    }

    if (!connected) {
      // 通常のOAuth2認証フロー（ユーザー操作あり）
      await pyodide.runPythonAsync(`await _gdrive.connect()`);
      // 認証成功したアカウントのemailをhintとして保存（次回サイレント認証に使用）
      // tokeninfo エンドポイントはトークン自体の情報を返す（スコープ不問）
      try {
        const emailJson = await pyodide.runPythonAsync(`
import json as _j
_email_result = ""
try:
    _tok = _gdrive._token
    if _tok:
        _tinfo = await _gdrive._fetch(
            f"https://www.googleapis.com/oauth2/v3/tokeninfo?access_token={_tok}"
        )
        _email_result = _tinfo.get("email", "")
except:
    pass
_j.dumps(_email_result)
`);
        const email = JSON.parse(emailJson);
        if (email) {
          localStorage.setItem('momoGdriveHint', email);
        }
      } catch(e) { /* email取得失敗は無視 */ }
    }

    state.backends.gdrive.status = "connected";
    updateTreeBadge("gdrive");
    state.treeExpanded.gdrive = true;
    document.getElementById("toggle-gdrive").classList.add("open");
    const container = document.getElementById("tree-children-gdrive");
    container.classList.remove("collapsed");
    showToast(t('toastGdrive'));
    // ルートを右ペインに表示
    await navigateTo("gdrive", "");
    await loadGdriveTreeChildren(container, "", 1);
  } catch(e) {
    state.backends.gdrive.status = "error";
    updateTreeBadge("gdrive");
    await showModal({ title: t('modalDiskErrTitle'), titleClass:"err",
      body: t('modalGdriveConnErr') + e.message,
      buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
  }
}

async function loadGdriveTreeChildren(container, path, depth) {
  container.innerHTML = `<div class="tree-row"><div class="tree-spinner"></div></div>`;
  try {
    const items = await listDir("gdrive", path);
    container.innerHTML = "";
    const folders = items.filter(i => i.type === "dir");
    if (folders.length === 0) {
      container.innerHTML = `<div class="tree-row" style="color:var(--fg3);font-size:11px;font-family:var(--mono);padding-left:${8+depth*14}px">${t('treeEmpty')}</div>`;
      return;
    }
    for (const f of folders) {
      container.appendChild(buildTreeFolderNode("gdrive", f.name, path ? `${path}/${f.name}` : f.name, depth));
    }
  } catch(e) {
    container.innerHTML = `<div class="tree-row" style="color:var(--err);font-size:11px;padding-left:${8+depth*14}px">${t('overlayError')}${escHtml(e.message)}</div>`;
  }
}

  if (state.backends.github.status !== "connected") {
    await initGithubBackend();
  }
  if (state.backends.github.status !== "connected") {
    await showModal({
      title: t('modalGithubConnTitle'),
      titleClass: "err",
      body: t('modalGithubConnErr'),
      buttons: [{ label: t('modalOk'), cls: "primary", resolve: true }],
    });
    return;
  }

  state.treeExpanded.github = true;
  document.getElementById("toggle-github").classList.add("open");
  const container = document.getElementById("tree-children-github");
  container.classList.remove("collapsed");
  container.innerHTML = `<div class="tree-row"><div class="tree-spinner"></div><span style="color:var(--fg3);font-size:11px;font-family:var(--mono)">${t('treeLoading')}</span></div>`;

  try {
    const items = await listDir("github", "");
    container.innerHTML = "";
    const folders = items.filter(i => i.type === "dir");

    // サブフォルダの有無にかかわらず、ルート自体を右ペインに表示

    if (folders.length === 0) {
      container.innerHTML = `<div class="tree-row" style="color:var(--fg3);font-size:11px;font-family:var(--mono);padding-left:22px">${t('treeSubNone')}</div>`;
    }

      const node = buildTreeFolderNode("github", f.name, f.name, 1);
      container.appendChild(node);
    }
  } catch(e) {
    container.innerHTML = `<div class="tree-row" style="color:var(--err);font-size:11px;font-family:var(--mono)">${t('overlayError')}${escHtml(e.message)}</div>`;
  }
}

function buildTreeFolderNode(backend, name, path, depth) {
  const wrap = document.createElement("div");
  wrap.className = "tree-node";

  const row = document.createElement("div");
  row.className = `tree-row backend-${backend}`;
  row.style.paddingLeft = (8 + depth * 14) + "px";
  row.innerHTML = `
    <span class="tree-toggle" data-expanded="false">▶</span>
    <span class="tree-icon">📁</span>
    <span class="tree-label">${escHtml(name)}</span>
  `;

  row.addEventListener("click", async (e) => {
    e.stopPropagation();
    // フォルダ選択 → 右ペイン更新
    selectTreeRow(row);
    await navigateTo(backend, path);

    // 子展開トグル
    const toggle = row.querySelector(".tree-toggle");
    const isExp = toggle.dataset.expanded === "true";
    if (isExp) {
      toggle.dataset.expanded = "false";
      toggle.classList.remove("open");
      if (wrap.childrenContainer) wrap.childrenContainer.classList.add("collapsed");
    } else {
      toggle.dataset.expanded = "true";
      toggle.classList.add("open");
      await expandTreeNode(wrap, backend, path, depth);
    }
  });

  wrap.appendChild(row);
  wrap._row = row;
  return wrap;
}

async function expandTreeNode(wrap, backend, path, depth) {
  if (wrap.childrenContainer) {
    wrap.childrenContainer.classList.remove("collapsed");
    return;
  }
  const container = document.createElement("div");
  container.className = "tree-children";
  container.innerHTML = `<div class="tree-row" style="padding-left:${8+(depth+1)*14}px"><div class="tree-spinner"></div></div>`;
  wrap.appendChild(container);
  wrap.childrenContainer = container;

  try {
    const items = await listDir(backend, path);
    container.innerHTML = "";
    const folders = items.filter(i => i.type === "dir");
    if (folders.length === 0) {
      container.innerHTML = `<div class="tree-row" style="padding-left:${8+(depth+1)*14}px;color:var(--fg3);font-size:11px;font-family:var(--mono)">${t('treeEmpty')}</div>`;
    }
    for (const f of folders) {
      const childPath = path ? `${path}/${f.name}` : f.name;
      const node = buildTreeFolderNode(backend, f.name, childPath, depth + 1);
      container.appendChild(node);
    }
  } catch(e) {
    container.innerHTML = `<div class="tree-row" style="padding-left:${8+(depth+1)*14}px;color:var(--err);font-size:11px;font-family:var(--mono)">${t('overlayError')}</div>`;
  }
}

let selectedTreeRow = null;
function selectTreeRow(row) {
  if (selectedTreeRow) selectedTreeRow.classList.remove("selected");
  selectedTreeRow = row;
  row.classList.add("selected");
}

// ── ナビゲーション ────────────────────────────────────
async function navigateTo(backend, path) {
  setLoading(true);
  state.currentBackend = backend;
  state.currentPath    = path;
  state.selectedItem   = null;
  updateAddrBar();
  updateToolbar();
  updateReadonlyBanner();

  const addrErr = document.getElementById("addr-error");
  addrErr.style.display = "none";

  try {
    const items = await listDir(backend, path);
    renderFileList(items, backend, path);
  } catch(e) {
    renderError(e.message);
  } finally {
    setLoading(false);
  }
}

// ── バックエンド別 listDir ───────────────────────────
async function listDir(backend, path) {
  if (backend === "github") return await listDirGithub(path);
  if (backend === "disk")   return await listDirDisk(path);
  if (backend === "gdrive") return await listDirGdrive(path);
  return [];
}

async function listDirGdrive(path) {
  if (!pyReady) throw new Error("Pyodide が初期化されていません");
  const safePath = (path || "").replace(/'/g, "\'");
  const result = await pyodide.runPythonAsync(`
import json as _json
_path_arg = '${safePath}' if '${safePath}' else None
_raw = await _gdrive.list_dir(path=_path_arg, use_cache=True)
def _fmt(item):
    d = dict(item)
    d['type'] = 'dir' if d.get('isFolder') else 'file'
    d['name'] = d.get('name', '')
    d['size'] = d.get('size', 0) or 0
    mt = d.get('modifiedTime')
    d['modified'] = str(mt) if mt else None
    return d
_json.dumps([_fmt(i) for i in _raw])
`);
  return JSON.parse(result);
}


async function listDirDisk(path) {
  // iOSフォールバック: VFSから返す
  if (state.backends.disk.iosMode && iosVFS.active) {
    return iosVFS.listDir(path || "");
  }
  if (!pyReady) throw new Error("Pyodide が初期化されていません");
  const safePath = (path || "/").replace(/'/g, "\\'");
  const result = await pyodide.runPythonAsync(`
import json as _json
_items = await _disk.list_dir(path='${safePath}', use_cache=True)
_json.dumps([dict(i) for i in _items])
`);
  return JSON.parse(result);
}

async function listDirGithub(path) {
  if (!pyReady) throw new Error("Pyodide が初期化されていません");

  const safePath = (path || "").replace(/'/g, "\\'");
  const result = await pyodide.runPythonAsync(`
import json as _json
_items = await _gh.list_dir(path='${safePath}', use_cache=True)
_meta = None
_plain = []
for _it in _items:
    if '_cached' in _it:
        _meta = dict(_it)
    else:
        _plain.append(_it)
_json.dumps({"items": _plain, "meta": _meta})
`);
  const data = JSON.parse(result);

  // レート制限警告
  if (data.meta && data.meta._rate_limit && data.meta._rate_limit.low_rate) {
    const rw = document.getElementById("rate-warn");
    const rem = data.meta._rate_limit.remaining;
    const resetAt = data.meta._rate_limit.reset_at || t('rateWarnUnknown');
    rw.textContent = t('rateWarnMsg').replace('{rem}', rem).replace('{reset}', resetAt);
    rw.classList.add("show");
  } else {
    document.getElementById("rate-warn").classList.remove("show");
  }

  return data.items;
}

// ── 右ペイン描画 ──────────────────────────────────────
function renderFileList(items, backend, basePath) {
  const list = document.getElementById("file-list");
  const overlay = document.getElementById("list-overlay");

  list.innerHTML = "";

  if (items.length === 0) {
    overlay.classList.remove("hidden");
    document.getElementById("list-spinner").style.display = "none";
    document.getElementById("overlay-msg").textContent = t('overlayEmpty');
    document.getElementById("sb-items").textContent = "0" + t('sbItems');
    return;
  }

  overlay.classList.add("hidden");

  // フォルダ先・ファイル後で既にソート済みと想定
  for (const item of items) {
    const row = document.createElement("div");
    const isDir = item.type === "dir";
    row.className = "file-row" + (isDir ? " folder backend-" + backend : "");
    row.dataset.name = item.name;
    row.dataset.type = item.type;

    const icon = isDir ? "📁" : getFileIcon(item.name);
    const sizeStr = isDir ? "—" : formatSize(item.size || 0);
    const dateStr = item.modified ? formatDate(item.modified) : "—";
    const typeStr = isDir ? t('typeFolder') : getExt(item.name);

    row.innerHTML = `
      <div class="f-icon">${icon}</div>
      <div class="f-name" title="${escHtml(item.name)}">${escHtml(item.name)}</div>
      <div class="f-type">${typeStr}</div>
      <div class="f-size">${sizeStr}</div>
      <div class="f-date">${dateStr}</div>
    `;

    row.addEventListener("click", () => onFileRowClick(row, item, backend, basePath));
    list.appendChild(row);
  }

  document.getElementById("sb-items").textContent = `${items.length}${t('sbItems')}`;
}

function onFileRowClick(row, item, backend, basePath) {
  const allRows = document.querySelectorAll(".file-row");
  const already = row.classList.contains("selected");

  allRows.forEach(r => r.classList.remove("selected"));

  if (already) {
    // 再クリック → 選択解除
    state.selectedItem = null;
  } else {
    row.classList.add("selected");
    const itemPath = basePath ? `${basePath}/${item.name}` : item.name;
    state.selectedItem = { name: item.name, type: item.type, path: itemPath, backend };
  }
  updateToolbar();
}

function renderError(msg) {
  const overlay = document.getElementById("list-overlay");
  overlay.classList.remove("hidden");
  document.getElementById("list-spinner").style.display = "none";
  document.getElementById("overlay-msg").textContent = t('overlayError') + msg;
  document.getElementById("file-list").innerHTML = "";
}

  const isGithub = state.currentBackend === "github";

  document.getElementById("btn-copy").disabled   = !hasSelection || busy;
  document.getElementById("btn-cut").disabled    = !hasSelection || selIsGithub || isGithub || busy || iosSel;
  document.getElementById("btn-paste").disabled  = !clip || isGithub || busy || iosDisk;

  document.getElementById("btn-refresh").disabled = !state.currentBackend || busy;

  if (state.backends.disk.status === "connected") {
    diskRootBtn.style.display = "";

    diskRootBtn.style.display = "none";
  }

  } else {
    gdriveDisconnBtn.style.display = "none";

// ── クロスバックエンド再帰フォルダコピー ─────────────────
// srcBack/dstBack: 'disk' | 'gdrive' | 'github'
// srcPath/dstPath: バックエンド内のパス文字列
async function copyFolderCrossBackend(srcBack, srcPath, dstBack, dstPath) {
  // 1. コピー先フォルダを作成
  if (dstBack === "disk") {
    const sp = dstPath.replace(/'/g, "\\'");
    await pyodide.runPythonAsync(`await _disk.mkdir('${sp}')`);
  } else if (dstBack === "gdrive") {
    const sp = dstPath.replace(/'/g, "\\'");
    await pyodide.runPythonAsync(`await _gdrive.mkdir('${sp}')`);
  }

  // 2. ソースフォルダの内容を列挙
  const items = await listDir(srcBack, srcPath);

  // 3. 各アイテムを再帰的にコピー
  for (const item of items) {
    const childSrc = srcPath ? `${srcPath}/${item.name}` : item.name;
    const childDst = dstPath ? `${dstPath}/${item.name}` : item.name;
    if (item.type === "dir") {
      await copyFolderCrossBackend(srcBack, childSrc, dstBack, childDst);
    } else {
      // ファイル: バイト列をread→write
      const ss = childSrc.replace(/'/g, "\\'");
      const ds = childDst.replace(/'/g, "\\'");
      await pyodide.runPythonAsync(`
_data = await ${srcBack === "disk" ? "_disk" : srcBack === "gdrive" ? "_gdrive" : "_gh"}.read_bytes('${ss}')
await ${dstBack === "disk" ? "_disk" : "_gdrive"}.write_bytes('${ds}', _data)
`);
    }
  }
}

// ── フォルダ再帰削除（disk/gdrive共通） ─────────────────
async function deleteFolderRecursive(backend, path) {
  const safe = path.replace(/'/g, "\\'");
  if (backend === "disk") {
    await pyodide.runPythonAsync(`await _disk.delete('${safe}', force=True)`);
  } else if (backend === "gdrive") {
    // gdrive の delete はフォルダごと（trash=True）
    await pyodide.runPythonAsync(`await _gdrive.delete('${safe}')`);
  }
}

// ── アドレスバー直接入力 ──────────────────────────────
document.getElementById("addr-input").addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;
  const val = e.target.value.trim();
  const err = document.getElementById("addr-error");
  err.style.display = "none";

  if (!val) return;

  const parts = val.split("/");
  const backend = parts[0].toLowerCase();
  const path = parts.slice(1).join("/");

  if (!["github", "disk", "gdrive"].includes(backend)) {
    showAddrError(t('addrErrInvalid'));
    return;
  }

  if (backend === "gdrive") {
    showAddrError(t('addrErrGdrive'));
    return;
  }
  if (backend === "disk") {
    if (state.backends.disk.status !== "connected") {
      showAddrError(t('addrErrDiskNC'));
      return;
    }
    try {
      setLoading(true);
      await navigateTo("disk", path);
      syncTreeHighlight("disk", path);
    } catch(ex) {
      showAddrError(t('addrErrNotFound') + ex.message);
      setLoading(false);
    }
    return;
  }

  // github の場合、存在確認してから移動
  try {
    setLoading(true);
    await navigateTo(backend, path);
    // ツリー側のハイライトも同期
    syncTreeHighlight(backend, path);
  } catch(ex) {
    showAddrError(t('addrErrNotFound') + ex.message);
    setLoading(false);
  }
});

function showAddrError(msg) {
  const err = document.getElementById("addr-error");
  err.textContent = msg;
  err.style.display = "block";
  setTimeout(() => { err.style.display = "none"; }, 4000);
}

function syncTreeHighlight(backend, path) {
  // ルートノードをハイライト
  const rootRow = document.getElementById(`tree-root-${backend}`);
  if (rootRow) selectTreeRow(rootRow);
}

    showGithubWriteError(); return;

  updateToolbar();

document.getElementById("btn-paste").addEventListener("click", async () => {
  if (!state.clipboard) return;
  if (state.currentBackend === "github") { showGithubWriteError(); return; }
  if (state.backends.disk.iosMode && state.currentBackend === "disk") {
    await showModal({ title: t('modalDiskErrTitle'), titleClass:"err",
      body: t('iosReadOnlyOp'),
      buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
    return;
  }

  const { item, op } = state.clipboard;
  const dstPath = state.currentPath
    ? `${state.currentPath}/${item.name}`
    : item.name;
  const srcBack = item.backend;
  const dstBack = state.currentBackend;
  const isDir   = item.type === "dir";

  // 同名確認（ファイルのみ；フォルダは上書きではなくマージ）
  let alreadyExists = false;
  if (!isDir) {
    if (dstBack === "disk") {
      const r = await pyodide.runPythonAsync(
        `str(await _disk.exists('${dstPath.replace(/'/g,"\\'")}'))`
      );
      alreadyExists = r.trim() === "True";
    } else if (dstBack === "gdrive") {
      const r = await pyodide.runPythonAsync(
        `str(await _gdrive.exists('${dstPath.replace(/'/g,"\\'")}'))`
      );
      alreadyExists = r.trim() === "True";
    }
  }

  if (alreadyExists) {
    const overwrite = await showModal({
      title: t('modalOverwriteTitle'),
      titleClass: "warn",
      body: `「${escHtml(item.name)}」${t('modalOverwriteBody')}`,
      buttons: [
        { label: t('modalOverwriteBtn'), cls: "danger", resolve: true },
        { label: t('modalCancel'), cls: "", resolve: false },
      ],
    });
    if (!overwrite) return;
  } else {
    // コピー/移動 確認ダイアログ（改善版）
    const isCopy = op === "copy";
    const srcLabel = `${srcBack}:${item.path}`;
    const dstLabel = `${dstBack}:${dstPath}`;
    const confirmed = await showModal({
      title: isCopy ? t('modalCopyTitle') : t('modalMoveTitle'),
      titleClass: isCopy ? "" : "warn",
      body: `
        <div style="margin-bottom:10px">${isCopy ? t('modalCopyDesc') : t('modalMoveDesc')}</div>
        <table style="width:100%;font-family:var(--mono);font-size:11px;border-collapse:collapse">
          <tr>
            <td style="color:var(--fg3);padding:3px 8px 3px 0;white-space:nowrap">${t('modalSrcLabel')}</td>
            <td style="color:var(--fg2);word-break:break-all">${escHtml(srcLabel)}</td>
          </tr>
          <tr>
            <td style="color:var(--fg3);padding:3px 8px 3px 0;white-space:nowrap">${isCopy ? t('modalDstLabelCopy') : t('modalDstLabelMove')}</td>
            <td style="color:var(--fg2);word-break:break-all">${escHtml(dstLabel)}</td>
          </tr>
        </table>
      `,
      buttons: [
        { label: isCopy ? t('modalCopyBtn') : t('modalMoveBtn'), cls: "primary", resolve: true },
        { label: t('modalCancel'), cls: "", resolve: false },
      ],
    });
    if (!confirmed) return;
  }

  try {
    setLoading(true);
    const src = item.path.replace(/'/g, "\\'");
    const dst = dstPath.replace(/'/g, "\\'");

    if (isDir) {
      // フォルダ: 同一backend or クロスbackend どちらも再帰コピー
      if (srcBack === "disk" && dstBack === "disk") {
        await pyodide.runPythonAsync(`await _disk.copy('${src}', '${dst}')`);
      } else if (srcBack === "gdrive" && dstBack === "gdrive") {
        // gdrive→gdrive フォルダは再帰コピー（API copy はファイルのみ）
        await copyFolderCrossBackend(srcBack, item.path, dstBack, dstPath);
      } else {
        // クロスbackend フォルダ再帰コピー
        await copyFolderCrossBackend(srcBack, item.path, dstBack, dstPath);
      }
      if (op === "cut") {
        await deleteFolderRecursive(srcBack, item.path);
      }
    } else {
      // ファイル: 既存ロジック
      if (srcBack === "disk" && dstBack === "disk") {
        await pyodide.runPythonAsync(`await _disk.copy('${src}', '${dst}')`);
        if (op === "cut") {
          const verified = await pyodide.runPythonAsync(`str(await _disk.exists('${dst}'))`);
          if (verified.trim() !== "True") throw new Error(t('copyVerifyErr'));
          await pyodide.runPythonAsync(`await _disk.delete('${src}', force=True)`);
        }
      } else if (srcBack === "github" && dstBack === "disk") {
        await pyodide.runPythonAsync(`
_data = await _gh.read_bytes('${src}')
await _disk.write_bytes('${dst}', _data)
`);
      } else if (srcBack === "disk" && dstBack === "gdrive") {
        await pyodide.runPythonAsync(`
_data = await _disk.read_bytes('${src}')
await _gdrive.write_bytes('${dst}', _data)
`);
        if (op === "cut") await pyodide.runPythonAsync(`await _disk.delete('${src}', force=True)`);
      } else if (srcBack === "github" && dstBack === "gdrive") {
        await pyodide.runPythonAsync(`
_data = await _gh.read_bytes('${src}')
await _gdrive.write_bytes('${dst}', _data)
`);
      } else if (srcBack === "gdrive" && dstBack === "disk") {
        await pyodide.runPythonAsync(`
_data = await _gdrive.read_bytes('${src}')
await _disk.write_bytes('${dst}', _data)
`);
        if (op === "cut") await pyodide.runPythonAsync(`await _gdrive.delete('${src}')`);
      } else if (srcBack === "gdrive" && dstBack === "gdrive") {
        await pyodide.runPythonAsync(`
_data = await _gdrive.read_bytes('${src}')
await _gdrive.write_bytes('${dst}', _data)
`);
        if (op === "cut") await pyodide.runPythonAsync(`await _gdrive.delete('${src}')`);
      } else {
        throw new Error(`${srcBack} → ${dstBack} のコピーには対応していません`);
      }
    }

    if (op === "cut") state.clipboard = null;
    await navigateTo(state.currentBackend, state.currentPath);
  } catch(e) {
    await showModal({ title: t('modalErrTitle'), titleClass:"err",
      body: escHtml(e.message),
      buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
    setLoading(false);
  }
});

    setLoading(false);
  }
});

document.getElementById("btn-diskroot").addEventListener("click", async () => {
  // iOSフォールバック: 別フォルダを再選択
  if (state.backends.disk.iosMode) {
    iosVFS.clear();
    state.backends.disk.status = "ready";
    state.backends.disk.rootName = "";
    updateTreeBadge("disk");
    updateDiskStatusBar();
    document.getElementById("tree-children-disk").innerHTML = "";
    await openIosFolderPicker();
    return;
  }
  // disk のルートフォルダを強制的に新規選択
  try {
    setLoading(true);
    const info = JSON.parse(await pyodide.runPythonAsync(`
import json as _j
import js
# MomoDiskBridge.openRoot() で新規ダイアログを強制表示
_handle = await _await_js(js.window.MomoDiskBridge.openRoot())
_disk.root_handle    = _handle
_disk.root_name      = _handle.name
_disk.current_path   = "/"
_disk.current_handle = _handle
_disk.cache.clear()
_j.dumps({"root_name": _disk.root_name})
`));
    state.backends.disk.rootName = info.root_name;
    updateDiskStatusBar();
    showToast(`💾 「${info.root_name}」${t('toastDiskRootChange')}`);
    const container = document.getElementById("tree-children-disk");
    await loadDiskTreeChildren(container, "", 1);
    await navigateTo("disk", "");
  } catch(e) {
    // キャンセル（AbortError / PermissionError でキャンセル文言）は無視して元のフォルダを維持
    const msg = e.message || "";
    if (msg.includes("AbortError") || msg.includes("abort") ||
        msg.includes("cancel") || msg.includes("キャンセル") ||
        msg.includes("The user aborted")) {
      // 何もしない（元のルートを維持）
    } else {
      await showModal({ title: t('modalDiskErrTitle'), titleClass:"err",
        body: t('modalDiskRootErr') + e.message,
        buttons:[{label: t('modalOk'), cls:"primary", resolve:true}] });
    }
  } finally {
    setLoading(false);
  }
});

// ── モーダルヘルパー ──────────────────────────────────
function showModal({ title, titleClass = "", body, input = false, buttons = [] }) {
  return new Promise((resolve) => {
    const bg   = document.getElementById("modal-bg");
    const t    = document.getElementById("modal-title");
    const b    = document.getElementById("modal-body");
    const inp  = document.getElementById("modal-input");
    const btns = document.getElementById("modal-btns");

    t.textContent = title;
    t.className   = "modal-title" + (titleClass ? ` ${titleClass}` : "");
    b.innerHTML   = body;

    if (input) {
      inp.classList.remove("hidden");
      inp.value = "";
      setTimeout(() => inp.focus(), 80);
    } else {
      inp.classList.add("hidden");
    }

    btns.innerHTML = "";
    for (const btn of buttons) {
      const el = document.createElement("button");
      el.className = "modal-btn " + (btn.cls || "");
      el.textContent = btn.label;
      el.addEventListener("click", () => {
        bg.classList.remove("show");
        if (btn.resolve === "input") {
          resolve(inp.value.trim());
        } else {
          resolve(btn.resolve);
        }
      });
      btns.appendChild(el);
    }

    bg.classList.add("show");
  });
}

// ── トースト ──────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  // ステータスバーを一時的に使う
  const sb = document.getElementById("sb-items");
  const prev = sb.textContent;
  sb.textContent = msg;
  sb.style.color = "var(--accent2)";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    sb.textContent = prev;
    sb.style.color = "";
  }, 3000);
}

// ── リサイザー ────────────────────────────────────────
(function() {
  const resizer = document.getElementById("resizer");
  const left    = document.getElementById("left-pane");
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX;
    startW = left.offsetWidth;
    resizer.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const w = Math.max(140, Math.min(400, startW + e.clientX - startX));
    left.style.width = w + "px";
  });
  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });
})();

// ── ユーティリティ ────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatSize(bytes) {
  if (bytes === 0) return "0 B";
  const u = ["B","KB","MB","GB"];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0) + " " + u[i];
}

function formatDate(d) {
  if (!d) return "—";
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return String(d);
    return dt.toLocaleDateString("ja-JP") + " " + dt.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
  } catch { return String(d); }
}

function getExt(name) {
  const i = name.lastIndexOf(".");
  return i > 0 ? name.slice(i + 1).toUpperCase() : "FILE";
}

function getFileIcon(name) {
  const ext = getExt(name).toLowerCase();
  const map = {
    py:"🐍", js:"📜", ts:"📜", json:"📋", md:"📝", txt:"📄",
    html:"🌐", css:"🎨", png:"🖼", jpg:"🖼", jpeg:"🖼", gif:"🖼",
    svg:"🖼", mp3:"🎵", wav:"🎵", ogg:"🎵", mp4:"🎬", webm:"🎬",
    zip:"📦", gz:"📦", tar:"📦", pdf:"📑", csv:"📊", xlsx:"📊",
  };
  return map[ext] || "📄";
}

// ── 猫語ステート ────────────────────────────────────
let catBase = 'ja';

// ── 現在の言語 ──────────────────────────────────────
let currentLang = (() => {
  try {
    const v = localStorage.getItem('momoLang');
    return ['ja','en','zh','cat'].includes(v) ? v : 'ja';
  } catch(e) { return 'ja'; }
})();

// ── 猫語生成 ────────────────────────────────────────
function catSpeak(key) {
  const errorKeys = ['modalGithubRO','modalDiskInitErr','modalDiskConnErr',
                     'modalGdriveInitErr','modalGdriveConnErr','modalGithubConnErr',
                     'overlayError','addrErrInvalid','addrErrNotFound','iosWarning'];
  const calmKeys  = ['overlayLoading','bootLoading','bootCdn','bootMicropip',
                     'bootGithub','bootDisk','badgeConnecting','pyodideInit'];
  let vocab;
  if (catBase === 'en') {
    if (errorKeys.includes(key))  vocab = ['HISS!','SPIT!','FSSST!'];
    else if (calmKeys.includes(key)) vocab = ['purrrr...','mrrr...','prrr...'];
    else vocab = ['MEOW','meow','mrrrow','mew','NYA!'];
  } else if (catBase === 'zh') {
    if (errorKeys.includes(key))  vocab = ['嘶！','哈！','嘶嘶！'];
    else if (calmKeys.includes(key)) vocab = ['咕噜…','喵…','噜噜…'];
    else vocab = ['喵','喵呜','咪','喵！'];
  } else {
    if (errorKeys.includes(key))  vocab = ['シャー！','フーッ！','シャシャシャ！'];
    else if (calmKeys.includes(key)) vocab = ['ごろごろ…','にゃ…','ぐるぐる…'];
    else vocab = ['にゃあ','にゃ','にゃーん','みゃお','ニャ！'];
  }
  return vocab[Math.floor(Math.random() * vocab.length)];
}

// ── 翻訳取得 ─────────────────────────────────────────
function t(key) {
  if (currentLang === 'cat') return catSpeak(key);
  return (I18N[currentLang] || I18N.ja)[key] || I18N.ja[key] || key;
}

// ── 言語適用 ─────────────────────────────────────────
function applyLang() {
  // html lang属性
  document.documentElement.lang = currentLang === 'zh' ? 'zh-Hans' : (currentLang === 'cat' ? 'ja' : currentLang);
  // select同期
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = currentLang;
  // ヘッダー pyodideラベル
  const pyLabel = document.getElementById('py-label');
  if (pyLabel) pyLabel.textContent = pyReady ? t('pyodideReady') : t('pyodideInit');
  // MOMO Worksリンク
  const momoLink = document.getElementById('momo-works-link');
  if (momoLink) momoLink.textContent = t('momoWorksLink');
  // アドレスバー
  const addrInput = document.getElementById('addr-input');
  if (addrInput) addrInput.placeholder = t('addrPlaceholder');
  // ツールバーラベル
  const btnMap = {
    'lbl-copy': 'btnCopy', 'lbl-cut': 'btnCut', 'lbl-paste': 'btnPaste',
    'lbl-delete': 'btnDelete', 'lbl-mkdir': 'btnMkdir',
    'lbl-refresh': 'btnRefresh', 'lbl-diskroot': 'btnDiskroot',
    'lbl-gdrive-disconnect': 'btnGdriveDisconnect',
  };
  for (const [id, key] of Object.entries(btnMap)) {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  }
  // 右ペイン列ヘッダ
  const colName = document.getElementById('col-name');
  const colType = document.getElementById('col-type');
  const colSize = document.getElementById('col-size');
  const colDate = document.getElementById('col-date');
  if (colName) colName.textContent = t('colName');
  if (colType) colType.textContent = t('colType');
  if (colSize) colSize.textContent = t('colSize');
  if (colDate) colDate.textContent = t('colDate');
  // readonly-banner
  const banner = document.getElementById('readonly-banner');
  if (banner) banner.textContent = t('readonlyBanner');
  // overlay-msg（ローディング中でなければ初期メッセージを更新）
  const overlayMsg = document.getElementById('overlay-msg');
  if (overlayMsg && !state.loading && !state.currentBackend) {
    overlayMsg.textContent = t('overlaySelect');
  }
  // バッジ更新（renderTree後のみ有効 - badge要素が存在しない場合はupdateTreeBadge内でスキップ）
  ['github', 'disk', 'gdrive'].forEach(id => updateTreeBadge(id));
}

// ── 言語切り替えハンドラ ─────────────────────────────
function onLangChange(lang) {
  if (lang === 'cat') catBase = currentLang === 'cat' ? catBase : currentLang;
  currentLang = lang;
  try { localStorage.setItem('momoLang', lang); } catch(e) {}
  applyLang();
}

// ── エントリポイント ──────────────────────────────────
(async function main() {
  // 言語を即時適用
  applyLang();
  // Pyodide CDN スクリプトを動的ロード
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js";
  script.onload  = () => bootPyodide();
  script.onerror = () => {
    document.getElementById("boot-msg").textContent = t('bootNetErr');
    document.getElementById("py-dot").className = "dot error";
    document.getElementById("py-label").textContent = t('pyodideErr');
  };
  document.head.appendChild(script);
})();
</script>
