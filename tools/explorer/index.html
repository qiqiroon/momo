<!DOCTYPE html>
<!-- Terms of Use: https://qiqiroon.github.io/momo/terms.html -->
<!-- MOMO Explorer v1.02a -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MOMO Explorer</title>
<style>
/* =====================================================
   MOMO Explorer v1.01 — スタイルシート
   テーマ: レトロOS風ユーティリティ × モダンクリーン
   ===================================================== */

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --bg:          #1a1b26;
  --bg2:         #16161e;
  --bg3:         #1f2335;
  --panel:       #24283b;
  --panel2:      #2a2e42;
  --border:      #3b4261;
  --border2:     #414868;

  --fg:          #c0caf5;
  --fg2:         #9aa5ce;
  --fg3:         #565f89;

  --accent:      #7aa2f7;
  --accent2:     #2ac3de;
  --accent3:     #bb9af7;

  --github-col:  #9ece6a;
  --disk-col:    #e0af68;
  --gdrive-col:  #f7768e;

  --sel:         #283457;
  --sel-border:  #7aa2f7;
  --hover:       #1e2030;

  --btn-bg:      #2a2e42;
  --btn-hover:   #3b4261;
  --btn-active:  #414868;
  --btn-dis:     #1f2335;

  --err:         #f7768e;
  --warn:        #e0af68;
  --ok:          #9ece6a;

  --radius:      4px;
  --radius2:     6px;
  --mono:        'JetBrains Mono', 'Courier New', monospace;
  --sans:        'Noto Sans JP', sans-serif;

  --header-h:    36px;
  --addr-h:      34px;
  --toolbar-h:   38px;
  --tree-w:      240px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: 13px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── レイアウトシェル ── */
#shell {
  display: grid;
  grid-template-rows: var(--header-h) var(--addr-h) auto var(--toolbar-h) 1fr;
  height: 100vh;
  width: 100vw;
}

/* ── ヘッダー ── */
#header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  user-select: none;
}
#header .logo {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
#header .logo .cat { font-size: 15px; margin-right: 4px; }
#header .logo .ver {
  color: var(--fg3);
  font-weight: 400;
  font-size: 11px;
  margin-left: 6px;
}
#header .spacer { flex: 1; }
#pyodide-status {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg3);
  display: flex;
  align-items: center;
  gap: 5px;
}
#pyodide-status .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--fg3);
  transition: background 0.4s;
}
#pyodide-status .dot.loading { background: var(--warn); animation: pulse 1s infinite; }
#pyodide-status .dot.ready   { background: var(--ok); }
#pyodide-status .dot.error   { background: var(--err); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── アドレスバー ── */
#addr-row {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
  position: relative;
}
#addr-icon { font-size: 14px; flex-shrink: 0; }
#addr-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  height: 100%;
  caret-color: var(--accent);
}
#addr-input:focus { color: var(--accent); }
#addr-error {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: var(--err);
  color: #fff;
  font-size: 11px;
  font-family: var(--mono);
  padding: 3px 12px;
  z-index: 100;
  display: none;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }

/* ── ツールバー ── */
#toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 4px;
}
.tb-btn {
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--fg2);
  font-family: var(--sans);
  font-size: 12px;
  cursor: pointer;
  padding: 3px 10px;
  height: 26px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  white-space: nowrap;
  user-select: none;
}
.tb-btn:hover:not(:disabled) {
  background: var(--btn-hover);
  color: var(--fg);
  border-color: var(--border2);
}
.tb-btn:active:not(:disabled) { background: var(--btn-active); }
.tb-btn:disabled {
  background: var(--btn-dis);
  color: var(--fg3);
  cursor: not-allowed;
  opacity: 0.55;
}
.tb-btn .icon { font-size: 13px; }
.tb-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 2px;
}

/* ── メインエリア ── */
#main {
  display: flex;
  overflow: hidden;
  border-top: 1px solid var(--border);
}

/* ── 左ペイン ── */
#left-pane {
  width: var(--tree-w);
  min-width: 140px;
  max-width: 400px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  position: relative;
}
#left-pane::-webkit-scrollbar { width: 4px; }
#left-pane::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* リサイザー */
#resizer {
  width: 4px;
  cursor: col-resize;
  background: transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}
#resizer:hover, #resizer.dragging { background: var(--accent); }

/* ── ツリー ── */
.tree-root { padding: 6px 0; }

.tree-node { user-select: none; }

.tree-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.1s;
  min-height: 24px;
  position: relative;
}
.tree-row:hover { background: var(--hover); }
.tree-row.selected {
  background: var(--sel);
  border-left: 2px solid var(--sel-border);
  padding-left: 6px;
}
.tree-row.backend-root {
  font-weight: 600;
  font-size: 12px;
  padding-top: 5px;
  padding-bottom: 5px;
}

.tree-toggle {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--fg3);
  flex-shrink: 0;
  transition: transform 0.15s;
}
.tree-toggle.open { transform: rotate(90deg); }

.tree-icon { font-size: 14px; flex-shrink: 0; }

.tree-label {
  font-size: 12px;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

/* バックエンドカラー */
.backend-github .tree-label { color: var(--github-col); }
.backend-disk   .tree-label { color: var(--disk-col); }
.backend-gdrive .tree-label { color: var(--gdrive-col); }
.backend-github.selected { border-color: var(--github-col); }
.backend-disk.selected   { border-color: var(--disk-col); }
.backend-gdrive.selected { border-color: var(--gdrive-col); }

.tree-children {
  padding-left: 16px;
  overflow: hidden;
}
.tree-children.collapsed { display: none; }

.conn-badge {
  font-size: 9px;
  font-family: var(--mono);
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: auto;
  flex-shrink: 0;
}
.conn-badge.ok     { background: #1a3a20; color: var(--ok); }
.conn-badge.no     { background: #2a1a1f; color: var(--fg3); }
.conn-badge.busy   { background: #2a2010; color: var(--warn); }

.tree-spinner {
  width: 12px; height: 12px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 右ペイン ── */
#right-pane {
  flex: 1;
  background: var(--bg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ファイルリストヘッダ */
#list-header {
  display: grid;
  grid-template-columns: 28px 1fr 70px 70px 130px;
  padding: 4px 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  color: var(--fg3);
  font-size: 11px;
  font-family: var(--mono);
  user-select: none;
  flex-shrink: 0;
}
.list-col { padding: 0 4px; }

/* ファイルリスト */
#file-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
#file-list::-webkit-scrollbar { width: 6px; }
#file-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.file-row {
  display: grid;
  grid-template-columns: 28px 1fr 70px 70px 130px;
  padding: 4px 8px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: background 0.1s;
  align-items: center;
  min-height: 28px;
}
.file-row:hover { background: var(--hover); }
.file-row.selected {
  background: var(--sel);
  border-bottom-color: transparent;
}
.file-row .f-icon { font-size: 15px; }
.file-row .f-name {
  font-size: 12px;
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 4px;
  color: var(--fg);
}
.file-row .f-type {
  font-size: 11px;
  color: var(--fg3);
  font-family: var(--mono);
  padding: 0 4px;
}
.file-row .f-size {
  font-size: 11px;
  color: var(--fg2);
  font-family: var(--mono);
  text-align: right;
  padding: 0 4px;
}
.file-row .f-date {
  font-size: 11px;
  color: var(--fg3);
  font-family: var(--mono);
  padding: 0 4px;
}
.file-row.folder .f-name { color: var(--accent); }

/* ローディング・空状態 */
#list-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--fg3);
  font-family: var(--mono);
  font-size: 12px;
  pointer-events: none;
}
#list-overlay.hidden { display: none; }
.overlay-spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ── モーダル・ダイアログ ── */
#modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  display: none;
}
#modal-bg.show { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 20px 24px;
  min-width: 300px;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: modalIn 0.15s ease-out;
}
@keyframes modalIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:none} }

.modal-title {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-title.warn { color: var(--warn); }
.modal-title.err  { color: var(--err);  }

.modal-body {
  font-size: 12px;
  color: var(--fg2);
  line-height: 1.6;
  margin-bottom: 16px;
  word-break: break-all;
}

.modal-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--fg);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 10px;
  outline: none;
  margin-bottom: 14px;
}
.modal-input:focus { border-color: var(--accent); }

.modal-btns {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.modal-btn {
  background: var(--btn-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--fg2);
  font-family: var(--sans);
  font-size: 12px;
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.modal-btn:hover { background: var(--btn-hover); color: var(--fg); }
.modal-btn.primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}
.modal-btn.primary:hover { filter: brightness(1.1); }
.modal-btn.danger {
  background: var(--err);
  color: #fff;
  border-color: var(--err);
}
.modal-btn.danger:hover { filter: brightness(1.1); }

/* ── ステータスバー ── */
#statusbar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  height: 22px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--fg3);
  flex-shrink: 0;
}
#statusbar .sb-item { display: flex; align-items: center; gap: 4px; }
#statusbar .sb-clip {
  color: var(--warn);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── github 読み取り専用バナー ── */
#readonly-banner {
  background: #1a1208;
  border-bottom: 1px solid #433c1a;
  padding: 3px 12px;
  font-size: 11px;
  font-family: var(--mono);
  color: var(--warn);
  display: none;
  align-items: center;
  gap: 6px;
}
#readonly-banner.show { display: flex; }

/* ── レート制限警告 ── */
.rate-warn {
  background: #1a1208;
  border-top: 1px solid #433c1a;
  padding: 3px 12px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--warn);
  display: none;
}
.rate-warn.show { display: block; }

/* ── Pyodide ロード中オーバーレイ ── */
#boot-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.4s;
}
#boot-overlay.hide { opacity: 0; pointer-events: none; }
.boot-logo {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.06em;
}
.boot-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--fg3);
}
.boot-bar {
  width: 220px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.boot-bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s;
  border-radius: 2px;
}

/* ── ユーティリティ ── */
.hidden { display: none !important; }
#right-wrap { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
</style>
</head>
<body>

<!-- ブート画面 -->
<div id="boot-overlay">
  <div class="boot-logo">🐱 MOMO Explorer</div>
  <div class="boot-sub" id="boot-msg">Pyodide を初期化中...</div>
  <div class="boot-bar"><div class="boot-bar-fill" id="boot-bar"></div></div>
</div>

<!-- メインシェル -->
<div id="shell">

  <!-- ヘッダー -->
  <div id="header">
    <span class="logo"><span class="cat">🐱</span>MOMO Explorer<span class="ver" id="ver-label">ver 1.02a</span></span>
    <span class="spacer"></span>
    <div id="pyodide-status">
      <div class="dot loading" id="py-dot"></div>
      <span id="py-label">Pyodide 初期化中</span>
    </div>
  </div>

  <!-- アドレスバー -->
  <div id="addr-row">
    <span id="addr-icon">📁</span>
    <input id="addr-input" type="text" placeholder="バックエンド/パス を入力して Enter" spellcheck="false">
    <div id="addr-error"></div>
  </div>

  <!-- 読み取り専用バナー -->
  <div id="readonly-banner">⚠ GitHub フォルダは読み取り専用です。閲覧のみ可能です。</div>

  <!-- ツールバー -->
  <div id="toolbar">
    <button class="tb-btn" id="btn-copy"   disabled><span class="icon">📋</span>コピー</button>
    <button class="tb-btn" id="btn-cut"    disabled><span class="icon">✂️</span>切り取り</button>
    <button class="tb-btn" id="btn-paste"  disabled><span class="icon">📌</span>貼り付け</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-delete" disabled><span class="icon">🗑</span>削除</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-mkdir"  disabled><span class="icon">📂</span>新規フォルダ</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btn-refresh"><span class="icon">🔄</span>更新</button>
  </div>

  <!-- メインエリア -->
  <div id="main">

    <!-- 左ペイン -->
    <div id="left-pane">
      <div class="tree-root" id="tree-root"></div>
    </div>

    <!-- リサイザー -->
    <div id="resizer"></div>

    <!-- 右ペイン -->
    <div id="right-wrap">
      <div id="list-header">
        <div class="list-col"></div>
        <div class="list-col">名前</div>
        <div class="list-col">種類</div>
        <div class="list-col" style="text-align:right">サイズ</div>
        <div class="list-col">更新日時</div>
      </div>
      <div id="right-pane">
        <div id="file-list"></div>
        <div id="list-overlay">
          <div class="overlay-spinner" id="list-spinner" style="display:none"></div>
          <span id="overlay-msg">フォルダを選択してください</span>
        </div>
      </div>
      <div class="rate-warn" id="rate-warn"></div>
      <div id="statusbar">
        <span class="sb-item" id="sb-items">0 項目</span>
        <span class="sb-item" id="sb-disk" style="display:none">💾 <span id="sb-disk-name"></span></span>
        <span class="sb-item sb-clip" id="sb-clip" style="display:none"></span>
      </div>
    </div>

  </div>
</div>

<!-- モーダル -->
<div id="modal-bg">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">タイトル</div>
    <div class="modal-body"  id="modal-body">本文</div>
    <input class="modal-input hidden" id="modal-input" type="text">
    <div class="modal-btns"  id="modal-btns"></div>
  </div>
</div>

<script>
/* =====================================================
   MOMO Explorer v1.01 — メインスクリプト
   ===================================================== */

const VERSION = "1.02a";

// ── 定数 ──────────────────────────────────────────────
const GITHUB_OWNER  = "qiqiroon";
const GITHUB_REPO   = "momo";
const GITHUB_BRANCH = "main";
const GITHUB_TOP    = "tools/explorer/data";  // エクスプローラに表示するトップフォルダ

// ── 状態 ──────────────────────────────────────────────
const state = {
  currentBackend: null,   // 'github' | 'disk' | 'gdrive'
  currentPath: "",        // バックエンド内の現在パス
  selectedItem: null,     // { name, type, path, backend }
  clipboard: null,        // { item, op: 'copy'|'cut' }
  backends: {
    github: { status: "disconnected", instance: null },
    disk:   { status: "disconnected", instance: null },
    gdrive: { status: "disconnected", instance: null },
  },
  loading: false,
  treeExpanded: { github: false, disk: false, gdrive: false },
  treeNodes: {},   // path -> element
};

// ── PyodideラッパーとPython連携 ──────────────────────
let pyodide = null;
let pyReady = false;

async function bootPyodide() {
  setBootMsg("Pyodide CDN から読み込み中...", 10);
  try {
    pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/" });
    setBootMsg("micropip をセットアップ中...", 40);
    await pyodide.loadPackage("micropip");
    setBootMsg("momo_github ライブラリを読み込み中...", 65);

// ライブラリが取得できない環境向けスタブ（最小実装）
function getMomoGithubStub() {
  return `
import json, time
from datetime import datetime, timezone

class MomoGitHub:
    VERSION = "1.00-stub"
    def __init__(self, owner, repo, branch="main", base_path="", cache_ttl=600):
        self.owner = owner; self.repo = repo; self.branch = branch
        self.base_path = base_path.strip("/"); self.cache_ttl = cache_ttl
        self.current_path = ""; self.cache = {}
        self._raw_base = f"https://raw.githubusercontent.com/{owner}/{repo}/{branch}"
        self._api_base = f"https://api.github.com/repos/{owner}/{repo}/contents"
    @property
    def breadcrumb(self):
        parts = [p for p in [self.base_path, self.current_path] if p]
        return " > ".join(parts)
    @property
    def full_current_path(self):
        segs = [s for s in [self.base_path, self.current_path] if s]
        return "/".join(segs)
    async def list_dir(self, path=None, use_cache=True):
        if path is None: path = self.current_path
        segs = [s for s in [self.base_path, self.current_path, path] if s]
        # deduplicate
        if path == self.current_path:
            segs = [s for s in [self.base_path, self.current_path] if s]
        full = "/".join(segs)
        url = f"{self._api_base}/{full}?ref={self.branch}" if full else f"{self._api_base}?ref={self.branch}"
        if use_cache and url in self.cache:
            ts, items, cat = self.cache[url]
            if time.monotonic()-ts < self.cache_ttl:
                return list(items)+[{"_cached":True,"_cached_at":cat,"_rate_limit":{}}]
        from pyodide.http import pyfetch
        r = await pyfetch(url)
        data = await r.json()
        if not isinstance(data, list): raise FileNotFoundError(full)
        items = sorted([{"name":i["name"],"type":"dir" if i["type"]=="dir" else "file","size":i.get("size",0),"download_url":i.get("download_url")} for i in data], key=lambda x:(0 if x["type"]=="dir" else 1,x["name"].lower()))
        self.cache[url]=(time.monotonic(),items,datetime.now(tz=timezone.utc))
        return list(items)+[{"_cached":False,"_cached_at":None,"_rate_limit":{}}]
    async def navigate(self, path):
        if path=="..":
            parts=[p for p in self.current_path.split("/") if p]
            if not parts: raise ValueError("Cannot navigate above base_path")
            self.current_path="/".join(parts[:-1])
        elif path.startswith("/"):
            self.current_path=path.lstrip("/")
        else:
            self.current_path=("/".join([p for p in [self.current_path,path] if p])).strip("/")
    async def read_text(self, path, encoding="utf-8"):
        segs=[s for s in [self.base_path,self.current_path,path] if s]
        url=f"{self._raw_base}/{'/'.join(segs)}"
        from pyodide.http import pyfetch
        r=await pyfetch(url)
        if r.status==404: raise FileNotFoundError(path)
        return await r.string()
    async def read_bytes(self, path):
        return (await self.read_text(path)).encode()
    async def read_json(self, path):
        return json.loads(await self.read_text(path))
    async def exists(self, path):
        try: await self.read_text(path); return True
        except: return False
    async def refresh(self, path=None):
        if path is None: self.cache.clear()
    def write_text(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
    def write_bytes(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
    def delete(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
    def mkdir(self,*a,**k): raise NotImplementedError("GitHub access is read-only")
`;
}

async function fetchLibSource(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch failed: ${url} (${r.status})`);

function renderTree() {
  const root = document.getElementById("tree-root");
  root.innerHTML = "";

  const backends = [
    { id: "github", icon: "🐙", label: "github",  col: "var(--github-col)" },
    { id: "disk",   icon: "💾", label: "disk",     col: "var(--disk-col)"   },
    { id: "gdrive", icon: "📱", label: "gdrive",   col: "var(--gdrive-col)" },
  ];

  for (const b of backends) {
    const node = buildBackendNode(b);
    root.appendChild(node);
  }
}

function buildBackendNode(b) {
  const wrap = document.createElement("div");
  wrap.className = `tree-node backend-node`;
  wrap.dataset.backend = b.id;

  const row = document.createElement("div");
  row.className = `tree-row backend-root backend-${b.id}`;
  row.id = `tree-root-${b.id}`;
  row.innerHTML = `
    <span class="tree-toggle" id="toggle-${b.id}">▶</span>
    <span class="tree-icon">${b.icon}</span>
    <span class="tree-label">${b.label}</span>
    <span class="conn-badge no" id="badge-${b.id}">未接続</span>
  `;
  row.addEventListener("click", () => onBackendRootClick(b.id));

  const children = document.createElement("div");
  children.className = "tree-children collapsed";
  children.id = `tree-children-${b.id}`;

  wrap.appendChild(row);
  wrap.appendChild(children);
  return wrap;
}

function updateTreeBadge(backendId) {
  const badge = document.getElementById(`badge-${backendId}`);
  if (!badge) return;
  const status = state.backends[backendId].status;
  badge.className = "conn-badge";
  if (status === "connected") { badge.className += " ok"; badge.textContent = "接続済"; }
  else if (status === "connecting") { badge.className += " busy"; badge.textContent = "接続中"; }
  else if (status === "error")      { badge.className += " no"; badge.textContent = "エラー"; }
  else                              { badge.className += " no"; badge.textContent = "未接続"; }
}

async function onBackendRootClick(backendId) {
  const expanded = state.treeExpanded[backendId];
  if (expanded) {
    // 折りたたむ
    state.treeExpanded[backendId] = false;
    document.getElementById(`toggle-${backendId}`).classList.remove("open");
    document.getElementById(`tree-children-${backendId}`).classList.add("collapsed");
    return;
  }

  // 展開
  if (backendId === "github") {
    await expandGithubTree();
  } else if (backendId === "disk") {
    await expandDiskTree();
  } else if (backendId === "gdrive") {
    await expandGdriveTree();
  }
}

function buildTreeFolderNode(backend, name, path, depth) {
  const wrap = document.createElement("div");
  wrap.className = "tree-node";

  const row = document.createElement("div");
  row.className = `tree-row backend-${backend}`;
  row.style.paddingLeft = (8 + depth * 14) + "px";
  row.innerHTML = `
    <span class="tree-toggle" data-expanded="false">▶</span>
    <span class="tree-icon">📁</span>
    <span class="tree-label">${escHtml(name)}</span>
  `;

  row.addEventListener("click", async (e) => {
    e.stopPropagation();
    // フォルダ選択 → 右ペイン更新
    selectTreeRow(row);
    await navigateTo(backend, path);

    // 子展開トグル
    const toggle = row.querySelector(".tree-toggle");
    const isExp = toggle.dataset.expanded === "true";
    if (isExp) {
      toggle.dataset.expanded = "false";
      toggle.classList.remove("open");
      if (wrap.childrenContainer) wrap.childrenContainer.classList.add("collapsed");
    } else {
      toggle.dataset.expanded = "true";
      toggle.classList.add("open");
      await expandTreeNode(wrap, backend, path, depth);
    }
  });

  wrap.appendChild(row);
  wrap._row = row;
  return wrap;
}

async function expandTreeNode(wrap, backend, path, depth) {
  if (wrap.childrenContainer) {
    wrap.childrenContainer.classList.remove("collapsed");
    return;
  }
  const container = document.createElement("div");
  container.className = "tree-children";
  container.innerHTML = `<div class="tree-row" style="padding-left:${8+(depth+1)*14}px"><div class="tree-spinner"></div></div>`;
  wrap.appendChild(container);
  wrap.childrenContainer = container;

  try {
    const items = await listDir(backend, path);
    container.innerHTML = "";
    const folders = items.filter(i => i.type === "dir");
    if (folders.length === 0) {
      container.innerHTML = `<div class="tree-row" style="padding-left:${8+(depth+1)*14}px;color:var(--fg3);font-size:11px;font-family:var(--mono)">（空）</div>`;
    }
    for (const f of folders) {
      const childPath = path ? `${path}/${f.name}` : f.name;
      const node = buildTreeFolderNode(backend, f.name, childPath, depth + 1);
      container.appendChild(node);
    }
  } catch(e) {
    container.innerHTML = `<div class="tree-row" style="padding-left:${8+(depth+1)*14}px;color:var(--err);font-size:11px;font-family:var(--mono)">エラー</div>`;
  }
}

let selectedTreeRow = null;
function selectTreeRow(row) {
  if (selectedTreeRow) selectedTreeRow.classList.remove("selected");
  selectedTreeRow = row;
  row.classList.add("selected");
}

// ── バックエンド別 listDir ───────────────────────────
async function listDir(backend, path) {
  if (backend === "github") return await listDirGithub(path);
  if (backend === "disk")   return await listDirDisk(path);
  if (backend === "gdrive") return await listDirGdrive(path);
  return [];
}

async function listDirGdrive(path) {
  if (!pyReady) throw new Error("Pyodide が初期化されていません");
  const safePath = (path || "").replace(/'/g, "\\'");
  const result = await pyodide.runPythonAsync(`
import json as _json
_items = await _gdrive.list_dir(path='${safePath}', use_cache=True)
def _fmt(item):
    d = dict(item)
    if d.get('modified') and hasattr(d['modified'], 'isoformat'):
        d['modified'] = d['modified'].isoformat()
    else:
        d['modified'] = None
    return d
_json.dumps([_fmt(i) for i in _items])
`);
  return JSON.parse(result);
}

async function listDirDisk(path) {
  if (!pyReady) throw new Error("Pyodide が初期化されていません");
  const safePath = (path || "/").replace(/'/g, "\\'");
  const result = await pyodide.runPythonAsync(`
import json as _json
from datetime import datetime
_items = await _disk.list_dir(path='${safePath}', use_cache=True)
def _fmt(item):
    d = dict(item)
    if d.get('modified') and hasattr(d['modified'], 'isoformat'):
        d['modified'] = d['modified'].isoformat()
    else:
        d['modified'] = None
    return d
_json.dumps([_fmt(i) for i in _items])
`);
  return JSON.parse(result);
}

async function listDirGithub(path) {
  if (!pyReady) throw new Error("Pyodide が初期化されていません");

  const safePath = (path || "").replace(/'/g, "\\'");
  const result = await pyodide.runPythonAsync(`
import json as _json
from datetime import datetime
_items = await _gh.list_dir(path='${safePath}', use_cache=True)
# メタエントリを分離・datetime を文字列化
_meta = None
_plain = []
for _it in _items:
    if '_cached' in _it:
        _meta = dict(_it)
        if isinstance(_meta.get('_cached_at'), datetime):
            _meta['_cached_at'] = _meta['_cached_at'].isoformat()
        _rl = _meta.get('_rate_limit') or {}
        if isinstance(_rl.get('reset_at'), datetime):
            _rl = dict(_rl)
            _rl['reset_at'] = _rl['reset_at'].isoformat()
            _meta['_rate_limit'] = _rl
    else:
        _plain.append(_it)
_json.dumps({"items": _plain, "meta": _meta})
`);
  const data = JSON.parse(result);

  // レート制限警告
  if (data.meta && data.meta._rate_limit && data.meta._rate_limit.low_rate) {
    const rw = document.getElementById("rate-warn");
    const rem = data.meta._rate_limit.remaining;
    const resetAt = data.meta._rate_limit.reset_at || "不明";
    rw.textContent = `⚠ GitHub API レート制限残り ${rem} 回。リセット: ${resetAt}`;
    rw.classList.add("show");
  } else {
    document.getElementById("rate-warn").classList.remove("show");
  }

  return data.items;
}

// ── 右ペイン描画 ──────────────────────────────────────
function renderFileList(items, backend, basePath) {
  const list = document.getElementById("file-list");
  const overlay = document.getElementById("list-overlay");

  list.innerHTML = "";

  if (items.length === 0) {
    overlay.classList.remove("hidden");
    document.getElementById("list-spinner").style.display = "none";
    document.getElementById("overlay-msg").textContent = "（このフォルダは空です）";
    document.getElementById("sb-items").textContent = "0 項目";
    return;
  }

  overlay.classList.add("hidden");

  // フォルダ先・ファイル後で既にソート済みと想定
  for (const item of items) {
    const row = document.createElement("div");
    const isDir = item.type === "dir";
    row.className = "file-row" + (isDir ? " folder" : "");
    row.dataset.name = item.name;
    row.dataset.type = item.type;

    const icon = isDir ? "📁" : getFileIcon(item.name);
    const sizeStr = isDir ? "—" : formatSize(item.size || 0);
    const dateStr = item.modified ? formatDate(item.modified) : "—";
    const typeStr = isDir ? "フォルダ" : getExt(item.name);

    row.innerHTML = `
      <div class="f-icon">${icon}</div>
      <div class="f-name" title="${escHtml(item.name)}">${escHtml(item.name)}</div>
      <div class="f-type">${typeStr}</div>
      <div class="f-size">${sizeStr}</div>
      <div class="f-date">${dateStr}</div>
    `;

    row.addEventListener("click", () => onFileRowClick(row, item, backend, basePath));
    list.appendChild(row);
  }

  document.getElementById("sb-items").textContent = `${items.length} 項目`;
}

function onFileRowClick(row, item, backend, basePath) {
  const allRows = document.querySelectorAll(".file-row");
  const already = row.classList.contains("selected");

  allRows.forEach(r => r.classList.remove("selected"));

  if (already) {
    // 再クリック → 選択解除
    state.selectedItem = null;
  } else {
    row.classList.add("selected");
    const itemPath = basePath ? `${basePath}/${item.name}` : item.name;
    state.selectedItem = { name: item.name, type: item.type, path: itemPath, backend };
  }
  updateToolbar();
}

function renderError(msg) {
  const overlay = document.getElementById("list-overlay");
  overlay.classList.remove("hidden");
  document.getElementById("list-spinner").style.display = "none";
  document.getElementById("overlay-msg").textContent = "エラー: " + msg;
  document.getElementById("file-list").innerHTML = "";
}

// ── ツールバー状態管理 ───────────────────────────────
function updateToolbar() {
  const sel = state.selectedItem;
  const clip = state.clipboard;
  const isGithub = state.currentBackend === "github";
  const busy = state.loading;

  const hasSelection = !!sel;
  const selIsGithub  = sel && sel.backend === "github";

  document.getElementById("btn-copy").disabled   = !hasSelection || busy;
  document.getElementById("btn-cut").disabled    = !hasSelection || selIsGithub || isGithub || busy;
  document.getElementById("btn-paste").disabled  = !clip || isGithub || busy;
  document.getElementById("btn-delete").disabled = !hasSelection || selIsGithub || busy;
  document.getElementById("btn-mkdir").disabled  = !state.currentBackend || isGithub || busy;
  document.getElementById("btn-refresh").disabled = !state.currentBackend || busy;

  // クリップボード表示
  const sbClip = document.getElementById("sb-clip");
  if (clip) {
    const op = clip.op === "copy" ? "📋" : "✂️";
    sbClip.textContent = `${op} ${clip.item.name}`;
    sbClip.style.display = "flex";
  } else {
    sbClip.style.display = "none";
  }
}

function updateReadonlyBanner() {
  const banner = document.getElementById("readonly-banner");
  if (state.currentBackend === "github") {
    banner.classList.add("show");
  } else {
    banner.classList.remove("show");
  }
}

function updateAddrBar() {
  const input   = document.getElementById("addr-input");
  const icon    = document.getElementById("addr-icon");
  const backend = state.currentBackend;
  const path    = state.currentPath;

  const icons  = { github:"🐙", disk:"💾", gdrive:"📱" };
  const colors = { github:"var(--github-col)", disk:"var(--disk-col)", gdrive:"var(--gdrive-col)" };

  if (!backend) {
    input.value = "";
    input.style.color = "";
    icon.textContent = "📁";
    return;
  }
  icon.textContent  = icons[backend] || "📁";
  input.value       = path ? `${backend}/${path}` : backend;
  input.style.color = colors[backend] || "";
}

function updateDiskStatusBar() {
  const el   = document.getElementById("sb-disk");
  const name = document.getElementById("sb-disk-name");
  if (state.backends.disk.status === "connected" && state.backends.disk.rootName) {
    name.textContent = state.backends.disk.rootName;
    el.style.display = "flex";
  } else {
    el.style.display = "none";
  }
}

function setLoading(flag) {
  state.loading = flag;
  const spinner = document.getElementById("list-spinner");
  const overlay = document.getElementById("list-overlay");
  const msg     = document.getElementById("overlay-msg");

  if (flag) {
    overlay.classList.remove("hidden");
    spinner.style.display = "block";
    msg.textContent = "読み込み中...";
    document.getElementById("file-list").innerHTML = "";
  } else {
    spinner.style.display = "none";
  }
  updateToolbar();
}

// ── アドレスバー直接入力 ──────────────────────────────
document.getElementById("addr-input").addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;
  const val = e.target.value.trim();
  const err = document.getElementById("addr-error");
  err.style.display = "none";

  if (!val) return;

  const parts = val.split("/");
  const backend = parts[0].toLowerCase();
  const path = parts.slice(1).join("/");

  if (!["github", "disk", "gdrive"].includes(backend)) {
    showAddrError("バックエンド名が無効です。github / disk / gdrive のいずれかで始めてください。");
    return;
  }

  if (backend === "gdrive") {
    showAddrError("gdrive はツリーパネルから接続してください。");
    return;
  }
  if (backend === "disk") {
    if (state.backends.disk.status !== "connected") {
      showAddrError("disk は未接続です。左ペインの disk をクリックして接続してください。");
      return;
    }
    try {
      setLoading(true);
      await navigateTo("disk", path);
      syncTreeHighlight("disk", path);
    } catch(ex) {
      showAddrError("指定したパスが見つかりません: " + ex.message);
      setLoading(false);
    }
    return;
  }

  // github の場合、存在確認してから移動
  try {
    setLoading(true);
    await navigateTo(backend, path);
    // ツリー側のハイライトも同期
    syncTreeHighlight(backend, path);
  } catch(ex) {
    showAddrError("指定したパスが見つかりません: " + ex.message);
    setLoading(false);
  }
});

function showAddrError(msg) {
  const err = document.getElementById("addr-error");
  err.textContent = msg;
  err.style.display = "block";
  setTimeout(() => { err.style.display = "none"; }, 4000);
}

function syncTreeHighlight(backend, path) {
  // ルートノードをハイライト
  const rootRow = document.getElementById(`tree-root-${backend}`);
  if (rootRow) selectTreeRow(rootRow);
}

// ── ツールバー操作 ────────────────────────────────────
document.getElementById("btn-copy").addEventListener("click", () => {
  if (!state.selectedItem) return;
  state.clipboard = { item: { ...state.selectedItem }, op: "copy" };
  updateToolbar();
  showToast(`📋 「${state.selectedItem.name}」をコピー対象に設定しました`);
});

document.getElementById("btn-cut").addEventListener("click", () => {
  if (!state.selectedItem) return;
  if (state.selectedItem.backend === "github" || state.currentBackend === "github") {
    showGithubWriteError(); return;
  }
  state.clipboard = { item: { ...state.selectedItem }, op: "cut" };
  updateToolbar();
  showToast(`✂️ 「${state.selectedItem.name}」を切り取り対象に設定しました`);
});

document.getElementById("btn-paste").addEventListener("click", async () => {
  if (!state.clipboard) return;
  if (state.currentBackend === "github") { showGithubWriteError(); return; }

  const { item, op } = state.clipboard;
  const dstPath = state.currentPath
    ? `${state.currentPath}/${item.name}`
    : item.name;

  // 同名確認
  let alreadyExists = false;
  if (state.currentBackend === "disk") {
    const r = await pyodide.runPythonAsync(
      `str(await _disk.exists('${dstPath.replace(/'/g,"\\'")}'))`
    );
    alreadyExists = r.trim() === "True";
  }

  if (alreadyExists) {
    const overwrite = await showModal({
      title: "⚠ 同名ファイルが存在します",
      titleClass: "warn",
      body: `「${escHtml(item.name)}」はすでに存在します。上書きしますか？`,
      buttons: [
        { label: "キャンセル", cls: "", resolve: false },
        { label: "上書き", cls: "danger", resolve: true },
      ],
    });
    if (!overwrite) return;
  } else {
    const confirmed = await showModal({
      title: "📌 貼り付け確認",
      body: `「${escHtml(item.name)}」を現在のフォルダに${op === "copy" ? "コピー" : "移動"}しますか？<br><small style="color:var(--fg3)">貼り付け先: ${state.currentBackend}/${state.currentPath || ""}</small>`,
      buttons: [
        { label: "キャンセル", cls: "", resolve: false },
        { label: op === "copy" ? "コピー" : "移動", cls: "primary", resolve: true },
      ],
    });
    if (!confirmed) return;
  }

  try {
    setLoading(true);
    if (state.currentBackend === "disk" && item.backend === "disk") {
      const src = item.path.replace(/'/g, "\\'");
      const dst = dstPath.replace(/'/g, "\\'");
      if (op === "copy") {
        await pyodide.runPythonAsync(`await _disk.copy('${src}', '${dst}')`);
      } else {
        // 移動: copy → verify → delete
        await pyodide.runPythonAsync(`await _disk.copy('${src}', '${dst}')`);
        const verified = await pyodide.runPythonAsync(
          `str(await _disk.exists('${dst}'))`
        );
        if (verified.trim() !== "True") {
          throw new Error("コピー先の確認に失敗しました。元ファイルは保持されています。");
        }
        await pyodide.runPythonAsync(`await _disk.delete('${src}', force=True)`);
      }
    }
    // クリップボードクリア（cut の場合のみ）
    if (op === "cut") state.clipboard = null;
    await navigateTo(state.currentBackend, state.currentPath);
  } catch(e) {
    await showModal({ title:"⚠ 操作エラー", titleClass:"err",
      body: escHtml(e.message),
      buttons:[{label:"OK", cls:"primary", resolve:true}] });
    setLoading(false);
  }
});

document.getElementById("btn-delete").addEventListener("click", async () => {
  if (!state.selectedItem) return;
  if (state.selectedItem.backend === "github") { showGithubWriteError(); return; }

  const name = state.selectedItem.name;
  const confirmed = await showModal({
    title: "🗑 削除の確認", titleClass: "warn",
    body: `「${escHtml(name)}」を削除しますか？<br><small style="color:var(--fg3)">この操作は元に戻せません。</small>`,
    buttons: [
      { label: "キャンセル", cls: "", resolve: false },
      { label: "削除", cls: "danger", resolve: true },
    ],
  });
  if (!confirmed) return;

  const backend = state.selectedItem.backend;
  const path    = state.selectedItem.path;

  try {
    setLoading(true);
    if (backend === "disk") {
      const safePath = path.replace(/'/g, "\\'");
      await pyodide.runPythonAsync(`await _disk.delete('${safePath}', force=False)`);
    }
    state.selectedItem = null;
    await navigateTo(backend, state.currentPath);
  } catch(e) {
    await showModal({ title:"⚠ 削除エラー", titleClass:"err",
      body: escHtml(e.message),
      buttons:[{label:"OK", cls:"primary", resolve:true}] });
    setLoading(false);
  }
});

document.getElementById("btn-mkdir").addEventListener("click", async () => {
  if (state.currentBackend === "github") { showGithubWriteError(); return; }

  const name = await showModal({
    title: "📂 新規フォルダ",
    body: "作成するフォルダ名を入力してください:",
    input: true,
    buttons: [
      { label: "キャンセル", cls: "", resolve: null },
      { label: "作成", cls: "primary", resolve: "input" },
    ],
  });
  if (!name) return;

  const newPath = state.currentPath
    ? `${state.currentPath}/${name}`
    : name;

  try {
    setLoading(true);
    if (state.currentBackend === "disk") {
      const safePath = newPath.replace(/'/g, "\\'");
      await pyodide.runPythonAsync(`await _disk.mkdir('${safePath}')`);
    }
    await navigateTo(state.currentBackend, state.currentPath);
  } catch(e) {
    await showModal({ title:"⚠ 作成エラー", titleClass:"err",
      body: escHtml(e.message),
      buttons:[{label:"OK", cls:"primary", resolve:true}] });
    setLoading(false);
  }
});

document.getElementById("btn-refresh").addEventListener("click", async () => {
  if (!state.currentBackend || state.loading) return;
  if (state.currentBackend === "github") {
    // キャッシュをクリアして再取得
    await pyodide.runPythonAsync(`await _gh.refresh()`);
  }
  await navigateTo(state.currentBackend, state.currentPath);
});

function showGithubWriteError() {
  showModal({
    title: "⚠ 書き込み不可",
    titleClass: "err",
    body: "GitHub フォルダは読み取り専用です。書き込みはできません。",
    buttons: [{ label: "OK", cls: "primary", resolve: true }],
  });
}

// ── モーダルヘルパー ──────────────────────────────────
function showModal({ title, titleClass = "", body, input = false, buttons = [] }) {
  return new Promise((resolve) => {
    const bg   = document.getElementById("modal-bg");
    const t    = document.getElementById("modal-title");
    const b    = document.getElementById("modal-body");
    const inp  = document.getElementById("modal-input");
    const btns = document.getElementById("modal-btns");

    t.textContent = title;
    t.className   = "modal-title" + (titleClass ? ` ${titleClass}` : "");
    b.innerHTML   = body;

    if (input) {
      inp.classList.remove("hidden");
      inp.value = "";
      setTimeout(() => inp.focus(), 80);
    } else {
      inp.classList.add("hidden");
    }

    btns.innerHTML = "";
    for (const btn of buttons) {
      const el = document.createElement("button");
      el.className = "modal-btn " + (btn.cls || "");
      el.textContent = btn.label;
      el.addEventListener("click", () => {
        bg.classList.remove("show");
        if (btn.resolve === "input") {
          resolve(inp.value.trim());
        } else {
          resolve(btn.resolve);
        }
      });
      btns.appendChild(el);
    }

    bg.classList.add("show");
  });
}

// ── トースト ──────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  // ステータスバーを一時的に使う
  const sb = document.getElementById("sb-items");
  const prev = sb.textContent;
  sb.textContent = msg;
  sb.style.color = "var(--accent2)";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    sb.textContent = prev;
    sb.style.color = "";
  }, 3000);
}

// ── リサイザー ────────────────────────────────────────
(function() {
  const resizer = document.getElementById("resizer");
  const left    = document.getElementById("left-pane");
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener("mousedown", (e) => {
    dragging = true;
    startX = e.clientX;
    startW = left.offsetWidth;
    resizer.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });
  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const w = Math.max(140, Math.min(400, startW + e.clientX - startX));
    left.style.width = w + "px";
  });
  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });
})();

// ── ユーティリティ ────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatSize(bytes) {
  if (bytes === 0) return "0 B";
  const u = ["B","KB","MB","GB"];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0) + " " + u[i];
}

function formatDate(d) {
  if (!d) return "—";
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return String(d);
    return dt.toLocaleDateString("ja-JP") + " " + dt.toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
  } catch { return String(d); }
}

function getExt(name) {
  const i = name.lastIndexOf(".");
  return i > 0 ? name.slice(i + 1).toUpperCase() : "FILE";
}

function getFileIcon(name) {
  const ext = getExt(name).toLowerCase();
  const map = {
    py:"🐍", js:"📜", ts:"📜", json:"📋", md:"📝", txt:"📄",
    html:"🌐", css:"🎨", png:"🖼", jpg:"🖼", jpeg:"🖼", gif:"🖼",
    svg:"🖼", mp3:"🎵", wav:"🎵", ogg:"🎵", mp4:"🎬", webm:"🎬",
    zip:"📦", gz:"📦", tar:"📦", pdf:"📑", csv:"📊", xlsx:"📊",
  };
  return map[ext] || "📄";
}
