<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Karaoke Latency Probe v3</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #999; margin: 0 0 16px; }
  button { font-size: 18px; padding: 14px 22px; border-radius: 10px; border: none;
           background: #2d7; color: #042; font-weight: 700; width: 100%; margin-bottom: 14px; }
  button:disabled { background: #444; color: #888; }
  pre { background: #000; border: 1px solid #333; border-radius: 8px; padding: 12px;
        font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; min-height: 220px; }
  .verdict { font-size: 16px; font-weight: 700; padding: 10px; border-radius: 8px; margin-top: 12px; }
  .ok { background: #143; color: #6f9; }
  .copy { background: #58a; color: #fff; }
</style>
</head>
<body>
  <h1>Karaoke йБЕеїґгГЧгГ≠гГЉгГЦ v3 (L_take + ќ≤)</h1>
  <p class="sub">гГЮгВ§гВѓдЄНдљњзФ®гАВtriggered take йБЕеїґгБ® continuous BGM йБЕеїґгВТжЄђгВК mixOffset еАЩи£ЬгВТзЃЧеЗЇгАВ</p>
  <button id="run">вЦґ и®ИжЄђйЦЛеІЛ</button>
  <button id="copyBtn" class="copy" style="display:none">рЯУЛ зµРжЮЬгВТгВ≥гГФгГЉ</button>
  <pre id="out">гГЬгВњгГ≥гВТжКЉгБЩгБ®и®ИжЄђгБЧгБЊгБЩгАВ</pre>
  <div id="verdict"></div>

<script>
const out = document.getElementById('out');
const verdictEl = document.getElementById('verdict');
const runBtn = document.getElementById('run');
const copyBtn = document.getElementById('copyBtn');
let logText = '';
function log(s){ logText += s + '\n'; out.textContent = logText; }

const SR = 44100;
const CLICK_AT = 1.0;
const BUF_DUR = 1.4;
const CLICK_DUR = 0.02;
const CLICK_FREQ = 1000;
const THRESHOLD = 0.15;
const TRIALS = 5;

function makeClickPcm(positions, totalDur){
  const n = Math.round(totalDur * SR);
  const pcm = new Float32Array(n);
  const len = Math.round(CLICK_DUR * SR);
  for(const P of positions){
    const start = Math.round(P * SR);
    for(let i=0;i<len;i++){
      const t = i/SR; let env = 1; const f = 0.002;
      if(t < f) env = t/f; else if(t > CLICK_DUR - f) env = (CLICK_DUR - t)/f;
      if(start+i < n) pcm[start+i] = Math.sin(2*Math.PI*CLICK_FREQ*t) * env * 0.9;
    }
  }
  return pcm;
}

function pcmToWavBlob(pcm){
  const n = pcm.length;
  const buf = new ArrayBuffer(44 + n*2);
  const dv = new DataView(buf);
  const ws = (o,s)=>{ for(let i=0;i<s.length;i++) dv.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); dv.setUint32(4, 36+n*2, true); ws(8,'WAVE');
  ws(12,'fmt '); dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,SR,true); dv.setUint32(28,SR*2,true); dv.setUint16(32,2,true); dv.setUint16(34,16,true);
  ws(36,'data'); dv.setUint32(40, n*2, true);
  let o=44;
  for(let i=0;i<n;i++){ let s=Math.max(-1,Math.min(1,pcm[i])); dv.setInt16(o, s<0?s*0x8000:s*0x7FFF, true); o+=2; }
  return new Blob([buf], {type:'audio/wav'});
}

function detectPeak(ctx, analyser, timeoutSec){
  return new Promise((resolve)=>{
    const data = new Float32Array(analyser.fftSize);
    const t0 = performance.now();
    function tick(){
      analyser.getFloatTimeDomainData(data);
      let peak = 0;
      for(let i=0;i<data.length;i++){ const a=Math.abs(data[i]); if(a>peak) peak=a; }
      if(peak >= THRESHOLD){ resolve({ detectCtx: ctx.currentTime, peak }); return; }
      if((performance.now()-t0)/1000 > timeoutSec){ resolve(null); return; }
      setTimeout(tick, 1);
    }
    tick();
  });
}

function median(arr){
  const v = arr.filter(x=>x!=null).sort((a,b)=>a-b);
  if(!v.length) return null;
  const m = Math.floor(v.length/2);
  return v.length%2 ? v[m] : (v[m-1]+v[m])/2;
}

// [1] triggered HTMLAudio: жѓОеЫЮ pauseвЖТseek0вЖТplay гБЧгБ¶гВѓгГ™гГГгВѓйБЕеїґ (play_call еЯЇжЇЦ) гВТжЄђгВЛ
async function measureTriggered(ctx, el){
  let analyser;
  try {
    const srcNode = ctx.createMediaElementSource(el);
    analyser = ctx.createAnalyser(); analyser.fftSize = 1024;
    srcNode.connect(analyser); analyser.connect(ctx.destination);
  } catch(e){ log('  MESдљЬжИРе§±жХЧ: '+(e.message||e)); return []; }
  const results = [];
  for(let t=0;t<TRIALS;t++){
    try { el.pause(); el.currentTime = 0; } catch(e){}
    await new Promise(r=>setTimeout(r,150));
    const playCall = ctx.currentTime;
    try { await el.play(); }
    catch(e){ log('  triggered trial '+(t+1)+' playе§±жХЧ: '+(e.message||e)); results.push(null); await new Promise(r=>setTimeout(r,150)); continue; }
    const det = await detectPeak(ctx, analyser, BUF_DUR+1.0);
    if(!det){ log('  triggered trial '+(t+1)+' ж§ЬеЗЇе§±жХЧ'); results.push(null); continue; }
    const ct = el.currentTime;
    const delayMs = (det.detectCtx - playCall - CLICK_AT) * 1000;
    const ctLagMs = (ct - CLICK_AT) * 1000;  // currentTime гБМ tap гВИгВКеЕИи°МгБЧгБ¶гБДгВЛйЗП
    log('  triggered trial '+(t+1)+': rel-play='+delayMs.toFixed(1)+'ms ¬Ј currentTime-lead='+ctLagMs.toFixed(1)+'ms');
    results.push(delayMs);
    await new Promise(r=>setTimeout(r,200));
  }
  try { el.pause(); } catch(e){}
  return results;
}

// [2] native baseline
async function measureBufferSource(ctx, pcm){
  const analyser = ctx.createAnalyser(); analyser.fftSize = 1024;
  analyser.connect(ctx.destination);
  const buf = ctx.createBuffer(1, pcm.length, SR);
  buf.copyToChannel(pcm, 0);
  const results = [];
  for(let t=0;t<TRIALS;t++){
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(analyser);
    const playCall = ctx.currentTime;
    src.start();
    const det = await detectPeak(ctx, analyser, BUF_DUR+1.0);
    if(!det){ results.push(null); try{src.stop();}catch(e){} continue; }
    const delayMs = (det.detectCtx - playCall - CLICK_AT) * 1000;
    log('  native trial '+(t+1)+': '+delayMs.toFixed(1)+' ms');
    results.push(delayMs);
    try{src.stop();}catch(e){}
    await new Promise(r=>setTimeout(r,120));
  }
  try { analyser.disconnect(); } catch(e){}
  return results;
}

// [3] continuous HTMLAudio: йА£зґЪеЖНзФЯгБЧгАБеРДгВѓгГ™гГГгВѓгБІ ќ≤ = (currentTime вИТ mediaдљНзљЃ) гВТжЄђгВЛ
async function measureContinuous(ctx, el){
  let analyser;
  try {
    const srcNode = ctx.createMediaElementSource(el);
    analyser = ctx.createAnalyser(); analyser.fftSize = 1024;
    srcNode.connect(analyser); analyser.connect(ctx.destination);
  } catch(e){ log('  MESдљЬжИРе§±жХЧ: '+(e.message||e)); return []; }
  try { el.pause(); el.currentTime = 0; } catch(e){}
  await new Promise(r=>setTimeout(r,150));
  const playCall = ctx.currentTime;
  try { await el.play(); }
  catch(e){ log('  continuous playе§±жХЧ: '+(e.message||e)); return []; }
  const data = new Float32Array(analyser.fftSize);
  const detections = [];
  let lastDetect = -10;
  const tEnd = ctx.currentTime + 5.5;
  await new Promise(resolve=>{
    function tick(){
      analyser.getFloatTimeDomainData(data);
      let peak=0; for(let i=0;i<data.length;i++){ const a=Math.abs(data[i]); if(a>peak) peak=a; }
      const now = ctx.currentTime;
      if(peak>=THRESHOLD && (now-lastDetect)>0.4){
        lastDetect = now;
        detections.push({ ctxT: now, ct: el.currentTime, peak });
      }
      if(now > tEnd){ resolve(); return; }
      setTimeout(tick, 1);
    }
    tick();
  });
  try { el.pause(); } catch(e){}
  const betas = [];
  for(const d of detections){
    const M = Math.round(d.ct);          // зЫіињСжХіжХ∞ = гБ©гБЃгВѓгГ™гГГгВѓ
    if(M < 1) continue;
    const beta = (d.ct - M) * 1000;             // currentTime гБМ tap еЗЇеКЫгВИгВКеЕИи°МгБЧгБ¶гБДгВЛйЗП
    const relPlay = (d.ctxT - playCall - M) * 1000;
    log('  click media~'+M+'s: ќ≤(currentTimeвИТmedia)='+beta.toFixed(1)+'ms ¬Ј rel-play='+relPlay.toFixed(1)+'ms (peak '+d.peak.toFixed(2)+')');
    if(M >= 2) betas.push(beta);  // еЃЪеЄЄзКґжЕЛгБЃгБњ
  }
  return betas;
}

async function run(ctx, wavSingle, wavTrain, elClick, elTrain, getUnlock){
  try { await ctx.resume(); } catch(e){}
  log('UA: ' + navigator.userAgent);
  log('sampleRate: ' + ctx.sampleRate +
      ' ¬Ј baseLatency: ' + (ctx.baseLatency!=null?(ctx.baseLatency*1000).toFixed(1)+'ms':'n/a') +
      ' ¬Ј outputLatency: ' + (ctx.outputLatency!=null?(ctx.outputLatency*1000).toFixed(1)+'ms':'n/a'));
  await new Promise(r=>setTimeout(r, 500));
  log('unlock: ' + getUnlock());
  log('');

  log('[1] triggered HTMLAudio (take зЫЄељУ):');
  const trig = await measureTriggered(ctx, elClick);
  const Ltake = median(trig);
  log('  вЖТ L_take median (rel-play): ' + (Ltake!=null?Ltake.toFixed(1)+' ms':'жЄђеЃЪдЄНиГљ'));
  log('');

  log('[2] native BufferSource (еЯЇжЇЦ):');
  const nat = median(await measureBufferSource(ctx, makeClickPcm([CLICK_AT], BUF_DUR)));
  log('  вЖТ median: ' + (nat!=null?nat.toFixed(1)+' ms':'жЄђеЃЪдЄНиГљ'));
  log('');

  log('[3] continuous HTMLAudio (BGM зЫЄељУ):');
  const betas = await measureContinuous(ctx, elTrain);
  const beta = median(betas);
  log('  вЖТ ќ≤ median (currentTimeвИТmedia, еЃЪеЄЄ): ' + (beta!=null?beta.toFixed(1)+' ms':'жЄђеЃЪдЄНиГљ'));
  log('');

  if(Ltake!=null && beta!=null){
    const mixOff = -(Ltake - beta);
    log('=== mixOffset еАЩи£Ь = -(L_take вИТ ќ≤) = -(' + Ltake.toFixed(0) + ' вИТ ' + beta.toFixed(0) + ') = ' + mixOff.toFixed(0) + ' ms ===');
    verdictEl.className = 'verdict ok';
    verdictEl.textContent = 'рЯУР mixOffset еАЩи£Ь: ' + mixOff.toFixed(0) + ' ms (L_take=' + Ltake.toFixed(0) + ', ќ≤=' + beta.toFixed(0) + ')';
  } else {
    verdictEl.className = 'verdict ok';
    verdictEl.textContent = 'вЪ† жЄђеЃЪдЄНиГљгАВгГ≠гВ∞гВТзҐЇи™НгБЧгБ¶гБПгБ†гБХгБДгАВ';
  }
  try { URL.revokeObjectURL(wavSingle); URL.revokeObjectURL(wavTrain); } catch(e){}
  try { ctx.close(); } catch(e){}
  copyBtn.style.display = 'block';
}

runBtn.addEventListener('click', ()=>{
  runBtn.disabled = true;
  logText = ''; verdictEl.textContent = ''; verdictEl.className = 'verdict';
  out.textContent = 'и®ИжЄђдЄ≠...';
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  ctx.resume();
  const wavSingle = URL.createObjectURL(pcmToWavBlob(makeClickPcm([CLICK_AT], BUF_DUR)));
  const wavTrain  = URL.createObjectURL(pcmToWavBlob(makeClickPcm([1,2,3,4,5], 5.6)));
  const elClick = new Audio(); elClick.preload='auto'; elClick.src = wavSingle;
  const elTrain = new Audio(); elTrain.preload='auto'; elTrain.src = wavTrain;
  // 2 и¶Бзі†гБ®гВВгВЄгВІгВєгГБгГ£еЖЕгБІ unlock
  let unlockState = 'pending';
  function unlock(el){ try { const p = el.play(); if(p&&p.then){ return p.then(()=>{ try{el.pause(); el.currentTime=0;}catch(e){} }); } } catch(e){} return Promise.resolve(); }
  Promise.all([unlock(elClick), unlock(elTrain)])
    .then(()=>{ unlockState='ok'; }).catch(e=>{ unlockState='fail:'+(e.name||e); });
  run(ctx, wavSingle, wavTrain, elClick, elTrain, ()=>unlockState).finally(()=>{ runBtn.disabled = false; });
});

copyBtn.addEventListener('click', async ()=>{
  try { await navigator.clipboard.writeText(logText + '\n' + verdictEl.textContent); copyBtn.textContent='вЬУ гВ≥гГФгГЉгБЧгБЊгБЧгБЯ'; setTimeout(()=>copyBtn.textContent='рЯУЛ зµРжЮЬгВТгВ≥гГФгГЉ',1500); }
  catch(e){ alert('гВ≥гГФгГЉе§±жХЧ: '+(e.message||e)); }
});
</script>
</body>
</html>
