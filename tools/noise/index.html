</head>
<body>

<!-- Splash -->
<div id="splash">
  <svg class="splash-cat" xmlns="http://www.w3.org/2000/svg" viewBox="-46 -50 100 110" aria-hidden="true">
    <g transform="rotate(-12,-12,8.3)"><path d="M-21.6,-14.94 L-14.549,-35.916 Q-12,-43.5 -9.451,-35.916 L-2.4,-14.94 Z" fill="#c2410c"/></g>
    <g transform="rotate(12,12,8.3)"><path d="M2.4,-14.94 L9.451,-35.916 Q12,-43.5 14.549,-35.916 L21.6,-14.94 Z" fill="#c2410c"/></g>
    <ellipse cx="0" cy="1.3" rx="34" ry="26" fill="#c2410c"/>
    <line x1="-14" y1="1" x2="-33.68" y2="-2.28" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-14" y1="6" x2="-33.44" y2="6" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-14" y1="10.59" x2="-29.58" y2="14.26" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-33.68" y1="-2.28" x2="-38" y2="-3" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-33.44" y1="6" x2="-40" y2="6" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-29.58" y1="14.26" x2="-37" y2="16" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14" y1="1" x2="33.68" y2="-2.28" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14" y1="6" x2="33.44" y2="6" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="14" y1="10.59" x2="29.58" y2="14.26" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="33.68" y1="-2.28" x2="38" y2="-3" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="33.44" y1="6" x2="40" y2="6" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="29.58" y1="14.26" x2="37" y2="16" stroke="#c2410c" stroke-width="1.8" stroke-linecap="round"/>
    <ellipse cx="-12" cy="-3.7" rx="4.2" ry="5.6" fill="#1a0800"/>
    <ellipse cx="12"  cy="-3.7" rx="4.2" ry="5.6" fill="#1a0800"/>
    <ellipse cx="-12" cy="-3.7" rx="2.4" ry="3.5" fill="#000"/>
    <ellipse cx="12"  cy="-3.7" rx="2.4" ry="3.5" fill="#000"/>
    <circle cx="-10.5" cy="-5.2" r="1.0" fill="#c2410c"/>
    <circle cx="13.5"  cy="-5.2" r="1.0" fill="#c2410c"/>
    <path d="M0,6.3 C-0.8,4.8 -3.5,4.8 -3.5,7.3 C-3.5,9.3 0,11.3 0,11.3 C0,11.3 3.5,9.3 3.5,7.3 C3.5,4.8 0.8,4.8 0,6.3 Z" fill="#000"/>
    <line x1="0" y1="11.3" x2="0" y2="13.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,13.3 Q-5,17.3 -8,15.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,13.3 Q5,17.3 8,15.3"  fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Noise 固有: 機械式メガホン (ピストルグリップ + トリガー + スイッチ、 白黒灰) -->
    <g id="noise-overlay">
      <!-- 本体 (台形、 左小→右大) -->
      <path d="M 10 4 L 50 -4 L 50 32 L 10 24 Z" fill="#cccccc" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/>
      <!-- 大開口リム (右端の縦楕円) -->
      <ellipse cx="50" cy="14" rx="3" ry="18" fill="#888888" stroke="#000" stroke-width="1.0"/>
      <!-- 後端ボックス (左、 電池/駆動部) -->
      <rect x="2" y="10" width="9" height="14" rx="1" fill="#666666" stroke="#000" stroke-width="0.9"/>
      <!-- スイッチノブ (本体上部の突起) -->
      <rect x="22" y="-2" width="4" height="5" rx="0.5" fill="#222" stroke="#000" stroke-width="0.5"/>
      <!-- ピストルグリップ (本体下、 縦長) -->
      <rect x="20" y="24" width="8" height="22" rx="2" fill="#444444" stroke="#000" stroke-width="1.0"/>
      <!-- グリップの滑り止め (横細線 3 本) -->
      <line x1="21.5" y1="30" x2="26.5" y2="30" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
      <line x1="21.5" y1="34" x2="26.5" y2="34" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
      <line x1="21.5" y1="38" x2="26.5" y2="38" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
      <!-- トリガーガード (U 字、 引き金カバー) -->
      <path d="M 17 26 C 12 30, 12 38, 18 38" fill="none" stroke="#444444" stroke-width="1.8" stroke-linecap="round"/>
      <!-- トリガー (引き金、 グリップ前面) -->
      <path d="M 20 27 L 17 32 L 20 33 Z" fill="#222" stroke="#000" stroke-width="0.5" stroke-linejoin="round"/>
    </g>
  </svg>
  <h1>MOMO <span>Noise</span></h1>
  <div id="version-panel" class="splash-ver"></div>
  <div class="tap-hint">TAP TO START</div>
</div>

<!-- Main -->
<div id="main" style="display:none">

  <header>
    <div class="header-top">
      <svg class="header-cat" xmlns="http://www.w3.org/2000/svg" viewBox="-46 -50 100 110" aria-hidden="true">
        <g transform="rotate(-12,-12,8.3)"><path d="M-21.6,-14.94 L-14.549,-35.916 Q-12,-43.5 -9.451,-35.916 L-2.4,-14.94 Z" fill="#c2410c"/></g>
        <g transform="rotate(12,12,8.3)"><path d="M2.4,-14.94 L9.451,-35.916 Q12,-43.5 14.549,-35.916 L21.6,-14.94 Z" fill="#c2410c"/></g>
        <ellipse cx="0" cy="1.3" rx="34" ry="26" fill="#c2410c"/>
        <line x1="-14" y1="1" x2="-33.68" y2="-2.28" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="-14" y1="6" x2="-33.44" y2="6" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="-14" y1="10.59" x2="-29.58" y2="14.26" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="14" y1="1" x2="33.68" y2="-2.28" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="14" y1="6" x2="33.44" y2="6" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="14" y1="10.59" x2="29.58" y2="14.26" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <ellipse cx="-12" cy="-3.7" rx="4.2" ry="5.6" fill="#1a0800"/>
        <ellipse cx="12"  cy="-3.7" rx="4.2" ry="5.6" fill="#1a0800"/>
        <ellipse cx="-12" cy="-3.7" rx="2.4" ry="3.5" fill="#000"/>
        <ellipse cx="12"  cy="-3.7" rx="2.4" ry="3.5" fill="#000"/>
        <circle cx="-10.5" cy="-5.2" r="1.0" fill="#c2410c"/>
        <circle cx="13.5"  cy="-5.2" r="1.0" fill="#c2410c"/>
        <path d="M0,6.3 C-0.8,4.8 -3.5,4.8 -3.5,7.3 C-3.5,9.3 0,11.3 0,11.3 C0,11.3 3.5,9.3 3.5,7.3 C3.5,4.8 0.8,4.8 0,6.3 Z" fill="#000"/>
        <line x1="0" y1="11.3" x2="0" y2="13.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M0,13.3 Q-5,17.3 -8,15.3" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M0,13.3 Q5,17.3 8,15.3"  fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Noise 固有: 機械式メガホン (ピストルグリップ + トリガー + スイッチ、 白黒灰) -->
        <g id="noise-overlay-h">
          <path d="M 10 4 L 50 -4 L 50 32 L 10 24 Z" fill="#cccccc" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/>
          <ellipse cx="50" cy="14" rx="3" ry="18" fill="#888888" stroke="#000" stroke-width="1.0"/>
          <rect x="2" y="10" width="9" height="14" rx="1" fill="#666666" stroke="#000" stroke-width="0.9"/>
          <rect x="22" y="-2" width="4" height="5" rx="0.5" fill="#222" stroke="#000" stroke-width="0.5"/>
          <rect x="20" y="24" width="8" height="22" rx="2" fill="#444444" stroke="#000" stroke-width="1.0"/>
          <line x1="21.5" y1="30" x2="26.5" y2="30" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
          <line x1="21.5" y1="34" x2="26.5" y2="34" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
          <line x1="21.5" y1="38" x2="26.5" y2="38" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
          <path d="M 17 26 C 12 30, 12 38, 18 38" fill="none" stroke="#444444" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M 20 27 L 17 32 L 20 33 Z" fill="#222" stroke="#000" stroke-width="0.5" stroke-linejoin="round"/>
        </g>
      </svg>
      <div>
        <div class="header-title">
          <span class="momo">MOMO</span>
          <span class="noise">Noise</span>
          <span class="version-tag" id="ver-display"></span>
        </div>
        <div class="header-sub" id="header-sub">Recording &amp; Clipping Noise Maker</div>
      </div>
      <div id="lang-switcher">
        <select id="lang-select" onchange="onLangChange(this.value)">
          <option value="ja">日本語</option>
          <option value="en">EN</option>
          <option value="zh">中文</option>
          <option value="cat">CAT</option>
        </select>
      </div>
    </div>
  </header>

  <!-- Controls bar -->
  <div class="controls-bar">
    <!-- Volume -->
    <div class="ctrl-group">
      <label id="lbl-vol">音量</label>
      <input type="range" id="ctrl-vol" min="0" max="1" step="0.05" value="1">
    </div>
    <!-- Pitch (step buttons) -->
    <div class="ctrl-group">
      <label id="lbl-pitch">ピッチ</label>
      <button class="noise-btn btn-step" id="btn-pitch-down">−</button>
      <span id="pitch-val" class="ctrl-val" style="min-width:32px;text-align:center">+0</span>
      <button class="noise-btn btn-step" id="btn-pitch-up">＋</button>
      <button class="noise-btn btn-step" id="btn-pitch-reset">R</button>
    </div>
    <!-- Metronome -->
    <div class="ctrl-group">
      <button class="noise-btn" id="btn-metro">メトロノーム</button>
      <div id="beat-flash"></div>
      <label id="lbl-bpm">BPM</label>
      <input type="range" id="ctrl-bpm" min="20" max="300" step="1" value="120" style="width:64px">
      <span class="ctrl-val" id="bpm-val">120</span>
    </div>
    <button class="noise-btn" id="btn-sync">シンクOFF</button>
    <!-- Trim -->
    <div class="ctrl-group">
      <label id="lbl-trim">無音カット</label>
      <input type="range" id="ctrl-trim" min="-60" max="-10" step="1" value="-40" style="width:56px">
      <span class="ctrl-val" id="trim-val">-40dB</span>
    </div>
    <!-- Mode -->
    <div class="mode-btns">
      <button class="noise-btn active" id="btn-mode-edit">編集</button>
      <button class="noise-btn" id="btn-mode-play">再生</button>
    </div>
  </div>

  <!-- Edit panel -->
  <div id="edit-panel"><div id="edit-list"></div></div>

  <!-- Play panel -->
  <div id="play-panel" style="display:none"><div id="play-pad"></div></div>

  <!-- Save bar -->
  <div class="save-bar">
    <button class="noise-btn" id="btn-drive-save">Driveに保存</button>
    <button class="noise-btn" id="btn-drive-load">Driveから読み込み</button>
  </div>

</div>

<div id="toast"></div>

<script src="versions.js"></script>
<script src="audio.js"></script>
<script src="metro.js"></script>
<script src="drive.js"></script>
<script src="app.js"></script>
</body>
</html>
