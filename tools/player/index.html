}

// v8: directoryHandleからファイルURLを解決
async function resolveTrackUrl(track) {
  if (track.url) return track.url;
  if (!track.path) return null;
  // rootFolderフィールドで直接照合（最優先）
  let rootEntry = state.rootFolders.find(f => f.folderPath === track.rootFolder);
  // なければpathの先頭セグメントで照合
  if (!rootEntry) {
    const firstSeg = track.path.split('/')[0];
    rootEntry = state.rootFolders.find(f => f.folderPath === firstSeg || f.displayName === firstSeg);
  }
  // まだなければhandleがあるものを使う
  if (!rootEntry) {
    rootEntry = state.rootFolders.find(f => f.directoryHandle);
  }
  if (!rootEntry || !rootEntry.directoryHandle) return null;
  try {
    const perm = await rootEntry.directoryHandle.requestPermission({ mode: 'read' });
    if (perm !== 'granted') return null;
    // path は "sub/file.mp3" 形式（ルートフォルダ名なし）なのでそのまま辿る
    const parts = track.path.split('/').filter(p => p.length > 0);
    if (parts.length === 0) return null;
    let handle = rootEntry.directoryHandle;
    for (let i = 0; i < parts.length - 1; i++) {
      handle = await handle.getDirectoryHandle(parts[i]);
    }
    const fileHandle = await handle.getFileHandle(parts[parts.length - 1]);
    const file = await fileHandle.getFile();
    return URL.createObjectURL(file);
  } catch(e) {
    addErrorLog(`ファイル解決エラー [${track.path}]: ${e.message||e}`);
    return null;
  }
}

// ===== V9: LRC パーサー =====
// V9e: LRCをバイト列から文字コード自動判定してデコードする
function decodeLRC(rawBytes) {
  // BOMチェック
  if (rawBytes[0]===0xEF && rawBytes[1]===0xBB && rawBytes[2]===0xBF) {
    return new TextDecoder('utf-8').decode(rawBytes.slice(3));
  }
  if (rawBytes[0]===0xFF && rawBytes[1]===0xFE) {
    return new TextDecoder('utf-16le').decode(rawBytes.slice(2));
  }
  if (rawBytes[0]===0xFE && rawBytes[1]===0xFF) {
    return new TextDecoder('utf-16be').decode(rawBytes.slice(2));
  }
  const mode = state.currentEncoding || 'auto';
  if (mode === 'sjis') {
    try { const s=new TextDecoder('shift_jis').decode(rawBytes); if(s&&!s.includes('\uFFFD')) return s; } catch(e) {}
  } else if (mode === 'unicode') {
    try { return new TextDecoder('utf-8',{fatal:true}).decode(rawBytes); } catch(e) {}
    try { return new TextDecoder('utf-8').decode(rawBytes); } catch(e) {}
  } else {
    // auto: UTF-8厳密 → SJIS → latin1
    try {
      const u=new TextDecoder('utf-8',{fatal:true}).decode(rawBytes);
      if(u && !/^[\x00-\x7F]*$/.test(u)) return u;
    } catch(e) {}
    if (looksLikeShiftJis(rawBytes)) {
      try { const s=new TextDecoder('shift_jis').decode(rawBytes); if(s&&!s.includes('\uFFFD')) return s; } catch(e) {}
    }
  }
  return new TextDecoder('utf-8').decode(rawBytes);
}

function parseLRC(textOrBytes) {
  if (!textOrBytes) return null;
  // バイト配列が渡された場合はデコードする
  let text = textOrBytes;
  if (textOrBytes instanceof Uint8Array || textOrBytes instanceof ArrayBuffer) {
    const bytes = textOrBytes instanceof ArrayBuffer ? new Uint8Array(textOrBytes) : textOrBytes;
    text = decodeLRC(bytes);
  }
  const lines = text.split(/\r?\n/);
  // タイムスタンプ正規表現: [分:秒.xx] (ドット区切り) または [分:秒:cc] (コロン区切りセンチ秒) 両形式に対応
  const timeReg = /\[(\d{1,3}):(\d{2})(?:[.:](\d+))?\]/g;
  const synced = [];
  const plain = [];
  lines.forEach(line => {
    const l = line.trim();
    if (!l) return;
    // メタタグ行を除外（[ti:...] [ar:...] 等）
    if (/^\[(ti|ar|al|by|offset|length|re|ve|au):/i.test(l)) return;
    const times = [];
    let m;
    timeReg.lastIndex = 0;
    while ((m = timeReg.exec(l)) !== null) {
      const sub = m[3] || '0';
      // サブ秒: 2桁以下はセンチ秒(1/100)、3桁以上はミリ秒(1/1000)
      const subSec = sub.length <= 2 ? parseInt(sub) / 100 : parseInt(sub) / 1000;
      times.push(parseInt(m[1]) * 60 + parseInt(m[2]) + subSec);
    }
    // タイムスタンプを除いた歌詞テキスト（ドット区切り・コロン区切り両形式を除去）
    const lyricText = l.replace(/\[\d{1,3}:\d{2}(?:[.:]\d+)?\]/g, '').trim();
    if (times.length > 0) {
      // タイムスタンプあり → synced（歌詞テキストが空でもタイミング行として登録）
      times.forEach(t => synced.push({ time: t, text: lyricText }));
    } else if (lyricText) {
      // タイムスタンプなし・テキストあり → plain候補
      plain.push(lyricText);
    }
  });
  synced.sort((a, b) => a.time - b.time);
  if (synced.length > 0) return { lines: synced, isTimeSynced: true };
  if (plain.length > 0) return { lines: plain.map(t => ({ time: -1, text: t })), isTimeSynced: false };
  return null;
}

// V9: 歌詞表示の初期化（曲切替時）
async function initLyricsForTrack(track) {
  stopLyricsTimer();
  state.currentLyrics = null;
  state.currentTrackHasLyrics = false;  // v9m: 歌詞有無フラグ
  // lrcFileMap に既読データがあれば使う
  let lrcText = state.lrcFileMap[track.cacheKey] || null;
  // なければlrcCacheから探す（cacheKeyでなくパスベース）
  if (!lrcText) {
    const parts = (track.path||'').split('/');
    const folder = parts.slice(0,-1).join('/');
    const baseName = (parts[parts.length-1]||'').replace(/\.[^.]+$/,'').replace(/^\d+[\s._-]*/,'').toLowerCase();
    const numMatch = (parts[parts.length-1]||'').match(/^(\d+)/);
    const trackNum = numMatch ? numMatch[1] : null;
    lrcText = state.lrcCache[folder+'/'+baseName]
           || (trackNum ? state.lrcCache[folder+'/__num__'+trackNum] : null)
           || null;
  }
  if (!lrcText) {
    // v10e: lyricsOnがtrueなら「歌詞がありません」表示（自動でスペクトラムに移行しない）
    if (state.lyricsOn) {
      showNoLyricsMessage();
    } else {
      showViz();
    }
    updateLyricsToggleBtn();
    return;
  }
  const parsed = parseLRC(lrcText);
  if (!parsed) {
    // v10e: 歌詞モードなら「歌詞がありません」表示
    if (state.lyricsOn) { showNoLyricsMessage(); } else { showViz(); }
    updateLyricsToggleBtn(); return;
  }
  state.currentLyrics = parsed;
  state.currentTrackHasLyrics = true;  // v9m: 歌詞あり
  if (state.lyricsOn) {
    showLyricsDisplay(parsed);
  } else {
    showViz();
  }
  // v9m: 切り替えボタン更新
  updateLyricsToggleBtn();
}

function showViz() {
  document.getElementById('lyrics-display').style.display = 'none';
  document.getElementById('viz').style.display = 'block';
  document.getElementById('lyrics-controls').style.display = 'none';
  // v10 改善2: スペクトラム表示時はリセットボタン非表示
  const resetBtn = document.getElementById('lyrics-reset-btn');
  if (resetBtn) resetBtn.style.display = 'none';
  // v9m: 切り替えボタンの表示を更新
  updateLyricsToggleBtn();
}

function showLyricsDisplay(parsed) {
  const ld = document.getElementById('lyrics-display');
  const viz = document.getElementById('viz');
  viz.style.display = 'none';
  ld.style.display = 'flex';
  ld.innerHTML = '';
  document.getElementById('lyrics-controls').style.display = 'flex';
  if (parsed.isTimeSynced) {
    // 同期歌詞: 1行表示
    const lineEl = document.createElement('div');
    lineEl.id = 'lyrics-line';
    lineEl.textContent = '';
    ld.appendChild(lineEl);
    startLyricsTimer();
  } else {
    // 非同期歌詞: スクロール可能な複数行表示
    const scroller = document.createElement('div');
    scroller.id = 'lyrics-manual-scroll';
    parsed.lines.forEach(l => {
      const p = document.createElement('div');
      p.className = 'lyrics-manual-line';
      p.textContent = l.text;
      scroller.appendChild(p);
    });
    ld.appendChild(scroller);
    // タイミング調整スライダーは非同期歌詞では非表示
    document.getElementById('lyrics-offset-slider').parentElement.style.display = 'none';
  }
  // v10 改善2: 歌詞リセットボタンは歌詞表示中のみ表示
  const resetBtn = document.getElementById('lyrics-reset-btn');
  if (resetBtn) resetBtn.style.display = 'inline-block';
  // v9m: 切り替えボタンの表示を更新
  updateLyricsToggleBtn();
}

function startLyricsTimer() {
  stopLyricsTimer();
  function tick() {
    const parsed = state.currentLyrics;
    if (!parsed || !parsed.isTimeSynced) return;
    const lineEl = document.getElementById('lyrics-line');
    if (!lineEl) return;
    const t = audio.currentTime + state.lyricsOffset;
    let current = '';
    for (let i = 0; i < parsed.lines.length; i++) {
      if (parsed.lines[i].time <= t) current = parsed.lines[i].text;
      else break;
    }
    if (lineEl.textContent !== current) lineEl.textContent = current;
    // フォントサイズ自動調整
    const w = lineEl.parentElement ? lineEl.parentElement.offsetWidth : 300;
    const len = current.length || 1;
    const fs = Math.min(28, Math.max(14, Math.floor(w / len * 1.5)));
    lineEl.style.fontSize = fs + 'px';
    state.lyricsTimer = requestAnimationFrame(tick);
  }
  state.lyricsTimer = requestAnimationFrame(tick);
}

function stopLyricsTimer() {
  if (state.lyricsTimer) { cancelAnimationFrame(state.lyricsTimer); state.lyricsTimer = null; }
}

// v9m: 歌詞/スペクトラム切り替えボタンの状態更新
// v9p: updateLyricsToggleBtn - lyricsOnベースのラベル
function updateLyricsToggleBtn() {
  const btn = document.getElementById('lyrics-toggle-btn');
  if (!btn) return;
  if (state.lyricsOn) {
    // 歌詞表示モード（歌詞あり・なし問わずラベルは同じ）
    btn.textContent = t('lyricsToggleToSpectrum');
    btn.classList.add('lyrics-active');
  } else {
    // v10e: スペクトラム表示モードは歌詞の有無にかかわらず常に「歌詞」ボタン表示
    btn.textContent = t('lyricsToggleToLyrics');
    btn.classList.remove('lyrics-active');
  }
}

}

// v9p: lyrics-toggle-btn クリックハンドラ（一本化・新仕様）
document.getElementById('lyrics-toggle-btn').addEventListener('click', () => {
  if (state.lyricsOn) {
    // 歌詞表示モード → スペクトラム表示モードに切替
    state.lyricsOn = false;

// ===== V9: 曲名バックグラウンド再解析（取込時文字化けしたMP3曲名のみ） =====
async function startTitleBgReanalysis(tracksToReanalyze) {
  if (!tracksToReanalyze || tracksToReanalyze.length === 0) return;
  // アーティスト・アルバムは変更しない。曲名のみ。
  (async () => {
    const BATCH = 10;
    for (let i = 0; i < tracksToReanalyze.length; i += BATCH) {
      const batch = tracksToReanalyze.slice(i, i+BATCH);
      await Promise.allSettled(batch.map(async track => {
        if (!track.file || track.format !== 'mp3') return;
        try {
          const buf = await readMP3TagBuffer(track.file);
          const tag = parseID3(buf);
          if (!tag.title) return;
          // 文字化けが改善しているか確認：元のタイトルに不正文字があれば差し替え
          const newTitle = tag.title;
          if (newTitle === track.title) return; // 同じなら更新不要
          if (!newTitle || /\uFFFD/.test(track.title) || containsMojibake(track.title)) {
            track.title = newTitle;
            // DOM更新
            const row = document.querySelector(`.lib-track-row[data-cache-key="${CSS.escape(track.cacheKey||'')}"]`);
            if (row) {
              const nameEl = row.querySelector('.lib-track-name');
              if (nameEl) {
                const lyricsIcon = track.hasLyrics ? '<span id="lyrics-icon-badge" title="歌詞あり">♪</span>' : '';
                nameEl.innerHTML = esc(newTitle) + lyricsIcon;
              }
            }
            // DB更新
            if (db) {
              try {
                const tx = db.transaction(DB_STORE, 'readwrite');
                const req = tx.objectStore(DB_STORE).get(track.cacheKey);
                req.onsuccess = e => { const rec=e.target.result; if(rec){rec.title=newTitle;tx.objectStore(DB_STORE).put(rec);} };
              } catch(e) {}
            }
          }
        } catch(e) {}
      }));
      await new Promise(r => setTimeout(r, 0));
    }
  })();
}

function containsMojibake(str) {
  if (!str) return false;
  let latin=0;
  for (let i=0; i<str.length; i++) {
    const c=str.charCodeAt(i);
    if (c>=0xC0&&c<=0xFF) latin++;
  }
  return str.length>2 && latin/str.length>0.4;
}

// v8: 追加タグ解析（TCOM/TCON/TDRC/TYER/COMM/TPOS）
function parseID3Extra(buffer) {
  const data = new Uint8Array(buffer);
  const res  = { composer:null, genre:null, year:null, comment:null, discNum:null };
  if (data[0]!==0x49||data[1]!==0x44||data[2]!==0x33) return res;
  const ver  = data[3];
  const size = ((data[6]&0x7f)<<21)|((data[7]&0x7f)<<14)|((data[8]&0x7f)<<7)|(data[9]&0x7f);
  let pos    = 10;
  if (data[5]&0x40) pos+=10;
  while (pos<10+size-10) {
    if (pos+10>data.length) break;
    const fid = String.fromCharCode(data[pos],data[pos+1],data[pos+2],data[pos+3]);
    if (fid==='\0\0\0\0') break;
    let fsz;
    if (ver>=4) fsz=((data[pos+4]&0x7f)<<21)|((data[pos+5]&0x7f)<<14)|((data[pos+6]&0x7f)<<7)|(data[pos+7]&0x7f);
    else        fsz=(data[pos+4]<<24)|(data[pos+5]<<16)|(data[pos+6]<<8)|data[pos+7];
    if (fsz<=0||fsz>10000000) break;
    const fd  = data.slice(pos+10,pos+10+fsz);
    const enc = fd[0];
    const sb  = fd.slice(1);
    if      (fid==='TCOM') res.composer = stripNull(decodeTagString(sb,enc));
    else if (fid==='TCON') { let g=stripNull(decodeTagString(sb,enc)); res.genre=g.replace(/^\((\d+)\)$/,(_,n)=>n)||g||null; }
    else if (fid==='TDRC'||fid==='TYER') { if(!res.year) res.year=stripNull(decodeTagString(sb,enc)).slice(0,4)||null; }
    else if (fid==='TPOS') res.discNum = stripNull(decodeTagString(sb,enc));
    else if (fid==='COMM') {
      // COMM: enc(1) + lang(3) + short desc(null) + text
      if (fd.length>5) {
        let i2=4; while(i2<fd.length&&fd[i2]!==0) i2++; i2++;
        if (i2<fd.length) {
          const cmt = stripNull(decodeTagString(fd.slice(i2),enc));
          if (cmt) res.comment = cmt;
        }
      }
    }
    pos+=10+fsz;
  }
  return res;
}

audio.addEventListener('ended', () => {
  if (state.isRepeat) { audio.play(); return; }

  // リストが空 → 停止
  if (state.playlist.length === 0) {
    state.isPlaying = false; updatePlayBtn(); clearPlayingHighlight(); stopLyricsTimer(); showViz(); return;
  }

  // currentIndex=-1 は「現在の曲がリストから消えた」→ 先頭から再生
  if (state.currentIndex < 0) {
    state.currentIndex = 0;
  } else {
    const next = state.currentIndex + 1;
    if (next >= state.playlist.length) {
      // リスト末尾 → 停止
      state.isPlaying = false; updatePlayBtn(); clearPlayingHighlight(); stopLyricsTimer(); showViz(); return;
    }
    state.currentIndex = next;
  }

  const nextTrack = state.playlist[state.currentIndex];
  updateNowPlaying(); updatePlaylistHighlight(); highlightPlaying();
  if (nextTrack.url) {
    audio.src = nextTrack.url; audio.play();
  } else {
    resolveTrackUrl(nextTrack).then(url => {
      if (url) { nextTrack.url = url; audio.src = url; audio.play(); }
      else { state.isPlaying = false; updatePlayBtn(); clearPlayingHighlight(); }
    });
  }
});

const searchInput  = document.getElementById('library-search-input');
const searchPrevBtn = document.getElementById('search-prev-btn');
const searchNextBtn = document.getElementById('search-next-btn');
const searchCount   = document.getElementById('search-count');

function clearSearchHighlights() {
  document.querySelectorAll('.lib-search-hit').forEach(el => el.classList.remove('lib-search-hit'));
}

// v9k: 検索を非同期チャンク処理化（1件でも見つかったら▶有効、全件完了で◀も有効）
function buildSearchResults(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    state.searchResults=[]; state.searchIndex=-1;
    state.searchInProgress=false; state.searchComplete=false;
    clearSearchHighlights(); searchCount.textContent='';
    updateSearchBtnState(); return;
  }
  // 前回の検索をキャンセル（クロージャのcurrentQueryで判定）
  state.searchResults = [];
  state.searchIndex = -1;
  state.searchInProgress = true;
  state.searchComplete = false;
  clearSearchHighlights();
  searchCount.textContent = '検索中…';
  updateSearchBtnState();

  const artists = [...document.querySelectorAll('.lib-artist-row')];
  const albums  = [...document.querySelectorAll('.lib-album-row')];
  const tracks  = [...document.querySelectorAll('.lib-track-row')];
  const allRows = [
    ...artists.map(el=>({el,type:'artist'})),
    ...albums.map(el=>({el,type:'album'})),
    ...tracks.map(el=>({el,type:'track'})),
  ];

  const CHUNK = 50;
  let i = 0;
  const currentQuery = q;

  function processChunk() {
    if (searchInput.value.trim().toLowerCase() !== currentQuery) return; // クエリ変更で中断
    const end = Math.min(i + CHUNK, allRows.length);
    for (; i < end; i++) {
      const {el, type} = allRows[i];
      let name = '';
      if (type==='artist') name=(el.querySelector('.lib-artist-name')?.textContent||'').toLowerCase();
      else if (type==='album') name=(el.querySelector('.lib-album-name')?.textContent||'').toLowerCase();
      else name=(el.querySelector('.lib-track-name')?.textContent||'').toLowerCase();
      if (name.includes(q)) state.searchResults.push({el,type});
    }
    // 1件以上見つかったら▶を有効化
    if (state.searchResults.length > 0) {
      searchNextBtn.disabled = false;
    }
    searchCount.textContent = `検索中… ${state.searchResults.length}件`;

    if (i < allRows.length) {
      setTimeout(processChunk, 0);
    } else {
      state.searchInProgress = false;
      state.searchComplete = true;
      if (state.searchResults.length === 0) {
        searchCount.textContent = '0件';
      } else {
        searchCount.textContent = `0/${state.searchResults.length}`;
      }
      updateSearchBtnState();
    }
  }
  setTimeout(processChunk, 0);
}

function jumpToSearchResult(idx) {
  clearSearchHighlights();
  if (state.searchResults.length === 0) return;
  // clamp（ローテーションなし）
  idx = Math.max(0, Math.min(idx, state.searchResults.length-1));
  state.searchIndex = idx;
  const res = state.searchResults[idx];
  const el = res.el;
  // 必要なら展開
  if (res.type === 'album' || res.type === 'track') {
    // アーティストを展開
    const artistBody = el.closest('.lib-artist-body');
    if (artistBody) {
      artistBody.classList.add('open');
      const artistRow = artistBody.previousElementSibling;
      if (artistRow) artistRow.querySelector('.lib-artist-toggle')?.classList.add('open');
    }
  }
  if (res.type === 'track') {
    // アルバムを展開
    const albumBody = el.closest('.lib-album-body');
    if (albumBody) {
      albumBody.classList.add('open');
      const albumRow = albumBody.previousElementSibling;
      if (albumRow) albumRow.querySelector('.lib-album-toggle')?.classList.add('open');
    }
  }
  el.classList.add('lib-search-hit');
  el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  searchCount.textContent = `${idx+1}/${state.searchResults.length}`;
  updateSearchBtnState();
}

// v9k: 並列検索対応版（searchCompleteフラグで◀の有効化を制御）
function updateSearchBtnState() {
  const n = state.searchResults.length;
  const idx = state.searchIndex;
  const complete = state.searchComplete;
  if (n === 0) {
    searchPrevBtn.disabled = true;
    searchNextBtn.disabled = true;
  } else if (idx === -1) {
    searchPrevBtn.disabled = !complete; // 完了前は◀disabled
    searchNextBtn.disabled = false;     // 1件以上あれば▶有効
  } else {
    searchPrevBtn.disabled = !complete || idx <= 0;
    searchNextBtn.disabled = idx >= n - 1;
  }
}

// ===== FILE LOADING (v8) =====
const loadStatus  = document.getElementById('load-status');
const folderInput = document.getElementById('folder-input');

// フォールバック用: input[webkitdirectory]でフォルダ追加（V9: 新形式・LRC対応）
folderInput.addEventListener('change', async e => {
  loadStatus.textContent = '';
  const files = Array.from(e.target.files);
  if (files.length === 0) return;
  const audioFiles = files.filter(f => /\.(mp3|flac|wav|wave|m4a|ogg|opus|aif|aiff|wma|dsf)$/i.test(f.name));
  const lrcFiles   = files.filter(f => /\.lrc$/i.test(f.name));
  const topFolderName = files[0]?.webkitRelativePath?.split('/')[0] || 'Music';
  const folderPath = topFolderName;
  if (state.rootFolders.some(f => f.folderPath === folderPath)) {
    showToast(currentLang === 'en' ? 'Folder already registered' : currentLang === 'zh' ? '文件夹已注册' : 'このフォルダは既に登録済みです');
    folderInput.value = '';
    return;
  }

  // V9: LRCファイルをメモリに読み込んでキャッシュ
  const lrcTextMap = {};
  for (const lrcFile of lrcFiles) {
    try {
      const text = new Uint8Array(await lrcFile.arrayBuffer());
      const relPath = lrcFile.webkitRelativePath || lrcFile.name;
      const parts = relPath.split('/').slice(1); // トップフォルダ名を除く
      const folder = parts.slice(0,-1).join('/');
      const lrcName = parts[parts.length-1];
      const baseName = lrcName.replace(/\.lrc$/i,'').replace(/^\d+[\s._-]*/,'').toLowerCase();
      const numMatch = lrcName.match(/^(\d+)/);
      const lrcNum = numMatch ? numMatch[1] : null;
      lrcTextMap[folder + '/' + baseName] = text;
      if (lrcNum) lrcTextMap[folder + '/__num__' + lrcNum] = text;
    } catch(e) {}
  }
  Object.assign(state.lrcCache, lrcTextMap);

  loadStatus.textContent = `タグ情報を読み込み中…`;
  const BATCH = 20;
  const results = [];
  for (let i = 0; i < audioFiles.length; i += BATCH) {
    const batch = audioFiles.slice(i, i+BATCH);
    const parsed = await Promise.allSettled(batch.map(f => readFileMeta(f, f.webkitRelativePath.replace(/^[^/]+\//,''))));
    parsed.forEach((r, ri) => {
      if(r.status==='fulfilled'&&r.value) {
        const meta = r.value;
        meta.rootFolder = folderPath;
        // V9: LRC対応付け
        const parts = (audioFiles[i+ri].webkitRelativePath||'').split('/').slice(1);
        const folder = parts.slice(0,-1).join('/');
        const fname  = parts[parts.length-1]||'';
        const bname  = fname.replace(/\.[^.]+$/,'').replace(/^\d+[\s._-]*/,'').toLowerCase();
        const numM   = fname.match(/^(\d+)/);
        const tNum   = numM ? numM[1] : null;
        const kByName = folder+'/'+bname;
        const kByNum  = tNum ? folder+'/__num__'+tNum : null;
        if (lrcTextMap[kByName]||(kByNum&&lrcTextMap[kByNum])) {
          meta.hasLyrics = true;
          state.lrcFileMap[meta.cacheKey] = lrcTextMap[kByName] || lrcTextMap[kByNum];
          // v9n BUG-B修正: キャッシュヒット済みでもhasLyricsが変化した場合はDBを更新
          if (meta.fromCache) saveToCache(meta);
        } else if (meta.fromCache && meta.hasLyrics) {
          meta.hasLyrics = false;
          delete state.lrcFileMap[meta.cacheKey];
          saveToCache(meta);
        }
        results.push(meta);
      }
    });
    loadStatus.textContent = `タグ情報を読み込み中… ${Math.min(i+BATCH, audioFiles.length)}/${audioFiles.length}件`;
    await new Promise(r => setTimeout(r, 0));
  }
  unifyFolderMeta(results);
  state.rootFolders.push({ folderPath, displayName: topFolderName, directoryHandle: null, registeredAt: Date.now(), lastUpdatedAt: Date.now() });
  await saveRootFolders(state.rootFolders);
  const newFiles = results.filter(f => !f.fromCache);
  if (db && newFiles.length > 0) {
    for (let i = 0; i < newFiles.length; i += BATCH) {
      await Promise.allSettled(newFiles.slice(i, i+BATCH).map(saveToCache));
      await new Promise(r => setTimeout(r, 0));
    }
  }
  await reloadLibrary();
  loadStatus.textContent = `${results.length}件読み込み完了`;
  setTimeout(() => { loadStatus.textContent = ''; }, 3000);
  folderInput.value = '';
});


// ===== v10c: タイマー再生・スリープタイマー機能 =====

// --- タイマー再生 ---
// 保存形式: { start: "7:30", end: "8:00", active: true }
// 時刻は "H:MM" または "HH:MM" 形式。24以上は翌日分（25:00=翌1:00等）
// アクティブ状態はlocalStorageに保存（再起動後も記憶）

const TIMER_PLAY_KEY = 'momoTimerPlay';
let _timerCheckInterval = null;
let _timerFading = false;
let _timerPlayState = { start: '', end: '', active: false };

function loadTimerPlayState() {
  try {
    const d = JSON.parse(localStorage.getItem(TIMER_PLAY_KEY) || 'null');
    if (d && typeof d.start === 'string') _timerPlayState = d;
  } catch(e) {}
}

function saveTimerPlayState() {
  try { localStorage.setItem(TIMER_PLAY_KEY, JSON.stringify(_timerPlayState)); } catch(e) {}
}

// "7:30" → 分単位の数値（= 7*60+30 = 450）
function parseTimerMinutes(str) {
  if (!str || !str.trim()) return null;
  const m = str.trim().match(/^(\d{1,2}):([0-5]\d)$/);
  if (!m) return null;
  return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
}

// 分単位 → "H:MM" 文字列
function fmtTimerTime(mins) {
  return Math.floor(mins / 60) + ':' + String(mins % 60).padStart(2, '0');
}

// 現在の「今日基準」分数（0〜1439）
function nowMinutes() {
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

// ボタン表示更新
function updateTimerBtn() {
  const btn = document.getElementById('btn-timer');
  const lbl = document.getElementById('timer-label');
  if (!btn) return;
  if (_timerPlayState.active && _timerPlayState.start) {
    let label = _timerPlayState.start;
    if (_timerPlayState.end) label += '-' + _timerPlayState.end;
    // v10d: アイコン+時刻を表示、TIMERラベルを隠す
    if (btn.firstChild && btn.firstChild.nodeType === Node.TEXT_NODE) {
      btn.firstChild.textContent = '⏰' + label;
    } else {
      btn.insertBefore(document.createTextNode('⏰' + label), btn.firstChild);
    }
    if (lbl) lbl.style.display = 'none';
    btn.classList.add('active');
  } else {
    // v10d: アイコンのみ表示、TIMERラベルを表示
    if (btn.firstChild && btn.firstChild.nodeType === Node.TEXT_NODE) {
      btn.firstChild.textContent = '⏰';
    }
    if (lbl) lbl.style.display = '';
    btn.classList.remove('active');
  }
}

// フェードイン（gainNodeのvalueを0→元の音量へ）
function fadeIn(durationSec) {
  const slider = document.getElementById('vol-slider');
  const targetVol = slider ? parseFloat(slider.value) : 0.8;
  if (!gainNode) return;
  _timerFading = true;
  const startTime = audioCtx.currentTime;
  gainNode.gain.cancelScheduledValues(startTime);
  gainNode.gain.setValueAtTime(0, startTime);
  gainNode.gain.linearRampToValueAtTime(targetVol, startTime + durationSec);
  setTimeout(() => { _timerFading = false; }, durationSec * 1000 + 100);
}

// フェードアウト後に停止
function fadeOutAndStop(durationSec) {
  if (!gainNode || !state.isPlaying) return;
  _timerFading = true;
  const startTime = audioCtx.currentTime;
  const curVol = gainNode.gain.value;
  gainNode.gain.cancelScheduledValues(startTime);
  gainNode.gain.setValueAtTime(curVol, startTime);
  gainNode.gain.linearRampToValueAtTime(0, startTime + durationSec);
  setTimeout(() => {
    audio.pause();
    state.isPlaying = false;
    updatePlayBtn();
    // ゲインを元の音量に戻す
    const slider = document.getElementById('vol-slider');
    const vol = slider ? parseFloat(slider.value) : 0.8;
    if (gainNode) gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
    _timerFading = false;
  }, durationSec * 1000 + 100);
}

// 毎分タイマーチェック
function checkTimerPlay() {
  if (!_timerPlayState.active || !_timerPlayState.start) return;
  const startMins = parseTimerMinutes(_timerPlayState.start);
  if (startMins === null) return;
  const endMins = _timerPlayState.end ? parseTimerMinutes(_timerPlayState.end) : null;
  const now = nowMinutes();

  // 24以上の場合は翌日扱い（now + 1440 で比較）
  // 開始チェック：現在時刻が開始時刻に一致（±1分）かつ未再生
  const nowNorm = now; // 0〜1439
  const startNorm = startMins % 1440;
  if (nowNorm === startNorm && !state.isPlaying) {
    initAudio();
    if (state.playlist.length > 0) {
      const idx = state.currentIndex >= 0 ? state.currentIndex : 0;
      loadTrack(idx);
      // gainを0にしてからフェードイン
      if (gainNode) gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      audio.play().then(() => {
        state.isPlaying = true;
        updatePlayBtn();
        fadeIn(10); // 10秒フェードイン
      }).catch(() => {});
    }
  }

  // 終了チェック
  if (endMins !== null) {
    const endNorm = endMins % 1440;
    if (nowNorm === endNorm && state.isPlaying) {
      fadeOutAndStop(10); // 10秒フェードアウト
    }
  }
}

function startTimerCheck() {
  if (_timerCheckInterval) clearInterval(_timerCheckInterval);
  _timerCheckInterval = setInterval(checkTimerPlay, 30000); // 30秒ごと
}

}

});

// --- スリープタイマー ---
let _sleepTimerId = null;
let _sleepEndTime = 0; // Date.now() + ms
let _sleepDisplayId = null;

function updateSleepBtn() {
  const btn = document.getElementById('btn-sleep');
  const lbl = document.getElementById('sleep-label');
  if (!btn) return;
  if (_sleepTimerId !== null) {
    const remaining = Math.max(0, Math.ceil((_sleepEndTime - Date.now()) / 60000));
    // v10d: アイコン+残り時間を表示、SLEEPラベルを隠す
    if (btn.firstChild && btn.firstChild.nodeType === Node.TEXT_NODE) {
      btn.firstChild.textContent = '💤' + remaining + '分';
    } else {
      btn.insertBefore(document.createTextNode('💤' + remaining + '分'), btn.firstChild);
    }
    if (lbl) lbl.style.display = 'none';
    btn.classList.add('active');
  } else {
    // v10d: アイコンのみ表示、SLEEPラベルを表示
    if (btn.firstChild && btn.firstChild.nodeType === Node.TEXT_NODE) {
      btn.firstChild.textContent = '💤';
    }
    if (lbl) lbl.style.display = '';
    btn.classList.remove('active');
  }
}

function cancelSleepTimer() {
  if (_sleepTimerId) { clearTimeout(_sleepTimerId); _sleepTimerId = null; }
  if (_sleepDisplayId) { clearInterval(_sleepDisplayId); _sleepDisplayId = null; }
  _sleepEndTime = 0;
  updateSleepBtn();
}

function startSleepTimer(minutes) {
  cancelSleepTimer();
  const ms = minutes * 60 * 1000;
  _sleepEndTime = Date.now() + ms;
  _sleepTimerId = setTimeout(() => {
    cancelSleepTimer();
    if (state.isPlaying) {
      fadeOutAndStop(10);
    }
    showToast(currentLang === 'en' ? 'Sleep timer: stopped' : currentLang === 'zh' ? '定时关闭：已停止' : 'スリープタイマー: 停止しました');
  }, ms);
  // 1分ごとに残り時間表示更新
  _sleepDisplayId = setInterval(() => { updateSleepBtn(); }, 60000);
  updateSleepBtn();
}

function openSleepPanel() {
  const panel = document.getElementById('sleep-panel');
  const timerPanel = document.getElementById('timer-panel');
  if (!panel) return;
  const isOpen = panel.style.display === 'block';
  if (timerPanel) timerPanel.style.display = 'none';
  if (isOpen) {

  } else {
    panel.style.display = 'block';
  }
}

document.getElementById('btn-sleep').addEventListener('click', (e) => {

    showToast(currentLang === 'en' ? 'Sleep timer cancelled' : currentLang === 'zh' ? '定时关闭已取消' : 'スリープタイマーをキャンセルしました');

    openSleepPanel();
  }
});

});

// ===== v10b: プレイリストスロット機能 =====
const PLAYLIST_SLOT_COUNT = 10;
const PLAYLIST_SLOT_KEY_PREFIX = 'momoPlaylist_';

function openPlaylistSlotsPanel() {
  const panel = document.getElementById('playlist-slots-panel');
  const btn = document.getElementById('btn-playlist');
  if (!panel) return;
  const isOpen = panel.style.display === 'block';
  if (isOpen) {
    panel.style.display = 'none';
    if (btn) btn.classList.remove('active');
  } else {
    renderPlaylistSlotsPanel();
    panel.style.display = 'block';
    if (btn) btn.classList.add('active');
  }
}

function renderPlaylistSlotsPanel() {
  const listEl = document.getElementById('psp-list');
  if (!listEl) return;
  listEl.innerHTML = '';
  for (let i = 0; i < PLAYLIST_SLOT_COUNT; i++) {
    const slotData = loadPlaylistSlotData(i);
    const row = document.createElement('div');
    row.className = 'psp-row';

    // 上段：番号 ・ 名前入力 ・ ボタン群
    const rowTop = document.createElement('div');
    rowTop.className = 'psp-row-top';

    const numEl = document.createElement('span');
    numEl.className = 'psp-num';
    numEl.textContent = i + 1;
    rowTop.appendChild(numEl);

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'psp-name-input';
    nameInput.placeholder = '—';
    nameInput.value = slotData ? (slotData.name || '') : '';
    nameInput.addEventListener('change', () => {
      const data = loadPlaylistSlotData(i);
      if (data) {
        data.name = nameInput.value;
        savePlaylistSlotData(i, data);
      }
    });
    rowTop.appendChild(nameInput);

    // 読み出しボタン
    const loadBtn = document.createElement('button');
    loadBtn.className = 'psp-btn load-btn';
    loadBtn.textContent = t('playlistLoad');
    loadBtn.disabled = !slotData;
    loadBtn.addEventListener('click', () => loadPlaylistSlot(i));
    rowTop.appendChild(loadBtn);

    // 書き込みボタン
    const saveBtn = document.createElement('button');
    saveBtn.className = 'psp-btn';
    saveBtn.textContent = t('playlistSave');
    saveBtn.addEventListener('click', () => savePlaylistSlot(i, nameInput.value));
    rowTop.appendChild(saveBtn);

    // 消去ボタン
    const clearBtn = document.createElement('button');
    clearBtn.className = 'psp-btn clear-btn';
    clearBtn.textContent = t('playlistClear');
    clearBtn.disabled = !slotData;
    clearBtn.addEventListener('click', () => clearPlaylistSlot(i));
    rowTop.appendChild(clearBtn);

    row.appendChild(rowTop);

    // 下段：統計情報（書き込み済みの場合のみ）
    if (slotData && slotData.stats) {
      const statsEl = document.createElement('div');
      statsEl.className = 'psp-stats';
      statsEl.textContent = formatPlaylistStats(slotData.stats);
      row.appendChild(statsEl);
    }

    listEl.appendChild(row);
  }
}

function formatPlaylistStats(stats) {
  const fmt = t('playlistStatsFmt');
  // fmt例: 'アーティストN・アルバムN・曲N' / 'N artists・N albums・N tracks' / 'N 艺术家・N 专辑・N 曲目'
  // 3つのNをそれぞれの数で置換（artistCount, albumCount, trackCount）
  const parts = fmt.split('N');
  if (parts.length < 4) {
    // フォールバック（パース失敗時）
    return `${stats.artistCount} / ${stats.albumCount} / ${stats.trackCount}`;
  }
  return parts[0] + stats.artistCount + parts[1] + stats.albumCount + parts[2] + stats.trackCount + (parts[3] || '');
}

function loadPlaylistSlotData(index) {
  try {
    const json = localStorage.getItem(PLAYLIST_SLOT_KEY_PREFIX + index);
    return json ? JSON.parse(json) : null;
  } catch(e) { return null; }
}

function savePlaylistSlotData(index, data) {
  try {
    localStorage.setItem(PLAYLIST_SLOT_KEY_PREFIX + index, JSON.stringify(data));
  } catch(e) {}
}

function savePlaylistSlot(index, nameOverride) {
  const si = state.selectedItems;
  const name = (nameOverride !== undefined ? nameOverride : '') || '';
  const data = {
    name,
    artists: [...si.artists],
    albums: [...si.albums],
    tracks: [...si.tracks],
    stats: {
      artistCount: si.artists.size,
      albumCount: si.albums.size,
      trackCount: si.tracks.size,
    },
    savedAt: new Date().toISOString(),
  };
  savePlaylistSlotData(index, data);
  renderPlaylistSlotsPanel();
  const total = si.artists.size + si.albums.size + si.tracks.size;
  showToast(
    currentLang === 'en'
      ? `Playlist ${index + 1} saved (${total} items)`
      : currentLang === 'zh'
      ? `播放列表 ${index + 1} 已保存（${total} 项）`
      : `プレイリスト${index + 1}を保存しました（${total}件）`
  );
}

function loadPlaylistSlot(index) {
  const data = loadPlaylistSlotData(index);
  if (!data) return;

  // state.allFiles の cacheKey セットを構築
  const allCacheKeys = new Set(state.allFiles.map(f => f.cacheKey));

  // 照合して存在するもののみ復元
  const restoredArtists = new Set();
  const restoredAlbums = new Set();
  const restoredTracks = new Set();
  let missingCount = 0;

  (data.artists || []).forEach(k => {
    // アーティストキーは直接保持（state.selectedItemsにそのまま格納）
    restoredArtists.add(k);
  });
  (data.albums || []).forEach(k => {
    restoredAlbums.add(k);
  });
  (data.tracks || []).forEach(k => {
    // トラックキーは "artistKey\x00cacheKey" 形式
    const cacheKey = k.split('\x00')[1];
    if (!cacheKey || allCacheKeys.has(cacheKey)) {
      restoredTracks.add(k);
    } else {
      missingCount++;
    }
  });

  // 選択状態に反映
  state.selectedItems.artists = restoredArtists;
  state.selectedItems.albums = restoredAlbums;
  state.selectedItems.tracks = restoredTracks;

  // ハイライト更新・再生リスト再構築
  updateLibraryHighlights();
  updateCenterSelectionCount();
  updatePlaylistFromSelection();

  // パネルを閉じる
  const panel = document.getElementById('playlist-slots-panel');
  if (panel) panel.style.display = 'none';
  const btn = document.getElementById('btn-playlist');
  if (btn) btn.classList.remove('active');

  // トースト通知
  const slotName = data.name ? `「${data.name}」` : `プレイリスト${index + 1}`;
  const slotNameEn = data.name ? `"${data.name}"` : `Playlist ${index + 1}`;
  const slotNameZh = data.name ? `"${data.name}"` : `播放列表 ${index + 1}`;
  const restored = restoredArtists.size + restoredAlbums.size + restoredTracks.size;
  let msg;
  if (currentLang === 'en') {
    msg = `${slotNameEn} ${t('playlistRestored')} (${restoredArtists.size} artists・${restoredAlbums.size} albums・${restoredTracks.size} tracks)`;
    if (missingCount > 0) msg += ` (${missingCount} ${t('playlistNotFound')})`;
  } else if (currentLang === 'zh') {
    msg = `${slotNameZh}${t('playlistRestored')} (${restoredArtists.size} 艺术家・${restoredAlbums.size} 专辑・${restoredTracks.size} 曲目)`;
    if (missingCount > 0) msg += `（${missingCount} ${t('playlistNotFound')}）`;
  } else {
    msg = `${slotName}${t('playlistRestored')}（アーティスト${restoredArtists.size}・アルバム${restoredAlbums.size}・曲${restoredTracks.size}）`;
    if (missingCount > 0) msg += `（${missingCount}${t('playlistNotFound')}）`;
  }
  showToast(msg, 3000);
}

function clearPlaylistSlot(index) {
  try { localStorage.removeItem(PLAYLIST_SLOT_KEY_PREFIX + index); } catch(e) {}
  renderPlaylistSlotsPanel();
  showToast(
    currentLang === 'en'
      ? `Playlist ${index + 1} cleared`
      : currentLang === 'zh'
      ? `播放列表 ${index + 1} 已清除`
      : `プレイリスト${index + 1}を消去しました`
  );
}

// プレイリストボタンのクリックハンドラ
document.getElementById('btn-playlist').addEventListener('click', openPlaylistSlotsPanel);

// プレイリストパネルの閉じるボタン
document.getElementById('psp-close-btn').addEventListener('click', () => {
  const panel = document.getElementById('playlist-slots-panel');
  if (panel) panel.style.display = 'none';
  const btn = document.getElementById('btn-playlist');
  if (btn) btn.classList.remove('active');
});

// ===== UTILS =====
function fmtDur(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ===== INIT =====
(async () => {
  // V9d: まず旧DB（MusicPlayerCache）を削除して干渉を防ぐ
  await deleteOldDB();

  try { db = await openDB(); } catch(e) { db = null; console.warn('IndexedDB unavailable:', e); }

  // V9: ブラウザ対応形式チェック（フォーマットフィルターボタン生成）
  detectSupportedFormats();
  applyLang();

  state.rootFolders = await loadRootFolders();

  // V9d: 新DBにrootFoldersが空の場合、localStorageのバックアップから名前だけ復元
  if (state.rootFolders.length === 0) {
    try {
      const saved = JSON.parse(localStorage.getItem('momoRootFolders') || '[]');
      if (saved.length > 0) {
        state.rootFolders = saved.map(f => ({
          folderPath: f.folderPath, displayName: f.displayName,
          directoryHandle: null, registeredAt: 0, lastUpdatedAt: 0
        }));
        // 名前だけ復元した場合はDBにも保存しておく
        await saveRootFolders(state.rootFolders);
      }
    } catch(e) {}
  }

  if (state.rootFolders.length > 0) {
    await reloadLibrary();

    // V9d: allFilesが0件の場合（新DB初回 or DBクリア後）→ 再取込を案内
    if (state.allFiles.length === 0) {
      const _ls = document.getElementById('load-status');
      if (_ls) {
        _ls.textContent = '⚠ 音楽ファイルが見つかりません。「ライブラリ管理」→「フォルダを追加」で再取込してください。';
        _ls.style.color = '#f97316';
      }
      updateBannerText();
      return;
    }

    // v9o2: FSA対応時は最初のユーザー操作で許可確認（許可済みなら無音で通過）
    if (hasFSA) {
      const handleFolders = state.rootFolders.filter(f => f.directoryHandle);
      if (handleFolders.length > 0) {
        const onFirstClick = async () => {
          document.removeEventListener('click', onFirstClick, true);
          for (const f of state.rootFolders) {
            if (f.directoryHandle) {
              try { await f.directoryHandle.requestPermission({ mode: 'read' }); } catch(e) {}
            }
          }
          startDurationBgLoad();
          const mp3Files = state.allFiles.filter(f => f.format === 'mp3' && f.file);
          startTitleBgReanalysis(mp3Files);
        };
        document.addEventListener('click', onFirstClick, true);
      }
      // directoryHandleなし（webkitdirectory経由）の場合は何もしない
    }
  } else {
    // 登録フォルダなし → 初期画面
    document.getElementById('initial-screen').style.display = 'flex';
    updateBannerText();
  }
})();
</script>
