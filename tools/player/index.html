// ===== INDEXEDDB =====
// V9d: DB名を変更して旧バージョンのDBと完全分離
const DB_NAME        = 'MusicPlayerCacheV9';
const DB_VERSION     = 1;  // v9d: 新DB名で1から開始
const DB_NAME_OLD    = 'MusicPlayerCache'; // 旧DB名（削除対象）
const DB_STORE       = 'tracks';
const DB_STORE_META  = 'appMeta';
const DB_STORE_ARTS  = 'arts';
const DB_STORE_ROOT  = 'rootFolders';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      // V9d: 新DB名で初回作成のみ（バージョン管理不要）
      if (!d.objectStoreNames.contains(DB_STORE)) {
        d.createObjectStore(DB_STORE, { keyPath: 'cacheKey' });
      }
      if (!d.objectStoreNames.contains(DB_STORE_META)) {
        d.createObjectStore(DB_STORE_META);
      }
      if (!d.objectStoreNames.contains(DB_STORE_ARTS)) {
        d.createObjectStore(DB_STORE_ARTS, { keyPath: 'albumKey' });
      }
      if (!d.objectStoreNames.contains(DB_STORE_ROOT)) {
        d.createObjectStore(DB_STORE_ROOT, { keyPath: 'folderPath' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

// V9d: 旧DB（MusicPlayerCache）を削除する
async function deleteOldDB() {
  return new Promise(resolve => {
    try {
      const req = indexedDB.deleteDatabase(DB_NAME_OLD);
      req.onsuccess = () => { console.log('旧DB削除完了'); resolve(); };
      req.onerror   = () => resolve(); // エラーは無視
      req.onblocked = () => resolve(); // ブロックされても続行
    } catch(e) { resolve(); }
  });
}

// ===== v8: D-3 抽象化4関数 =====
async function loadLibrary() {
  if (!db) return [];
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).getAll();
      req.onsuccess = e => resolve(e.target.result || []);
      req.onerror   = () => resolve([]);
    } catch(e) { resolve([]); }
  });
}
async function saveLibrary(tracks) {
  if (!db) return;
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(DB_STORE, 'readwrite');
      const store = tx.objectStore(DB_STORE);
      tracks.forEach(t => store.put(t));
      tx.oncomplete = resolve;
      tx.onerror    = resolve;
    } catch(e) { resolve(); }
  });
}
async function loadRootFolders() {
  if (!db) return [];
  const folders = await new Promise((resolve) => {
    try {
      const tx = db.transaction(DB_STORE_ROOT, 'readonly');
      const req = tx.objectStore(DB_STORE_ROOT).getAll();
      req.onsuccess = e => resolve(e.target.result || []);
      req.onerror   = () => resolve([]);
    } catch(e) { resolve([]); }
  });
  return folders;
}
async function saveRootFolders(rootFolders) {
  // localStorageにフォルダ名一覧をバックアップ（directoryHandleは保存不可）
  try {
    const names = rootFolders.map(f => ({ folderPath: f.folderPath, displayName: f.displayName }));
    localStorage.setItem('momoRootFolders', JSON.stringify(names));
  } catch(e) {}
  if (!db) return;
  return new Promise((resolve) => {
    try {
      const tx = db.transaction(DB_STORE_ROOT, 'readwrite');
      const store = tx.objectStore(DB_STORE_ROOT);
      store.clear();
      rootFolders.forEach(f => store.put(f));
      tx.oncomplete = resolve;
      tx.onerror    = resolve;
    } catch(e) { resolve(); }
  });
}

// ===== AUDIO ENGINE =====
let audioCtx, analyser, srcNode, gainNode, eqNodes = [];
const audio = new Audio();

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  srcNode  = audioCtx.createMediaElementSource(audio);
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.8;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const freqs = [60,250,1000,4000,16000];
  const types = ['lowshelf','peaking','peaking','peaking','highshelf'];
  let prev = srcNode;
  freqs.forEach((f,i) => {
    const filt = audioCtx.createBiquadFilter();
    filt.type = types[i]; filt.frequency.value = f; filt.gain.value = 0;
    eqNodes.push(filt); prev.connect(filt); prev = filt;
  });
  prev.connect(gainNode);
  gainNode.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ===== VISUALIZER =====
const canvas = document.getElementById('viz');
const gfx    = canvas.getContext('2d');
function drawViz() {
  requestAnimationFrame(drawViz);
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (W === 0) return;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  gfx.scale(devicePixelRatio, devicePixelRatio);
  gfx.clearRect(0, 0, W, H);
  if (!analyser || !state.isPlaying) {
    gfx.strokeStyle = 'rgba(249,115,22,0.12)'; gfx.lineWidth = 1.5; gfx.beginPath();
    const t = Date.now();
    for (let x = 0; x < W; x++) {
      const y = H/2 + Math.sin(x*0.03+t*0.0008)*5 + Math.sin(x*0.07+t*0.0012)*3;
      x===0 ? gfx.moveTo(x,y) : gfx.lineTo(x,y);
    }
    gfx.stroke(); return;
  }
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);
  const barW = (W/buf.length)*2.2; let x = 0;
  for (let i = 0; i < buf.length; i++) {
    const v=buf[i]/255, h=v*H;
    const g=gfx.createLinearGradient(0,H-h,0,H);
    g.addColorStop(0,'#f97316'); g.addColorStop(1,'rgba(249,115,22,0.15)');
    gfx.fillStyle=g; gfx.fillRect(x,H-h,Math.max(1,barW-1),h);
    x+=barW; if(x>W) break;
  }
}
drawViz();

// ===== ID3 TAG PARSER =====
// ===== V9: 文字コードデコード（強化版・enc指定対応） =====
function decodeTagString(bytes, enc, forceEnc) {
  // forceEnc: 'auto'|'sjis'|'unicode' — state.currentEncodingより上書き
  const mode = forceEnc || state.currentEncoding || 'auto';
  if (enc===1) {
    // UTF-16 with BOM（ID3v2.3仕様）。一部エンコーダーはBOMを省略する
    if (bytes.length >= 2 && bytes[0]===0xFF && bytes[1]===0xFE) {
      return new TextDecoder('utf-16le').decode(bytes.slice(2)).replace(/\0/g,'');
    }
    if (bytes.length >= 2 && bytes[0]===0xFE && bytes[1]===0xFF) {
      return new TextDecoder('utf-16be').decode(bytes.slice(2)).replace(/\0/g,'');
    }
    // BOMなし: UTF-16LEとして試み、nullバイトを除去
    try {
      const s = new TextDecoder('utf-16le').decode(bytes).replace(/\0/g,'');
      if (s && s.length > 0) return s;
    } catch(e) {}
    return new TextDecoder('latin1').decode(bytes);
  }
  if (enc===2) {
    // UTF-16BE without BOM（ID3v2.4）
    return new TextDecoder('utf-16be').decode(bytes).replace(/\0/g,'');
  }
  if (enc===3) return new TextDecoder('utf-8').decode(bytes).replace(/\0/g,'');

function looksLikeShiftJis(bytes) {

    const b=bytes[i];

    const b=bytes[i];

  let big5=0, nonAscii=0, i=0;

    const b=bytes[i];

// ===== V9: ブラウザ再生対応チェック =====
function detectSupportedFormats() {
  const tmp = new Audio();
  const check = (mime) => tmp.canPlayType(mime) !== '';
  state.supportedFormats = {
    mp3:  true,
    flac: check('audio/flac'),
    wav:  true,
    m4a:  check('audio/mp4; codecs="mp4a.40.2"') || check('audio/x-m4a'),
    ogg:  check('audio/ogg; codecs=vorbis'),
    opus: check('audio/ogg; codecs=opus') || check('audio/webm; codecs=opus'),
    aif:  check('audio/aiff') || check('audio/x-aiff'),
    wma:  false,
    dsf:  false,
  };
  // V9: 静的HTMLに書かれた全フォーマットのラベルにスタイルを適用
  applyFormatFilterStyles();
}

function applyFormatFilterStyles() {
  const allFmts = ['mp3','flac','wav','m4a','ogg','opus','aif','wma','dsf'];
  allFmts.forEach(fmt => {
    const supported = state.supportedFormats[fmt] === true;
    // V9e: 非対応形式はformatFilterの初期値をfalse（チェックOFF）にする
    if (!(fmt in state.formatFilter)) state.formatFilter[fmt] = supported;
    const label = document.getElementById('fmt-label-' + fmt);
    const cb = document.getElementById('chk-' + fmt);
    if (!label || !cb) return;
    if (!supported) {
      label.classList.add('no-playback');
      label.title = 'このブラウザでは再生できません';
      // チェックボックスの初期値をOFFに設定
      cb.checked = false;
      state.formatFilter[fmt] = false;
      if (!label.querySelector('.fmt-no-play-icon')) {
        const icon = document.createElement('span');
        icon.className = 'fmt-no-play-icon';
        icon.textContent = '🚫';
        label.appendChild(icon);
      }
    }
    cb.addEventListener('change', e => {
      state.formatFilter[fmt] = e.target.checked;
      rebuildLibrary();
    });
  });
}

function buildExtraFormatCheckboxes() {
  // 静的HTML方式に変更したため不要。applyFormatFilterStylesで代替。
  applyFormatFilterStyles();

function parseID3(buffer) {
  const data = new Uint8Array(buffer);
  const res  = { title:null, artist:null, albumArtist:null, album:null, track:null, artData:null };
  if (data[0]!==0x49||data[1]!==0x44||data[2]!==0x33) return res;
  const ver  = data[3];
  const size = ((data[6]&0x7f)<<21)|((data[7]&0x7f)<<14)|((data[8]&0x7f)<<7)|(data[9]&0x7f);
  let pos    = 10;
  if (data[5]&0x40) pos+=10;
  while (pos<10+size-10) {
    if (pos+10>data.length) break;
    const fid = String.fromCharCode(data[pos],data[pos+1],data[pos+2],data[pos+3]);
    if (fid==='\0\0\0\0') break;
    let fsz;
    if (ver>=4) fsz=((data[pos+4]&0x7f)<<21)|((data[pos+5]&0x7f)<<14)|((data[pos+6]&0x7f)<<7)|(data[pos+7]&0x7f);
    else        fsz=(data[pos+4]<<24)|(data[pos+5]<<16)|(data[pos+6]<<8)|data[pos+7];
    if (fsz<=0||fsz>10000000) break;
    const fd  = data.slice(pos+10,pos+10+fsz);
    const enc = fd[0];
    const sb  = fd.slice(1);
    if      (fid==='TIT2') res.title       = stripNull(decodeTagString(sb,enc));
    else if (fid==='TPE1') res.artist      = stripNull(decodeTagString(sb,enc));
    else if (fid==='TPE2') res.albumArtist = stripNull(decodeTagString(sb,enc));
    else if (fid==='TALB') res.album       = stripNull(decodeTagString(sb,enc));
    else if (fid==='TRCK') { const t=stripNull(decodeTagString(sb,enc)); res.track=parseInt(t.split('/')[0])||null; }
    else if (fid==='APIC') {
      // fd[0]=encoding, fd[1..]=MIME\0, PictureType, Description\0(or \0\0 for UTF-16), imageData
      const apicEnc = fd[0];
      let i2 = 1;
      // MIME typeをスキップ（常に Latin-1, \0終端）
      while (i2 < fd.length && fd[i2] !== 0) i2++;
      i2++; // \0
      i2++; // Picture Type (1バイト)
      // Description をスキップ（enc=1/2はUTF-16なので\0\0終端、enc=0/3は\0終端）
      if (apicEnc === 1 || apicEnc === 2) {
        while (i2 + 1 < fd.length && !(fd[i2] === 0 && fd[i2+1] === 0)) i2 += 2;
        i2 += 2; // \0\0
      } else {
        while (i2 < fd.length && fd[i2] !== 0) i2++;
        i2++; // \0
      }
      if (i2 < fd.length) {
        const slice = fd.slice(i2);
        res.artData = slice.buffer.slice(slice.byteOffset, slice.byteOffset + slice.byteLength);
      }
    }
    pos+=10+fsz;
  }
  return res;
}

function parseVorbisComment(data) {

  for (let i=0; i<commentCount; i++) {
    if (pos+4 > data.length) break;
    const len = readU32LE();

    const comment = new TextDecoder('utf-8').decode(data.slice(pos, pos+len));
    pos += len;
    const eq = comment.indexOf('=');
    if (eq<0) continue;
    const key = comment.slice(0,eq).toUpperCase();
    const val = comment.slice(eq+1).trim();
    if (!val) continue;
    if (key==='TITLE')        res.title = val;
    else if (key==='ARTIST')  res.artist = val;
    else if (key==='ALBUMARTIST'||key==='ALBUM ARTIST') res.albumArtist = val;
    else if (key==='ALBUM')   res.album = val;
    else if (key==='TRACKNUMBER') res.track = parseInt(val.split('/')[0])||null;
    else if (key==='METADATA_BLOCK_PICTURE') {
      try {
        const bin = atob(val);
        const pic = new Uint8Array(bin.length);
        for (let j=0; j<bin.length; j++) pic[j]=bin.charCodeAt(j);
        // FLAC picture block: type(4)+mimeLen(4)+mime+descLen(4)+desc+w+h+depth+indexed(16)+dataLen(4)+data
        let p2=4; const mL=(pic[p2]<<24)|(pic[p2+1]<<16)|(pic[p2+2]<<8)|pic[p2+3]; p2+=4+mL;
        const dL=(pic[p2]<<24)|(pic[p2+1]<<16)|(pic[p2+2]<<8)|pic[p2+3]; p2+=4+dL+16;
        const imgL=(pic[p2]<<24)|(pic[p2+1]<<16)|(pic[p2+2]<<8)|pic[p2+3]; p2+=4;
        res.artData = pic.slice(p2, p2+imgL).buffer;
      } catch(e) {}
    }
  }
  return res;
}

function parseFLACTags(buffer) {
  const data = new Uint8Array(buffer);

  if (data[0]!==0x66||data[1]!==0x4C||data[2]!==0x61||data[3]!==0x43) return res; // fLaC

    pos += 4;
    if (blockType === 4) { // VORBIS_COMMENT
      const vc = parseVorbisComment(data.slice(pos, pos+blockLen));

    pos += blockLen;
    if (isLast) break;
  }
  return res;
}

function parseOGGTags(buffer) {
  // OGG コンテナからVorbis/OpusのComment packetを抽出
  const data = new Uint8Array(buffer);

    if (data[pos]!==0x4F||data[pos+1]!==0x67||data[pos+2]!==0x67||data[pos+3]!==0x53) break;

    for (let s=0; s<numSegments; s++) pageDataLen += data[pos+27+s];

    const isVorbisComment = pageData[0]===3 && pageData[1]===0x76 && pageData[2]===0x6F;

    if (isVorbisComment) {
      const vc = parseVorbisComment(pageData.slice(7));
      return vc;
    } else if (isOpusTags) {
      const vc = parseVorbisComment(pageData.slice(8));
      return vc;
    }
    pos += headerLen + pageDataLen;
    pageCount++;

  return res;
}

function parseM4ATags(buffer) {

    if (ckID==='ID3 '||ckID==='id3 ') {
      const id3 = parseID3(data.slice(pos, pos+Math.min(ckSize,256*1024)).buffer);

    } else if (ckID==='NAME') {
      try { res.title = new TextDecoder('latin1').decode(data.slice(pos,pos+ckSize)).replace(/\0/g,'').trim(); } catch(e) {}
    } else if (ckID==='AUTH') {
      try { res.artist = new TextDecoder('latin1').decode(data.slice(pos,pos+ckSize)).replace(/\0/g,'').trim(); } catch(e) {}
    }
    pos += ckSize + (ckSize&1); // pad to even
    if (pos >= data.length) break;
  }
  return res;
}

// V9: リアルタイム進捗・エラーログ付き再帰列挙（新形式・LRC対応）
async function collectFilesFromHandle(dirHandle, basePath='', countRef={n:0}, lrcHandles={}) {
  const results = [];
  try {
    for await (const [name, handle] of dirHandle.entries()) {
      const entryPath = basePath ? `${basePath}/${name}` : name;
      if (handle.kind === 'file') {
        if (/\.(mp3|flac|wav|wave|m4a|ogg|opus|aif|aiff|wma|dsf)$/i.test(name)) {
          results.push({ handle, path: entryPath, name });
          countRef.n++;
          if (countRef.n % 10 === 0 || countRef.n <= 10) {
            loadStatus.textContent = `ファイルを列挙しています… ${countRef.n}件`;
            await new Promise(r => setTimeout(r, 0));
          }
        } else if (/\.lrc$/i.test(name)) {
          // V9: LRCファイルを同フォルダの音楽ファイルと対応付けるためパスを記録
          lrcHandles[entryPath] = handle;
        }
      } else if (handle.kind === 'directory') {
        const sub = await collectFilesFromHandle(handle, entryPath, countRef, lrcHandles);
        results.push(...sub);
      }
    }
  } catch(e) {
    addErrorLog(`フォルダ列挙エラー [${basePath||'/'}]: ${e.message||e}`);
    console.warn('列挙エラー:', basePath, e);
  }
  return results;
}

// ===== METADATA READING =====
// V9: 形式判定ヘルパー
function getFormat(ext) {
  const e = ext.toLowerCase();
  if (e==='mp3') return 'mp3';
  if (e==='flac') return 'flac';
  if (e==='wav'||e==='wave') return 'wav';
  if (e==='m4a') return 'm4a';
  if (e==='ogg') return 'ogg';
  if (e==='opus') return 'opus';
  if (e==='aif'||e==='aiff') return 'aif';
  if (e==='wma') return 'wma';
  if (e==='dsf') return 'dsf';
  return 'wav'; // fallback
}
// V9: 形式ごとの読み込みサイズ
function getReadSize(fmt) {
  if (fmt==='dsf') return null; // 末尾も必要なので特別処理
  if (fmt==='wma') return 512*1024;
  return 256*1024;
}
// v9n: MP3のID3タグを正確なサイズで読み込むヘルパー
// 大きいアルバムアート画像が256KB固定読み込みで切れる問題を修正（BUG-16）
async function readMP3TagBuffer(fileObj) {
  const hdr = new Uint8Array(await fileObj.slice(0, 10).arrayBuffer());
  let readSize = 256 * 1024;
  if (hdr[0]===0x49 && hdr[1]===0x44 && hdr[2]===0x33) {
    const id3Size = ((hdr[6]&0x7f)<<21)|((hdr[7]&0x7f)<<14)|((hdr[8]&0x7f)<<7)|(hdr[9]&0x7f);
    readSize = Math.max(readSize, 10 + id3Size);
  }
  return fileObj.slice(0, readSize).arrayBuffer();
}

async function readFileMeta(fileObj, pathOverride) {
  const path       = pathOverride || fileObj.webkitRelativePath || fileObj.name;
  const ext        = fileObj.name.split('.').pop().toLowerCase();
  const format     = getFormat(ext);
  const pathParts  = path.split('/');
  const parentFolder = pathParts.length>=2 ? pathParts[pathParts.length-2] : '';
  const baseName   = fileObj.name.replace(/\.[^.]+$/,'');
  const folderPath = pathParts.slice(0,-1).join('/');
  const cacheKey   = makeCacheKey(path, fileObj.size, fileObj.lastModified);

  // Try cache first
  if (db) {
    const cached = await dbGet(cacheKey);
    if (cached) {
      let artBlob = null;
      if (cached.artData) {
        try { artBlob = URL.createObjectURL(new Blob([cached.artData])); } catch(e) {}
      }
      return {
        file: fileObj, format, path, folderPath, cacheKey,
        url: URL.createObjectURL(fileObj),
        title: cached.title, artist: cached.artist,
        albumArtist: cached.albumArtist, album: cached.album,
        track: cached.track, duration: cached.duration || 0,
        artBlob, artData: cached.artData || null,
        fromTag: cached.fromTag, fromCache: true,
        rootFolder: cached.rootFolder || '',  // BUG1修正: キャッシュヒット時にrootFolderを設定
        canPlay: cached.canPlay !== undefined ? cached.canPlay : true,
        hasLyrics: cached.hasLyrics || false,
      };
    }
  }

  // Cache miss: parse tags
  const canPlay = state.supportedFormats[format] !== false;
  let meta = { title:baseName, artist:parentFolder, albumArtist:null, album:null, track:null, artData:null, fromTag:false };
  try {
    if (format==='mp3') {
      const buf = await readMP3TagBuffer(fileObj);
      const tag  = parseID3(buf);
      if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
      if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
      if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
      if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
      if (tag.track)         meta.track=tag.track;
      if (tag.artData)       meta.artData=tag.artData;
    } else if (format==='flac') {
      const buf = await fileObj.slice(0,256*1024).arrayBuffer();
      const tag = parseFLACTags(buf);
      if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
      if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
      if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
      if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
      if (tag.track)         meta.track=tag.track;
      if (tag.artData)       meta.artData=tag.artData;
    } else if (format==='ogg'||format==='opus') {
      const buf = await fileObj.slice(0,64*1024).arrayBuffer();
      const tag = parseOGGTags(buf);
      if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
      if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
      if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
      if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
      if (tag.track)         meta.track=tag.track;
      if (tag.artData)       meta.artData=tag.artData;
    } else if (format==='m4a') {
      const buf = await fileObj.slice(0,256*1024).arrayBuffer();
      const tag = parseM4ATags(buf);
      if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
      if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
      if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
      if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
      if (tag.track)         meta.track=tag.track;
      if (tag.artData)       meta.artData=tag.artData;
    } else if (format==='aif') {
      const buf = await fileObj.slice(0,256*1024).arrayBuffer();
      const tag = parseAIFTags(buf);
      if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
      if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
      if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
      if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
      if (tag.track)         meta.track=tag.track;
      if (tag.artData)       meta.artData=tag.artData;
    } else if (format==='wma') {
      const buf = await fileObj.slice(0,512*1024).arrayBuffer();
      const tag = parseWMATags(buf);
      if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
      if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
      if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
      if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
      if (tag.track)         meta.track=tag.track;
      if (tag.artData)       meta.artData=tag.artData;
    } else if (format==='dsf') {
      // DSF: 先頭28バイトでID3オフセット取得 → 末尾のID3を読む
      const header = await fileObj.slice(0,28).arrayBuffer();
      const hd = new Uint8Array(header);
      if (hd[0]===0x44&&hd[1]===0x53&&hd[2]===0x44&&hd[3]===0x20) {
        const id3OffLo = hd[20]|(hd[21]<<8)|(hd[22]<<16)|(hd[23]<<24);
        if (id3OffLo > 0 && id3OffLo < fileObj.size) {
          const id3Buf = await fileObj.slice(id3OffLo).arrayBuffer();
          const tag = parseID3(id3Buf);
          if (tag.title)       { meta.title=tag.title; meta.fromTag=true; }
          if (tag.artist)      { meta.artist=tag.artist; meta.fromTag=true; }
          if (tag.albumArtist)   meta.albumArtist=tag.albumArtist;
          if (tag.album)       { meta.album=tag.album; meta.fromTag=true; }
          if (tag.track)         meta.track=tag.track;
          if (tag.artData)       meta.artData=tag.artData;
        }
      }
    }
    // wav/wave: タグなし → フォルダ名・ファイル名で補完（既存動作維持）
  } catch(e) {
    addErrorLog(`タグ解析エラー [${path}]: ${e.message||e}`);
  }

  let artBlob = null;
  if (meta.artData) {
    try { artBlob = URL.createObjectURL(new Blob([meta.artData])); } catch(e) {}
  }

  return {
    file: fileObj, format, path, folderPath, cacheKey,
    url: URL.createObjectURL(fileObj),
    title: meta.title, artist: meta.artist,
    albumArtist: meta.albumArtist, album: meta.album,
    track: meta.track, duration: 0,
    artBlob, artData: meta.artData,
    fromTag: meta.fromTag, fromCache: false,
    canPlay, hasLyrics: false,
  };
}

// Save to DB (v8: artDataはtracksに含まない、artsストアに保存)
async function saveToCache(trackObj) {
  if (!db) return;
  try {
    const record = {
      cacheKey:    trackObj.cacheKey,
      title:       trackObj.title,
      artist:      trackObj.artist,
      albumArtist: trackObj.albumArtist,
      album:       trackObj.album,
      track:       trackObj.track,
      duration:    trackObj.duration,
      fromTag:     trackObj.fromTag,
      cachedAt:    Date.now(),
      // v8追加
      rootFolder:  trackObj.rootFolder || '',
      folderPath:  trackObj.folderPath,
      format:      trackObj.format,
      path:        trackObj.path,
      canPlay:     trackObj.canPlay !== undefined ? trackObj.canPlay : true,
      hasLyrics:   trackObj.hasLyrics || false,
    };
    await new Promise((resolve) => {
      try {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(record);
        tx.oncomplete = resolve;
        tx.onerror    = resolve;
      } catch(e) { resolve(); }
    });
    // v8: artDataはartsストアにアルバム単位で保存
    if (trackObj.artData) {
      const albumKey = (trackObj.rootFolder||'') + '|' + (trackObj.album||'') + '|' + (trackObj.albumArtist||trackObj.artist||'');
      await artPut({ albumKey, artData: trackObj.artData, cachedAt: Date.now() });
    }
  } catch(e) {
    addErrorLog(`DB保存エラー [key=${trackObj.cacheKey}]: ${e.message||e}`);
  }
}

// Background duration loading
function loadDurationBg(trackObj) {
  return new Promise(resolve => {
    if (trackObj.duration > 0) { resolve(); return; }
    if (trackObj.canPlay === false) { resolve(); return; }
    const tmp = new Audio();
    tmp.src = trackObj.url;
    tmp.onloadedmetadata = async () => {
      trackObj.duration = tmp.duration;
      updateLibraryDuration(trackObj);
      if (db && !trackObj.fromCache) await saveToCache(trackObj);
      else if (db && trackObj.fromCache && trackObj.duration > 0) {
        const cached = await dbGet(trackObj.cacheKey);
        if (cached) { cached.duration = trackObj.duration; await dbPut(cached); }
      }
      resolve();
    };
    tmp.onerror = () => {
      addErrorLog(`再生時間取得エラー [${trackObj.path}]`);
      resolve();
    };
    setTimeout(resolve, 5000);
  });
}

function updateLibraryDuration(trackObj) {
  // cacheKeyで検索（url=nullのキャッシュ復元時にも対応）
  const key = trackObj.cacheKey || '';
  const row = key
    ? document.querySelector(`.lib-track-row[data-cache-key="${CSS.escape(key)}"]`)
    : (trackObj.url ? document.querySelector(`.lib-track-row[data-url="${CSS.escape(trackObj.url)}"]`) : null);
  if (row) {
    const durEl = row.querySelector('.lib-track-dur');
    if (durEl) durEl.textContent = fmtDur(trackObj.duration);
  }
  // v9p2: 再生リストパネルの該当行も更新
  // v10f: nullチェック強化（panelがnullの場合のquerySelectorエラーを防止）
  if (key) {
    const plIdx = state.playlist.findIndex(t => t.cacheKey === key);
    if (plIdx >= 0) {
      state.playlist[plIdx].duration = trackObj.duration;
      const panel = document.getElementById('playlist-panel');
      if (panel) {
        const plItem = panel.querySelector(`.playlist-item[data-index="${plIdx}"]`);
        if (plItem) {
          const plDur = plItem.querySelector('.pl-dur');
          if (plDur) plDur.textContent = fmtDur(trackObj.duration);
        }
      }
    }
  }
}

// ===== FOLDER METADATA UNIFICATION =====
function unifyFolderMeta(files) {
  const byFolder = {};
  files.forEach(f => { if (!byFolder[f.folderPath]) byFolder[f.folderPath]=[]; byFolder[f.folderPath].push(f); });

  Object.values(byFolder).forEach(group => {
    const folderName = (() => { const p=group[0].folderPath.split('/'); return p[p.length-1]||group[0].folderPath; })();
    const albumCounts = {};
    group.forEach(f => { if (f.album) albumCounts[f.album]=(albumCounts[f.album]||0)+1; });
    const repAlbum = Object.keys(albumCounts).length>0
      ? Object.entries(albumCounts).sort((a,b)=>b[1]-a[1])[0][0]
      : null;
    const taggedFile = group.find(f => f.fromTag && f.artist);
    const repArtist      = taggedFile ? taggedFile.artist      : null;
    const repAlbumArtist = taggedFile ? taggedFile.albumArtist : null;
    const repArtData     = taggedFile ? taggedFile.artData     : null;

    group.forEach(f => {
      if (repAlbum) { f.album = repAlbum; } else { f.album = folderName; }
      if (!f.fromTag) {
        if (repArtist)      f.artist      = repArtist;
        if (repAlbumArtist) f.albumArtist = repAlbumArtist;
        if (!f.artBlob && repArtData) {
          try { f.artData = repArtData; f.artBlob = URL.createObjectURL(new Blob([repArtData])); } catch(e) {}
        }
      }
    });
  });
}

// ===== FOLDER TREE =====
function buildFolderTree(entries) {
  const root = { name:'', children:{}, files:[] };
  entries.forEach(({path}) => {
    const parts = path.split('/');
    let node = root;
    for (let i=0; i<parts.length-1; i++) {
      const part=parts[i];
      if (!node.children[part]) node.children[part]={name:part,children:{},files:[],path:parts.slice(0,i+1).join('/')};
      node=node.children[part];
    }
    node.files.push(path);
  });
  return root;
}
function countFiles(node) { let c=node.files.length; Object.values(node.children).forEach(ch=>c+=countFiles(ch)); return c; }

// v9p: 歌詞スキャンボタン
document.getElementById('lmp-lyrics-scan-btn').addEventListener('click', async () => {
  closeLibraryPanel();
  if (!hasFSA || state.rootFolders.length === 0) return;
  showToast(currentLang === 'en' ? 'Scanning lyrics...' : currentLang === 'zh' ? '扫描歌词中...' : '歌詞をスキャン中...');
  // 全フォルダから .lrc を収集し直す
  const newLrcTextMap = {};
  for (const folder of state.rootFolders) {
    if (!folder.directoryHandle) continue;
    const lrcHandles = {};
    await collectFilesFromHandle(folder.directoryHandle, '', {n:0}, lrcHandles);
    // lrcHandlesはpath->FileSystemFileHandle
    for (const [lrcPath, lrcHandle] of Object.entries(lrcHandles)) {
      try {
        const file = await lrcHandle.getFile();
        const rawBytes = new Uint8Array(await file.arrayBuffer());
        // v9p2 BUG修正: folderPath付きフルキーとルートフォルダ名なしキーの両方で登録
        const parts = lrcPath.split('/');
        const lrcBaseName = parts[parts.length-1].replace(/\.lrc$/i,'').replace(/^\d+[\s._-]*/,'').toLowerCase();
        const lrcFolder = parts.slice(0,-1).join('/');
        const numMatch = parts[parts.length-1].match(/^(\d+)/);
        const lrcNum = numMatch ? numMatch[1] : null;
        const keyByName = lrcFolder + '/' + lrcBaseName;
        const keyByNum  = lrcNum ? lrcFolder + '/__num__' + lrcNum : null;
        newLrcTextMap[keyByName] = rawBytes;
        if (keyByNum) newLrcTextMap[keyByNum] = rawBytes;
      } catch(e) {}
    }
  }
  // state.lrcCacheに反映（既存キャッシュとマージ）
  Object.assign(state.lrcCache, newLrcTextMap);
  // state.allFiles を走査して hasLyrics を再判定
  let changed = 0;
  for (const track of state.allFiles) {
    if (!track.cacheKey) continue;
    const parts = (track.path||'').split('/');
    const folder2 = parts.slice(0,-1).join('/');
    const baseName = (parts[parts.length-1]||'').replace(/\.[^.]+$/,'').replace(/^\d+[\s._-]*/,'').toLowerCase();
    const numMatch = (parts[parts.length-1]||'').match(/^(\d+)/);
    const trackNum = numMatch ? numMatch[1] : null;
    const lrcText = state.lrcCache[folder2+'/'+baseName]
                 || (trackNum ? state.lrcCache[folder2+'/__num__'+trackNum] : null)
                 || state.lrcFileMap[track.cacheKey]
                 || null;
    const hasLyrics = !!lrcText;
    // lrcFileMapも更新
    if (lrcText) {
      state.lrcFileMap[track.cacheKey] = lrcText;
    } else {
      delete state.lrcFileMap[track.cacheKey];
    }
    if (track.hasLyrics !== hasLyrics) {
      track.hasLyrics = hasLyrics;
      if (db) {
        try {
          const tx = db.transaction(DB_STORE, 'readwrite');
          const req = tx.objectStore(DB_STORE).get(track.cacheKey);
          req.onsuccess = e => { const rec=e.target.result; if(rec){rec.hasLyrics=hasLyrics;tx.objectStore(DB_STORE).put(rec);} };
        } catch(e) {}
      }
      changed++;
    }
  }
  rebuildLibrary();
  // 現在再生中のトラックが影響を受けた場合は再初期化
  if (state.currentIndex >= 0 && state.currentIndex < state.playlist.length) {
    initLyricsForTrack(state.playlist[state.currentIndex]);
  }
  showToast((currentLang === 'en' ? 'Lyrics scan complete' : currentLang === 'zh' ? '歌词扫描完成' : '歌詞スキャン完了') + ` (${changed}件更新)`);
});

// v9k: 差分更新（前回取込以降に変更されたファイルのみ再読み込み）
async function onDiffUpdate() {
  if (!hasFSA) return;
  const allScanned = [];
  for (const folder of state.rootFolders) {
    if (!folder.directoryHandle) continue;
    loadStatus.textContent = `🔍 ${folder.displayName} を差分確認中…`;
    // FSAで現在のファイル一覧を取得
    let entries;
    try {
      const countRef = { n: 0 };
      const lrcHandles = {};
      entries = await collectFilesFromHandle(folder.directoryHandle, '', countRef, lrcHandles);
    } catch(e) {
      addErrorLog(`差分更新 走査エラー [${folder.folderPath}]: ${e.message||e}`);
      continue;
    }
    // DBの全cacheKeyを取得
    const dbKeys = new Set();
    const dbKeyMap = {}; // cacheKey → true
    try {
      const allRecords = await new Promise((res, rej) => {
        const tx = db.transaction('tracks', 'readonly');
        const req = tx.objectStore('tracks').getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
      });
      for (const rec of allRecords) {
        if (rec.rootFolder === folder.folderPath && rec.cacheKey) {
          dbKeys.add(rec.cacheKey);
          dbKeyMap[rec.cacheKey] = true;
        }
      }
    } catch(e) {}

    // FSA側のcacheKeyセットを構築
    const fsaKeys = new Set();
    const newEntries = [];
    for (const entry of entries) {
      if (/\.lrc$/i.test(entry.name)) continue;
      try {
        const file = await entry.handle.getFile();
        const cacheKey = entry.path + '|' + file.size + '|' + file.lastModified;
        fsaKeys.add(cacheKey);
        if (!dbKeyMap[cacheKey]) newEntries.push({ entry, file, cacheKey }); // 新規または変更
      } catch(e) {}
    }

    // 削除されたファイル（DBにあってFSAにない）をDB削除
    const deletedKeys = [...dbKeys].filter(k => !fsaKeys.has(k));
    if (deletedKeys.length > 0) {
      try {
        const tx = db.transaction('tracks', 'readwrite');
        const store = tx.objectStore('tracks');
        const allRecs = await new Promise((res, rej) => {
          const req = store.getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error);
        });
        for (const rec of allRecs) {
          if (rec.rootFolder === folder.folderPath && rec.cacheKey && !fsaKeys.has(rec.cacheKey)) {
            store.delete(rec.cacheKey);
          }
        }
        await new Promise((res, rej) => { tx.oncomplete=res; tx.onerror=()=>rej(tx.error); });
      } catch(e) {}
    }

    // 新規・変更ファイルを読み込みDBに保存
    let processed = 0;
    for (const { entry, file, cacheKey } of newEntries) {
      loadStatus.textContent = `⚡ 差分更新中: ${folder.displayName} (${++processed}/${newEntries.length})`;
      try {
        const meta = await readFileMeta(file, entry.path);
        if (meta) {
          meta.rootFolder = folder.folderPath;
          meta.cacheKey = cacheKey;
          await saveToCache(meta);
          allScanned.push({ ...meta, file, url: URL.createObjectURL(file) });
        }
      } catch(e) {}
    }
    folder.lastUpdatedAt = Date.now();
  }
  await saveRootFolders(state.rootFolders);
  await reloadLibrary();
  mergeScannedUrls(allScanned);
  startDurationBgLoad(); // v10f: 差分更新後にdurationバックグラウンド取得を起動
  const total = allScanned.length;
  loadStatus.textContent = total > 0 ? `差分更新完了: ${total}件更新` : '差分更新完了: 変更なし';
  setTimeout(() => { loadStatus.textContent = ''; }, 3000);
}

// v8: フォルダ走査してDBに保存。url付きresultsを返す（V9: LRC収集・新形式対応）
async function scanAndSaveFolder(dirHandle, rootFolderPath) {
  const countRef = { n: 0 };
  const lrcHandles = {}; // V9: lrcパス → handle
  let entries;
  try {
    entries = await collectFilesFromHandle(dirHandle, '', countRef, lrcHandles);
  } catch(e) {
    addErrorLog(`フォルダ走査エラー [${rootFolderPath}]: ${e.message||e}`);
    return [];
  }

  // V9: LRCファイルをメモリに読み込んでキャッシュ（フォルダパス+ベース名でインデックス）
  // lrcHandles: { "sub/track.lrc": handle, ... }
  const lrcTextMap = {}; // "folderPath/baseName" -> lrcText
  for (const [lrcPath, lrcHandle] of Object.entries(lrcHandles)) {
    try {
      const lrcFile = await lrcHandle.getFile();
      const text = new Uint8Array(await lrcFile.arrayBuffer());
      const parts = lrcPath.split('/');
      const lrcBaseName = parts[parts.length-1].replace(/\.lrc$/i,'').replace(/^\d+[\s._-]*/,'');
      const lrcFolder = parts.slice(0,-1).join('/');
      const numMatch = parts[parts.length-1].match(/^(\d+)/);
      const lrcNum = numMatch ? numMatch[1] : null;
      const keyByName = lrcFolder + '/' + lrcBaseName.toLowerCase();
      const keyByNum  = lrcNum ? lrcFolder + '/__num__' + lrcNum : null;
      lrcTextMap[keyByName] = text;
      if (keyByNum) lrcTextMap[keyByNum] = text;
    } catch(e) {}
  }
  // state.lrcCache にマージ（session中保持）
  Object.assign(state.lrcCache, lrcTextMap);

  const results = [];
  for (let i = 0; i < entries.length; i++) {
    const entry = entries[i];
    // LRCファイルはスキップ（音楽ファイルのみ処理）
    if (/\.lrc$/i.test(entry.name)) continue;
    try {
      const file = await entry.handle.getFile();
      const meta = await readFileMeta(file, entry.path);
      if (meta) {
        meta.rootFolder = rootFolderPath;
        // V9: LRC対応付け（ファイル名完全一致 or 先頭番号一致）
        const parts = entry.path.split('/');
        const folder = parts.slice(0,-1).join('/');
        const baseName = entry.name.replace(/\.[^.]+$/,'').replace(/^\d+[\s._-]*/,'').toLowerCase();
        const numMatch = entry.name.match(/^(\d+)/);
        const trackNum = numMatch ? numMatch[1] : null;
        const keyByName = folder + '/' + baseName;
        const keyByNum  = trackNum ? folder + '/__num__' + trackNum : null;
        if (lrcTextMap[keyByName] || (keyByNum && lrcTextMap[keyByNum])) {
          meta.hasLyrics = true;
          const lrcText = lrcTextMap[keyByName] || lrcTextMap[keyByNum];
          state.lrcFileMap[meta.cacheKey] = lrcText; // sessionキャッシュ
          // v9n BUG-B修正: キャッシュヒット済みでもhasLyricsが変化した場合はDBを更新
          if (meta.fromCache) saveToCache(meta);
        } else if (meta.fromCache && meta.hasLyrics) {
          // v9n BUG-B修正: LRCが消えた場合もDBのhasLyricsをfalseに更新
          meta.hasLyrics = false;
          delete state.lrcFileMap[meta.cacheKey];
          saveToCache(meta);
        }
        results.push(meta);
      }
    } catch(e) {
      addErrorLog(`ファイル取得エラー [${entry.path}]: ${e.message||e}`);
    }
    if ((i+1) % 100 === 0 || i === entries.length - 1) {
      loadStatus.textContent = `タグ情報を読み込み中… ${i+1}/${entries.length}件`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  unifyFolderMeta(results);
  const newFiles = results.filter(f => !f.fromCache);
  if (db && newFiles.length > 0) {
    const BATCH = 20;
    for (let i = 0; i < newFiles.length; i += BATCH) {
      await Promise.allSettled(newFiles.slice(i, i+BATCH).map(saveToCache));
      await new Promise(r => setTimeout(r, 0));
    }
  }
  // バックグラウンドでduration取得
  const needDuration = results.filter(f => f.duration === 0);
  if (needDuration.length > 0) {
    (async() => {
      const BATCH = 20;
      for (let i = 0; i < needDuration.length; i += BATCH) {
        await Promise.allSettled(needDuration.slice(i, i+BATCH).map(loadDurationBg));
        await new Promise(r => setTimeout(r, 0));
      }
    })();
  }
  return results;
}

// v8: scanAndSaveFolderのurl/fileをstate.allFilesにマージ（reloadLibrary後に呼ぶ）
function mergeScannedUrls(scanned) {
  if (!scanned || scanned.length === 0) return;
  const urlMap = new Map();
  scanned.forEach(s => { if (s.cacheKey && s.url) urlMap.set(s.cacheKey, { url: s.url, file: s.file || null }); });
  state.allFiles.forEach(f => {
    if (!f.url && f.cacheKey && urlMap.has(f.cacheKey)) {
      const src = urlMap.get(f.cacheKey);
      f.url = src.url;
      f.file = src.file;
    }
  });
}

// v8: DBから全件読み込んでライブラリ再構築
async function reloadLibrary() {
  const allRecords = await loadLibrary();
  state.allFiles = allRecords.map(r => ({
    file: null,
    url: null,
    format: r.format || 'mp3',
    path: r.path || '',
    folderPath: r.folderPath || '',
    cacheKey: r.cacheKey,
    title: r.title,
    artist: r.artist,
    albumArtist: r.albumArtist,
    album: r.album,
    track: r.track,
    duration: r.duration || 0,
    artBlob: null,
    artData: null,
    fromTag: r.fromTag,
    fromCache: true,
    rootFolder: r.rootFolder || '',
    canPlay: r.canPlay !== undefined ? r.canPlay : true,
    hasLyrics: r.hasLyrics || false,
  }));
  // rootFolderName: 登録フォルダが1件なら名前、複数なら件数表示
  if (state.rootFolders.length === 1) {
    state.rootFolderName = state.rootFolders[0].displayName;
  } else if (state.rootFolders.length > 1) {
    state.rootFolderName = `${state.rootFolders[0].displayName} ほか${state.rootFolders.length-1}件`;
  } else {
    state.rootFolderName = '';
  }
  state.selectedFolder = null;
  // V9c: rootFolderが空のレコードをstate.rootFoldersから補完する
  // （v8sからのDB移行時やreadFileMetaの旧バグにより空になったレコードを救済）
  if (state.rootFolders.length === 1) {
    // 登録フォルダが1つなら全ファイルをそのrootFolderに帰属させる
    const singleRoot = state.rootFolders[0].folderPath;
    state.allFiles.forEach(f => { if (!f.rootFolder) f.rootFolder = singleRoot; });
  } else if (state.rootFolders.length > 1) {
    // 複数フォルダの場合はpathの先頭セグメントで一致するものを探す
    state.allFiles.forEach(f => {
      if (f.rootFolder) return;
      const firstSeg = (f.path || '').split('/')[0];
      const matched = state.rootFolders.find(r => r.folderPath === firstSeg || r.displayName === firstSeg);
      if (matched) f.rootFolder = matched.folderPath;
      else if (state.rootFolders.length > 0) f.rootFolder = state.rootFolders[0].folderPath;
    });
  }
  // 全トップフォルダを初期選択（起動直後・フォルダ追加直後は全選択が自然な状態）
  state.selectedFolders = new Set();
  state.selectedItems = { artists: new Set(), albums: new Set(), tracks: new Set() };
  const rootKeys = [...new Set(state.allFiles.map(f => f.rootFolder || '__unknown__'))];
  rootKeys.forEach(k => { if (k && k !== '__unknown__') state.selectedFolders.add(k); });
  renderFolderTreeV8();
  rebuildLibrary();
  updateBannerText();
  updateSelectionCounts();
  document.getElementById('playlist-count').textContent = t('playlistCount').replace('N','0');
}

// ===== パーミッション取得後のdurationバックグラウンド取得 =====
// （ユーザー操作後のみ呼ぶこと）
function startDurationBgLoad() {
  const needDuration = state.allFiles.filter(
    f => f.duration === 0 && f.path && f.canPlay !== false
  );
  if (needDuration.length === 0) return;
  const _ls = document.getElementById('load-status');
  if (_ls) _ls.textContent = `再生時間をバックグラウンドで取得中... (${needDuration.length}件)`;
  (async () => {
    const BATCH = 10;
    for (let i = 0; i < needDuration.length; i += BATCH) {
      await Promise.allSettled(needDuration.slice(i, i + BATCH).map(async f => {
        const tmpUrl = await resolveTrackUrl(f).catch(() => null);
        if (!tmpUrl) return;
        return new Promise(resolve => {
          const tmp = new Audio();
          tmp.src = tmpUrl;
          const cleanup = () => URL.revokeObjectURL(tmpUrl);
          tmp.onloadedmetadata = async () => {
            f.duration = tmp.duration;
            cleanup();
            updateLibraryDuration(f);
            if (db) {
              try {
                const tx = db.transaction(DB_STORE, 'readwrite');
                const req = tx.objectStore(DB_STORE).get(f.cacheKey);
                req.onsuccess = e => {
                  const rec = e.target.result;
                  if (rec) { rec.duration = f.duration; tx.objectStore(DB_STORE).put(rec); }
                };
              } catch(e) {}
            }
            resolve();
          };
          tmp.onerror = () => {
            cleanup();
            addErrorLog(`再生時間取得エラー [${f.path}]`);
            resolve();
          };
          setTimeout(() => { cleanup(); resolve(); }, 5000);
        });
      }));
      await new Promise(r => setTimeout(r, 0));
    }
    if (_ls) _ls.textContent = '';
  })();
}

// ===== v8: フォルダツリー描画 =====
function renderFolderTreeV8() {
  const treeEl = document.getElementById('folder-tree');
  const initScreen = document.getElementById('initial-screen');

  if (state.allFiles.length === 0 && state.rootFolders.length === 0) {
    initScreen.style.display = 'flex';
    treeEl.innerHTML = '';
    return;
  }
  // rootFoldersが登録されていれば初期画面は非表示
  initScreen.style.display = 'none';
  treeEl.innerHTML = '';
  if (state.allFiles.length === 0) {
    // ファイルは0件だがフォルダは登録済み（空フォルダ等）→ ツリーだけ空で返す
    return;
  }

  // トップフォルダごとにファイルをグループ化
  const filesByRoot = {};
  state.allFiles.forEach(f => {
    const rootKey = f.rootFolder || f.path.split('/')[0] || '__unknown__';
    if (!filesByRoot[rootKey]) filesByRoot[rootKey] = [];
    filesByRoot[rootKey].push(f);
  });

  const rootKeys = Object.keys(filesByRoot);

  // トップフォルダが1件のみ → 全体を1つの🗂️ノードで包む
  // トップフォルダが複数 → それぞれ独立した🗂️ノードとして表示
  rootKeys.forEach(rootKey => {
    const files = filesByRoot[rootKey];
    const displayName = (() => {
      const rf = state.rootFolders.find(f => f.folderPath === rootKey);
      return rf ? rf.displayName : rootKey;
    })();
    const subtree = buildFolderTree(files.map(f => ({ path: f.path })));
    const totalCount = files.length;

    // ルートノード生成
    const rootRow = document.createElement('div');
    rootRow.className = 'tree-node root-node selected';
    rootRow.style.paddingLeft = '8px';
    rootRow.dataset.path = '__ROOT__:' + rootKey;
    rootRow.dataset.rootKey = rootKey;

    const rootToggle = document.createElement('span');
    rootToggle.className = 'tree-toggle open';  // 初期状態は展開
    rootToggle.textContent = '▶';
    rootRow.appendChild(rootToggle);

    const rootIcon = document.createElement('span');
    rootIcon.className = 'tree-icon';
    rootIcon.textContent = '🗂️';
    rootRow.appendChild(rootIcon);

    const rootNameEl = document.createElement('span');
    rootNameEl.className = 'tree-name';
    rootNameEl.textContent = displayName;
    rootRow.appendChild(rootNameEl);

    const rootCnt = document.createElement('span');
    rootCnt.className = 'tree-count';
    rootCnt.textContent = totalCount;
    rootRow.appendChild(rootCnt);

    // ルートノードの childWrap（サブフォルダを格納）
    const rootWrap = document.createElement('div');
    rootWrap.className = 'tree-children open';  // 初期状態は展開

    // トグルクリック：展開/折りたたみ
    rootToggle.addEventListener('click', e => {
      e.stopPropagation();
      rootWrap.classList.toggle('open');
      rootToggle.classList.toggle('open');
    });

    // 行クリック：このルートフォルダのみ選択
    rootRow.addEventListener('click', () => {
      // このrootKeyのフォルダを選択・解除
      const rootPath = rootKey;
      if (state.selectedFolders.has(rootPath)) {
        state.selectedFolders.delete(rootPath);
      } else {
        state.selectedFolders.add(rootPath);
      }
      state.selectedFolder = state.selectedFolders.size > 0 ? [...state.selectedFolders][0] : null;
      updateFolderHighlights();
      rebuildLibrary();
      updateSelectionCounts();
    });

    treeEl.appendChild(rootRow);
    treeEl.appendChild(rootWrap);

    // サブフォルダをrootWrapに描画
    renderSubTree(subtree, rootWrap, 1, rootKey);
  });

  updateFolderHighlights();
}

// サブフォルダを再帰描画（depth=1から）
function renderSubTree(node, container, depth, rootKey) {
  Object.values(node.children).sort((a,b)=>a.name.localeCompare(b.name,'ja')).forEach(child => {
    const hasChildren = Object.keys(child.children).length > 0;
    const count = countFiles(child);
    const row = document.createElement('div');
    row.className = 'tree-node';
    row.style.paddingLeft = (8 + depth * 14) + 'px';
    row.dataset.path = child.path || child.name;
    row.dataset.rootKey = rootKey;

    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle';
    toggle.textContent = hasChildren ? '▶' : '';
    row.appendChild(toggle);

    const icon = document.createElement('span');
    icon.className = 'tree-icon';
    icon.textContent = '📁';
    row.appendChild(icon);

    const nameEl = document.createElement('span');
    nameEl.className = 'tree-name';
    nameEl.textContent = child.name;
    row.appendChild(nameEl);

    const cnt = document.createElement('span');
    cnt.className = 'tree-count';
    cnt.textContent = count;
    row.appendChild(cnt);

    const childWrap = document.createElement('div');
    childWrap.className = 'tree-children';

    toggle.addEventListener('click', e => {
      e.stopPropagation();
      if (hasChildren) {
        childWrap.classList.toggle('open');
        toggle.classList.toggle('open');
      }
    });

    row.addEventListener('click', () => {
      const path = child.path || child.name;
      // 親ルートが選択済みならトースト
      if (state.selectedFolders.has(rootKey)) {
        showToast(t('alreadySelected'));
        return;
      }
      if (state.selectedFolders.has(path)) {
        state.selectedFolders.delete(path);
      } else {
        state.selectedFolders.add(path);
      }
      state.selectedFolder = state.selectedFolders.size > 0 ? [...state.selectedFolders][0] : null;
      updateFolderHighlights();
      rebuildLibrary();
      updateSelectionCounts();
    });

    container.appendChild(row);
    container.appendChild(childWrap);
    if (hasChildren) renderSubTree(child, childWrap, depth + 1, rootKey);
  });
}

function updateFolderHighlights() {
  document.querySelectorAll('.tree-node').forEach(node => {
    const path = node.dataset.path;
    const rootKey = node.dataset.rootKey;
    if (!path) return;
    node.classList.remove('selected', 'selected-child');

    if (path.startsWith('__ROOT__:')) {
      const rk = path.replace('__ROOT__:', '');
      if (state.selectedFolders.has(rk)) {
        node.classList.add('selected');
      }
      return;
    }
    if (state.selectedFolders.has(path)) {
      node.classList.add('selected');
    } else if (rootKey && state.selectedFolders.has(rootKey)) {
      node.classList.add('selected-child');
    } else {
      let isChild = false;
      state.selectedFolders.forEach(sel => {
        if (path.startsWith(sel + '/')) isChild = true;
      });
      if (isChild) node.classList.add('selected-child');
    }
  });
}

// v8: 複数フォルダ選択トグル
function selectFolder(path, rowEl) {
  if (path === '__ROOT__') {
    // ルートノードは「全選択クリア」
    state.selectedFolders.clear();
    state.selectedFolder = null;
    updateFolderHighlights();
    rebuildLibrary();
    updateSelectionCounts();
    return;
  }
  // サブフォルダクリック時、親が選択済みならトースト
  let parentSelected = false;
  state.selectedFolders.forEach(sel => {
    if (path.startsWith(sel + '/')) parentSelected = true;
  });
  if (parentSelected) {
    showToast(t('alreadySelected'));
    return;
  }
  // ON/OFFトグル
  if (state.selectedFolders.has(path)) {
    state.selectedFolders.delete(path);
  } else {
    // このフォルダの配下の選択を削除してから追加
    state.selectedFolders.forEach(sel => {
      if (sel.startsWith(path + '/')) state.selectedFolders.delete(sel);
    });
    state.selectedFolders.add(path);
  }
  // selectedFolder も更新（互換用）
  state.selectedFolder = state.selectedFolders.size > 0 ? [...state.selectedFolders][0] : null;
  updateFolderHighlights();
  rebuildLibrary();
  updateSelectionCounts();
}

// ===== LIBRARY =====
function getFilesForFolder() {
  // selectedFolders空 → 何も選択されていない → 空（自動全選択しない）
  if (state.selectedFolders.size === 0) return [];
  return state.allFiles.filter(f => {
    const rootKey = f.rootFolder || f.path.split('/')[0] || '__unknown__';
    let match = false;
    state.selectedFolders.forEach(sel => {
      if (sel === rootKey) { match = true; return; }
      if (f.path.startsWith(sel + '/') || f.path.split('/').slice(0,-1).join('/') === sel) match = true;
    });
    return match;
  });
}
function getLibraryArtistKey(tracks) {
  for (const t of tracks) { if (t.albumArtist) return t.albumArtist; }
  const artists=[...new Set(tracks.map(t=>t.artist||'Unknown Artist'))];
  if (artists.length===1) return artists[0];
  return artists[0]+' 他';
}

// v7: 同名アルバムを別フォルダで区別するため folderPath を複合キーに含める
function getAlbumKey(track) {
  return track.album + '\x00' + track.folderPath;
}

function rebuildLibrary() {
  const list=document.getElementById('library-list');
  // 選択なし → 空メッセージ
  if (state.selectedFolders.size === 0 && state.allFiles.length > 0) {
    list.innerHTML='<div id="library-empty" style="padding:40px 16px;text-align:center;color:var(--text-hint);font-size:13px;line-height:1.8;">' + t('selectFolder') + '</div>';
    return;
  }
  const files=getFilesForFolder();
  const filter=state.formatFilter;
  const filtered=files.filter(f=>{
    const fmt = f.format || 'mp3';
    if (fmt in filter && !filter[fmt]) return false;
    return true;
  });
  // v7: アルバムキーはアルバム名+folderPathの複合キー
  const byAlbumKey={};
  filtered.forEach(f=>{
    const ak=getAlbumKey(f);
    if(!byAlbumKey[ak]) byAlbumKey[ak]=[];
    byAlbumKey[ak].push(f);
  });
  const byArtist={};
  Object.entries(byAlbumKey).forEach(([albumKey,tracks])=>{
    const displayAlbum = tracks[0].album || 'Unknown Album';
    const ak=getLibraryArtistKey(tracks);
    if(!byArtist[ak]) byArtist[ak]={};
    // 表示上は同名アルバムを許容。内部キーで区別。
    if(!byArtist[ak][albumKey]) byArtist[ak][albumKey]={ displayName: displayAlbum, tracks: [] };
    byArtist[ak][albumKey].tracks.push(...tracks);
  });
  // Sort tracks per album
  Object.values(byArtist).forEach(albums=>{
    Object.values(albums).forEach(({tracks})=>{
      const hasAnyTrack = tracks.some(t=>t.track);
      const allHaveTrack = tracks.every(t=>t.track);
      if (allHaveTrack) {
        tracks.sort((a,b)=>a.track-b.track);
      } else if (!hasAnyTrack) {
        tracks.sort((a,b)=>(a.title||'').localeCompare(b.title||'','ja'));
      } else {
        const noTrack  = tracks.filter(t=>!t.track).sort((a,b)=>(a.title||'').localeCompare(b.title||'','ja'));
        const hasTrack = tracks.filter(t=>t.track).sort((a,b)=>a.track-b.track);
        const total    = tracks.length;
        const result   = new Array(total).fill(null);
        hasTrack.forEach(t => {
          const pos = Math.min(Math.max(t.track-1, 0), total-1);
          // 衝突時は空きを探す
          if (result[pos] === null) {
            result[pos] = t;
          } else {
            for (let j = 0; j < total; j++) {
              if (result[j] === null) { result[j] = t; break; }
            }
          }
        });
        let ni = 0;
        for (let i=0; i<total; i++) {
          if (result[i]===null && ni < noTrack.length) result[i]=noTrack[ni++];
        }
        // nullやundefinedが残った場合は除外
        const cleaned = result.filter(t => t != null);
        tracks.splice(0, tracks.length, ...cleaned);
      }
    });
  });
  if (Object.keys(byArtist).length===0) {
    list.innerHTML='<div id="library-empty" style="padding:40px 16px;text-align:center;color:var(--text-hint);font-size:13px;line-height:1.8;">' + t('noTracks') + '</div>';
    return;
  }
  list.innerHTML='';
  const sortedArtists=Object.keys(byArtist).sort((a,b)=>(a||'').localeCompare(b||'','ja'));
  sortedArtists.forEach(artistKey=>{
    try {
    const albums=byArtist[artistKey];
    const sortedAlbumKeys=Object.keys(albums).sort((a,b)=>(albums[a].displayName||'').localeCompare(albums[b].displayName||'','ja'));
    const totalTracks=sortedAlbumKeys.reduce((s,ak)=>s+albums[ak].tracks.length,0);
    const artistRow=document.createElement('div'); artistRow.className='lib-artist-row'; artistRow.dataset.artistKey=artistKey;
    const artistToggle=document.createElement('span'); artistToggle.className='lib-artist-toggle'; artistToggle.textContent='▶'; artistRow.appendChild(artistToggle);
    const artistNameEl=document.createElement('span'); artistNameEl.className='lib-artist-name'; artistNameEl.textContent=artistKey; artistRow.appendChild(artistNameEl);
    const artistCount=document.createElement('span'); artistCount.className='lib-artist-count'; artistCount.textContent=totalTracks; artistRow.appendChild(artistCount);
    const artistBody=document.createElement('div'); artistBody.className='lib-artist-body';
    artistToggle.addEventListener('click',e=>{e.stopPropagation();artistBody.classList.toggle('open');artistToggle.classList.toggle('open');});
    artistRow.addEventListener('click', e => {
      if (e.target === artistToggle) return;
      const allTracks = sortedAlbumKeys.flatMap(ak=>albums[ak].tracks);
      toggleLibrarySelection('artist', artistKey, null, allTracks, artistRow);
    });
    list.appendChild(artistRow); list.appendChild(artistBody);
    sortedAlbumKeys.forEach(albumKey=>{
      const {displayName, tracks}=albums[albumKey];
      const albumRow=document.createElement('div'); albumRow.className='lib-album-row'; albumRow.dataset.artistKey=artistKey; albumRow.dataset.albumKey=albumKey;
      const albumToggle=document.createElement('span'); albumToggle.className='lib-album-toggle'; albumToggle.textContent='▶'; albumRow.appendChild(albumToggle);
      const albumNameEl=document.createElement('span'); albumNameEl.className='lib-album-name'; albumNameEl.textContent=displayName; albumRow.appendChild(albumNameEl);
      const albumCount=document.createElement('span'); albumCount.className='lib-album-count'; albumCount.textContent=tracks.length; albumRow.appendChild(albumCount);
      const albumBody=document.createElement('div'); albumBody.className='lib-album-body';
      albumToggle.addEventListener('click',e=>{e.stopPropagation();albumBody.classList.toggle('open');albumToggle.classList.toggle('open');});
      albumRow.addEventListener('click', e => {
        if (e.target === albumToggle) return;
        toggleLibrarySelection('album', artistKey, albumKey, tracks, albumRow);
      });
      artistBody.appendChild(albumRow); artistBody.appendChild(albumBody);
      tracks.forEach(track=>{
        if (!track) return;
        try {
        const trackRow=document.createElement('div'); trackRow.className='lib-track-row';
        trackRow.dataset.url=track.url||''; trackRow.dataset.cacheKey=track.cacheKey||''; trackRow.dataset.artistKey=artistKey; trackRow.dataset.albumKey=albumKey;
        const numStr=track.track?String(track.track).padStart(2,'0'):'—';
        const durStr=track.duration>0?fmtDur(track.duration):'—';
        // V9: 再生非対応バッジ・歌詞アイコン
        const noPlay = track.canPlay===false;
        const lyricsIcon = track.hasLyrics ? '<span class="lib-lyrics-icon" title="歌詞あり">♪</span>' : '';
        const newBadge = newLyricsCacheKeys.has(track.cacheKey) ? '<span class="lib-new-badge">NEW</span>' : '';
        const badgeStyle = noPlay ? 'opacity:0.45;' : '';
        const noPlayIcon = noPlay ? '<span style="font-size:9px;margin-left:1px;" title="このブラウザでは再生できません">🚫</span>' : '';
        trackRow.innerHTML=`<span class="fmt-badge" style="${badgeStyle}">${track.format.toUpperCase()}${noPlayIcon}</span><span class="lib-track-num">${numStr}</span><span class="lib-track-name">${esc(track.title)}${lyricsIcon}${newBadge}</span><span class="lib-track-dur">${durStr}</span>`;
        trackRow.addEventListener('click',e=>{
          e.stopPropagation();
          if (track.canPlay===false) { showToast('このブラウザでは再生できません'); return; }
          toggleLibrarySelection('track',artistKey,albumKey,[track],trackRow);
        });
        albumBody.appendChild(trackRow);
        } catch(e) { addErrorLog(`ライブラリ描画エラー [${track.path||track.title||'?'}]: ${e.message||e}`); }
      });
    });
    } catch(e) { addErrorLog(`ライブラリ描画エラー [アーティスト: ${artistKey||'?'}]: ${e.message||e}`); }
  });
  highlightPlaying();
  updateLibraryHighlights();  // v8l: 複数選択ハイライト復元
  updateCenterSelectionCount();
  // V9: 検索結果を再適用
  if (typeof reapplySearch === 'function') reapplySearch();
}

// ===== v8l: 中央ペイン 複数選択トグル =====
// selectedItems管理：アーティスト選択 → 配下は selected-child
// クリックでトグル。複数選択可。再生リストは選択トラックの合算。
function toggleLibrarySelection(type, artistKey, albumKey, tracks, el) {
  const si = state.selectedItems;

  if (type === 'artist') {
    // 親が選択済みかチェック（なし → アーティスト選択は常にトップレベル）
    if (si.artists.has(artistKey)) {
      // 選択解除
      si.artists.delete(artistKey);
    } else {
      // 選択追加。配下のアルバム・トラック選択は除去
      si.albums.forEach(k => { if (k.startsWith(artistKey + '\x00')) si.albums.delete(k); });
      si.tracks.forEach(k => { if (k.startsWith(artistKey + '\x00')) si.tracks.delete(k); });
      si.artists.add(artistKey);
    }
  } else if (type === 'album') {
    const key = artistKey + '\x00' + albumKey;
    if (si.artists.has(artistKey)) {
      // 親アーティストが選択済み → トースト
      showToast(t('alreadySelectedItem'));
      return;
    }
    if (si.albums.has(key)) {
      si.albums.delete(key);
    } else {
      // 配下のトラック個別選択を除去
      tracks.forEach(tr => { if (tr) si.tracks.delete(artistKey + '\x00' + (tr.cacheKey||tr.title)); });
      si.albums.add(key);
    }
  } else if (type === 'track') {
    const track = tracks[0]; if (!track) return;
    const key = artistKey + '\x00' + (track.cacheKey||track.title);
    const albumKey2 = artistKey + '\x00' + albumKey;
    if (si.artists.has(artistKey) || si.albums.has(albumKey2)) {
      showToast(t('alreadySelectedItem'));
      return;
    }
    if (si.tracks.has(key)) {
      si.tracks.delete(key);
    } else {
      si.tracks.add(key);
    }
  }

  updateLibraryHighlights();
  updateCenterSelectionCount();
  updatePlaylistFromSelection();
}

// 選択アイテムのハイライト更新
function updateLibraryHighlights() {
  const si = state.selectedItems;
  document.querySelectorAll('.lib-artist-row').forEach(row => {
    const ak = row.dataset.artistKey;
    row.classList.remove('selected', 'selected-child');
    if (si.artists.has(ak)) row.classList.add('selected');
  });
  document.querySelectorAll('.lib-album-row').forEach(row => {
    const ak = row.dataset.artistKey;
    const bk = row.dataset.albumKey;
    const key = ak + '\x00' + bk;
    row.classList.remove('selected', 'selected-child');
    if (si.artists.has(ak)) {
      row.classList.add('selected-child');
    } else if (si.albums.has(key)) {
      row.classList.add('selected');
    }
  });
  document.querySelectorAll('.lib-track-row').forEach(row => {
    const ak = row.dataset.artistKey;
    const bk = row.dataset.albumKey;
    const ck = row.dataset.cacheKey;
    const albumKey2 = ak + '\x00' + bk;
    const trackKey = ak + '\x00' + ck;
    row.classList.remove('selected', 'selected-child');
    if (si.artists.has(ak) || si.albums.has(albumKey2)) {
      row.classList.add('selected-child');
    } else if (si.tracks.has(trackKey)) {
      row.classList.add('selected');
    }
  });
}

// 中央ペイン選択件数表示
function updateCenterSelectionCount() {
  const si = state.selectedItems;
  const n = si.artists.size + si.albums.size + si.tracks.size;
  const el = document.getElementById('center-selection-count');
  if (el) {
    el.style.display = n > 0 ? '' : 'none';
    el.textContent = t('selectedItems').replace('N', n);
  }
}

// 選択状態から再生リストを構築してプレイリストに反映
function updatePlaylistFromSelection() {
  const si = state.selectedItems;
  const currentTrack = state.playlist[state.currentIndex] || null;
  const wasPlaying = state.isPlaying;

  // DOMから表示順にトラックを収集
  const newPlaylist = [];
  document.querySelectorAll('.lib-track-row').forEach(row => {
    const ak = row.dataset.artistKey;
    const bk = row.dataset.albumKey;
    const ck = row.dataset.cacheKey;
    const albumKey2 = ak + '\x00' + bk;
    const trackKey = ak + '\x00' + ck;
    const included = si.artists.has(ak) || si.albums.has(albumKey2) || si.tracks.has(trackKey);
    if (included) {
      const track = state.allFiles.find(f => f.cacheKey === ck);
      if (track) newPlaylist.push(track);
    }
  });

  if (newPlaylist.length === 0) {
    // リストが空になった → 再生中でも停止しない（現在の曲は最後まで再生）
    state.playlist = [];
    state.currentIndex = -1;
    document.getElementById('playlist-count').textContent = t('playlistCount').replace('N', 0);
    renderPlaylistPanel();
    return;
  }

  if (wasPlaying && currentTrack) {
    // 再生中 → 現在の曲がリストに残っていれば継続、消えていれば再生中の曲を最後まで再生して終了後に先頭へ
    const idx = newPlaylist.findIndex(f => f.cacheKey === currentTrack.cacheKey);
    state.playlist = newPlaylist;
    state.currentIndex = idx >= 0 ? idx : -1; // -1 = 終了後に先頭から
  } else if (!wasPlaying) {
    // 停止中 → プレイリストを更新して先頭（シャッフル中はランダム）を自動再生
    state.playlist = newPlaylist;
    if (state.isShuffle) {
      state.currentIndex = Math.floor(Math.random() * newPlaylist.length);
    } else {
      state.currentIndex = 0;
    }
    // 自動再生開始
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    const track = state.playlist[state.currentIndex];
    state.isPlaying = true;
    updatePlayBtn();
    updateNowPlaying();
    updatePlaylistHighlight();
    highlightPlaying();
    if (track.url) {
      audio.src = track.url;
      audio.play().catch(() => {});
    } else {
      resolveTrackUrl(track).then(url => {
        if (url) { track.url = url; audio.src = url; audio.play().catch(() => {}); }
        else { state.isPlaying = false; updatePlayBtn(); clearPlayingHighlight(); }
      });
    }
  } else {
    state.playlist = newPlaylist;
    state.currentIndex = 0;
  }

  document.getElementById('playlist-count').textContent = t('playlistCount').replace('N', state.playlist.length);
  renderPlaylistPanel();
  // v9p2: プレイリスト更新時にDLキューをリセット・再開
  if (state.autoLyricsDl && hasFSA) {
    resetLyricsDlQueue();
    startLyricsDlQueue();
  }
}
function selectAndPlay(type, artistKey, albumKey, tracks, el) {
  // 後方互換のため残す。再生リストを即座にセットして再生開始。
  document.querySelectorAll('.lib-artist-row,.lib-album-row,.lib-track-row').forEach(r => r.classList.remove('selected'));
  if (el) el.classList.add('selected');
  startPlayback(tracks);
}

function startPlayback(tracks) {
  state.playlist=[...tracks];
  if (state.isShuffle) shufflePlaylist();
  state.currentIndex=0;
  document.getElementById('playlist-count').textContent=t('playlistCount').replace('N',state.playlist.length);
  renderPlaylistPanel();
  initAudio();
  if (audioCtx.state==='suspended') audioCtx.resume();
  audio.pause();
  state.isPlaying=true;
  updatePlayBtn();
  const track = state.playlist[0];
  updateNowPlaying();
  updatePlaylistHighlight();
  highlightPlaying();
  if (track.url) {
    audio.src = track.url;
    audio.play().catch(()=>{});
  } else {
    // url未解決（キャッシュ復元時） → resolveしてから再生
    resolveTrackUrl(track).then(url => {
      if (url) {
        track.url = url;
        audio.src = url;
        audio.play().catch(()=>{});
      } else {
        addErrorLog(`再生URLを取得できません [${track.path}]`);
        state.isPlaying=false;
        updatePlayBtn();
      }
    });
  }
  // v9p2: プレイリスト確定後に歌詞自動DLキューを開始
  if (state.autoLyricsDl && hasFSA) {
    resetLyricsDlQueue();
    startLyricsDlQueue();
  }
}
function shufflePlaylist() {
  for(let i=state.playlist.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[state.playlist[i],state.playlist[j]]=[state.playlist[j],state.playlist[i]];}
}

// ===== v8: 再生リストパネル描画 =====
// v9o: 再生リストに通し番号・♪マーク・再生時間を追加
function renderPlaylistPanel() {
  const panel = document.getElementById('playlist-panel');
  panel.innerHTML = '';
  state.playlist.forEach((track, idx) => {
    const item = document.createElement('div');
    item.className = 'playlist-item' + (idx === state.currentIndex ? ' active' : '');
    item.dataset.index = idx;
    // B: 通し番号
    const numEl = document.createElement('span');
    numEl.className = 'pl-num';
    numEl.textContent = idx + 1;
    // アーティスト名
    const artistEl = document.createElement('span');
    artistEl.className = 'pl-artist';
    artistEl.textContent = track.artist || '—';
    // 曲名
    const titleEl = document.createElement('span');
    titleEl.className = 'pl-title';
    titleEl.textContent = track.title || '—';
    // C: ♪マーク（歌詞ありの場合のみ）
    const lyricsEl = document.createElement('span');
    lyricsEl.className = 'pl-lyrics';
    lyricsEl.textContent = track.hasLyrics ? '♪' : '';
    // v10: NEWバッジ（今回DLした曲のみ）
    const newEl = document.createElement('span');
    newEl.className = 'pl-new-badge';
    newEl.textContent = newLyricsCacheKeys.has(track.cacheKey) ? 'NEW' : '';
    // D: 再生時間
    const durEl = document.createElement('span');
    durEl.className = 'pl-dur';
    durEl.textContent = track.duration > 0 ? fmtDur(track.duration) : '—';
    item.appendChild(numEl);
    item.appendChild(artistEl);
    item.appendChild(titleEl);
    item.appendChild(lyricsEl);
    item.appendChild(newEl);
    item.appendChild(durEl);
    item.addEventListener('click', () => {
      loadTrack(idx);
      if (state.isPlaying) audio.play().catch(()=>{});
    });
    panel.appendChild(item);
  });
  // v9p4: 再生リスト描画後、state.allFilesのdurationを再同期して「—」を補完
  state.playlist.forEach((track, idx) => {
    if (track.duration > 0) return;
    // allFilesから最新のdurationを取得（バックグラウンド取得済みの場合）
    const src = state.allFiles.find(f => f.cacheKey === track.cacheKey);
    if (src && src.duration > 0) {
      track.duration = src.duration;
      const panel2 = document.getElementById('playlist-panel');
      const plItem = panel2 ? panel2.querySelector(`.playlist-item[data-index="${idx}"]`) : null;
      if (plItem) {
        const plDur = plItem.querySelector('.pl-dur');
        if (plDur) plDur.textContent = fmtDur(track.duration);
      }
    }
  });
}
function updatePlaylistHighlight() {
  document.querySelectorAll('.playlist-item').forEach((item, idx) => {
    item.classList.toggle('active', idx === state.currentIndex);
  });
  // 再生中アイテムをスクロールで見えるように
  const panel = document.getElementById('playlist-panel');
  const active = panel.querySelector('.playlist-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

// ===== PLAYBACK =====
// v8: loadTrack — urlがない場合はdirectoryHandleから解決してからsrcをセット
// v9p: autoLyricsDlがONの場合、歌詞なし曲で自動DLを実行してから再生
async function loadTrack(idx) {
  if(idx<0||idx>=state.playlist.length) return;
  state.currentIndex=idx;
  const track = state.playlist[idx];

  if (track.url) {
    audio.src = track.url;
    updateNowPlaying();
    updatePlaylistHighlight();
    highlightPlaying();
  } else {
    // url未解決 → 非同期で解決して再生
    updateNowPlaying();
    updatePlaylistHighlight();
    highlightPlaying();
    resolveTrackUrl(track).then(url => {
      if (url) {
        track.url = url;
        audio.src = url;
        if (state.isPlaying) audio.play().catch(()=>{});
      } else {
        addErrorLog(`再生URLを取得できません [${track.path}]`);
      }
    });
  }
}

// v9p2: 歌詞自動DLキュー（プレイリスト順に10秒間隔でDL）
let _lyricsDlQueueTimer = null;
let _lyricsDlQueuePos = 0;

function startLyricsDlQueue() {
  if (_lyricsDlQueueTimer) { clearTimeout(_lyricsDlQueueTimer); _lyricsDlQueueTimer = null; }
  _lyricsDlQueuePos = 0;
  scheduleLyricsDlQueue();
}

function scheduleLyricsDlQueue() {
  if (_lyricsDlQueueTimer) { clearTimeout(_lyricsDlQueueTimer); _lyricsDlQueueTimer = null; }
  if (!state.autoLyricsDl || !hasFSA) return;
  if (state.playlist.length === 0) return;
  _lyricsDlQueueTimer = setTimeout(processLyricsDlQueue, 10000);
}

async function processLyricsDlQueue() {
  _lyricsDlQueueTimer = null;
  if (!state.autoLyricsDl || !hasFSA) return;
  if (state.playlist.length === 0) return;
  // v10 改善3: duration>0の曲を優先。同一グループ内は元の順序を維持。
  const noLyrics = state.playlist.filter(t => !t.hasLyrics);
  if (noLyrics.length === 0) return;
  const withDuration    = noLyrics.filter(t => t.duration > 0);
  const withoutDuration = noLyrics.filter(t => t.duration === 0);
  const ordered = [...withDuration, ...withoutDuration];
  // _lyricsDlQueuePosはordered配列のインデックス
  if (_lyricsDlQueuePos >= ordered.length) { _lyricsDlQueuePos = 0; return; }
  const track = ordered[_lyricsDlQueuePos];
  _lyricsDlQueuePos++;
  await autoDownloadLyrics(track).catch(()=>{});
  scheduleLyricsDlQueue();
}

function resetLyricsDlQueue() {
  _lyricsDlQueuePos = 0;
  if (_lyricsDlQueueTimer) { clearTimeout(_lyricsDlQueueTimer); _lyricsDlQueueTimer = null; }
}

function showLyricsDlStatus(msg, autoHideMs = 0) {
  const el = document.getElementById('lyrics-dl-status');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';

    _lyricsDlStatusTimer = setTimeout(() => {
      el.style.display = 'none';
      _lyricsDlStatusTimer = null;
    }, autoHideMs);
  }
}

// v10 改善4: fetchLrclibの戻り値を{lyrics, artistName, trackName}形式に変更
async function fetchLrclib(title, artist) {
  // まず完全一致
  try {
    const url = `https://lrclib.net/api/get?track_name=${encodeURIComponent(title)}&artist_name=${encodeURIComponent(artist)}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (data.syncedLyrics) return { lyrics: data.syncedLyrics, artistName: data.artistName || artist, trackName: data.trackName || title };
    }
  } catch(e) {}
  // 検索にフォールバック
  try {
    const params = new URLSearchParams({ track_name: title });
    if (artist) params.set('artist_name', artist);
    const url2 = `https://lrclib.net/api/search?${params.toString()}`;
    const res2 = await fetch(url2);
    if (res2.ok) {
      const list = await res2.json();
      const hit = list.find(x => x.syncedLyrics);
      if (hit) return { lyrics: hit.syncedLyrics, artistName: hit.artistName || artist, trackName: hit.trackName || title };
    }
  } catch(e) {}
  return null;
}

function cleanTitle(str) {
  return str.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'')
            .replace(/feat\..*$/i,'').replace(/\s+/g,' ').trim();
}
function cleanArtist(str) {
  return str.replace(/feat\..*$/i,'').replace(/&.*$/,'').trim();
}

async function saveLrcFile(track, lrcText) {
  const rootEntry = state.rootFolders.find(f => f.folderPath === track.rootFolder);
  if (!rootEntry || !rootEntry.directoryHandle) throw new Error('directoryHandle なし');
  // v10e: 書き込み前にreadwriteパーミッションを確認・取得
  const perm = await rootEntry.directoryHandle.requestPermission({ mode: 'readwrite' });
  if (perm !== 'granted') throw new Error('書き込み許可が得られませんでした');
  const parts = track.path.split('/');
  const fileName = parts[parts.length - 1];
  const lrcFileName = fileName.replace(/\.[^.]+$/, '.lrc');
  let dirHandle = rootEntry.directoryHandle;
  for (let i = 0; i < parts.length - 1; i++) {
    dirHandle = await dirHandle.getDirectoryHandle(parts[i]);
  }
  const fileHandle = await dirHandle.getFileHandle(lrcFileName, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(new Blob([lrcText], { type: 'text/plain; charset=utf-8' }));
  await writable.close();
}

function updateLyricsIconInLibrary(cacheKey) {

  if (!row) return;
  if (!row.querySelector('.lib-lyrics-icon')) {

    icon.className = 'lib-lyrics-icon';
    icon.title = '歌詞あり';
    icon.textContent = '♪';
    const titleSpan = row.querySelector('.lib-track-name');
    if (titleSpan) titleSpan.append(icon);
  }
}

// v10: 歌詞長さ照合閾値（改善1）
const LYRICS_DL_DURATION_THRESHOLD = 30; // 秒

// v10: 改善1 - syncedLyricsの最終タイムスタンプを取得
function getLrcLastTimestamp(syncedLyrics) {
  const lines = syncedLyrics.split(/\r?\n/);
  let last = -1;
  const timeReg = /\[(\d{1,3}):(\d{2})(?:[.:](\d+))?\]/;
  for (const line of lines) {
    const m = timeReg.exec(line);
    if (m) {
      const sub = m[3] || '0';
      const subSec = sub.length <= 2 ? parseInt(sub) / 100 : parseInt(sub) / 1000;
      const t = parseInt(m[1]) * 60 + parseInt(m[2]) + subSec;
      if (t > last) last = t;
    }
  }
  return last;
}

// v10: NEWバッジ管理（アプリ再起動で忘れる）
const newLyricsCacheKeys = new Set();

async function autoDownloadLyrics(track) {
  _lastLyricsDlTime = Date.now();
  const title = track.title || '';
  const artist = track.artist || '';
  showLyricsDlStatus(t('lyricsDlSearching'));
  let result = null;
  // v10 改善3: duration>0の曲を優先（この関数は1曲ずつ呼ばれるため判定不要。キュー側で制御）
  // フォールバック3段階（改善4: fetchLrclibの戻り値はオブジェクト）
  result = await fetchLrclib(title, artist);
  if (!result) result = await fetchLrclib(cleanTitle(title), cleanArtist(artist));
  if (!result) result = await fetchLrclib(title, '');
  if (!result) {
    showLyricsDlStatus(t('lyricsDlNotFound'), 3000);
    return;
  }
  const { lyrics: syncedLyrics, artistName, trackName } = result;
  // v10 改善1: duration照合（duration>0の場合のみ）
  if (track.duration > 0) {
    const lrcLast = getLrcLastTimestamp(syncedLyrics);
    if (lrcLast > 0 && Math.abs(lrcLast - track.duration) >= LYRICS_DL_DURATION_THRESHOLD) {
      showLyricsDlStatus(t('lyricsDlLengthMismatch'), 3000);
      return;
    }
  }
  // v10 改善4: lrcファイル先頭にメタ情報行を追加
  const metaLine = `[00:00.00] ${artistName} / ${trackName}\n`;
  const finalLyrics = metaLine + syncedLyrics;
  try {
    await saveLrcFile(track, finalLyrics);
    showLyricsDlStatus(t('lyricsDlFound'), 3000);
    track.hasLyrics = true;
    if (db) {
      try {
        const tx = db.transaction(DB_STORE, 'readwrite');
        const req = tx.objectStore(DB_STORE).get(track.cacheKey);
        req.onsuccess = e => { const rec=e.target.result; if(rec){rec.hasLyrics=true;tx.objectStore(DB_STORE).put(rec);} };
      } catch(e) {}
    }
    state.lrcFileMap[track.cacheKey] = finalLyrics;
    if (state.lyricsOn) initLyricsForTrack(track);
    // v10: NEWバッジ追加
    newLyricsCacheKeys.add(track.cacheKey);
    updateLyricsIconInLibrary(track.cacheKey);
    updateNewBadgeInLibrary(track.cacheKey);
    // 再生リストパネルの♪マーク・NEWバッジも即時反映
    const plIdx = state.playlist.findIndex(t => t.cacheKey === track.cacheKey);
    if (plIdx >= 0) {
      const panel = document.getElementById('playlist-panel');
      const plItem = panel ? panel.querySelector(`.playlist-item[data-index="${plIdx}"]`) : null;
      if (plItem) {
        const lyrEl = plItem.querySelector('.pl-lyrics');
        if (lyrEl) lyrEl.textContent = '♪';
        // NEWバッジ
        if (!plItem.querySelector('.pl-new-badge')) {
          const nb = document.createElement('span');
          nb.className = 'pl-new-badge';
          nb.textContent = 'NEW';
          lyrEl ? lyrEl.after(nb) : plItem.appendChild(nb);
        }
      }
    }
  } catch(e) {
    showLyricsDlStatus(t('lyricsDlFailed') + ': ' + e.message); // v10e: エラーは自動消去しない
  }
}

// v10: NEWバッジをライブラリ行に追加
function updateNewBadgeInLibrary(cacheKey) {
  const row = document.querySelector(`.lib-track-row[data-cache-key="${CSS.escape(cacheKey)}"]`);
  if (!row) return;
  if (!row.querySelector('.lib-new-badge')) {
